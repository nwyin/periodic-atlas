geopolitical_events:
  - date: 2024-01
    event: "US titanium sponge imports near historical high: ~40,000 t in 2024 (vs 40,400 t record in 2023); Japan 67%, Saudi Arabia 23%, Kazakhstan 7% of Jan-Sep 2024 imports"
    impact: |
      US net import reliance for sponge remained >95% of apparent consumption
      in 2024. Import source diversification from historical Japan dominance
      (82% in 2020-23) toward Saudi Arabia (rising) reflects deliberate US
      procurement strategy. The customs value of imported sponge reached ~$450M
      in 2024, up 7% from $420M in 2023.
    source_id: usgs_mcs_2025_titanium
  - date: 2024-01
    event: "Virginia company scaling new scrap titanium recycling technology: planned capacity increase from 2 t/yr to 125 t/yr, long-term goal 10,000 t/yr by 2030"
    impact: |
      US Government-funded initiative to develop domestic titanium recycling
      via powder metallurgy route. If successful, could reduce US dependence
      on imported sponge for certain aerospace applications. Near-term impact
      is negligible (2 t/yr current vs ~40,000 t/yr sponge imports).
    source_id: usgs_mcs_2025_titanium
  - date: 2024-01
    event: "US titanium scrap imports: ~28,000 t in 2024; UK 17%, Germany 12%, France and Japan 11% each, Canada and Korea 9% each"
    impact: |
      Scrap represents an important supplementary feedstock for US titanium
      producers. Import unit value fell from $9.20/kg (2023) to $8.70/kg (2024),
      reflecting softer scrap market conditions.
    source_id: usgs_mcs_2025_titanium
  - date: 2024-01
    event: "China continues as dominant ilmenite consumer: imports 4.0 Mt gross weight Jan-Oct 2024, up 14% vs same period 2023; top sources Mozambique 44%, Australia 12%, Norway 9%"
    impact: |
      China's growing TiO2 and titanium metal industries drive sustained demand
      for mineral concentrate imports. China's domestic ilmenite production (~37%
      of world) supplements but does not meet its refining appetite. Mozambique
      has emerged as the single largest source for Chinese imports.
    source_id: usgs_mcs_2025_ti_mineral_concentrates
  - date: 2024-01
    event: "Sierra Leone rutile production falls from 110 kt to 60 kt (2024e); Ukraine rutile collapses from 95 kt to 10 kt due to war"
    impact: |
      World rutile mine production declined from 590 kt (2023) to 450 kt (2024e).
      The combined 75 kt drop represents a ~13% decline in total titanium mineral
      concentrate supply on a rutile-equivalent basis. Ukraine's 85-kt rutile
      decline since the 2022 invasion has materially tightened high-grade
      feedstock availability.
    source_id: usgs_mcs_2025_ti_mineral_concentrates
  - date: 2024-01
    event: "US Government Stockpile targets: FY2024 and FY2025 potential acquisitions of 15,000 t titanium each; FY2024 disposal of 454 t titanium alloys, FY2025 disposal of 136 t"
    impact: |
      US strategic stockpile interest in titanium reflects defense and aerospace
      supply chain concerns. Acquisition targets unchanged year-over-year at
      15,000 t; modest alloy disposals indicate portfolio rebalancing.
    source_id: usgs_mcs_2025_titanium

narrative: |
  Titanium sits at the intersection of two commercially distinct markets: the
  relatively modest sponge metal market (~320,000 t/yr globally, excluding the
  US) valued for its unmatched strength-to-weight ratio and corrosion resistance,
  and the massive TiO2 pigment market (~9.8 Mt/yr capacity globally) which
  accounts for well over 95% of world titanium mineral concentrate consumption.
  The element's commercial chain runs from beach-sand deposits of ilmenite and
  rutile through mineral concentrate processing, titanium slag upgrading, and
  then diverges: the chloride/sulfate pigment route produces TiO2 for paints and
  plastics, while the Kroll reduction route (TiCl4 + magnesium) produces sponge
  metal for aerospace and defense applications. China dominates both
  streams — roughly 37% of world ilmenite mining, 69% of sponge metal production,
  and an estimated 56% of TiO2 pigment capacity.

  The US sponge metal situation is structurally fragile. Apparent consumption of
  ~340,000 t/yr depends on imports at >95% for met-grade needs, with Japan (67%
  of 2024 Jan-Sep sponge imports), Saudi Arabia (23%), and Kazakhstan (7%)
  as leading sources. Two of three US sponge facilities are idle — Henderson NV
  (12,600 t/yr capacity, idle since 2020) and Rowley UT (10,900 t/yr, idle since
  2016) — and only a 500-t/yr specialty facility in Salt Lake City is operating.
  The US Government responds via stockpile acquisition targets (15,000 t/yr in
  FY2024-25) and funding for novel recycling routes. In contrast, the US TiO2
  pigment industry (850,000 t/yr in 2024) is a net exporter, selling more to
  Canada (44%), China (12%), and other markets than it imports.

  Supply concentration and strategic designation make titanium a critical material
  for both the US (2022 Final Critical Minerals List) and the EU (CRMA 2024,
  Annex I Strategic Raw Materials). World mineral concentrate reserves are large
  (>560 Mt TiO2 content, resource base >2 billion tonnes) and geographically
  distributed — Australia holds the largest known reserves (215 Mt combined) —
  so geological scarcity is not the primary concern. The structural risks are
  sponge metal supply concentration in China and Japan, the near-complete
  collapse of US domestic sponge capacity, and the ongoing disruption to Ukraine's
  rutile production since the 2022 invasion.

