reserves:
  economic_reserves:
    value: 560000000
    unit: tonnes
    form: concentrate
    approximate: true
    confidence: high
    notes: |
      USGS MCS 2025 Titanium Mineral Concentrates p.189: world ilmenite
      reserves >510,000 kt TiO2 content + world rutile reserves >46,000 kt
      TiO2 content = combined >560,000 kt = >560,000,000 metric tons TiO2
      content. Several countries (Mozambique, Senegal, Kenya, Ukraine-rutile)
      have NA reserve data; the world total reflects the sum of known reserves
      and is therefore a lower bound.
    source_id: usgs_mcs_2025_ti_mineral_concentrates
  resources:
    value: 2000000000
    unit: tonnes
    form: concentrate
    approximate: true
    confidence: medium
    notes: |
      USGS MCS 2025 p.189: "World resources of anatase, ilmenite, and rutile
      total more than 2 billion tons." This is an overall resource base figure
      (not economic reserves). Includes sub-economic and inferred resources.
