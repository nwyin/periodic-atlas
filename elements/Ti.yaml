feedstock_origins:
  - substrate: ilmenite_concentrate
    typical_concentration_pct: 45
    notes: |
      Primary feedstock for TiO2 pigment production (via sulfate or chloride
      process) and for titanium metal sponge production (via TiCl4 intermediate).
      Natural ilmenite is FeTiO3 with ~45–65% TiO2 content. Upgraded to
      titanium slag (80–95% TiO2) by electric arc furnace smelting before
      entering the chloride process. >95% of US mineral concentrates consumed
      by TiO2 pigment producers; remainder for welding rods, metal, carbides.
    source_id: usgs_mcs_2025_ti_mineral_concentrates
  - substrate: rutile_concentrate
    typical_concentration_pct: 95
    notes: |
      High-grade feedstock (≥95% TiO2) for TiO2 pigment (chloride process)
      and titanium metal sponge. Natural rutile commands a price premium over
      ilmenite due to its higher TiO2 content and lower impurities. Synthetic
      rutile (upgraded from ilmenite) also used as feedstock; US synthetic
      rutile imports entirely from China per USGS Sep 2024 data.
    source_id: usgs_mcs_2025_ti_mineral_concentrates
  - substrate: titanium_slag
    typical_concentration_pct: 87
    notes: |
      Intermediate product (80–95% TiO2) produced by electric arc furnace
      smelting of ilmenite. Slag is a major chloride-process feedstock globally.
      US slag imports (Sep 2024): Canada 46%, Norway 31%, South Africa 23%.
      USGS reports slag unit value of US imports at $990/t (2024e), down from
      $1,050/t in 2023.
    source_id: usgs_mcs_2025_ti_mineral_concentrates

substitutes:
  - application: metal_high_strength_structural
    availability: partial
    notes: |
      USGS MCS 2025 Titanium and TiO2 chapter: "In high-strength applications,
      titanium competes with aluminum, composites, intermetallics, steel, and
      superalloys." These substitutes can replace titanium in specific aerospace
      and industrial structures, but typically at a weight or corrosion
      performance penalty. Titanium's strength-to-weight ratio and corrosion
      resistance are considered essentially unmatched at comparable weight in
      many aero applications.
    source_id: usgs_mcs_2025_titanium
  - application: metal_corrosion_resistance
    availability: partial
    notes: |
      USGS MCS 2025: "Aluminum, nickel, specialty steels, and zirconium alloys
      may be substituted for titanium for applications that require corrosion
      resistance." These materials offer adequate corrosion resistance in some
      chemical processing, marine, and medical environments but generally with
      trade-offs in weight, cost, or performance at extreme conditions.
    source_id: usgs_mcs_2025_titanium
  - application: tio2_white_pigment
    availability: partial
    notes: |
      USGS MCS 2025: "Ground calcium carbonate, precipitated calcium carbonate,
      kaolin, and talc compete with TiO2 as a white pigment." These extender
      pigments offer lower cost but significantly inferior hiding power and
      brightness. TiO2 has the highest refractive index of any commercial white
      pigment (n=2.73 for rutile); no complete functional substitute exists at
      the same loading level.
    source_id: usgs_mcs_2025_titanium
  - application: mineral_concentrate_feedstock
    availability: full
    notes: |
      USGS MCS 2025 Titanium Mineral Concentrates chapter: "Ilmenite, leucoxene,
      rutile, slag, and synthetic rutile compete as feedstock sources for
      producing TiO2 pigment, titanium metal, and welding-rod coatings."
      These materials are functional substitutes for each other in many
      production routes, with price differentials driving feedstock mix choices.
    source_id: usgs_mcs_2025_ti_mineral_concentrates

end_uses:
  uses:
    - application: tio2_pigment_paints_coatings
      share_pct: 57
      confidence: medium
      notes: |
        USGS MCS 2025 p.186: leading use of TiO2 pigment is "paints (including
        lacquers and varnishes)." Paints and coatings typically account for
        ~55-60% of global TiO2 pigment demand. More than 95% of US mineral
        concentrates consumed by TiO2 pigment producers; paints/coatings is
        the dominant downstream use. Percentage inferred from USGS qualitative
        description and industry context; exact global split not stated.
      source_id: usgs_mcs_2025_titanium
    - application: tio2_pigment_plastics
      share_pct: 20
      confidence: medium
      notes: |
        USGS MCS 2025 p.186: second leading use of TiO2 pigment is plastics.
        Plastics use TiO2 as an opacifier and UV stabilizer. Share inferred
        from USGS ordering (paints, plastics, paper) and industry context.
      source_id: usgs_mcs_2025_titanium
    - application: tio2_pigment_paper
      share_pct: 10
      confidence: medium
      notes: |
        USGS MCS 2025 p.186: third leading use of TiO2 pigment is paper.
        Paper uses TiO2 for whiteness and opacity. Share inferred.
      source_id: usgs_mcs_2025_titanium
    - application: metal_aerospace
      share_pct: 7
      confidence: medium
      notes: |
        USGS MCS 2025 p.186: "the majority of titanium metal was used in
        aerospace applications." Aerospace (airframes, engines, fasteners) is
        the dominant use of titanium sponge/mill products. Total titanium metal
        apparent consumption was estimated at ~340,000 t in 2024. Share estimated
        relative to total mineral concentrates market.
      source_id: usgs_mcs_2025_titanium
    - application: tio2_pigment_other
      share_pct: 4
      confidence: low
      notes: |
        USGS MCS 2025 p.186: other TiO2 uses include catalysts, ceramics,
        coated fabrics and textiles, floor coverings, printing ink, and
        roofing granules.
      source_id: usgs_mcs_2025_titanium
    - application: metal_other
      share_pct: 2
      confidence: low
      notes: |
        USGS MCS 2025 p.186: titanium metal remainder uses include armor,
        chemical processing, marine hardware, medical implants, power
        generation, and other applications. Also includes welding-rod coatings,
        carbides, and chemicals from mineral concentrates (small fraction).
      source_id: usgs_mcs_2025_titanium
  completeness: partial

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_critical_minerals_2022
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_annex_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_annex_2024
  notes: |
    Titanium is on the US 2022 Final List of Critical Minerals (Federal Register
    Vol. 87, No. 37, February 22, 2022). Titanium metal is listed in Annex I
    (Strategic Raw Materials) and Annex II (Critical Raw Materials) of the EU
    Critical Raw Materials Act (Regulation EU 2024/1252, March 2024). Criticality
    reflects supply concentration risk in sponge metal (China ~69% of world
    production, Japan ~17%) and strategic importance for aerospace and defense.
    The US Government Stockpile targets potential acquisition of 15,000 metric
    tons of titanium in both FY2024 and FY2025.

