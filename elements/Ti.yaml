symbol: Ti
atomic_number: 22
name: titanium
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Titanium is a three-stream commodity. USGS MCS 2025 reports:
  (1) mineral concentrates — ilmenite and rutile — in thousand metric tons of
  titanium dioxide (TiO2) content; (2) sponge metal in metric tons, produced by
  the Kroll process (TiCl4 reduced with magnesium); and (3) TiO2 pigment in
  metric tons of pigment product. All production quantities in this file are
  converted to tonnes_per_year or tonnes as appropriate.
  Ilmenite (FeTiO3) accounts for roughly 90% of world titanium mineral
  consumption; rutile (TiO2, typically ≥95% TiO2 content) commands a
  significant price premium over ilmenite. Titanium slag (an upgraded ilmenite
  smelted to 80–95% TiO2) is an important intermediate feedstock traded
  alongside natural concentrates. Sponge metal prices are reported as landed
  duty-paid unit value of US imports. TiO2 pigment prices are US domestic
  prices from US Salient Statistics.

