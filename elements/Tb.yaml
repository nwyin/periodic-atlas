symbol: Tb
atomic_number: 65
name: terbium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single grouped commodity chapter
  ("rare earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element
  tonnage is not published for individual REEs. Per-element attribution for terbium
  requires multiplying the aggregate by Tb's typical basket share. Terbium is
  commercially traded as Tb₄O₇ (terbium(III,IV) oxide) at ≥99.99% minimum purity —
  the same high-purity specification as europium oxide in the USGS MCS 2025 salient
  statistics table, and distinct from the 99.5% grade tracked for La, Ce, and Nd
  oxides. USGS MCS 2025 explicitly lists terbium oxide (99.99% minimum) as a tracked
  price commodity, alongside dysprosium oxide (99.5% minimum) and europium oxide
  (99.99% minimum), sourced from Argus Media Group (footnote 6). All production
  figures in this file are derived by multiplying USGS-reported aggregate REO totals
  by Tb's typical basket share of ~0.1%, which is not reported directly by USGS.
  The basket share varies significantly by deposit type: bastnaesite and carbonatite
  deposits (Mountain Pass CA, Bayan Obo CN, Mt. Weld AU) are LREE-dominant and yield
  very low Tb fractions (~0.01–0.03% Tb₄O₇ of total REOs); ion adsorption clay
  deposits in southern China and Southeast Asia yield much higher Tb proportions
  (~0.2–0.5%) because these deposits are enriched in the heavy REEs (Gd–Lu). Terbium
  is the lightest heavy REE with significant commercial application. A global weighted
  average of ~0.1% is used as the central estimate here, but China's actual share of
  world Tb production substantially exceeds its 69% share of total REO because its
  HREE-enriched southern-China ion adsorption clay deposits are the world's dominant
  source of commercial terbium. All data are in metric tons REO equivalent unless
  otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 390
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Tb's typical basket share of ~0.1% gives
      ~390 t Tb₄O₇ equivalent. Terbium's basket share is not reported separately by USGS;
      the 0.1% factor is an industry consensus figure for the global weighted average across
      deposit types. LREE-dominant bastnaesite mines at Mountain Pass (CA), Bayan Obo (CN),
      and Mt. Weld (AU) have Tb fractions of only ~0.01–0.03% of REO; ion adsorption clay
      deposits in southern China and Southeast Asia (Myanmar, Thailand) contain ~0.2–0.5%
      Tb₄O₇, making them the dominant commercial Tb source despite contributing only ~30% of
      world REO tonnage. Actual Tb output is not officially disaggregated from the REE basket
      in public USGS data; this figure carries low confidence. The 2023 comparable estimate
      is ~376 t at the same 0.1% share applied to 376,000 t world total.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        quantity:
          value: 270
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          China 2024e REE total: 270,000 t REO (production quota per USGS footnote 14;
          excludes undocumented production). China share of world: 270,000 / 390,000 =
          69.2%. Estimated Tb component at 0.1% basket share: ~270 t Tb₄O₇. However,
          China's actual Tb share is substantially higher than 69.2% because southern
          China ion adsorption clay deposits (Jiangxi, Fujian, Guangdong) contain
          ~0.3–0.5% Tb₄O₇ — far above the global basket average — and are the world's
          primary commercial Tb source. Undocumented production from smaller Chinese ion
          adsorption clay mines further increases China's effective Tb share. The 0.1%
          global average applied here underestimates China's actual Tb output. China's
          2024 quota rose from 255,000 t in 2023 to 270,000 t.
        source_id: usgs_mcs_2025_rare_earths
      - country: US
        share_pct: 11.5
        quantity:
          value: 45
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          US 2024e REE total: 45,000 t REO from bastnaesite concentrates at Mountain Pass,
          CA (MP Materials), valued at ~$260 million. Estimated Tb at 0.1% global average:
          ~45 t. This is a significant overestimate for Mountain Pass: bastnaesite from
          Mountain Pass contains approximately 0.01–0.03% Tb₄O₇ of total REOs, far below
          the global basket average applied here. Actual US Tb content in Mountain Pass
          concentrate is likely only ~5–15 t. Mountain Pass concentrate is shipped primarily
          to China for separation; virtually no commercial Tb₄O₇ is separated domestically.
          Production up from 41,600 t REO in 2023.
