criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Terbium is classified as critical under the US 2022 Critical Minerals List as part
    of "rare earth elements" (a group designation). US net import reliance for REE
    compounds and metals was 80% in 2024e (USGS MCS 2025 salient statistics). Heavy rare
    earth elements including terbium are designated as Critical Raw Materials and Strategic
    Raw Materials under EU Regulation 2024/1252 (Critical Raw Materials Act, CRMA); the EU
    explicitly distinguishes light REEs and heavy REEs as separate CRM entries. Terbium's
    criticality is amplified by its growing use in NdFeB magnets for EV traction motors and
    wind turbine generators — clean energy applications with rapid demand growth — and by
    its near-complete dependence on Chinese HREE supply chains (ion adsorption clay
    processing). In April 2025 China directly named Tb as one of seven rare earth elements
    subject to export controls, the most acute supply-chain risk event in the USGS 2025
    reporting window. Import sources 2020–23: China 70%, Malaysia 13%, Japan 6%, Estonia 5%.

geopolitical_events:
  - date: "2025-04"
    event: "China imposes export controls on 7 REEs including terbium, dysprosium, gadolinium, samarium, lutetium, scandium, and yttrium"
    impact: |
      China's April 2025 REE export controls directly targeted terbium by name, requiring
      export licenses for Tb metal, Tb₄O₇ oxide, and Tb-containing alloy intermediates.
      Terbium is particularly sensitive because (1) its dominant commercial application —
      HREE dopant in NdFeB magnets for EV traction motors and wind turbines — is on a
      strong growth trajectory with clean energy deployment, and (2) China controls the
      near-entirety of commercial Tb supply through its ion adsorption clay deposits and
      processing facilities. Non-Chinese producers of Tb₄O₇ are essentially absent at
      commercial scale. The controls placed direct pressure on NdFeB magnet manufacturers
      outside China that use Tb for high-temperature coercivity enhancement, with no
      near-term alternative supply source.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2022"
    event: "Terbium oxide price peaks at $2,051/kg driven by EV and wind turbine demand forecasts — the highest unit price in the 2020–2024 price series"
    impact: |
      USGS MCS 2025 salient statistics show Tb₄O₇ (99.99%) rising from $670/kg in 2020 to
      $1,346/kg in 2021 and peaking at $2,051/kg in 2022, before declining to $1,298/kg in
      2023 and $810/kg in 2024e. The 2022 peak was driven by rapid scaling of EV production
      and accelerated wind farm deployment globally, both of which require NdFeB magnets with
      Tb/Dy HREE additions for high-temperature performance. The subsequent price decline
      from the 2022 peak reflects partial demand-side adjustment (magnet manufacturers
      reducing Tb loading via grain-boundary diffusion techniques and motor redesign) and
      recovery of Myanmar ion adsorption clay supply. At $810/kg in 2024e, Tb remains by
      far the most expensive of the commonly tracked REE oxides.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "Global REE mine production increases to 390,000 t REO in 2024e; Burma REE production falls 28% YoY, affecting HREE supply"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t, up from 376,000 t in
      2023, driven by China, Nigeria, and Thailand growth. However, Burma (Myanmar) fell
      from 43,000 t to 31,000 t REO (-28% YoY). Burma's ion adsorption clay deposits are
      HREE-enriched (high Tb content), so its 12,000 t decline has a disproportionate
      impact on world Tb supply relative to its 8% share of total REO. At 0.1% basket
      average, Burma's 12,000 t decline implies ~12 t less Tb, but the true reduction may
      be higher given above-average Tb fractions in Burmese clay deposits. Production data
      for Burma estimated from China import records (USGS footnote 12).
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "US net import reliance for REE compounds and metals declines to 80% in 2024e; Tb-specific US processing capacity remains absent"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds and
      metals at 80% in 2024e, down from >95% in 2020–2023, reflecting growth in domestic
      compound production to 7,600 t total in 2024. However, this improvement is concentrated
      in LREE processing (NdPr compounds in California, RE compounds in Utah). No domestic US
      separation of Tb₄O₇ at commercial scale is reported. Mountain Pass concentrate, which
      contains trace quantities of Tb (~0.01–0.02% of REO), is processed in China. US NdFeB
      magnet manufacturers requiring Tb for high-temperature coercivity remain entirely
      dependent on imported Tb₄O₇ or pre-alloyed NdFeB with Tb additions from Chinese
      processors.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Terbium stands apart within the rare earth supply chain as the most commercially
  valuable of the HREE oxides tracked by USGS MCS 2025, priced at $810/kg in 2024e
  (≥99.99% Tb₄O₇) — more than three times the price of dysprosium oxide ($260/kg) and
  nearly 15 times the price of neodymium oxide ($56/kg). This premium reflects Tb's
  unique combination of high demand growth (driven by clean energy applications) and
  extreme supply concentration in Chinese ion adsorption clay deposits. Unlike the
  light rare earths (La, Ce, Nd), which are produced in large volumes from LREE-dominant
  bastnaesite at Mountain Pass and Bayan Obo, terbium is predominantly recovered from
  heavy-REE-enriched ion adsorption clays in southern China's Jiangxi, Fujian, and
  Guangdong provinces — a deposit type with essentially no significant non-Chinese
  counterpart at commercial scale. Burma (Myanmar) and Thailand contribute HREE clay
  production, but Chinese processing of their concentrates means China controls the
  full value chain.

  Terbium's fastest-growing and now dominant application is as a coercivity enhancer in
  NdFeB permanent magnets for high-temperature environments — specifically EV traction
  motors and direct-drive wind turbine generators. Both applications require magnets that
  maintain strong fields at operating temperatures well above ambient (EV motors: >150°C);
  adding Tb or Dy at ~0.1–0.5 wt% dramatically increases the magnet's coercivity and
  operating temperature ceiling. Advanced grain-boundary diffusion techniques reduce the
  required HREE loading per magnet (by concentrating Tb/Dy at grain boundaries rather than
  dissolving it throughout the alloy), partially dampening demand growth per unit of EV or
  wind capacity, but the absolute growth in EV and wind deployment more than offsets this
  efficiency gain. This demand dynamic drove the 2021–2022 price surge to $2,051/kg and
  is the structural force maintaining Tb prices well above the long-run lows seen for bulk
  LREEs. Phosphors — once the dominant Tb end use (Tb³⁺ green emission in tri-color
  fluorescent lamps) — remain significant but are in structural decline with the ongoing
  shift to LED lighting.

  China's direct targeting of terbium in its April 2025 export controls — explicitly naming
  Tb alongside Dy, Sm, Gd, Lu, Sc, and Y — marked the sharpest formalization of Tb supply
  risk since the 2010–2012 REE export restriction era. Unlike neodymium and praseodymium,
  which are targeted indirectly through NdFeB magnet technology and equipment controls, Tb
  was named as a directly controlled substance, with export licenses required for Tb metal,
  Tb₄O₇ oxide, and processed alloy products. Building resilient non-Chinese Tb supply chains
  requires developing non-Chinese ion adsorption clay operations at scale — a decade-long
  challenge involving ore body development, hydromet processing, and separation technology
  — or developing viable magnet designs with substantially reduced or eliminated Tb loading.
  Neither pathway is close to commercial realization at the scale required to replace Chinese
  HREE supply.

