          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Thailand 2024e REE total: 13,000 t REO, up from 3,600 t in 2023 (+261% YoY).
          Thailand produces from ion adsorption clay deposits; Tb content is likely above
          the global basket average (~0.2–0.4%). Applying 0.1% global average gives ~13 t,
          which likely understates actual Thai Tb output. Cited by USGS as a driver of
          global production growth alongside China and Nigeria. Production estimated from
          China import data (USGS footnote 12). Thailand REO reserves: 4,500 t.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 2.3
        quantity:
          value: 9
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Remaining producers 2024e: India (2,900 t), Russia (2,500 t), Madagascar
          (2,000 t), Other USGS bucket (1,100 t), Vietnam (300 t), Malaysia (130 t),
          Brazil (20 t) ≈ 8,950 t total REO, ~2.3% of world. Estimated combined Tb
          contribution ~9 t at 0.1% global basket average.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 93
        notes: |
          China controls approximately 90–95% of global REE separation and refining
          capacity; for heavy REEs like Tb, China's dominance is even greater than for
          LREEs because the primary ore sources (southern China ion adsorption clays)
          are processed domestically. High-purity Tb₄O₇ (≥99.99%) production is
          concentrated in specialized Chinese separation facilities in Jiangxi, Fujian,
          and Guangdong provinces. USGS MCS 2025 import sources (2020–23) confirm China
          supplied 70% of US REE compound and metal imports; China's actual share of
          Tb₄O₇ separation is higher (~93%+) as non-Chinese separators have very limited
          HREE processing capacity. Mountain Pass concentrate exported to China contains
          trace Tb that is recovered there, not in the US.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 4
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate and produces separated REE oxides including
          minor quantities of Tb₄O₇. LAMP is the world's largest non-Chinese REE
          separation facility. However, as Mt. Weld concentrate is LREE-dominant,
          LAMP's contribution to global Tb₄O₇ output is minimal relative to Chinese
          ion adsorption clay processors. USGS cites Malaysia as 13% of US REE compound
          and metal imports (2020–23), but most of that is LREE products (La, Ce, NdPr).
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Other non-Chinese Tb₄O₇ producers are limited: Neo Performance Materials
          (Sillamäe, Estonia, 5% of US imports 2020–23), Japanese processors (Japan 6%
          of US imports 2020–23), and nascent separation capacity in the US. Estonia and
          Japan source feed from Australian and Chinese intermediates per USGS chapter
          text. Phosphor- and magnet-grade Tb₄O₇ at ≥99.99% purity is an overwhelmingly
          Chinese specialty product. Non-Chinese HREE separation capacity is very limited
          compared to LREE separation.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Tb-specific figures derived from REO totals using the ~0.1%
    basket share assumption; actual per-element disaggregation is not available from
    public USGS data. Terbium as a HREE is disproportionately concentrated in China's
    ion adsorption clay deposits and Myanmar/Thailand HREE-enriched clays; the 0.1%
    global average applied here likely underestimates actual Tb output from HREE-rich
    sources and overestimates it from LREE-dominant mines (Mountain Pass, Mt. Weld).

reserves:
  economic_reserves:
    value: 90000
    unit: tonnes
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports world total REE reserves >90,000,000 t REO
      (floor value used). Applying Tb's typical basket share (~0.1%) gives ~90,000 t
      Tb₄O₇ equivalent. USGS does not report per-element reserve breakdowns; all
      Tb-specific reserve figures are derived. The true figure is uncertain because
      (1) the world REO total is stated as ">90,000,000 t" (a floor), and (2) Tb's
      actual fraction varies by deposit type. Ion adsorption clay reserves in southern
      China have higher Tb concentrations (~0.3–0.5%) than bastnaesite or carbonatite
      reserves (~0.01–0.03%), meaning the effective Tb reserve concentration by deposit
      type does not track total REO reserve distribution.
