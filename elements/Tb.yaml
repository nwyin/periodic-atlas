byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 0.35
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma/Myanmar, Thailand) are the world's primary commercial source
      of terbium. These deposits are enriched in heavy rare earth elements relative to
      the LREE-dominant bastnaesite and carbonatite mines. Tb₄O₇ typically represents
      ~0.2–0.5% of total REOs in southern China ionic clay concentrates, compared to
      ~0.01–0.03% in bastnaesite. USGS MCS 2025 cites Myanmar and Thailand production
      as estimated from China import data; these represent predominantly clay-derived
      HREE concentrates. The high Tb fraction in clay deposits makes them the economic
      backbone of global Tb supply despite contributing only ~30% of world REO tonnage.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.02
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary commercial source of light
      REEs (La, Ce, Pr, Nd) but contains very little terbium. Tb₄O₇ typically represents
      only ~0.01–0.03% of total REOs in commercial bastnaesite concentrates (Mountain Pass
      CA ~0.01–0.02%; Bayan Obo CN ~0.02%; Mt. Weld AU ~0.02%). USGS MCS 2025 confirms
      bastnaesite was mined as a primary product at Mountain Pass in 2024. Small amounts of
      Tb are recovered during Chinese processing of mixed bastnaesite concentrate, but
      Mountain Pass concentrate exported to China contributes a minor fraction of world Tb
      supply relative to clay-deposit sources. The very low Tb content of bastnaesite makes
      it an uneconomic primary Tb source.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.06
    notes: |
      Monazite (rare-earth phosphate) is stockpiled as a separated concentrate or recovered
      as an accessory mineral in heavy-mineral-sand concentrates. USGS MCS 2025 confirms
      monazite was stockpiled in the southeastern United States in 2024. Tb typically
      represents ~0.05–0.08% of total REOs in monazite. Thorium content in monazite
      complicates processing under radioactive materials regulations. Monazite contributes
      modestly to world Tb supply through Indian and other heavy mineral sand operations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: ndfeb_magnet_coercivity_enhancer
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For Tb's role as a heavy-REE coercivity enhancer in NdFeB permanent
      magnets, dysprosium (Dy) is the primary substitute: both Tb and Dy are added to
      NdFeB alloys (as Tb₃Fe₅, TbFe₂, or grain-boundary diffusion layers) to increase
      coercivity and extend operating temperature range for EV traction motors and wind
      turbine generators. Tb provides higher coercivity per unit weight than Dy but at
      significantly higher cost ($810/kg versus $260/kg in 2024e). Holmium (Ho) is a
      weaker substitute with lower anisotropy. Motor redesign to operate at lower
      temperatures reduces or eliminates the need for HREE dopants, but this limits
      power density. No complete substitute exists for the combination of energy density
      and high-temperature performance that Tb/Dy-doped NdFeB provides in high-performance
      EV traction and wind turbine applications.
    source_id: usgs_mcs_2025_rare_earths
  - application: green_phosphors_fluorescent_led
    availability: partial
    notes: |
      For Tb³⁺-activated green phosphors in fluorescent lamps and LED applications
      (lanthanum phosphate Ce,Tb:LaPO₄ and terbium aluminum garnet Ce:TAG), europium
      (Eu³⁺) and cerium (Ce³⁺) provide different emission colors (red and blue-to-yellow)
      but cannot replace Tb³⁺ green emission. Ce³⁺-doped YAG (Y₃Al₅O₁₂:Ce) provides
      warm-white LED phosphor without Tb but with different color rendering. LED phosphors
      require less total phosphor mass per lumen than fluorescent technology, reducing
      total Tb consumption per lighting unit. The shift from fluorescent to LED has reduced
      Tb demand for phosphors structurally, but Tb-based green phosphors retain some use
      in tri-color fluorescent lamps and specialty LED applications. USGS MCS 2025 general
      substitutes statement applies.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: magnets_ndfeb_hree_dopant
      share_pct: 60
      confidence: low
      notes: |
        Terbium's dominant and fastest-growing end use is as a heavy-REE additive in
        neodymium-iron-boron (NdFeB) permanent magnets to increase coercivity at elevated
        operating temperatures. Tb is added at ~0.1–0.5% by weight (as Tb₃Fe₅ alloy or
        via grain-boundary diffusion) to NdFeB magnets used in EV traction motors (~1–2 kg
        Nd/vehicle; Tb/Dy content is a fraction of that) and direct-drive wind turbine
        generators. High-coercivity NdFeB with Tb/Dy additions is essential for EV motor
        designs that operate at elevated temperatures (>150°C in traction applications)
        without loss of field strength. Compared to Dy, Tb provides superior coercivity
        enhancement per unit weight, reducing the HREE addition needed in advanced magnet
        designs. Tb use in magnets grows with EV and wind turbine deployment; USGS MCS
        2025 lists permanent magnets as a major REE end use. The 60% share is an industry
        consensus estimate; USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: phosphors_fluorescent_led
      share_pct: 25
      confidence: low
      notes: |
        Tb³⁺ (terbium(III) ion) is a highly efficient green-emitting activator in rare-earth
        phosphors, used in tri-color fluorescent lamps (Ce,Tb:LaPO₄ "LAP" phosphor, green
        channel), compact fluorescent lamps (CFLs), and some LED and display phosphors.
        The Tb³⁺ → ⁵D₄ → ⁷F_J emission at ~544 nm provides saturated green color. Phosphor
        demand for Tb has declined significantly since peak CFL production (~2010–2015) due
        to LED adoption and the obsolescence of CRT displays. LED systems require less
        phosphor mass per lumen than fluorescent technology. USGS MCS 2025 lists ceramics
        and glass (including phosphors) as REE end uses. The 25% share reflects the
        declining but still significant phosphor segment; it was the dominant Tb use
        prior to NdFeB magnet growth. Share is an industry consensus estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: solid_oxide_fuel_cells_specialty
      share_pct: 8
      confidence: low
      notes: |
        Terbium oxide (Tb₄O₇) is used as a dopant in solid oxide fuel cells (SOFCs) and
        in specialty functional ceramics. Tb-doped ceria (TDC) and mixed Tb-Ce oxides have
        ionic conductivity properties used in SOFC electrolyte layers and in electrochromic
        materials. Terbium is also used in terbium-doped garnets (Tb₃Al₅O₁₂, TAG) for
        magneto-optical applications (Faraday rotators, isolators) and in specialty optical
        glass. The magnetostrictive compound Terfenol-D (Tb₀.₃Dy₀.₇Fe₂) uses Tb as a
        primary constituent for precision actuation in sonar transducers, vibration
        cancellation, and industrial motion control. Share is an estimate aggregating
        several specialty applications.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_uses
      share_pct: 7
      confidence: low
      notes: |
        Other minor applications include Tb-doped materials for neutron imaging, Tb-chelate
        complexes as labels in time-resolved fluorescence bioassays (Tb³⁺ has a long
        fluorescence lifetime enabling time-gated detection), specialty glass for UV
        absorption, research-grade laser host materials, and minor metallurgical uses.
        Aggregate of several small-volume specialty applications. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

prices:
  - year: 2024
    value: 810
    unit: usd_per_kg
    form: oxide
    basis: spot
    region: US
    notes: |
      USGS MCS 2025 salient statistics: terbium oxide (Tb₄O₇), 99.99% minimum purity,
      average price 2024e = $810/kg. Source: Argus Media Group, Argus Non-Ferrous Markets
      (footnote 6). Price declined sharply from the 2022 peak of $2,051/kg, reflecting
      normalization after the 2021–2022 REE market run-up driven by EV and wind turbine
      demand forecasts. At $810/kg, terbium oxide is among the most valuable REE commodities
      by unit price, far above NdPr oxide ($56/kg), Dy oxide ($260/kg), and Eu oxide ($27/kg)
      in 2024e. The 99.99% minimum purity specification reflects the high-purity requirements
      for both magnet alloy production and phosphor applications.
    source_id: usgs_mcs_2025_rare_earths
