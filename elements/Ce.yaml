byproduct_of: []
feedstock_origins:
  - substrate: bastnaesite_ore
    typical_concentration_pct: 49
    notes: |
      Primary commercial REE mineral; Ce comprises ~49% of TREO in bastnaesite.
      Key deposits: Bayan Obo (China, world's largest REE deposit), Mountain Pass
      (US, MP Materials), Mount Weld (Australia, Lynas). High Ce and La content
      relative to heavy REEs; processing produces a LREE-rich intermediate.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 43
    notes: |
      Thorium-bearing phosphate mineral recovered as a byproduct of heavy-mineral-
      sand operations (ilmenite, zircon, rutile mining). Ce ~43% of TREO in monazite.
      Thorium radioactivity complicates processing and waste disposal; historically
      stockpiled by the US government. USGS MCS 2025 notes monazite stockpiled as
      separated concentrate or as an accessory mineral in southeastern US heavy-mineral-
      sand concentrates.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: ionic_adsorption_clay
    typical_concentration_pct: 3
    notes: |
      Weathered granite clay deposits in southern China and Myanmar; Ce is a minor
      component (~2–5% of TREO) because these deposits are heavy-REE dominant
      (Dy, Tb, Y, Er). High-value for heavy REEs but low Ce yield per tonne of ore.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Substitutes are available for many
      applications but generally are less effective." For cerium specifically:
      alumina (Al2O3) and iron oxide powder can substitute for CeO2 in glass
      polishing but with lower cutting rate and surface quality. Alternative
      zeolite additives and vanadium compounds can partially substitute for
      cerium in fluid catalytic cracking (FCC) catalysts, but Ce provides
      unique oxygen storage and redox cycling properties that are difficult to
      replicate. Ferrite and bonded-magnet grades can be formulated with reduced
      Ce addition, though Ce/La substitution for Nd in magnets trades cost
      savings for lower energy product.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: catalysts_fcc_and_auto
      share_pct: 45
      confidence: low
      notes: |
        Catalysts are the leading domestic end use of rare earths per USGS MCS
        2025 chapter text. For cerium specifically, fluid catalytic cracking (FCC)
        catalysts for petroleum refining and automotive exhaust catalysts are the
        dominant applications. Ce acts as an oxygen storage component (OSC) in
        three-way catalytic converters and as a stabilizer in FCC zeolite catalysts.
        The 45% share is an approximation based on historical USGS REE chapter
        reporting patterns; the 2025 chapter does not quantify per-element end-use
        percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: metallurgical_additives
      share_pct: 18
      confidence: low
      notes: |
        Mischmetall (mixed rare earth metal, typically ~65% Ce and 35% La by USGS
        convention) is used in cast iron, steel, and aluminum alloys to improve
        mechanical properties and nodularity. Also used in lighter flints (Ce
        pyrophoric alloy). Share is approximate; USGS 2025 chapter identifies
        metallurgical applications and alloys among significant REE end uses.
      source_id: usgs_mcs_2025_rare_earths
    - application: glass_polishing
      share_pct: 14
      confidence: low
      notes: |
        Cerium oxide (CeO2) polishing powder is the dominant abrasive for precision
        glass polishing (optical components, hard drives, flat panel displays, solar
        panels). Share is approximate; USGS 2025 chapter text identifies polishing
        among significant rare earth end uses.
      source_id: usgs_mcs_2025_rare_earths
    - application: glass_ceramics_additives
      share_pct: 12
      confidence: low
      notes: |
        Ce2O3 and CeO2 are added to specialty glass to block UV transmission
        (optical filters, windshields, TV tubes), decolorize glass (neutralizing
        iron-induced tint), and provide color in ceramics. Share is approximate;
        USGS 2025 chapter identifies ceramics and glass among significant REE uses.
      source_id: usgs_mcs_2025_rare_earths
    - application: phosphors_and_other
      share_pct: 11
      confidence: low
      notes: |
        Residual uses including phosphors (Ce:YAG white LED phosphors, fluorescent
        lamp phosphors), cerium-doped fiber optics, and nuclear applications.
        Share is approximate and aggregates several minor applications.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

