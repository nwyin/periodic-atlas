symbol: Ce
atomic_number: 58
name: cerium
category: lanthanide
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS reports rare earth elements as a grouped commodity in metric tons of
  rare-earth-oxide (REO) equivalent; per-element tonnage is not published
  for individual REEs in the MCS chapter. Per-element attribution for cerium
  requires multiplying the aggregate by Ce's typical basket share. Cerium is
  the most abundant REE by mass in most commercial ore bodies, comprising
  approximately 33% of the global REE basket weighted across deposit types
  (bastnaesite ~49% Ce, monazite ~43% Ce, ionic adsorption clay ~2–5% Ce).
  Prices are quoted per kilogram for specific oxide grades. Cerium oxide
  (99.5% minimum) is among the lowest-priced REO commodities (~$1/kg in
  2022–2024), reflecting Ce's geological abundance and concentration in
  bulk industrial uses rather than high-performance magnet or phosphor
  applications.

