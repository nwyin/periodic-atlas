symbol: O
atomic_number: 8
name: oxygen
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Commercial oxygen is produced from ambient air, primarily in cryogenic air
  separation units (ASUs). Linde's 2024 annual report describes oxygen as a
  typical large-volume on-site gas supplied by pipeline from cryogenic plants,
  while merchant oxygen is distributed as a cryogenic liquid by tanker truck and
  small-volume demand is served in cylinders. WHO's medical-oxygen guidance
  distinguishes medical oxygen made by air liquefaction at not less than 99.5%
  v/v O2 from PSA output at 93% +/- 3%; industrial and medical oxygen are not
  interchangeable.

