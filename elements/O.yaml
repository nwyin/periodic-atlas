feedstock_origins:
  - substrate: atmospheric_air
    typical_concentration_pct: 20.95
    notes: |
      Oxygen is separated from ambient air. WHO's oxygen guidance cites room air
      as 21% oxygen for concentrator specifications, which is consistent with
      standard atmospheric composition and with cryogenic-ASU feed assumptions.
    source_id: who_oxygen_topic_2025

substitutes:
  - application: medical_oxygen
    availability: none
    notes: |
      WHO describes oxygen as a life-saving essential medicine with no
      substitution. Industrial oxygen is not interchangeable with medical oxygen,
      and patient use requires medical-grade product or regulated on-site
      generation meeting healthcare specifications.
    source_id: who_oxygen_topic_2025

end_uses:
  uses:
    - application: steelmaking_and_metallurgy
      share_pct: 55
      confidence: low
      notes: |
        Inferred dominant end use. worldsteel reported 1,882.6 Mt of crude steel
        in 2024, and the IEA reports BF-BOF routes still make up about 70% of
        global steel production. That makes steelmaking the anchor demand center
        for commercial oxygen even though public primary sources do not publish a
        direct global oxygen-by-end-use table.
      source_id: iea_breakthrough_2025_steel
    - application: chemicals_fuels_and_refining
      share_pct: 20
      confidence: low
      notes: |
        Inferred from very large on-site oxygen deployments into fuels and
        chemicals. Air Liquide's Secunda installation alone added a 5,000 t/d
        oxygen unit and brought its Sasol site total above 45,000 t/d of oxygen
        capacity for fuels and chemicals, demonstrating that chemical complexes
        are the second major oxygen sink after steel.
      source_id: airliquide_secunda_2018
    - application: healthcare_medical_oxygen
      share_pct: 10
      confidence: low
      notes: |
        Inferred global share for medical oxygen as a distinct but smaller stream
        than steel or chemicals. WHO classifies oxygen as an essential medicine
        used across wards, ICU, surgery, trauma, pneumonia, and COVID-19 care,
        but does not publish a global tonnage share; the 10% value is a cautious
        market-share estimate rather than a published official statistic.
      source_id: who_oxygen_topic_2025
    - application: glass_water_wastewater_cutting_welding_pulp_paper_and_other
