geopolitical_events:
  - date: 2021-02
    event: "WHO and partners launched an oxygen-emergency response as COVID-19 sharply increased medical oxygen demand"
    impact: |
      WHO reported that the pandemic accelerated global oxygen demand and that
      more than half a million COVID-19 patients in low- and middle-income
      countries were estimated to need oxygen treatment every day. The episode
      exposed the fragility of medical-oxygen logistics, cylinder supply, power
      reliability for concentrators and PSA plants, and the distinction between
      industrial oxygen capacity and patient-ready medical oxygen systems.
    source_id: who_covid_oxygen_emergency_2021
  - date: 2024-05
    event: "Linde signed a long-term agreement to supply oxygen, nitrogen, and argon to H2 Green Steel's first large-scale green-steel plant in Sweden"
    impact: |
      The project shows that oxygen remains infrastructure-critical even in lower
      emissions steel routes. Decarbonization does not remove oxygen from the
      steel value chain; instead it shifts new ASU investment toward DRI-EAF and
      integrated green-steel hubs.
    source_id: linde_h2greensteel_2024

narrative: |
  Oxygen is one of the highest-volume industrial elements, but unlike sulfur,
  chlorine, or helium it is not reported by USGS as a dedicated mineral
  commodity. The commercial reality is an industrial-gas business layered on top
  of atmospheric air: very large customers take pipeline oxygen from on-site
  cryogenic ASUs, merchant customers receive liquid oxygen by tanker, and
  healthcare systems use either air-liquefaction product that meets
  pharmacopoeial purity or regulated on-site generation such as PSA plants.

  The dominant oxygen sink is still steelmaking, which is why the most
  defensible production metric in public primary sources is a steel-linked
  captive stream rather than a single global oxygen total for every market. The
  secondary anchors are fuels-and-chemicals complexes, followed by the medical
  oxygen system that became strategically visible during the COVID-19 emergency.
  Decarbonization changes where new ASUs get built, but it does not eliminate
  oxygen demand: low-emissions steel, gasification, and many chemical processes
  still require large oxygen flows.

