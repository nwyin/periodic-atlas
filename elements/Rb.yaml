    source_id: usgs_mcs_2025_rubidium
  - year: 2024
    value: 1244.19
    unit: usd_per_kg
    form: carbonate
    basis: price_list
    notes: |
      USGS MCS 2025 says one company cited a rubidium carbonate price of
      $1,244.19 per kilogram, value-added tax included, at the end of September
