    source_id: usgs_mcs_2025_rubidium

geopolitical_events:
  - date: 2024
    event: "Commercial rubidium supply outside China remained dependent on legacy stockpiles from former mines"
    impact: |
      USGS reported that known rubidium ore production outside China had ceased
      within the past two decades and that stockpiles at former mine sites were
      still feeding downstream refineries, with those stockpiles outside China
      potentially nearing depletion at current processing rates. This leaves the
      market highly dependent on residual inventories and potential Chinese
      production.
    source_id: usgs_mcs_2025_rubidium
  - date: 2024
    event: "A Namibian lepidolite project advanced with downstream rubidium conversion planned in Abu Dhabi"
    impact: |
      USGS said one company continued developing a lepidolite concentration mine
      and processing facility in Namibia, targeting 5,700 t/yr of lithium
      hydroxide capacity from 2026, with byproduct rubidium intended for a
      downstream chemical conversion facility in Abu Dhabi. The project shows that
      new rubidium supply is being pursued indirectly through lithium-led project
      economics rather than through standalone rubidium mines.
    source_id: usgs_mcs_2025_rubidium
  - date: 2024-08
    event: "Mount Edon in Western Australia published an inferred resource containing rubidium oxide"
    impact: |
      USGS reports that the Mount Edon Project announced an initial
      JORC-compliant inferred mineral resource of 3.6 million tons containing an
      estimated 7,900 tons of rubidium oxide, with a mining proposal targeted by
      yearend 2025. This is evidence that prospective new rubidium supply remains
      tied to lithium- and cesium-bearing pegmatite developments.
    source_id: usgs_mcs_2025_rubidium

narrative: |
  Rubidium is commercially real, but it is not a bulk commodity in the usual
  mining sense. USGS describes a market built around byproduct recovery from
  cesium- and lithium-bearing pegmatites, imported concentrate, and downstream
  processing into small quantities of metal and specialty compounds. The leading
  application is specialty glass for fiber-optic telecommunications, with the
  rest of demand spread across biomedical uses, electronics, catalysts,
  pyrotechnics, ceramics, and atomic-frequency-reference systems. The older USGS
  profile still captures the core commercial fact pattern: the market is tiny,
  measured in only about 1 to 2 metric tons per year in the United States.

  The current supply picture is structurally fragile. USGS MCS 2025 says there
  were no official 2024 production statistics, no U.S. mine output, and that
  known ore production outside China had already ceased, leaving downstream
  refiners reliant on legacy stockpiles from former mines. New potential supply
  is coming mainly from lithium- or cesium-led pegmatite projects in Namibia and
  Australia rather than from dedicated rubidium mines. That combination of tiny
  market size, byproduct dependence, and sparse public reporting explains why
  rubidium can be on the U.S. critical minerals list while still looking almost
  invisible in ordinary commodity statistics.

