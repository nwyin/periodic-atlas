symbol: Rb
atomic_number: 37
name: rubidium
category: alkali_metal
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rubidium data in metric tons of rubidium oxide unless
  otherwise specified. Commercial rubidium is not traded as a bulk mined metal;
  the source describes imported rubidium concentrate produced as a byproduct of
  pollucite (cesium) and lepidolite (lithium) mining and processed into small
  batches of metal ampoules and specialty compounds such as carbonate, acetate,
  bromide, chloride, nitrate, and formate hydrate.

production:
  - reporting_year: 2024
    mining_by_country:
      completeness: partial
    refining_by_country:
      completeness: partial
    notes: |
      USGS MCS 2025 explicitly states that there were no official sources for
      rubidium production data in 2024. The same chapter says no rubidium was
      mined in the United States, known production of rubidium ore outside China
      had ceased within the past two decades, and primary global producers of
      refined rubidium compounds were estimated to include China, Germany, and
      Russia. Existing stockpiles at multiple former mine sites continued feeding
      downstream refineries, so the commercial market remained real even though a
      defensible public tonnage table was not published.

reserves:
  economic_reserves:
    value: 200000
    unit: tonnes
    form: oxide
    approximate: true
    confidence: low
    notes: |
      USGS MCS 2025 says Australia, Canada, China, and Namibia were estimated to
      have reserves totaling less than 200,000 tons of recoverable rubidium
      materials. Because the chapter header states data are in metric tons of
      rubidium oxide unless otherwise specified, this entry encodes the published
      global upper bound as an approximate oxide-equivalent reserve ceiling rather
      than a point estimate.
    source_id: usgs_mcs_2025_rubidium
  reserves_by_country:
    completeness: partial
  notes: |
    The source names Australia, Canada, China, and Namibia as reserve-holding
    countries but does not provide a country-level reserve split.

byproduct_of:
  - Cs
  - Li

feedstock_origins:
  - substrate: pollucite_ore
    notes: |
      USGS MCS 2025 states that rubidium concentrate is produced as a byproduct
      of pollucite (cesium) mining and that pollucite can contain up to 1.5%
      rubidium oxide.
    source_id: usgs_mcs_2025_rubidium
  - substrate: lepidolite_ore
    notes: |
      USGS MCS 2025 states that rubidium concentrate is produced as a byproduct
      of lepidolite (lithium) mining and that lepidolite can contain up to 3.5%
      rubidium oxide.
    source_id: usgs_mcs_2025_rubidium

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS states that rubidium and cesium can be used interchangeably in many
      applications because they have similar physical properties and atomic
      radii, although cesium's greater electropositivity makes it the preferred
      material in some uses.
    source_id: usgs_mcs_2025_rubidium

end_uses:
  uses:
    - application: specialty_glass_and_niche_uses
      share_pct: 100
      confidence: medium
      notes: |
        The open USGS sources do not publish a quantitative end-use split for
        rubidium. This grouped application represents the entire commercial
        market described by USGS: specialty glass for fiber-optic
        telecommunications as the leading outlet, plus biomedical research and
        imaging, electronics and photoemissive devices, catalysts, pyrotechnics,
        ceramics, and atomic-frequency-reference uses. The market is extremely
        small and better characterized by niche functionality than by tonnage
        segmentation.
      source_id: usgs_profile_2003_rubidium
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_critical_minerals_2025
  eu_crm_list_as_of_2024: false
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Rubidium appears on the final U.S. 2025 critical minerals list but is not
    listed in Annex II (critical raw materials) or Annex I section 1 (strategic
    raw materials) of Regulation (EU) 2024/1252.

