byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 0.1
    notes: |
      Ion adsorption clay (IAC) deposits in southern China (Jiangxi, Fujian, Guangdong)
      and Southeast Asia (Burma/Myanmar, Thailand) are the world's most important commercial
      source of lutetium and other heavy rare earth elements. These deposits are enriched in
      HREEs relative to LREE-dominant bastnaesite and carbonatite mines. Lu₂O₃ typically
      represents ~0.05–0.15% of total REOs in southern China ionic clay concentrates,
      compared to ~0.01–0.03% in bastnaesite. USGS MCS 2025 cites Myanmar and Thailand
      production as estimated from China import data; these represent predominantly
      clay-derived HREE concentrates. The high Lu fraction in IAC deposits makes them the
      economic backbone of global Lu supply despite contributing only ~30% of world REO
      tonnage. Lu is recovered from the heavy-REE fraction of the IAC leach solution during
      solvent extraction separation.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.03
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary commercial source of light
      REEs (La, Ce, Pr, Nd) but contains very low lutetium. Lu₂O₃ typically represents
      only ~0.01–0.05% of total REOs in commercial bastnaesite concentrates (Mountain Pass
      CA ~0.01–0.03%; Bayan Obo CN ~0.02–0.05%). USGS MCS 2025 confirms bastnaesite was
      mined as a primary product at Mountain Pass in 2024. Very small amounts of Lu are
      recovered during Chinese processing of mixed bastnaesite concentrate, but Mountain
      Pass and Bayan Obo bastnaesite contribute a negligible fraction of world Lu supply
      relative to HREE-enriched clay-deposit sources.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.07
    notes: |
      Monazite (rare-earth phosphate) is stockpiled as a separated concentrate or recovered
      as an accessory mineral in heavy-mineral-sand concentrates. USGS MCS 2025 confirms
      monazite was stockpiled in the southeastern United States in 2024. Lu typically
      represents ~0.05–0.10% of total REOs in monazite, making it a minor but meaningful
      Lu source from Indian and Brazilian heavy mineral sand operations. Thorium content in
      monazite complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: lyso_scintillator_pet_scanners
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For lutetium's dominant application in LYSO (lutetium yttrium
      orthosilicate, Lu₂(1-x)Y₂xSiO₅:Ce) and LSO (lutetium oxyorthosilicate, Lu₂SiO₅:Ce)
      scintillator crystals used in PET/CT medical imaging: BGO (bismuth germanate,
      Bi₄Ge₃O₁₂) and GSO (gadolinium orthosilicate, Gd₂SiO₅:Ce) can substitute in
      older-generation PET scanner designs but with lower light yield and poorer time
      resolution (BGO: ~8–9 ns coincidence time resolution vs. ~200–400 ps for LYSO).
      Modern time-of-flight PET (TOF-PET) scanners — the current clinical standard for
      oncological imaging — depend on LYSO's superior timing characteristics (light output
      ~30 photons/keV, decay time ~40 ns, high effective atomic number). Replacing LYSO
      with BGO or NaI(Tl) would degrade time-of-flight resolution and sensitivity.
      Partially Lu-substituted compositions (lower Lu:Y ratios in LYSO) reduce Lu content
      per crystal but alter scintillator performance. No substitute matches LYSO in
      combined light output, timing, density, and non-hygroscopic character for clinical
      TOF-PET.
    source_id: usgs_mcs_2025_rare_earths
  - application: petroleum_refining_catalysts
    availability: full
    notes: |
      In fluid catalytic cracking (FCC) and other refinery catalysts where Lu₂O₃ is a
      minor additive, other lanthanide oxides (La₂O₃, Ce₂O₃, mixed REO) readily substitute
      at higher dosing because catalyst activity is less sensitive to the specific heavy
      lanthanide used. The petroleum refining catalyst application is a relatively minor
      Lu end use and is not Lu-specific in its chemistry. USGS MCS 2025 notes general
      lanthanide interchangeability in many catalyst applications.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: lyso_lso_scintillator_pet_ct
      share_pct: 45
      confidence: low
      notes: |
        Lutetium's dominant commercial application is as the primary component of LYSO
        (lutetium yttrium orthosilicate, Lu₂(1-x)Y₂xSiO₅:Ce) and LSO (Lu₂SiO₅:Ce)
        scintillator crystals used in positron emission tomography (PET) and combined
        PET/CT medical imaging systems. A single modern clinical PET scanner contains
        hundreds to thousands of LYSO crystal elements requiring significant Lu₂O₃ input.
        LYSO's high effective atomic number (Zeff ~65), density (7.1 g/cm³), and fast
        scintillation decay time (~40 ns) make it the preferred scintillator for
        time-of-flight PET (TOF-PET), where coincidence time resolution below 400 ps is
        critical for image quality improvement. LYSO/LSO became the dominant clinical PET
        scintillator material from the early 2000s, displacing BGO. Growth is driven by
        expanding global installation of clinical PET/CT scanners for oncology staging,
        cardiac imaging, and neurological diagnostics. Industrial and security inspection
        applications (radiation portal monitors, high-energy physics detectors) also use
        LYSO. Share is an industry consensus estimate; USGS does not report per-element
        end-use percentages for Lu.
      source_id: usgs_mcs_2025_rare_earths
    - application: petroleum_refining_catalysts
      share_pct: 25
      confidence: low
      notes: |
        Lu₂O₃ is used in small quantities as a promoter or additive in fluid catalytic
        cracking (FCC) catalysts and other petroleum refinery applications where lanthanide
        oxides enhance catalyst selectivity, stability, and cracking activity. In FCC
        catalysts, rare earth oxides (including La, Ce, and mixed REO) exchange into the
        zeolite framework to stabilize the catalyst structure at high temperatures
        (~700°C). While La and Ce are far more common as FCC catalyst promoters, heavy
        lanthanides including Lu may be present in mixed REO streams. USGS MCS 2025 lists
        catalysts as one of the major REE end uses broadly. The 25% share estimate for Lu
        in catalysis reflects its use in miscellaneous chemical process applications where
        Lu₂O₃ may be added to mixed REO catalyst formulations.
      source_id: usgs_mcs_2025_rare_earths
    - application: lu177_radiopharmaceuticals
      share_pct: 15
      confidence: low
      notes: |
        Lutetium-177 (Lu-177, half-life 6.647 days, β⁻ emitter) is the active isotope in
        targeted radionuclide therapy drugs. Lu-177-DOTATATE (commercial name Lutathera,
        approved by FDA in 2018 and EMA in 2017) treats somatostatin receptor-positive
        gastroenteropancreatic neuroendocrine tumors (GEP-NETs). Lu-177-PSMA-617
        (Pluvicto, approved FDA 2022) treats PSMA-positive metastatic castration-resistant
        prostate cancer. Both drugs deliver targeted beta radiation to tumor cells
        expressing the relevant receptor. Lu-177 is produced by neutron irradiation of
        enriched Lu-176 targets or natural Lu in nuclear reactors. Demand for Lu-177
        radiopharmaceuticals is growing rapidly with clinical adoption and expanded
        indications; this is the fastest-growing end use for Lu. Total Lu consumed in
        radiopharmaceutical production is still small relative to scintillator use but
        growing at double-digit annual rates. High-purity (≥99.99%) Lu₂O₃ feed and
        reactor capacity are both required. Share is an industry estimate; USGS does not
        separately report radiopharmaceutical Lu demand.
      source_id: usgs_mcs_2025_rare_earths
    - application: specialty_glass_ceramics_lasers
      share_pct: 10
      confidence: low
      notes: |
        Lu₂O₃ is incorporated into specialty optical glass compositions for high-refractive-
        index applications and as a sintering aid in transparent ceramics. LuAG (lutetium
        aluminum garnet, Lu₃Al₅O₁₂) is used as a scintillator and as a laser host crystal
        (Lu:YAG for near-IR lasers). LuLiF₄ single crystals are laser host materials for
        rare-earth-doped solid-state lasers. Lu₂O₃ is also used as a sintering aid in
        silicon nitride and other advanced ceramic compositions. These applications are
        individually small-volume but collectively represent a significant specialty fraction
        of Lu consumption. Share aggregates several minor specialty applications.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_research_specialty
      share_pct: 5
      confidence: low
      notes: |
        Other minor applications include use of Lu₂O₃ in specialty coatings, research-
        grade reagents, and as a dopant in other functional materials for photonics and
        electronics research. Lu metal is used in very small quantities for specialty
        alloy research. Aggregate of very small-volume applications for which USGS does
        not report specific tonnages or end-use shares.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

