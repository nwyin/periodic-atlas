symbol: Lu
atomic_number: 71
name: lutetium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a grouped commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element tonnage
  is not published for individual REEs. Per-element attribution for lutetium requires
  multiplying the aggregate by Lu's typical basket share. Lutetium is commercially
  traded primarily as Lu₂O₃ (lutetium(III) oxide) at ≥99.9% to ≥99.99% minimum
  purity depending on application — medical imaging scintillator and radiopharmaceutical
  grades demand the highest purity. Lu metal is produced for research and specialty
  applications. Lutetium is the heaviest stable lanthanide and one of the rarest
  elements in the REE basket. All production figures in this file are derived by
  multiplying USGS-reported aggregate REO totals by Lu's typical basket share of ~0.05%,
  which is not reported directly by USGS. The basket share varies by deposit type:
  bastnaesite and carbonatite deposits (Mountain Pass CA, Bayan Obo CN, Mt. Weld AU)
  contain very low Lu fractions (~0.01–0.05% Lu₂O₃ of total REOs) as lutetium
  preferentially enriches heavy-REE-bearing deposits; ion adsorption clay deposits in
  southern China (Jiangxi, Fujian, Guangdong) and Southeast Asia (Myanmar, Thailand)
  yield higher Lu proportions (~0.05–0.15% Lu₂O₃) because these HREE-enriched deposits
  concentrate the heaviest lanthanides. Monazite from heavy mineral sands typically
  contains ~0.05–0.10% Lu₂O₃. A global weighted average of ~0.05% is used as the
  central estimate; at this share Lu production is among the smallest of any commercially
  traded REE. Lu₂O₃ prices are NOT listed in the USGS MCS 2025 salient statistics table;
  only Ce, Dy, Eu, La, mischmetal, Nd, and Tb oxide prices are reported therein. All
  data are in metric tons REO equivalent unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 195
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Lu's typical basket share of ~0.05% gives
      ~195 t Lu₂O₃ equivalent. Lutetium's basket share is not reported separately by USGS;
      the 0.05% factor is an industry consensus figure for the global weighted average
      across deposit types. Lu is the heaviest stable lanthanide and is enriched in HREE
      deposits: ion adsorption clay mines in southern China (~0.05–0.15% Lu₂O₃) are the
      primary commercial Lu source, while LREE-dominant bastnaesite mines at Mountain Pass
      (CA), Bayan Obo (CN), and Mt. Weld (AU) contain only ~0.01–0.05% Lu₂O₃. The 2023
      comparable estimate is ~188 t at the same 0.05% share applied to 376,000 t world
      total. Actual Lu output is not officially disaggregated from the REE basket in public
      USGS data; this figure carries low confidence. Lutetium is commercially produced in
      smaller absolute quantities than any other commercially traded REE except promethium
      (synthetic) and thulium.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
