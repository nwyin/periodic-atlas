  notes: |
    Lutetium is classified as critical under the US 2022 Critical Minerals List as part
    of "rare earth elements" (a group designation). US net import reliance for REE
    compounds and metals was 80% in 2024e (USGS MCS 2025 salient statistics). Heavy rare
    earth elements including lutetium are designated as Critical Raw Materials and Strategic
    Raw Materials under EU Regulation 2024/1252 (Critical Raw Materials Act, CRMA); the EU
    explicitly distinguishes light REEs and heavy REEs as separate CRM entries. Lutetium's
    criticality is compounded by its extreme scarcity in the REE basket (~0.05% global
    average), its concentration in Chinese HREE processing, and its non-substitutable role
    in LYSO scintillators for modern time-of-flight PET/CT medical imaging. China's April
    2025 direct export controls explicitly named lutetium as one of seven HREEs subject to
    export license requirements. Import sources 2020–23: China 70%, Malaysia 13%, Japan 6%,
    Estonia 5% (for REE compounds and metals broadly; Lu-specific import data not
    separately reported by USGS).

geopolitical_events:
  - date: "2025-04"
    event: "China imposes direct export controls on lutetium and 6 other REEs (Sm, Gd, Tb, Dy, Sc, Y)"
    impact: |
      China's April 2025 announcement of export license requirements for seven rare earth
      elements explicitly named lutetium metal, Lu₂O₃ oxide, and Lu-containing compounds.
      Lutetium's inclusion in the controlled list — alongside Sm, Gd, Tb, Dy, Sc, and Y —
      has direct implications for LYSO scintillator crystal growers outside China (primarily
      in the US, Japan, and Germany) that depend on imported Lu₂O₃ as the primary feedstock.
      The Lu-177 radiopharmaceutical supply chain is also affected: Lu-177 production from
      natural Lu targets requires access to Lu₂O₃ feed material; disruption could impact
      availability of Lutathera and Pluvicto for cancer patients. The export controls
      operate through China's Dual-Use Export Control list mechanism, allowing selective
      approval or denial of licenses rather than a total ban, creating pricing uncertainty
      and procurement risk for non-Chinese buyers. Non-Chinese scintillator manufacturers
      and Lu-177 producers hold limited strategic inventory; the absence of ex-China Lu₂O₃
      separation capacity means no rapid supply-side substitution is possible. China's
      dominance in both Lu₂O₃ supply and LYSO crystal manufacturing gives it structural
      leverage over the global medical imaging sector.
    source_id: mofcom_2025_export_controls
  - date: "2024"
    event: "Burma (Myanmar) REE production falls 28% to 31,000 t REO in 2024e, reducing global heavy-REE supply"
    impact: |
      USGS MCS 2025 reports Burma REE production declined from 43,000 t in 2023 to 31,000 t
      in 2024e, a 28% drop attributed to reduced mining activity. Myanmar's ion adsorption
      clay deposits are HREE-enriched (~0.08–0.15% Lu₂O₃), making them disproportionately
      important for global Lu supply relative to their share of total REO production. The
      12,000 t REO decline from Burma at the heavy-REE basket average implies a reduction of
      ~6–18 t Lu₂O₃ equivalent — modest in absolute terms but significant relative to a
      world Lu market of only ~195 t/year. Production estimated from China import records
      (USGS footnote 12). Myanmar IAC output has been politically volatile due to military
      conflict since the 2021 coup; further supply disruptions remain possible.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "Global REE mine production increases to 390,000 t REO in 2024e, with HREE contribution driven by China quota increase and Thailand growth"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from 376,000 t
      in 2023. China rose from 255,000 to 270,000 t; Nigeria from 7,200 to 13,000 t;
      Thailand from 3,600 to 13,000 t; Burma fell from 43,000 to 31,000 t. For Lu, Thailand's
      261% YoY growth (+9,400 t REO) partially offsets Burma's decline, since Thailand's IAC
      deposits also carry above-average Lu concentrations. At ~0.05% basket share, world Lu
      production rose from ~188 t in 2023 to ~195 t in 2024e based on USGS aggregate REO
      figures.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Lutetium is the heaviest and rarest of the commercially produced stable lanthanides, and
  its commercial story is defined almost entirely by a single application: LYSO (lutetium
  yttrium orthosilicate) scintillator crystals, the enabling material for modern time-of-
  flight positron emission tomography (TOF-PET) medical imaging. Virtually every clinical
  PET/CT scanner manufactured in the past two decades uses LYSO or LSO as its detector
  crystal, exploiting lutetium's high density (7.1 g/cm³), excellent light yield, and
  fast scintillation timing. Lu₂O₃ is also used in petroleum refining catalysts, specialty
  glass, and laser host crystals, but these applications are secondary. The most rapidly
  growing Lu end use is Lu-177 radiopharmaceuticals — Lutathera (FDA-approved 2018) and
  Pluvicto (FDA-approved 2022) — which deliver targeted radiation therapy to neuroendocrine
  tumors and prostate cancer respectively, driving demand growth at a rate well above the
  underlying REE market.

  Lutetium's supply chain is the most geographically concentrated of any commercially
  traded rare earth element. At a basket share of only ~0.05% of global REO production,
  world output is estimated at ~195 t Lu₂O₃ in 2024e from USGS-reported aggregate REO
  data — the smallest absolute production volume of any REE in regular commercial trade.
  The primary ore source is ion adsorption clay (IAC) deposits in southern China (Jiangxi,
  Fujian, Guangdong) and neighboring Southeast Asia (Myanmar, Thailand), which contain
  ~0.05–0.15% Lu₂O₃ — well above the global basket average and orders of magnitude above
  LREE-dominant bastnaesite deposits at Mountain Pass (CA) or Bayan Obo (CN). China
  controls approximately 95% of global Lu₂O₃ separation capacity, reflecting both its
  dominance in the IAC ore base and the specialized solvent extraction infrastructure
  required to separate the heaviest lanthanides. No significant ex-China Lu₂O₃ production
  at commercial scale exists. USGS MCS 2025 aggregate REO data underpins all production
  estimates; per-element tonnage is not disaggregated in public USGS reporting.

  China's April 2025 imposition of direct export controls on lutetium — one of seven REEs
  explicitly named alongside Sm, Gd, Tb, Dy, Sc, and Y — represents the most acute supply
  risk materialization in the modern Lu market. Unlike the broader REE basket, where some
  non-Chinese production of La, Ce, and NdPr exists (US, Australia, Estonia), there is
  essentially no alternative supply chain for Lu₂O₃ at commercial scale. LYSO crystal
  growers outside China, Lu-177 radiopharmaceutical manufacturers, and medical device OEMs
  face structural dependence on Chinese export license approval for their primary feedstock.
  Burma's 28% production decline in 2024 further tightened the HREE supply picture.
  The combination of sub-200 t/year world production, single-supplier separation, direct
  export control targeting, and rapidly growing radiopharmaceutical demand makes lutetium
  one of the most supply-constrained materials in the critical minerals landscape.

