    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 95
        notes: |
          China controls approximately 95% or more of global Lu₂O₃ separation and refining
          capacity; for the heaviest lanthanides like Lu, China's dominance is even greater
          than for lighter HREEs because the primary ore sources (southern China ion
          adsorption clays) are processed domestically, and because Lu separation — as the
          last element in the lanthanide series — requires the most sophisticated solvent
          extraction or ion exchange fractionation steps. High-purity Lu₂O₃ (≥99.99%)
          production for LYSO scintillator and radiopharmaceutical applications is
          concentrated almost exclusively in specialized Chinese separation facilities.
          USGS MCS 2025 import sources (2020–23) confirm China supplied 70% of US REE
          compound and metal imports broadly; China's actual share of Lu₂O₃ separation
          substantially exceeds that figure.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 5
        notes: |
          Other Lu₂O₃ producers are extremely limited: Neo Performance Materials
          (Sillamäe, Estonia, ~5% of US REE imports 2020–23), Japanese specialty
          processors (Japan ~6% of US REE imports 2020–23), and no significant US
          separation capacity for Lu. These non-Chinese processors source feed from
          Australian and Chinese intermediates per USGS chapter text; their Lu-specific
          output fractions are very small. High-purity Lu₂O₃ for LYSO crystal growth
          and Lu-177 radiopharmaceutical production is essentially a Chinese specialty.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Lu-specific figures derived from REO totals using the ~0.05%
    basket share assumption; actual per-element disaggregation is not available from
    public USGS data. Lutetium as the heaviest stable lanthanide is disproportionately
    concentrated in southern China IAC deposits and HREE-enriched Myanmar/Thailand clay
    mines relative to its share of total REO tonnage. The 0.05% global average likely
    underestimates actual Lu output from HREE-rich IAC sources and overestimates it from
    LREE-dominant mines (Mountain Pass, Mt. Weld). Country shares sum to ~100.8% due to
    rounding of reported integers against the rounded world total.

