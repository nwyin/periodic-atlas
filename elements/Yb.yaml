criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Ytterbium is classified as critical under the US 2022 Critical Minerals List as
    part of "rare earth elements" (a group designation). US net import reliance for REE
    compounds and metals was 80% in 2024e (USGS MCS 2025 salient statistics). Heavy rare
    earth elements including ytterbium are designated as Critical Raw Materials and
    Strategic Raw Materials under EU Regulation 2024/1252 (Critical Raw Materials Act,
    CRMA); the EU explicitly distinguishes light REEs and heavy REEs as separate CRM
    entries. Ytterbium's criticality is amplified by its role as the active gain medium
    in Yb-doped fiber lasers — the dominant industrial laser platform for metal processing
    — and by near-complete dependence on Chinese HREE supply chains (ion adsorption clay
    processing) for high-purity Yb₂O₃. Import sources 2020–23: China 70%, Malaysia 13%,
    Japan 6%, Estonia 5% (for REE compounds and metals broadly; Yb-specific import data
    not separately reported by USGS).

geopolitical_events:
  - date: "2024"
    event: "Global REE mine production increases to 390,000 t REO in 2024e; Burma REE production falls 28% YoY, reducing HREE supply including Yb"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t, up from 376,000 t
      in 2023, driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
      and Thailand (+9,400 t to 13,000 t). However, Burma (Myanmar) fell from 43,000 t
      to 31,000 t REO (-28% YoY). Burma's ion adsorption clay deposits are HREE-enriched
      (high Yb content ~1–2% Yb₂O₃), so its 12,000 t decline has a disproportionate
      impact on world Yb supply relative to its 8% share of total REO. At 0.5% basket
      average, Burma's 12,000 t decline implies ~60 t less Yb, but the true reduction may
      be higher given above-average Yb fractions in Burmese clay deposits. Production data
      for Burma estimated from China import records (USGS footnote 12).
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "US net import reliance for REE compounds and metals declines to 80% in 2024e; no domestic Yb₂O₃ separation capacity"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds
      and metals at 80% in 2024e, down from >95% in 2020–2023, reflecting growth in
      domestic compound production to 7,600 t total in 2024. However, this improvement
      is concentrated in LREE processing (NdPr compounds in California, RE compounds in
      Utah). No domestic US separation of Yb₂O₃ at commercial scale is reported.
      Mountain Pass concentrate, which contains trace Yb (~0.1–0.2% of REO), is
      processed in China. US fiber laser manufacturers (importing Yb-doped fiber and
      Yb₂O₃) remain dependent on imported material from Chinese separation facilities.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2025-04"
    event: "China imposes export controls on 7 HREEs (Sm, Gd, Tb, Dy, Lu, Sc, Y) — ytterbium not directly targeted but HREE basket dynamics affected"
    impact: |
      China's April 2025 export controls required export licenses for samarium, gadolinium,
      terbium, dysprosium, lutetium, scandium, and yttrium but did not explicitly name
      ytterbium. However, the controls elevated awareness of heavy REE supply chain
      vulnerability across the basket and disrupted some supply logistics for HREE
      separation intermediates from which Yb co-occurs in processing streams. Fiber laser
      manufacturers and defense contractors using Yb:YAG laser gain media noted ytterbium's
      similar single-source dependency on Chinese ion adsorption clay operations, even
      without direct license requirements on Yb.
    source_id: china_mofcom_export_controls_2025

narrative: |
  Ytterbium's commercial story is dominated by one transformative application: Yb-doped
  fiber lasers, which have become the global workhorse of industrial material processing
  over the past two decades. The physical basis is elegant — Yb³⁺ ions in silica fiber
  absorb pump photons at 976 nm and emit stimulated radiation at ~1070 nm with a near-
  quantum-limited efficiency exceeding 80% slope efficiency, enabling multi-kilowatt
  continuous-wave outputs with diffraction-limited beam quality from a fiber format that
  is inherently air-cooled and mechanically robust. Starting from niche scientific
  applications in the 1990s, Yb fiber lasers (led commercially by IPG Photonics,
  subsequently by Coherent, nLIGHT, and Chinese manufacturers) have largely displaced CO₂
  lasers and flashlamp-pumped Nd:YAG systems in the metal cutting, welding, and drilling
  markets, while simultaneously expanding into new applications in additive manufacturing,
  battery electrode production, and semiconductor processing. Unlike most rare earth
  elements, whose industrial importance is primarily indirect (e.g., magnets or phosphors),
  ytterbium is the active gain medium — the physical origin of the photons — in the
  dominant industrial laser platform of the 21st century.

  Ytterbium is a heavy rare earth element (HREE), and like Er, Dy, and Gd, its supply is
  disproportionately concentrated in China's ion adsorption clay (IAC) deposits in Jiangxi,
  Fujian, and Guangdong provinces, which contain ~1–2% Yb₂O₃ — well above the global
  basket average of ~0.5% applied to USGS aggregate REO data. At that basket share, world
  2024 ytterbium production is estimated at ~1,950 t Yb₂O₃ derived from 390,000 t world
  REO production reported by USGS MCS 2025, though actual production may differ given
  deposit-type concentration effects. USGS does not disaggregate REE production or reserves
  by individual element. Burma (Myanmar), a meaningful HREE source via its own IAC deposits,
  saw production fall 28% in 2024, tightening global HREE supply, while Thailand's 261% YoY
  growth partially offset this decline. Mountain Pass bastnaesite, the dominant US REE
  source, is LREE-dominant and contributes minimally to actual Yb supply despite representing
  11.5% of world REO tonnage by USGS accounting.

  Ytterbium was not among the seven heavy rare earth elements directly named in China's
  April 2025 export controls (Sm, Gd, Tb, Dy, Lu, Sc, Y), suggesting somewhat lower
  near-term supply disruption risk than the directly targeted HREEs. Nevertheless, Yb's
  supply chain remains overwhelmingly Chinese: China controls both the dominant IAC ore
  base and the downstream high-purity Yb₂O₃ separation and Yb-doped fiber preform
  fabrication capacity required for fiber laser manufacturing. Beyond fiber lasers,
  Yb:YAG crystals are the preferred gain medium for ultrashort-pulse (femtosecond/
  picosecond) laser systems used in precision micromachining and scientific research, and
  Yb-171 optical lattice clocks represent the frontier of timekeeping precision at national
  metrology institutes. The combination of dominant laser market position, heavy-REE
  supply concentration in China, and absence of non-Chinese Yb₂O₃ separation capacity
  positions ytterbium as a quiet but consequential supply-chain vulnerability in advanced
  manufacturing and defense laser systems.

