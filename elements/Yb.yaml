symbol: Yb
atomic_number: 70
name: ytterbium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single grouped commodity chapter
  ("rare earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element
  tonnage is not published for individual REEs. Per-element attribution for ytterbium
  requires multiplying the aggregate by Yb's typical basket share. Ytterbium is
  commercially traded primarily as Yb₂O₃ (ytterbium(III) oxide) at ≥99.9% minimum
  purity for laser and optical applications; Yb-doped silica fiber and Yb metal are
  used directly in fiber laser manufacturing. All production figures in this file are
  derived by multiplying USGS-reported aggregate REO totals by Yb's typical basket
  share of ~0.5%, which is not reported directly by USGS. The basket share varies by
  deposit type: bastnaesite and carbonatite deposits (Mountain Pass CA, Bayan Obo CN,
  Mt. Weld AU) are LREE-dominant and yield low Yb fractions (~0.1–0.2% Yb₂O₃ of
  total REOs); ion adsorption clay deposits in southern China (Jiangxi, Fujian,
  Guangdong) and Southeast Asia (Burma/Myanmar, Thailand) yield higher Yb proportions
  (~1–2%) because these deposits are enriched in heavy rare earth elements. Monazite
  from heavy mineral sands typically contains ~0.5–1.0% Yb₂O₃. A global weighted
  average of ~0.5% is used as the central estimate, reflecting the dominance of
  Chinese mixed bastnaesite-IAC production in the world total. Yb₂O₃ prices are NOT
  listed in the USGS MCS 2025 salient statistics table; only Ce, Dy, Eu, La,
  mischmetal, Nd, and Tb oxide prices are reported therein. All data are in metric
  tons REO equivalent unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 1950
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Yb's typical basket share of ~0.5% gives
      ~1,950 t Yb₂O₃ equivalent. Ytterbium's basket share is not reported separately by
      USGS; the 0.5% factor reflects the global weighted average across deposit types.
      LREE-dominant bastnaesite mines at Mountain Pass (CA), Bayan Obo (CN), and Mt. Weld
      (AU) have Yb fractions of only ~0.1–0.2% of REO; ion adsorption clay deposits in
      southern China and Southeast Asia contain ~1–2% Yb₂O₃, making them
      disproportionately important Yb sources relative to their share of total REO
      tonnage. Monazite in heavy mineral sands yields ~0.5–1.0% Yb₂O₃. Actual Yb output
      is not officially disaggregated from the REE basket in public USGS data; this
      figure carries low confidence. The 2023 comparable estimate is ~1,880 t at the
      same 0.5% share applied to 376,000 t world total.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        quantity:
          value: 1350
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          China 2024e REE total: 270,000 t REO (production quota per USGS footnote 14;
          excludes undocumented production). China share of world: 270,000 / 390,000 =
          69.2%. Estimated Yb component at 0.5% basket share: ~1,350 t Yb₂O₃. However,
          China's actual Yb share is higher than 69.2% because southern China ion
          adsorption clay deposits (Jiangxi, Fujian, Guangdong) contain ~1–2% Yb₂O₃ —
          well above the global basket average — and are the world's primary commercial
          HREE source. Bayan Obo bastnaesite (LREE-dominant, ~0.1% Yb) dilutes the
