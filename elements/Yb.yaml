    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 90
        notes: |
          China controls approximately 90% of global REE separation and refining
          capacity; for heavy REEs like Yb, China's dominance is even greater than for
          LREEs because the primary ore sources (southern China ion adsorption clays) are
          processed domestically, and because Yb separation requires sophisticated solvent
          extraction or ion exchange infrastructure concentrated in Chinese facilities.
          High-purity Yb₂O₃ (≥99.9%) and Yb-doped silica fiber preform production for
          high-power fiber laser applications are concentrated in specialized Chinese
          separation and materials processing facilities. USGS MCS 2025 import sources
          (2020–23) confirm China supplied 70% of US REE compound and metal imports;
          China's actual share of Yb₂O₃ separation is higher (~90%+) given its dominance
          of both IAC ore supply and downstream processing.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 5
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate and produces separated REE oxides. However,
          as Mt. Weld concentrate is LREE-dominant, LAMP's contribution to global Yb₂O₃
          output is minimal. USGS cites Malaysia as 13% of US REE compound and metal
          imports (2020–23), but most of that is LREE products (La, Ce, NdPr). LAMP's
          Yb₂O₃ output fraction is small.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 5
        notes: |
          Other non-Chinese Yb₂O₃ producers are limited: Neo Performance Materials
          (Sillamäe, Estonia, 5% of US imports 2020–23), Japanese processors (Japan 6%
          of US imports 2020–23), and nascent US separation capacity. Estonia and Japan
          source feed from Australian and Chinese intermediates per USGS chapter text.
          High-purity Yb₂O₃ and Yb-doped fiber preforms for high-power laser applications
          are an overwhelmingly Chinese specialty product.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Yb-specific figures derived from REO totals using the ~0.5%
    basket share assumption; actual per-element disaggregation is not available from
    public USGS data. Ytterbium as a HREE is disproportionately concentrated in southern
    China IAC deposits and HREE-enriched Myanmar/Thailand clay mines relative to its
    share of total REO tonnage. The 0.5% global average likely underestimates actual
    Yb output from HREE-rich IAC sources and overestimates it from LREE-dominant
    mines (Mountain Pass, Mt. Weld). Country shares sum to ~100.8% due to rounding
    of reported integers against the rounded world total.

