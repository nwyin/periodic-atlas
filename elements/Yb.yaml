byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 1.5
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma/Myanmar, Thailand) are the world's most important commercial
      source of ytterbium and other heavy rare earth elements. These deposits are enriched
      in HREEs relative to LREE-dominant bastnaesite and carbonatite mines. Yb₂O₃
      typically represents ~1–2% of total REOs in southern China ionic clay concentrates,
      compared to ~0.1–0.2% in bastnaesite. USGS MCS 2025 cites Myanmar and Thailand
      production as estimated from China import data; these represent predominantly
      clay-derived HREE concentrates. The high Yb fraction in IAC deposits makes them
      the economic backbone of global Yb supply despite contributing only ~30% of world
      REO tonnage.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.15
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary commercial source of
      light REEs (La, Ce, Pr, Nd) but contains modest ytterbium. Yb₂O₃ typically
      represents only ~0.1–0.2% of total REOs in commercial bastnaesite concentrates
      (Mountain Pass CA ~0.1–0.15%; Bayan Obo CN ~0.15–0.2%). USGS MCS 2025 confirms
      bastnaesite was mined as a primary product at Mountain Pass in 2024. Small amounts
      of Yb are recovered during Chinese processing of mixed bastnaesite concentrate,
      but Mountain Pass concentrate contributes a minor fraction of world Yb supply
      relative to HREE-enriched clay-deposit sources.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.7
    notes: |
      Monazite (rare-earth phosphate) is stockpiled as a separated concentrate or
      recovered as an accessory mineral in heavy-mineral-sand concentrates. USGS MCS
      2025 confirms monazite was stockpiled in the southeastern United States in 2024.
      Yb typically represents ~0.5–1.0% of total REOs in monazite, making it a
      meaningful Yb source from Indian and other heavy mineral sand operations. Thorium
      content in monazite complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: yb_fiber_lasers_industrial
    availability: partial
    notes: |
      USGS MCS 2025 states "Substitutes are available for many applications but generally
      are less effective." For Yb-doped fiber lasers (1030–1090 nm) in industrial material
      processing — the dominant commercial application — partial substitutes include CO₂
      lasers (10.6 μm), which were the industry standard before fiber lasers displaced them
      and remain in use for acrylic, wood, and some non-metal materials where 10.6 μm
      absorption is favorable. Nd:YAG solid-state lasers (1064 nm) are older technology
      now being displaced by Yb fiber lasers but remain installed in legacy systems.
      Direct diode laser arrays operate near 940–980 nm and can substitute for some low-
      brightness heating and welding tasks. However, for high-brightness precision cutting
      and welding of metals — the largest market — Yb fiber lasers are unmatched in beam
      quality, electrical efficiency (~30–40% wall-plug), and power scalability; no
      alternative technology achieves equivalent performance at comparable cost.
    source_id: usgs_mcs_2025_rare_earths
  - application: yb_yag_solid_state_lasers
    availability: partial
    notes: |
      For Yb:YAG (ytterbium-doped yttrium aluminum garnet) solid-state lasers used in
      precision scientific and industrial applications, alternative gain media include
      Nd:YAG (1064 nm, lower efficiency, well-established), Nd:YVO₄ (vanadate, used in
      compact pulsed systems), Ti:sapphire (tunable 670–1100 nm, broadly tunable but
      requires pump laser), and other Yb-doped host crystals (Yb:KGW, Yb:KYW).
      No substitute exists for the specific combination of Yb:YAG's thermal properties,
      efficiency, and 1030 nm wavelength that makes it preferred for ultrashort-pulse
      (femtosecond/picosecond) amplification in scientific instruments and precision
      micromachining. The USGS general substitutes statement applies.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: yb_fiber_lasers_industrial
      share_pct: 55
      confidence: low
      notes: |
        Ytterbium's dominant commercial application is as the active gain medium in
        Yb-doped double-clad fiber lasers — the world's most widely deployed high-power
        industrial laser platform. Yb³⁺ ions incorporated into silica fiber cores are
        pumped at ~976 nm (matching a strong Yb absorption band) and emit stimulated
        radiation at ~1030–1090 nm with slope efficiencies exceeding 80%. This near-
        quantum-limited efficiency, combined with fiber's excellent thermal management
        and near-diffraction-limited beam quality, allows kilowatt-class to multi-kilowatt
        continuous-wave outputs from a compact fiber format. High-power Yb fiber laser
        systems from manufacturers including IPG Photonics, nLIGHT, Coherent, and JDSU
        have largely displaced both CO₂ lasers and flashlamp-pumped Nd:YAG systems in
        industrial metal cutting, welding, drilling, and surface treatment applications.
        USGS MCS 2025 lists lasers as a major REE end use. The 55% share is an industry
        estimate; USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: yb_yag_ultrashort_pulse_lasers
      share_pct: 20
      confidence: low
      notes: |
        Yb:YAG (ytterbium-doped yttrium aluminum garnet) and other Yb-doped crystals
        (Yb:KGW, Yb:KYW, Yb:CaF₂) are the gain media of choice for ultrashort-pulse
        (femtosecond and picosecond) laser systems used in precision micromachining,
        ophthalmological surgery (LASIK and cataract procedures), scientific
        spectroscopy, and attosecond-physics research. The broad gain bandwidth of
        Yb-doped crystals supports sub-100 femtosecond pulse durations when combined
        with chirped pulse amplification. Applications include semiconductor wafer
        processing, display glass cutting, medical device fabrication, and research
        instrumentation at universities and national laboratories. USGS MCS 2025 lists
        lasers as a major REE end use. Share is an industry consensus estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: atomic_clocks_and_metrology
      share_pct: 5
      confidence: low
      notes: |
        Ytterbium-based optical lattice atomic clocks achieve the highest absolute
        frequency accuracy of any current timekeeping technology. Yb-171 neutral atoms
        cooled and confined in an optical lattice are interrogated at the 1S₀ → 3P₀
        clock transition at 578.4 nm; stability has been demonstrated at the 10⁻¹⁹
        fractional frequency level, roughly 100× better than Cs microwave fountain
        clocks. National metrology institutes (NIST, PTB, SYRTE, NMIJ) and defense
        research agencies operate Yb optical lattice clocks for next-generation UTC
        timescale applications, relativistic geodesy, and tests of fundamental physics.
        This application consumes very small Yb quantities but commands high-purity
        material (isotopically enriched Yb-171). USGS MCS 2025 lists specialty uses
        as a minor REE end-use category. Share is an estimate; absolute volumes are
        negligible relative to fiber laser use.
      source_id: usgs_mcs_2025_rare_earths
    - application: metallurgical_additives_and_alloys
      share_pct: 10
      confidence: low
      notes: |
        Small ytterbium additions (typically 0.1–0.5 wt%) to aluminum, magnesium, and
        stainless steel alloys improve grain refinement, recrystallization behavior,
        and mechanical properties. Yb additions to Al alloys have been studied for
        aerospace structural applications, where refined microstructure improves fatigue
        life and elevated-temperature strength. Yb is also used as a minor additive in
        some specialty steels and in brazing alloys. These metallurgical uses are small-
        volume compared to laser applications. USGS MCS 2025 lists metallurgical
        additives as a minor REE end-use category. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: upconversion_phosphors_and_other
      share_pct: 10
      confidence: low
      notes: |
        Ytterbium serves as a sensitizer ion in upconversion nanoparticle (UCNP) systems
        — most commonly NaYF₄:Er,Yb — where Yb³⁺ absorbs 980 nm near-infrared radiation
        and transfers energy to Er³⁺ activators, producing visible-wavelength upconverted
        emission used in bioimaging, anti-counterfeiting inks, and photovoltaic down-
        conversion research. Yb is also incorporated into specialty optical fibers for
        signal amplification at 1 μm (Yb-doped fiber amplifiers in high-power fiber
        oscillators), phosphor materials, specialty ceramics, and nuclear shielding glass.
        These specialty applications collectively consume a modest but non-trivial fraction
        of refined Yb₂O₃ output. USGS MCS 2025 lists phosphors, ceramics, and specialty
        uses as REE end-use categories. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

