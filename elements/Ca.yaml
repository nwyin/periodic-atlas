reserves:
  notes: |
    USGS MCS 2025 p.109: "Domestic and world resources of limestone and dolomite suitable
    for lime manufacture are very large." The reserves column in the USGS world production
    table states only "Adequate for all countries with listed production" — no specific
    quantitative reserves are provided by USGS for lime. Limestone deposits are extremely
    widespread globally and are not considered resource-constrained.

byproduct_of: []

feedstock_origins:
  - substrate: limestone
    notes: |
      Limestone (calcium carbonate, CaCO3) is the primary feedstock for quicklime and
      hydrated lime production. Limestone is calcined in vertical or rotary kilns at
      900–1,200°C to produce quicklime (CaO) via the reaction CaCO3 → CaO + CO2.
      Quicklime may then be slaked with water to produce hydrated lime (Ca(OH)₂).
      USGS MCS 2025: depletion allowance for limestone produced and used for lime
      production is 14% (domestic and foreign).
    source_id: usgs_mcs_2025_lime
  - substrate: dolomite
    notes: |
      Dolomite (calcium magnesium carbonate, CaMg(CO3)₂) is calcined to produce
      dolomitic lime (CaO·MgO) and refractory dead-burned dolomite (used in basic
      steel furnace linings). The USGS lime chapter explicitly includes refractory
      dead-burned dolomite in its production statistics. Calcined dolomite (HTS
      2518.20.0000) carries a 3% ad valorem tariff per USGS MCS 2025.
    source_id: usgs_mcs_2025_lime

substitutes:
  - application: fluxing_agriculture_sulfur_removal
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Limestone is a substitute for lime in many
      applications, such as agriculture, fluxing, and sulfur removal. Limestone, which
      contains less reactive material, is slower to react and may have other disadvantages
      compared with lime, depending on the application; however, limestone is considerably
      less expensive than lime."
    source_id: usgs_mcs_2025_lime
  - application: industrial_plasters_mortars
    availability: partial
    notes: |
      USGS MCS 2025: "Calcined gypsum is an alternative material in industrial plasters
      and mortars."
    source_id: usgs_mcs_2025_lime
  - application: construction
    availability: partial
    notes: |
      USGS MCS 2025: "Cement, cement kiln dust, fly ash, and lime kiln dust are potential
      substitutes for some construction uses of lime."
    source_id: usgs_mcs_2025_lime
  - application: ph_control
    availability: partial
    notes: |
      USGS MCS 2025: "Magnesium hydroxide is a substitute for lime in pH control."
    source_id: usgs_mcs_2025_lime
  - application: steelmaking_flux
    availability: partial
    notes: |
      USGS MCS 2025: "Magnesium oxide is a substitute for dolomitic lime as a flux in
      steelmaking."
    source_id: usgs_mcs_2025_lime

end_uses:
  uses:
    - application: steelmaking
      share_pct: 35
      confidence: low
      notes: |
        USGS MCS 2025: steelmaking is the first-listed end use "in descending order of
        consumption." Lime (both quicklime and dolomitic lime) is an essential flux in
        basic oxygen furnace (BOF) and electric arc furnace (EAF) steelmaking, removing
        phosphorus, sulfur, and silica impurities from molten steel. Share percentage is
        an approximation consistent with industry data; USGS does not provide explicit
        percentages in this chapter.
      source_id: usgs_mcs_2025_lime
    - application: chemical_and_industrial
      share_pct: 27
      confidence: low
      notes: |
        USGS MCS 2025: "chemical and industrial applications (such as the manufacture of
        fertilizer, glass, paper and pulp, and precipitated calcium carbonate, and in sugar
        refining)" is the second-largest use. Includes production of calcium carbide, calcium
        hypochlorite, and other calcium compounds. Share percentage is approximate.
      source_id: usgs_mcs_2025_lime
    - application: flue_gas_treatment
      share_pct: 15
      confidence: low
      notes: |
        USGS MCS 2025: flue gas treatment is the third-listed use. Lime and hydrated lime
        are injected into flue gas streams to neutralize SO₂ (acid rain precursor) and
        capture mercury, primarily at coal-fired power plants and industrial facilities.
        Share percentage is approximate.
      source_id: usgs_mcs_2025_lime
    - application: construction
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025: construction is the fourth-listed use. Applications include soil
        stabilization for roads and foundations, modification of asphalt, lime-based plaster
        and mortar, and stabilization of mine tailings. Hydrated lime is the primary form
        used. Share percentage is approximate.
      source_id: usgs_mcs_2025_lime
    - application: water_treatment
      share_pct: 8
      confidence: low
      notes: |
        USGS MCS 2025: water treatment is the fifth-listed use. Lime is used for pH
        adjustment, softening (removing calcium and magnesium hardness), fluoride removal,
        and heavy-metal precipitation in both municipal drinking water and industrial
        wastewater treatment. Recycling: USGS notes some municipal water-treatment plants
        regenerate lime from softening sludge. Share percentage is approximate.
      source_id: usgs_mcs_2025_lime
    - application: nonferrous_metal_mining
      share_pct: 5
      confidence: low
      notes: |
        USGS MCS 2025: nonferrous-metal mining is the sixth and last-listed use. Lime
        is used in gold cyanidation (pH control), copper flotation circuits, and tailings
        neutralization. Share percentage is approximate.
      source_id: usgs_mcs_2025_lime
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Calcium (lime) is not on the US 2022 Critical Minerals List, the EU Critical Raw
    Materials list (Regulation 2024/1252), or the EU Strategic Raw Materials list.
    Limestone deposits are globally abundant and widespread; lime production is a mature,
    geographically distributed industry. The United States is less than 1% net import
    reliant on lime (essentially self-sufficient), with Canada and Mexico supplying the
    small import fraction.

