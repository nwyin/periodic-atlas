symbol: Ca
atomic_number: 20
name: calcium
category: alkaline_earth
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports lime production in "thousand metric tons" and covers quicklime
  (calcium oxide, CaO), hydrated lime (calcium hydroxide, Ca(OH)₂), and refractory
  dead-burned dolomite. Data are for production sold or used by producers; independent
  commercial hydrators that purchase quicklime for hydration are excluded to avoid
  double counting. Only countries producing ≥1 million tons of lime per year are listed
  separately; smaller producers are aggregated as "Other countries." Prices are average
  value in dollars per metric ton at plant, reported separately for quicklime and hydrated
  lime. All production quantities are converted to million_tonnes_per_year (1,000 thousand
  metric tons = 1 Mt). Note: elemental calcium metal (used as a reducing agent in
  metallurgy and in alloying) is a small niche market not separately tracked in this
  USGS chapter; the dominant commercial calcium supply chain is lime.

