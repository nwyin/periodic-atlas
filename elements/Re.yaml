narrative: |
  Rhenium is a classic byproduct metal with a structurally inflexible supply chain.
  Primary output comes from recovering rhenium during roasting of molybdenum
  concentrates from porphyry copper-molybdenum systems, with additional recovery from
  copper-smelter residues in some sediment-hosted copper districts. USGS estimated only
  62,000 kilograms of primary mine recovery in 2024 worldwide, with Chile alone
  accounting for nearly half of that output and the United States, Poland, China, and
  Uzbekistan making up most of the balance.

  Demand is dominated by a narrow set of high-performance applications. USGS assigns
  80% of end use to superalloys for high-temperature turbine engine components and 15%
  to petroleum-reforming catalysts, leaving only a small residual market for specialty
  electrical, thermal, and vacuum applications. That concentration, combined with small
  absolute production volumes, helps explain why annual prices for both metal pellets
  and catalytic-grade APR moved sharply higher in 2024.

  Recycling is a major stabilizer for this market. USGS identifies the United States and
  Germany as the leading secondary rhenium producers and cites approximately
  25,000 kilograms of recycled output worldwide in 2024, sourced from superalloy scrap
  and spent catalysts. Even so, the United States remained 65% net import reliant in
  2024, underlining how dependent rhenium consumers remain on a small number of primary
  and secondary recovery circuits.

