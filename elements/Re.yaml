symbol: Re
atomic_number: 75
name: rhenium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rhenium data in kilograms of rhenium content unless otherwise
  specified. Commercial primary output is recovered as byproduct ammonium perrhenate
  (APR), metal powder, and perrhenic acid from roasting molybdenum concentrates derived
  from porphyry copper-molybdenum deposits. The salient-statistics price series is quoted
  in gross-weight dollars per kilogram for 99.99%-pure metal pellets and catalytic-grade
  ammonium perrhenate; the chapter footnote states APR contains 69.42% rhenium.

