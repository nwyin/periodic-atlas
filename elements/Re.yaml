    USGS reports the world total reserve position only as "Large" rather than a numeric
    stock. Korea, Republic of; Poland; and Uzbekistan are listed as NA for reserves.
    The shares above are therefore calculated against the quantified subset
    (2,314,000 kilograms), not against a published world-total reserve number. The
    World Resources section adds that identified U.S. resources are about 7 million
    kilograms and that most rhenium occurs with molybdenum in porphyry copper deposits.

byproduct_of: [Cu, Mo]

feedstock_origins:
  - substrate: molybdenum_concentrate_roaster_residues
    notes: |
      USGS states that U.S. rhenium-containing products were produced as byproducts from
      roasting molybdenum concentrates from porphyry copper-molybdenum deposits.
    source_id: usgs_mcs_2025_rhenium
  - substrate: copper_smelter_rhenium_bearing_residues
    notes: |
      The World Resources section states that in Armenia, Kazakhstan, Poland, Russia,
      and Uzbekistan rhenium is associated with copper minerals in sedimentary deposits,
      where ore is processed for copper recovery and rhenium-bearing residues are
      recovered at copper smelters.
    source_id: usgs_mcs_2025_rhenium

substitutes:
  - application: petroleum_reforming_catalysts
    availability: partial
    notes: |
      USGS substitutes paragraph: platinum-rhenium catalyst substitutes continue to be
      evaluated; an iridium-and-tin application has achieved commercial success, and
      gallium, germanium, indium, selenium, silicon, tungsten, and vanadium are also
      being evaluated for catalytic use.
    source_id: usgs_mcs_2025_rhenium
  - application: xray_target_coatings
    availability: full
    notes: "USGS substitutes paragraph: cobalt and tungsten can substitute for rhenium coatings on copper X-ray targets."
    source_id: usgs_mcs_2025_rhenium
  - application: high_temperature_thermocouples
    availability: full
    notes: "USGS substitutes paragraph: rhodium and rhodium-iridium can substitute for rhenium in high-temperature thermocouples."
    source_id: usgs_mcs_2025_rhenium
  - application: electrical_contact_coatings
    availability: full
    notes: "USGS substitutes paragraph: tungsten and platinum-ruthenium can substitute for rhenium coatings on electrical contacts."
    source_id: usgs_mcs_2025_rhenium
  - application: electron_emitters
    availability: full
    notes: "USGS substitutes paragraph: tungsten and tantalum can substitute for rhenium in electron emitters."
    source_id: usgs_mcs_2025_rhenium

end_uses:
  uses:
    - application: superalloys
      share_pct: 80
      notes: |
        USGS MCS 2025 states that superalloys used in high-temperature turbine engine
        components represented an estimated 80% of rhenium end uses in 2024.
      source_id: usgs_mcs_2025_rhenium
    - application: petroleum_reforming_catalysts
      share_pct: 15
      notes: |
        USGS MCS 2025 states that petroleum-reforming catalysts represented an
        estimated 15% of rhenium end uses in 2024.
      source_id: usgs_mcs_2025_rhenium
    - application: other_specialty_uses
      share_pct: 5
      notes: |
        Residual end uses include crucibles, electrical contacts, electromagnets,
        electron tubes and targets, heating elements, ionization gauges, mass
        spectrographs, metallic coatings, semiconductors, temperature controls,
        thermocouples, vacuum tubes, and related specialty applications listed by USGS.
      source_id: usgs_mcs_2025_rhenium
  completeness: complete

