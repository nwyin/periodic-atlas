- reporting_year: 2024
  stream: secondary_recycling
  refined:
    value: 25000
    unit: kg_per_year
    form: contained_element
    approximate: true
    confidence: medium
    notes: |
      USGS MCS 2025 reports industry estimates that approximately 25,000 kilograms of
      secondary rhenium was produced worldwide in 2024. This stream covers recycled
      rhenium recovered from nickel-base superalloy scrap, spent oil-refining catalysts,
      and foundry revert.
    source_id: usgs_mcs_2025_rhenium
  mining_by_country:
    completeness: partial
  refining_by_country:
    completeness: partial
  notes: |
    USGS identifies the United States and Germany as the leading secondary rhenium
    producers and also names Canada, Estonia, France, Japan, Poland, and Russia as
    secondary-producing countries, but it does not publish a country-by-country share
    breakdown for 2024 recycled output.

