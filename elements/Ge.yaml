          source_id: usgs_ofr_2024_germanium_restrictions
      completeness: complete
    notes: |
      USGS MCS 2025 reports that 2024 global germanium refinery production and
      recycling data remained limited and difficult to verify, while China
      remained the leading producer. The MCS chapter identifies current or
      recent commercial production or recycling in the United States, Belgium,
      Canada, China, Germany, and Russia, but does not publish a country-by-
      country 2024 refinery breakdown. This block therefore uses the quantified
      2022 USGS OFR estimate for primary output and keeps mining geography
      unresolved rather than inventing mine-stage tonnages.

reserves:
  notes: |
    USGS MCS 2025 does not publish quantified economic reserves or resources for
    germanium. It states that reserves data are not widely reported at the mine
    or country level and are difficult to quantify, and that available
    resources are associated with certain zinc and lead-zinc-copper sulfide
    ores and lignite coal deposits.

byproduct_of: [Zn]
feedstock_origins:
  - substrate: zinc_smelter_residues
    notes: |
      USGS OFR 2024-1057 states that germanium is recovered during the leaching
      of certain zinc smelter residues. USGS MCS 2025 likewise reports domestic
      production from germanium-bearing zinc concentrates in Alaska and formerly
      from Tennessee zinc concentrates processed into leach concentrate.
    source_id: usgs_ofr_2024_germanium_restrictions
  - substrate: coal_ash
    notes: |
      USGS OFR 2024-1057 states that germanium is also recovered from coal ash.
      USGS MCS 2025 describes world resources as associated in part with lignite
      coal deposits.
    source_id: usgs_ofr_2024_germanium_restrictions
  - substrate: lead_zinc_copper_sulfide_ores
    notes: |
      USGS MCS 2025 world-resources paragraph says available germanium resources
      are associated with certain zinc and lead-zinc-copper sulfide ores.
    source_id: usgs_mcs_2025_germanium
  - substrate: lignite_coal_deposits
    notes: |
      USGS MCS 2025 world-resources paragraph identifies lignite coal deposits
      as the other major geologic host for germanium resources.
    source_id: usgs_mcs_2025_germanium

substitutes:
  - application: electronics
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: silicon or gallium arsenide can
      substitute for germanium in certain electronic applications, but only
      application-by-application.
    source_id: usgs_mcs_2025_germanium
  - application: high_frequency_electronics
    availability: partial
    notes: |
      USGS MCS 2025 states that some metallic compounds can substitute for
      germanium in high-frequency electronics applications.
    source_id: usgs_mcs_2025_germanium
  - application: light_emitting_diodes
    availability: partial
    notes: |
      USGS MCS 2025 states that some metallic compounds can substitute for
      germanium in some light-emitting-diode applications.
    source_id: usgs_mcs_2025_germanium
  - application: infrared_optics
    availability: partial
    notes: |
      USGS MCS 2025 states that chalcogenide glass has been used as a substitute
      for germanium metal in infrared applications.
    source_id: usgs_mcs_2025_germanium
  - application: polymerization_catalysts
    availability: partial
    notes: |
      USGS MCS 2025 states that antimony and titanium are substitutes for
      germanium in polymerization catalysts.
    source_id: usgs_mcs_2025_germanium

end_uses:
  uses:
    - application: fiber_optics
      share_pct: 40
      confidence: medium
      notes: |
        USGS OFR 2024-1057 reports that USGS Mineral Commodity Summaries data
        suggest recent U.S. germanium use of 40% in fiber optics. The OFR notes
        these were last reported for 2016 but remained the best-available U.S.
        end-use split used in the disruption analysis.
      source_id: usgs_ofr_2024_germanium_restrictions
    - application: infrared_optics
      share_pct: 30
      confidence: medium
      notes: |
        USGS OFR 2024-1057 reports the recent U.S. end-use split at 30% for
        infrared optics, based on the USGS Mineral Commodity Summaries history.
      source_id: usgs_ofr_2024_germanium_restrictions
    - application: electronics_and_solar
      share_pct: 20
      confidence: medium
      notes: |
        USGS OFR 2024-1057 reports the recent U.S. end-use split at 20% for
        electronics and solar applications.
      source_id: usgs_ofr_2024_germanium_restrictions
    - application: other
      share_pct: 10
      confidence: medium
      notes: |
        USGS OFR 2024-1057 reports the residual 10% of recent U.S. germanium
        use as other applications.
      source_id: usgs_ofr_2024_germanium_restrictions
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_2025_critical_minerals
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Germanium appears on the November 7, 2025 U.S. final critical minerals
    list and on both Annex I (strategic raw materials) and Annex II (critical
    raw materials) of EU Regulation 2024/1252. USGS MCS 2025 also reports U.S.
    net import reliance above 50% throughout 2020-24.

