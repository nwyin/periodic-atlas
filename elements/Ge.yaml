        - country: RU
          share_pct: 2.9
          quantity:
            value: 6
            unit: tonnes_per_year
            form: metal
            approximate: true
            confidence: medium
            source_id: usgs_ofr_2024_germanium_restrictions
          notes: |
            Share derived from USGS OFR 2024-1057 table 1.14 by dividing the
