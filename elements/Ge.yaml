geopolitical_events:
  - date: 2023-08
    event: "China implemented an export licensing program for germanium."
    impact: |
      USGS MCS 2025 reports the licensing regime remained in force in 2024 and
      that China's reported exports of germanium metal for January-August 2024
      fell 55% year over year to 16,700 kilograms.
    source_id: usgs_mcs_2025_germanium
  - date: 2024-04
    event: "U.S. Department of Defense awarded $14.4 million to expand germanium wafer manufacturing in Utah."
    impact: |
      USGS MCS 2025 links the award to the Defense Production Act Investment
      Program and the 2024 National Defense Industrial Strategy, aimed at
      increasing domestic production and supply-chain resilience.
    source_id: usgs_mcs_2025_germanium
  - date: 2024-05
    event: "Belgian processor and Congolese partner agreed to recover germanium from Lubumbashi tailings."
    impact: |
      USGS MCS 2025 describes the deal as a Minerals Security Partnership-backed
      effort to build a new recovery plant in Congo (Kinshasa), broadening
      non-Chinese supply options from tailings feedstocks.
    source_id: usgs_mcs_2025_germanium
  - date: 2024-12
    event: "China banned all exports of germanium to the United States."
    impact: |
      USGS MCS 2025 states the ban followed the 2023 licensing regime and hit a
      U.S. market already importing more than 94% of 2024 year-to-August metal
      and dioxide supply from Belgium, Germany, Canada, and China.
    source_id: usgs_mcs_2025_germanium

narrative: |
  Germanium is a classic byproduct critical mineral rather than a stand-alone
  mining business. In the United States, USGS MCS 2025 describes germanium-
  bearing zinc concentrates from Alaska being exported to Canada for recovery as
  germanium dioxide and tetrachloride, while downstream U.S. activity centers on
  wafer and tetrachloride fabrication from imported and recycled feed. The same
  chapter reports no primary U.S. refinery production and net import reliance
  above 50%, with imports of metal and dioxide worth an estimated $50 million in
  2024.

  Supply is highly concentrated and data-poor at the same time. USGS OFR
  2024-1057 estimates 2022 world primary germanium production at about 210 t,
  with China at roughly 180 t and Canada, Belgium, and Russia making up most of
  the balance. USGS MCS 2025 says 2024 global refinery production and recycling
  data remained limited, but still identifies China as the leading producer and
  exporter. Because germanium is recovered mainly from zinc smelter residues and
  coal-derived feedstocks, supply responds weakly to germanium price signals.

  That structural tightness collided with geopolitics in 2023-24. China first
  imposed export licensing in August 2023 and then banned all germanium exports
  to the United States in December 2024. At the same time, European minimum-
  purity prices rose sharply through 2024, and the U.S. Government moved to
  strengthen domestic wafer capacity while allied firms pursued new tailings-
  based recovery projects in Congo (Kinshasa). Commercial reality is therefore a
  thin, strategically sensitive market organized around refined metal, dioxide,
  tetrachloride, and recycling rather than around visible mine output.

