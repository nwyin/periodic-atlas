      confidence: medium
      notes: |
        USGS Open-File Report 2024-1057 appendix table 1.14 estimates world
        primary germanium production at 210 metric tons in 2022. The same report
        notes a high degree of uncertainty around world germanium production and
        treats the figures as best-available estimates rather than audited totals.
      source_id: usgs_ofr_2024_germanium_restrictions
    mining_by_country:
      shares: []
      completeness: partial
    refining_by_country:
