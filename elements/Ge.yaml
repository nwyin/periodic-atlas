symbol: Ge
atomic_number: 32
name: germanium
category: metalloid
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  Commercial germanium trades mainly as high-purity germanium metal, germanium
  dioxide, and germanium tetrachloride; wafers are a downstream fabricated form.
  USGS MCS 2025 reports all chapter quantities in kilograms of germanium content
  unless otherwise specified. The annual price series is the average European
  price for minimum 99.999% purity material; germanium dioxide values are
  converted by USGS to germanium content using a 69% factor.

