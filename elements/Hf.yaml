  notes: |
    Hafnium has no published standalone mine-production table in USGS MCS 2025. This block
    therefore tracks hafnium content associated with mined zircon feedstock, which is the
    upstream resource flux — the upstream constraint on eventual hafnium recovery. The
    geographic distribution mirrors zircon mining rather than separated hafnium metal
    production. USGS separately notes that zirconium metal and hafnium metal were produced
    in the United States from zirconium chemical intermediates by one producer in Oregon
    and one in Utah, but it does not disclose tonnage. See the unwrought_metal block for
    commercial-scale hafnium metal data.

- reporting_year: 2024
  stream: unwrought_metal
  refined:
    value: 75
    unit: tonnes_per_year
    form: metal
    approximate: true
    low: 50
    high: 100
    confidence: low
    notes: |
      USGS MCS 2025 explicitly states that world primary hafnium production data are not
      available. This value (75 t, range 50–100 t) is an atlas estimate anchored by US
      trade statistics in the same chapter: US imports of unwrought hafnium were 50 t and
      exports were 10 t in 2024e. The US is a net importer and one of the larger consumers.
      Leading global exporters of unwrought hafnium were China, Germany, and the Netherlands.
      Industry estimates and secondary literature consistently place global commercial
      hafnium separation at 50–100 t/year. This is approximately 150–200x smaller than the
      contained_in_zircon_feed stream, which represents upstream resource flux rather than
      recovered metal.
    source_id: usgs_mcs_2025_zr_hf
  refining_by_country:
    shares:
      - country: CN
        share_pct: 35
        confidence: low
        notes: |
          China is named by USGS MCS 2025 as one of the leading global exporters of unwrought
          hafnium in 2024. USGS import source data (2020-23) show Germany 50%, China 21%,
          France 18%, UK 5%, other 6% for US unwrought hafnium imports — but this reflects
          US sourcing only, not global production. China's actual share in global refined Hf
          output is an atlas estimate. Marked low-confidence.
        source_id: usgs_mcs_2025_zr_hf
      - country: DE
        share_pct: 25
        confidence: low
        notes: |
          Germany is named by USGS MCS 2025 as one of the leading global exporters of unwrought
          hafnium in 2024 and was the top US import source (50%) over 2020-23. Estimate;
          Germany does not mine Hf but processes zirconium chemical intermediates from imported
          zircon. Share is an atlas estimate; confidence low.
        source_id: usgs_mcs_2025_zr_hf
      - country: FR
        share_pct: 20
        confidence: low
        notes: |
          France supplied 18% of US unwrought hafnium imports over 2020-23 per USGS MCS 2025.
          France (notably Framatome/CEZUS) produces nuclear-grade Zr and co-produces Hf.
          Share is an atlas estimate; confidence low.
        source_id: usgs_mcs_2025_zr_hf
      - country: NL
        share_pct: 10
        confidence: low
        notes: |
          Netherlands is named by USGS MCS 2025 as one of the leading global exporters of
          unwrought hafnium in 2024. Likely trading/re-export hub. Share is an atlas estimate.
        source_id: usgs_mcs_2025_zr_hf
      - country: US
        share_pct: 5
        confidence: low
        notes: |
          USGS MCS 2025 states hafnium metal is produced from zirconium chemical intermediates
          by producers in Oregon and Utah; the US is a net importer. Share is an atlas estimate.
        source_id: usgs_mcs_2025_zr_hf
      - country: ZZ
        share_pct: 5
        confidence: low
        notes: "Residual rest-of-world share; atlas estimate."
        source_id: usgs_mcs_2025_zr_hf
    completeness: partial
  notes: |
    This block represents actual separated, commercial hafnium metal. USGS does not publish
    a world production total. The refined.value of ~75 t/year (range 50–100 t) is an atlas
    estimate derived from US trade data and secondary literature. Country shares reflect
    USGS-cited leading exporters (China, Germany, Netherlands) and US import source data
    (Germany 50%, China 21%, France 18%, UK 5%, 2020-23 average). All shares are low-confidence
    estimates. This block should not be confused with the contained_in_zircon_feed block,
    which is ~150–200x larger and represents upstream zircon-hosted hafnium flux.

reserves:
  notes: |
    USGS MCS 2025 states: "World primary hafnium production data and quantitative estimates of
    hafnium reserves were not available." It also states that world resources of hafnium are
    associated with those of zircon and baddeleyite, but quantitative resource estimates were
    not available. Accordingly, this file does not report economic_reserves or resources values
    for hafnium.

byproduct_of: [Zr]

feedstock_origins:
  - substrate: zircon_sand
    notes: |
      Zircon is the primary source of all hafnium. USGS states that zirconium and hafnium are
      contained in zircon at a ratio of about 50:1. Hafnium therefore enters the supply chain
      through zircon recovered as a coproduct or byproduct of heavy-mineral-sand mining.
    source_id: usgs_zr_hf_stats_page
  - substrate: zirconium_chemical_intermediates
    notes: |
      In the commercial chain, hafnium metal is produced from zirconium chemical intermediates.
      USGS MCS 2025 states that zirconium metal and hafnium metal were produced from zirconium
      chemical intermediates by one producer in Oregon and one in Utah.
    source_id: usgs_mcs_2025_zr_hf
  - substrate: baddeleyite
    notes: |
      USGS MCS 2025 notes that world hafnium resources are associated with zircon and baddeleyite.
      Baddeleyite is a minor but geologically relevant zirconium oxide source compared with zircon.
    source_id: usgs_mcs_2025_zr_hf

substitutes:
  - application: nuclear_control_rods
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph states that boron or cadmium-silver-indium alloys are
      sometimes used in lieu of hafnium metal in control rods at nuclear powerplants.
    source_id: usgs_mcs_2025_zr_hf
  - application: nickel_based_superalloys
    availability: partial
    notes: |
      USGS MCS 2025 states that zirconium can be used interchangeably with hafnium in certain
      superalloys. Substitution is application-specific because Hf additions are used to tune
      oxidation resistance and creep behavior in hot-section alloys.
    source_id: usgs_mcs_2025_zr_hf

end_uses:
  uses:
    - application: nickel_based_superalloys
      share_pct: 45
      confidence: low
      notes: |
        USGS MCS 2025 says "The leading use of hafnium metal is in superalloys." The USGS
        zirconium-and-hafnium statistics page identifies nickel-based superalloys as a major
        hafnium end use. Because USGS does not publish end-use percentages, this atlas assigns
        a low-confidence plurality share to superalloy additions for turbine blades and other
        high-temperature aerospace components.
      source_id: usgs_zr_hf_stats_page
    - application: nuclear_control_rods
      share_pct: 30
      confidence: low
      notes: |
        The USGS zirconium-and-hafnium statistics page lists nuclear control rods among hafnium's
        major end uses. Hafnium's very high neutron-absorption cross section makes it valuable in
        reactor control assemblies. Share is an atlas estimate because USGS does not publish a
        percentage split.
      source_id: usgs_zr_hf_stats_page
    - application: plasma_arc_cutting_nozzles
      share_pct: 15
      confidence: low
      notes: |
        USGS identifies nozzles for plasma arc metal cutting as a major hafnium end use. Hafnium
        is used in plasma torch electrodes and nozzle assemblies because it tolerates very high
        temperatures and repeated arc exposure. Share is an atlas estimate.
      source_id: usgs_zr_hf_stats_page
    - application: high_temperature_ceramics
      share_pct: 10
      confidence: low
      notes: |
        USGS identifies high-temperature ceramics as a major hafnium end use. This includes
        hafnium-containing refractory or ultra-high-temperature ceramic applications where oxide,
        carbide, or nitride chemistry is valued for thermal stability. Share is an atlas estimate.
      source_id: usgs_zr_hf_stats_page
  completeness: partial

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_critical_minerals_2025
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  notes: |
    Hafnium appears on the USGS 2025 List of Critical Minerals. Under the EU Critical Raw
    Materials Act, hafnium is listed in Annex II (Critical Raw Materials) but not in Annex I
    (Strategic Raw Materials). The designation reflects a very small, byproduct-constrained
    market tied to zircon and zirconium processing, with applications in nuclear systems and
    high-temperature aerospace alloys.

