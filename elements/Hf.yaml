symbol: Hf
atomic_number: 72
name: hafnium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 publishes hafnium inside the combined "Zirconium and Hafnium" chapter.
  The chapter does not publish quantitative world primary hafnium metal production or
  reserves, but it does state that zirconium and hafnium occur in zircon at a ratio of
  about 50:1 and reports unwrought hafnium trade and price data in metric tons and
  US dollars per kilogram. Commercial hafnium is traded mainly as unwrought metal and
  powder; separation occurs from zirconium chemical intermediates produced from zircon feed.

  Two production blocks are maintained for hafnium:
  (1) stream=contained_in_zircon_feed — theoretical hafnium content in global zircon mine
      production; this is the upstream resource flux, NOT refined metal output. Value is
      ~14,400 t/year derived from world zircon output via the 50:1 Zr:Hf ratio.
  (2) stream=unwrought_metal — actual separated hafnium metal at commercial scale; USGS
      does not disclose a world total, but US trade data (50 t imports, 10 t exports in
      2024e) anchors the scale of the real commercial market at approximately 50-100 t/year
      globally. These two numbers differ by roughly 150x and must not be confused.

