      states that world primary hafnium production data are not available, but also states that
      zirconium and hafnium are typically contained in zircon at a ratio of about 50:1. This
      atlas proxy applies that ratio to 2024e world zircon mine production after converting
      zircon gross weight to ZrO2 content (65% per footnote 1) and then to contained zirconium:
      1,500,000 t gross zircon x 0.65 x 0.740 x 1/50 = about 14,400 t Hf contained in mined
