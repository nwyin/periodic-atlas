geopolitical_events:
  - date: "2024"
    event: "US unwrought hafnium trade contracted sharply in 2024 after the 2023 spike"
    impact: |
      USGS MCS 2025 reports that US exports of unwrought hafnium fell from 58 t in 2023 to
      10 t in 2024e, while imports fell from 70 t to 50 t. The chapter also names China,
      Germany, and the Netherlands as the leading global exporters of unwrought hafnium in 2024.
      Hafnium's annual average unwrought price fell from $6,150/kg in 2023 to $4,600/kg in 2024e,
      illustrating how thin and volatile the commercial market is.
    source_id: usgs_mcs_2025_zr_hf

narrative: |
  Hafnium is an extreme byproduct market. There are no meaningful primary hafnium mines; the
  element is carried into commerce through zircon and zirconium processing, with zirconium and
  hafnium occurring in zircon at about a 50:1 ratio. USGS MCS 2025 explicitly says that world
  primary hafnium production data are not available, which is why this file models upstream
  hafnium-bearing zircon feed rather than pretending the published zircon table is a direct hafnium
  metal output table. Commercial separation happens downstream when zirconium chemical intermediates
  are processed to make hafnium-free zirconium metal and hafnium byproduct metal.

  The resulting market is small, specialized, and volatile. USGS reports only tens of tonnes of
  US unwrought hafnium trade in 2024e: 50 t of imports and 10 t of exports, after the unusual 2023
  surge to 70 t and 58 t respectively. Price behavior reflects that thinness. Unwrought hafnium
  averaged $778/kg in 2020, $781/kg in 2021, $1,590/kg in 2022, then spiked to $6,150/kg in 2023
  before easing to $4,600/kg in 2024e. The main commercial uses are high-temperature nickel-base
  superalloys, nuclear control rods, plasma arc cutting consumables, and high-temperature ceramics.

  Criticality follows directly from that structure. Hafnium is tied to the same heavy-mineral-sand
  and zircon supply chains that feed zirconium, but only a small fraction of that upstream flow is
  separated into commercial hafnium products. Supply therefore depends less on hafnium price than on
  zircon mining, zirconium intermediate production, and demand for nuclear-grade zirconium and other
  downstream products. The United States lists hafnium on the 2025 critical minerals list, and the
  EU lists it as a critical raw material, reflecting its strategic role in nuclear and aerospace
  applications despite the absence of a large standalone market.

