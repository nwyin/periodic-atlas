    World refinery production 2024e (rounded): 24,000 metric tons. USGS reports this table
    as "Refinery production" — there is no separate world mine production table for cadmium,
    as cadmium has no independent mining and is recovered solely as a byproduct of zinc
    smelting. China dominates global refining at ~39% of world output; the Republic of Korea
    is second at ~19%. All country share_pct values are computed as country_value / 24,000
    and should be treated as inferred. US, Mexico, Netherlands, and Peru values are explicitly
    marked "Reported" in USGS footnote 10; all others are estimated.

reserves:
  notes: |
    USGS MCS 2025 states: "Quantitative estimates of reserves were not available. The
    cadmium content of typical zinc ores averages about 0.03%. See the Zinc chapter for
    zinc reserves." Cadmium reserves are therefore a derived quantity from zinc ore reserves,
    not reported independently. No economic_reserves quantity is assigned for cadmium.

substitutes:
  - application: nickel_cadmium_batteries
    availability: partial
    notes: |
      USGS MCS 2025 substitutes: "Batteries with other chemistries, particularly lithium-ion,
      can replace NiCd batteries in many applications." This is the most important substitution
      trend — LFP and NMC lithium-ion chemistries have displaced NiCd in consumer electronics
      and power tools. NiCd retains advantages in temperature extremes, high-cycle applications,
      and some industrial/aviation uses, limiting full substitution.
    source_id: usgs_mcs_2025_cadmium
  - application: coatings_and_plating
    availability: partial
    notes: |
      USGS MCS 2025: "Except where the surface characteristics of a coating are critical (for
      example, fasteners for aircraft), coatings such as zinc-nickel can be substituted for
      cadmium in many plating applications." Cadmium plating on aerospace fasteners remains
      largely irreplaceable due to its specific corrosion-resistance and lubricity properties.
    source_id: usgs_mcs_2025_cadmium
  - application: pigments
    availability: partial
    notes: |
      USGS MCS 2025: "Cerium sulfide is used as a replacement for cadmium pigments, mostly
      in plastics." Regulatory pressure in the EU and elsewhere has driven substitution of
      cadmium-based pigments (cadmium red, cadmium yellow, cadmium orange) in many markets,
      though cadmium pigments retain advantages in high-temperature processing applications.
    source_id: usgs_mcs_2025_cadmium
  - application: pvc_stabilizers
    availability: partial
    notes: |
      USGS MCS 2025: "Barium stabilizers can replace barium-cadmium stabilizers in flexible
      polyvinyl chloride (PVC) applications." Cadmium-based PVC heat stabilizers have largely
      been phased out in Europe; calcium-zinc and organotin systems are the primary alternatives.
    source_id: usgs_mcs_2025_cadmium
  - application: cdte_solar_and_semiconductors
    availability: none
    notes: |
      USGS MCS 2025: "Thin-film technologies based on copper-indium-gallium-selenide and
      perovskite materials continued to be investigated but were not yet commercially feasible"
      as alternatives to CdTe thin-film solar panels at the scale and cost of established
      CdTe manufacturing. CIGS and perovskite represent potential long-term substitutes, but
      CdTe remains the dominant non-silicon thin-film technology as of 2025.
    source_id: usgs_mcs_2025_cadmium

end_uses:
  uses:
    - application: nickel_cadmium_batteries
      share_pct: 73
      confidence: low
      notes: |
        USGS MCS 2025: cadmium metal and compounds "are mainly consumed for NiCd batteries."
        NiCd batteries are the dominant global end use. The 73% approximate share is consistent
        with international industry data but is not explicitly stated as a percentage in USGS
        MCS 2025. China replaced India as the leading cadmium consumer in 2024; India had been
        importing large quantities (>11,400 t in 2023) for NiCd battery manufacturing.
      source_id: usgs_mcs_2025_cadmium
    - application: pigments
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 lists pigments as a secondary end use. Cadmium-based pigments (cadmium
        red, yellow, orange) are used in plastics, ceramics, and glass. Regulatory pressure
        in Europe has reduced this share. US export of cadmium pigments and preparations in
        2024e was ~500 tonnes; imports were ~120 tonnes.
      source_id: usgs_mcs_2025_cadmium
    - application: coatings_and_plating
      share_pct: 9
      confidence: low
      notes: |
        USGS MCS 2025 lists coatings as a secondary end use. Cadmium electroplating is used
        on fasteners, connectors, and structural components in aerospace, defense, and marine
        applications for its combination of corrosion resistance, lubricity, and compatibility
        with aluminum. Largely irreplaceable in aircraft fastener applications.
      source_id: usgs_mcs_2025_cadmium
    - application: alloys
      share_pct: 4
      confidence: low
      notes: |
        USGS MCS 2025 lists alloys as a secondary end use. Cadmium alloys are used in
        low-friction bearing alloys (cadmium-copper, cadmium-nickel, cadmium-silver) and
        brazing alloys. Approximately 4% of global cadmium consumption.
      source_id: usgs_mcs_2025_cadmium
    - application: cdte_solar_and_semiconductors
      share_pct: 4
      confidence: low
      notes: |
        USGS MCS 2025: "An increasing use for cadmium was in cadmium-telluride (CdTe) thin-film
        solar panels, and in cadmium-zinc-telluride (CdZnTe) substrates for radiation detectors
        and imaging applications." The leading US CdTe solar manufacturer commenced commercial
        production at a fourth facility in Alabama in Q3 2024, increasing total US CdTe capacity
        to nearly 11 GW/year. A fifth facility in Louisiana is expected to add 3.5 GW/year in
        H2 2025. Worldwide CdTe capacity reached ~21 GW/year in 2024.
      source_id: usgs_mcs_2025_cadmium
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Cadmium is not on the US 2022 Critical Minerals List, the EU Critical Raw Materials list
    (2023), or the EU Strategic Raw Materials list (CRMA 2024). Despite strategic uses (CdZnTe
    substrates for radiation detectors and imaging; the US Defense Logistics Agency FY2025
    stockpile target includes 2,800 sq cm of CdZnTe substrates, a 180% increase from FY2024),
    cadmium itself is not designated as critical, partly because it is a byproduct commodity
    linked to zinc production and partly due to regulatory trends (REACH, EU RoHS) restricting
    cadmium use in many applications. Net import reliance for the US turned to net-exporter
    status (E) in 2023 and 2024.

