geopolitical_events:
  - date: "2024-01"
    event: "US becomes net exporter of cadmium for second consecutive year"
    impact: |
      The US was a net exporter of cadmium in 2024 (and 2023), as indicated by the "E"
      (net exporter) designation in the USGS salient statistics for net import reliance.
      This reflects increased primary production (375 t in 2023, 300 t in 2024e at the
      Tennessee zinc smelter) combined with reduced imports of unwrought cadmium (from 282 t
      in 2020 to just 7 t in 2024e). Exports of unwrought cadmium peaked at 100 t in 2023
      and declined to 20 t in 2024e.
    source_id: usgs_mcs_2025_cadmium
  - date: "2024-03"
    event: "China replaces India as world's leading cadmium consumer"
    impact: |
      Based on estimated production, imports, and exports, China replaced India as the leading
      global consumer of cadmium in 2024. India had been the leading importer of cadmium metal
      with more than 11,400 tonnes imported in 2023 and nearly 6,000 tonnes as of August 2024;
      however, despite substantial cadmium sponge production as a zinc smelting byproduct,
      India did not report cadmium metal production as of August 2024.
    source_id: usgs_mcs_2025_cadmium
  - date: "2024-07"
    event: "Leading US CdTe solar manufacturer begins commercial production at Alabama facility (4th plant)"
    impact: |
      The Inflation Reduction Act of 2022 (IRA) provided tax incentives for domestic solar
      manufacturing. The leading US CdTe thin-film solar panel manufacturer (First Solar, based
      in Ohio) began commercial production in Q3 2024 at a fourth facility in Alabama, increasing
      total US CdTe manufacturing capacity to nearly 11 GW per year. A fifth site in Louisiana
      was under construction, expected to add another 3.5 GW/year in H2 2025. Worldwide CdTe
      manufacturing capacity reached approximately 21 GW/year, including a facility in India
      that opened in early 2024.
    source_id: usgs_mcs_2025_cadmium
  - date: "2024-01"
    event: "NREL awards $1.8 million in second-round CdTe photovoltaic accelerator contracts"
    impact: |
      The National Renewable Energy Laboratory (NREL), as administrator of the 3-year Cadmium
      Telluride Photovoltaics Accelerator Program, announced in January 2024 that $1.8 million
      had been awarded in a second round of contracts to support development of more efficient
      and lower-cost CdTe solar cells.
    source_id: usgs_mcs_2025_cadmium
  - date: "2024-01"
    event: "US government FY2025 stockpile target for CdZnTe substrates increased 180%"
    impact: |
      The Defense Logistics Agency FY2025 potential acquisitions include 2,800 square centimeters
      of CdZnTe (cadmium-zinc-telluride) substrates, a 180% increase from 1,000 sq cm in FY2024.
      CdZnTe substrates are critical for radiation detectors and imaging systems used in defense
      and homeland security applications.
    source_id: usgs_mcs_2025_cadmium
  - date: "2024-01"
    event: "Ohio NiCd battery recycler shuts cadmium recovery line to focus on lithium-ion recycling"
    impact: |
      A company in Ohio that had been recovering secondary cadmium metal shut down its NiCd
      battery recycling line in 2024, shifting focus to lithium-ion battery recycling. This
      reflects the broader market trend away from NiCd toward Li-ion chemistries, reducing
      secondary cadmium recovery. A separate Ohio company established in 2022 continued
      processing both consumer and industrial NiCd batteries, recovering cadmium metal and
      planning to refine it to battery-grade purity.
    source_id: usgs_mcs_2025_cadmium

narrative: |
  Cadmium is produced exclusively as a byproduct of zinc smelting and refining, with no
  independent primary mining. World refinery production was approximately 24,000 metric tons
  in 2024, dominated by China (~39%), the Republic of Korea (~19%), Canada and Japan (~7%
  each), and Mexico (~5%). The US recovered 300 metric tons at the single domestic zinc
  smelter in Tennessee, making it a net cadmium exporter for the second consecutive year
  as domestic primary production exceeded unwrought import volumes. Cadmium prices rose
  steadily from $2.29/kg in 2020 to $4.10/kg in 2024e (Fastmarkets MB, CIF global ports),
  with intra-year dips reflecting seasonal demand patterns from India, historically the
  leading importer. In 2024, China replaced India as the world's leading cadmium consumer.

  The dominant end use for cadmium remains nickel-cadmium (NiCd) batteries, which account
  for an estimated 70–75% of global consumption, primarily in rechargeable consumer batteries,
  power tools, and industrial/aviation applications. Cadmium pigments, coatings, and alloys
  represent secondary applications. The most significant growth vector is cadmium telluride
  (CdTe) thin-film photovoltaic panels, which are gaining market share under IRA-driven
  incentives. The US CdTe industry leader reached ~11 GW/year of domestic manufacturing
  capacity in 2024 and is adding a fifth facility in Louisiana, with global CdTe capacity
  reaching ~21 GW/year. CdZnTe substrates for radiation detectors represent a small but
  strategically important use, with US government stockpile acquisitions increasing 180%
  in FY2025. Reserves are not quantified independently — cadmium availability is directly
  tied to zinc ore reserves, with typical ore grades of approximately 0.03% Cd.

  Cadmium faces significant regulatory headwinds: EU RoHS, REACH, and analogous frameworks
  restrict cadmium in batteries, pigments, plating, and PVC stabilizers across major markets,
  accelerating substitution toward lithium-ion chemistries, zinc-nickel coatings, cerium
  sulfide pigments, and calcium-zinc PVC stabilizers. Cadmium is not designated as critical
  by the US, EU, or other major economies, in part because its supply is structurally linked
  to zinc and because policy trends toward reducing cadmium use outweigh strategic supply
  concerns for most applications. The notable exception is CdZnTe for defense radiation
  detectors, where no viable substitute technology has been commercialized.

