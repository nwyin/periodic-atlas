symbol: Cd
atomic_number: 48
name: cadmium
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Cadmium has no independent mine production — it is recovered exclusively as a byproduct
  of zinc smelting and refining. USGS MCS 2025 reports world cadmium figures as "Refinery
  production" (not mine production) in metric tons of cadmium metal content.

  Primary cadmium metal is produced by roasting zinc sulfide concentrates; cadmium is
  volatilised, collected in flue dust, and reduced to metal (99.95% purity). Commercial
  trade forms include unwrought cadmium metal and powders, wrought articles, cadmium oxide,
  cadmium sulfide, and cadmium pigments/preparations based on cadmium compounds. Prices are
  quoted in US dollars per kilogram for 99.95% purity in 10-ton lots, cost insurance and
  freight (CIF), global ports, as reported by Fastmarkets MB. Data are in metric tons unless
  otherwise specified.

byproduct_of: [Zn]

feedstock_origins:
  - substrate: sphalerite_zinc_ore
    typical_concentration_pct: 0.03
    notes: |
      Cadmium is generally recovered from zinc ores and concentrates. Sphalerite, the most
      economically significant zinc ore mineral, commonly contains minor amounts of cadmium,
      which shares certain similar chemical properties with zinc and often substitutes for
      zinc in the sphalerite crystal lattice. The average cadmium content of typical zinc
      ores is about 0.03%. The cadmium mineral greenockite (CdS) is frequently associated
      with weathered sphalerite and wurtzite.
    source_id: usgs_mcs_2025_cadmium
  - substrate: zinc_roaster_flue_dust
    notes: |
      Cadmium is volatilised during the roasting of zinc sulfide concentrates and collected
      in flue dusts and bag-house residues. At the only US zinc smelter (Tennessee), primary
      cadmium metal is recovered as a byproduct of zinc leaching from roasted sulfide
      concentrates.
    source_id: usgs_mcs_2025_cadmium
  - substrate: nickel_cadmium_battery_scrap
    notes: |
      Secondary cadmium is mainly recovered from spent consumer and industrial NiCd batteries.
      Other scrap sources include copper-cadmium alloy scrap, complex nonferrous alloy scrap,
      cadmium-containing dust from electric-arc furnaces, and CdTe solar panels. In 2024 a
      company in Ohio shut down its NiCd battery recycling line to focus on lithium-ion
      battery recycling; a separate Ohio company established in 2022 continued processing
      consumer and industrial NiCd batteries and planned to refine recovered cadmium to
      battery-grade purity.
    source_id: usgs_mcs_2025_cadmium

