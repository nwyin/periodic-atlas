criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_yttrium
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Yttrium is classified as critical under the US 2022 Critical Minerals List as
    part of "rare earth elements" (a group designation). US net import reliance for
    yttrium compounds and metals was 100% in 2024e (USGS MCS 2025 Yttrium chapter
    salient statistics), with 93% of imports sourced from China (2020–23 average).
    Heavy rare earth elements including yttrium are designated as Critical Raw
    Materials (Annex I) and Strategic Raw Materials (Annex II) under EU Regulation
    2024/1252 (Critical Raw Materials Act, CRMA); the EU explicitly distinguishes
    light REEs and heavy REEs as separate CRM/SRM entries. Yttrium's criticality is
    amplified by: (1) its direct inclusion in China's April 2025 export controls on
    seven heavy REEs; (2) 100% US import reliance with no commercial domestic
    separation; (3) its non-substitutability in YAG lasers, YIG electronics, and
    YSZ thermal barrier coatings for jet engines; (4) its growing role in white-LED
    phosphors (YAG:Ce) and HTS conductors (YBCO). The USGS Yttrium chapter (footnote 1)
    notes the Rare Earths chapter trade data include yttrium, confirming Y's
    classification alongside lanthanides in US critical mineral policy.

geopolitical_events:
  - date: "2024"
    event: "Global REE mine production rises to 390,000 t REO in 2024e; China raises IAC clay quota to 19,150 t, China exports 3,100 t Y₂O₃ in 2024"
    impact: |
      USGS MCS 2025 Rare Earths chapter reports 2024e world REE production of 390,000 t
      REO, up from 376,000 t in 2023. Growth driven by China (+15,000 t to 270,000 t),
      Nigeria (+5,800 t to 13,000 t), and Thailand (+9,400 t to 13,000 t); partially
      offset by Burma's 28% YoY decline (43,000 → 31,000 t). China's Ministry of
      Industry and Information Technology raised mining quotas to 270,000 t, allocating
      19,150 t to ion-adsorption clays (the primary Y ore type) — up from 2023 levels.
      The USGS Yttrium chapter reports China exported an estimated 3,100 t Y₂O₃
      equivalent in 2024, with Japan, US, Netherlands, and Republic of Korea as leading
      destinations. Burma's 28% production decline, driven by conflict-related
      disruptions to HREE-enriched IAC operations in Kachin and Shan States, had a
      disproportionate impact on yttrium supply relative to Burma's 7.9% share of REO
      tonnage, since Burmese deposits are HREE/Y-enriched.
    source_id: usgs_mcs_2025_yttrium
  - date: "2025-04"
    event: "China imposes export licensing controls directly on yttrium — one of seven named heavy REEs"
    impact: |
      China's Ministry of Commerce (MOFCOM) announced export control measures requiring
      licenses for exports of seven heavy rare earth elements: samarium (Sm), gadolinium
      (Gd), terbium (Tb), dysprosium (Dy), lutetium (Lu), scandium (Sc), and yttrium (Y).
      Unlike elements such as erbium and ytterbium — which were not directly named —
      yttrium was explicitly included in the April 2025 controls. The announcement
      coincided with US tariff escalation and served as a significant geopolitical signal
      given China's ~93% share of global Y compound supply. Controls create licensing
      friction for all downstream Y consumers outside China including makers of white-LED
      phosphors (YAG:Ce), YSZ thermal barrier coatings, YAG laser systems, and YIG
      microwave components. Strategic Y inventories outside China were limited at the
      time of the announcement.
    source_id: china_mofcom_2025_ree_controls

narrative: |
  Yttrium occupies a distinctive position in the rare earth family: it is not a
  lanthanide (it is a group 3 d-block element at atomic number 39), but its ionic
  radius and trivalent chemistry are so similar to the heavy lanthanides that it
  co-occurs with them in every commercial deposit type and is classified alongside
  them in USGS reporting. Unlike most heavy rare earth elements for which USGS
  publishes only a grouped REO total requiring basket-share derivation, yttrium
  receives a dedicated USGS MCS chapter that directly reports world Y₂O₃ mine
  production at 15,000–20,000 tonnes (2024e) — making it the best-documented HREE
  in terms of production statistics. This directly reported range implies a basket
  share of approximately 3.8–5.1% of global REO production, far larger than most
  individual lanthanides, reflecting yttrium's exceptional enrichment in ion
  adsorption clay (IAC) deposits where it can constitute 8–15% of total REOs.

  The commercial story of yttrium centers on three material platforms. First, yttria-
  stabilized zirconia (YSZ) — the coating that enables modern gas turbines, dental
  implants, and solid oxide fuel cells — commands the largest demand share (~40%).
  Second, yttrium-based phosphors including Y₂O₃:Eu (red, legacy CRT/fluorescent) and
  YAG:Ce (white LED wavelength converter, growing) together account for ~25% of
  demand. Third, catalysts (~12%), metallurgical applications including FeCrAl
  heating alloys and YBCO high-temperature superconductors (~10%), and YAG laser
  crystals (~8%) round out the portfolio. In each application, substitution is either
  impractical (YIG microwave components, YAG lasers) or costly in performance terms
  (CaO-stabilized zirconia is lower-toughness than YSZ). US net import reliance for
  yttrium compounds and metals was 100% in 2024e.

  Yttrium was directly named in China's April 2025 export licensing controls on seven
  heavy rare earth elements — a geopolitically significant inclusion given China's 93%
  share of US yttrium import sources (2020–23) and the absence of any commercial-scale
  Y₂O₃ separation outside China. Both the US and EU have designated rare earth elements
  including yttrium as critical materials. The combination of irreplaceable roles in
  jet-engine thermal barrier coatings, LED phosphors, and microwave electronics, with
  complete US import dependence and direct Chinese export control targeting, makes
  yttrium one of the most acute supply security exposures in the heavy rare earth basket.

