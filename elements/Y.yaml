symbol: Y
atomic_number: 39
name: yttrium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  Yttrium (Y, atomic number 39) is a group 3 d-block transition metal; it is not a
  lanthanide but is classified with the rare earth elements by USGS due to its
  similar chemistry and occurrence. USGS MCS 2025 covers yttrium in a dedicated
  Yttrium chapter (separate from the grouped Rare Earths chapter) and in the Rare
  Earths chapter as an included component (footnote 1 of the Rare Earths chapter:
  "Data include lanthanides and yttrium but exclude most scandium"). All USGS
  yttrium production data are reported in metric tons of yttrium oxide (Y₂O₃)
  equivalent; prices are free on board (FOB) China per Argus Rare Earths.

  Unlike most heavy rare earth elements for which USGS only reports aggregate REO
  totals requiring basket-share derivation, the USGS MCS 2025 Yttrium chapter
  directly reports world mine production of Y₂O₃ as 15,000–20,000 tonnes, making
  the production estimate more reliable than for other HREEs. The midpoint of this
  range (~17,500 t) is used as the central estimate. The implied Y₂O₃ basket share
  in the 390,000 t 2024e world REO total is approximately 3.8–5.1% (midpoint ~4.5%).

  Y is commercially traded primarily as Y₂O₃ at ≥99.9% purity (standard grade) or
  ≥99.999% purity (optical-grade for laser and phosphor applications), and as yttrium
  metal at ≥99.9% purity for metallurgical additions. The USGS Yttrium chapter tracks
  two price series: Y₂O₃ at 99.999% minimum purity and yttrium metal at 99.9% minimum
  purity, both FOB China (Argus Rare Earths). USGS does not report per-country Y₂O₃
  production tonnage; country-level shares are inferred from USGS qualitative statements
  and the relative REO production totals in the Rare Earths chapter. Mountain Pass
  bastnaesite was estimated to contain approximately 0.12% yttrium of rare-earth
  elements per USGS MCS 2025 Yttrium chapter. Yttrium ore production in the United
  States is reported as NA by USGS for all years 2020–2024.

production:
- reporting_year: 2024
  mine:
    value: 17500
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: medium
    notes: |
      USGS MCS 2025 Yttrium chapter directly reports world mine production of Y₂O₃
      equivalent contained in rare-earth mineral concentrates as 15,000–20,000 tonnes
      (2024e). This is a directly reported range, not a basket-share derivation —
      unlike most heavy rare earth elements. The midpoint of 17,500 t is used as the
      central estimate; the full range spans 15,000–20,000 t. Using the midpoint
      against the USGS-reported 390,000 t 2024e world REO total (Rare Earths chapter)
      implies a Y₂O₃ basket share of approximately 4.5% (range 3.8–5.1%), substantially
      higher than lighter REE basket shares because Y is strongly enriched in ion
      adsorption clay deposits (8–15% Y₂O₃) relative to bastnaesite (0.12% at Mountain
      Pass) and monazite (~1–3% Y₂O₃). USGS states: "Most of this production took
      place in China and Burma." China's Ministry of Industry and Information Technology
      allocated 19,150 t of the 2024 rare-earth mining quota to ion-adsorption clays
      (IAC), which are the primary yttrium ore type; the remaining 250,850 t was
      allocated to light rare earths (bastnaesite-dominant). IAC deposits at Y₂O₃
      concentrations of 8–15% would yield approximately 1,500–2,900 t from the official
      19,150 t IAC quota alone; undocumented production and broader Chinese IAC
      operations imply substantially higher actual output. China exported an estimated
      3,100 t Y₂O₃ equivalent in 2024 (leading destinations: Japan, US, Netherlands,
      Republic of Korea) per USGS, confirming meaningful production well above the
      official IAC quota figure. The 2023 world total would be approximately 14,400–
      19,200 t applying the same range to 376,000 t total REO reported for 2023.
      Confidence is medium (directly reported USGS range vs. low for basket derivations).
    source_id: usgs_mcs_2025_yttrium
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 75.0
        notes: |
          USGS MCS 2025 Yttrium chapter states China produced most world yttrium from
          weathered clay ion-adsorption ore deposits in southern provinces — primarily
          Fujian, Guangdong, and Jiangxi, with lesser deposits in Guangxi and Hunan.
          China's 2024 REE mining quota of 270,000 t REO (Rare Earths chapter footnote
          14) included 19,150 t from ion-adsorption clays, the primary yttrium ore type.
          China's actual IAC output (and thus Y production) includes undocumented
          production beyond the quota. The 75% country share is an estimate derived from
          USGS qualitative statements; the proportional REO share alone (270,000 /
          390,000 = 69.2%) understates China's yttrium dominance because southern
          Chinese IAC deposits are substantially enriched in Y relative to bastnaesite.
          China exported 3,100 t Y₂O₃ equivalent in 2024 (USGS Yttrium chapter), which
          represents a lower bound on Chinese Y production given domestic consumption.
        source_id: usgs_mcs_2025_yttrium
      - country: MM
        share_pct: 15.0
        notes: |
          USGS MCS 2025 Yttrium chapter explicitly cites Burma (Myanmar) as the other
          primary Y producer, from "similar clay deposits" (ion adsorption clay). Burma's
          2024 total REO output was 31,000 t (7.9% of world per Rare Earths chapter),
          down from 43,000 t in 2023 (-28% YoY). Burmese IAC deposits (primarily Kachin
          State and Shan State) are heavy-REE-enriched and contain above-average Y₂O₃
          fractions (~8–15%); at 15% country share of world Y₂O₃, the implied Burma Y
          output is ~2,600 t. Production is estimated from China import records (Rare
          Earths footnote 12). Burma's Y₂O₃ contribution exceeds its 7.9% REO share
          because its deposits are IAC-type and HREE/Y-enriched versus the LREE-dominant
          mines that dominate global REO tonnage.
        source_id: usgs_mcs_2025_yttrium
      - country: ZZ
        share_pct: 10.0
        notes: |
          Residual producers: Thailand (13,000 t REO 2024e, IAC deposits with elevated
          Y content), India (2,900 t REO from monazite/xenotime in heavy mineral sands,
          ~1–3% Y₂O₃), Australia (13,000 t REO from Mt. Weld bastnaesite, very low Y
          ~0.12%), Vietnam (300 t), Russia (2,500 t), Madagascar (2,000 t), Malaysia
          (130 t), and other (1,100 t) per the Rare Earths chapter. Thailand's IAC-type
          production contributes above-average Y relative to its REO share; bastnaesite-
          dominant producers (Australia, Mountain Pass-equivalent sources) contribute
          below-average Y. Overall contribution from this group is estimated at ~10% of
          world Y₂O₃ (~1,750 t at midpoint). Country shares are approximate; USGS does
          not report per-country Y₂O₃ tonnage.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 93.0
        notes: |
          USGS MCS 2025 Yttrium chapter reports US import sources 2020–23: China 93%,
          Germany 3%, other 4%. The chapter notes "Nearly all imports of yttrium metal
          and compounds are derived from mineral concentrates processed in China."
          Germany's 3% share reflects re-export and downstream processing of
          Chinese-origin yttrium intermediates, not independent primary separation.
          China controls both the dominant IAC ore base and essentially all commercial-
          scale Y₂O₃ separation and high-purity yttrium processing capacity; no fully
          commercial rare-earth separation facility existed in the United States in 2024
          per USGS. China's 2024 separation quota of 250,000 t REO equivalent (USGS
          Yttrium chapter) includes yttrium separation from both IAC concentrate and
          mixed REE streams. For high-purity optical-grade Y₂O₃ (99.999%), Chinese
          specialist separation facilities are essentially the sole commercial source.
        source_id: usgs_mcs_2025_yttrium
      - country: DE
        share_pct: 3.0
        notes: |
          Germany accounts for approximately 3% of US yttrium compound imports (2020–23)
          per USGS. German yttrium processing involves re-processing of Chinese-sourced
          yttrium intermediates or co-production from mixed REE streams; Germany is not
          an independent primary yttrium separation source. The 3% share represents a
          small but non-trivial non-Chinese Y source for US consumers.
        source_id: usgs_mcs_2025_yttrium
      - country: ZZ
        share_pct: 4.0
        notes: |
          Remaining 4% of US yttrium imports from other sources (2020–23). These likely
          include Japan (downstream Y processor), Estonia (Neo Performance Materials,
          processes Australian/Chinese intermediates), and other minor sources. All
          are ultimately derived from Chinese-processed mineral concentrates per USGS.
        source_id: usgs_mcs_2025_yttrium
    completeness: complete

reserves:
  economic_reserves:
    value: 4050000
    unit: tonnes
    form: oxide
    approximate: true
    confidence: low
    notes: |
      USGS MCS 2025 Yttrium chapter explicitly states "Global reserves of Y₂O₃ were
      not quantified." This derived estimate uses the world REE reserve floor of
      >90,000,000 t REO reported in the Rare Earths chapter (2025) multiplied by the
      implied Y₂O₃ basket share (~4.5% midpoint of the 3.8–5.1% range implied by
      USGS-reported 2024 production). 90,000,000 × 4.5% = 4,050,000 t Y₂O₃ floor
      estimate. The leading countries for total REO reserves — Australia, Brazil, China,
      India, Russia, and Vietnam — are the most important for Y resource potential
      (per USGS Yttrium chapter). However, USGS cautions that recent high demand for
      IAC rare earths in Burma and China, plus economic conditions, environmental issues,
      and trade restrictions, could affect availability. This derived figure carries low
      confidence; actual Y₂O₃ reserves depend on deposit-specific Y content which varies
      from ~0.1% in bastnaesite to ~8–15% in IAC deposits.
    source_id: usgs_mcs_2025_yttrium
  reserves_by_country:
