byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 10.0
    notes: |
      Ion adsorption clay (IAC) deposits in southern China (Fujian, Guangdong,
      Jiangxi, Guangxi, Hunan) and Southeast Asia (Burma/Myanmar) are the dominant
      commercial yttrium source. USGS MCS 2025 Yttrium chapter identifies China's
      southern province IAC deposits and Burmese clay deposits as the primary
      production locations. IAC deposits are weathered granites or tuffaceous rocks
      in which rare earth ions (including Y³⁺) are adsorbed onto clay mineral surfaces
      rather than locked in crystalline minerals; they are processed by in-situ or heap
      leaching with ammonium sulfate solution. Yttrium typically represents 8–15% of
      total REOs in Chinese southern IAC concentrates (compared to ~0.12% at bastnaesite
      Mountain Pass), making IAC deposits disproportionately important for Y supply
      relative to their REO tonnage share. China's 2024 quota of 19,150 t from IAC
      (of 270,000 t total quota) reflects the smaller REO tonnage but higher per-tonne
      Y value of these deposits vs. LREE bastnaesite operations.
    source_id: usgs_mcs_2025_yttrium
  - substrate: monazite_sand
    typical_concentration_pct: 2.0
    notes: |
      Monazite (rare-earth phosphate) concentrates often contain xenotime (YPO₄,
      yttrium phosphate) as an associated accessory mineral; xenotime is essentially
      pure yttrium phosphate and is the richest Y mineral (~60% Y₂O₃). USGS MCS 2025
      Yttrium chapter notes monazite was produced as a separated concentrate in Florida
      "that includes yttrium-rich xenotime as part of heavy-mineral-sand concentrates."
      India produces ~2,900 t REO per year from monazite/xenotime in beach sands.
      Monazite itself contains ~1–3% Y₂O₃. Thorium content in monazite complicates
      processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_yttrium
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.12
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary source of light REEs
      (La, Ce, Pr, Nd) but contains only trace yttrium. USGS MCS 2025 Yttrium chapter
      states Mountain Pass bastnaesite contains approximately 0.12% yttrium of total
      rare-earth elements — well below even the global REO basket average (4.5%). While
      Mountain Pass contributed 45,000 t REO in 2024 (11.5% of world REO total), its
      actual Y₂O₃ contribution is only ~54 t at 0.12% Y fraction. Bastnaesite at
      Bayan Obo (China) similarly has below-average Y content. Bastnaesite-type ore
      is a minor yttrium source despite dominating global REO tonnage.
    source_id: usgs_mcs_2025_yttrium

substitutes:
  - application: zirconia_ceramics_stabilizer
    availability: partial
    notes: |
      USGS MCS 2025 Yttrium chapter: "As a stabilizer in zirconia ceramics, Y₂O₃ may
      be substituted with calcium oxide or magnesium oxide, but the substitutes
      generally impart lower toughness." Yttria-stabilized zirconia (YSZ) at 3–8 mol%
      Y₂O₃ produces the tetragonal phase associated with transformation toughening;
      CaO-stabilized (CSZ) and MgO-stabilized zirconia achieve full cubic stabilization
      but at lower toughness and poorer thermal cycling resistance. For thermal barrier
      coatings on jet-engine hot-section components and for medical-grade dental
      zirconia requiring highest toughness, YSZ has no fully satisfactory substitute.
      In lower-end ceramic applications (refractories, cutting tool binders), CaO and
      MgO substitution is commercially practiced.
    source_id: usgs_mcs_2025_yttrium
  - application: electronics_lasers_phosphors
    availability: none
    notes: |
      USGS MCS 2025 Yttrium chapter: "In most uses, especially in electronics, lasers,
      and phosphors, yttrium is generally not subject to direct substitution by other
      elements." Yttrium-iron garnet (YIG, Y₃Fe₅O₁₂) microwave devices exploit Y's
      specific lattice parameter and magneto-optical properties; no other material
      provides the same narrow ferromagnetic resonance linewidth essential for microwave
      filter and oscillator applications. Yttrium-aluminum garnet (YAG, Y₃Al₅O₁₂) laser
      crystals and phosphor hosts (Y₂O₃:Eu red phosphors, YAG:Ce white-LED converters)
      similarly have no economically viable Y-free substitutes at comparable performance.
    source_id: usgs_mcs_2025_yttrium

end_uses:
  uses:
    - application: ceramics_ysz_refractories
      share_pct: 40
      confidence: low
      notes: |
        Yttria-stabilized zirconia (YSZ) is the largest commercial Y application.
        Y₂O₃ at 3–8 mol% stabilizes the tetragonal or cubic ZrO₂ phase, imparting
        transformation toughening (t-YSZ) or ionic conductivity (c-YSZ). Applications:
        (1) Thermal barrier coatings (TBC) on turbine blades and combustion chambers in
        aircraft engines and industrial gas turbines — the leading aerospace-industrial
        use. (2) Solid oxide fuel cell (SOFC) electrolytes, where c-YSZ provides O²⁻
        conductivity at 800–1000°C. (3) Oxygen sensors in automobile engines (λ-sensors)
        using YSZ's oxygen-ion conductivity. (4) High-temperature refractories for
        steel continuous-casting nozzles and other metallurgical equipment. (5) Medical-
        dental zirconia (3Y-TZP) for crowns, bridges, and implant components — one of
        the fastest-growing Y applications. USGS MCS 2025 Yttrium chapter lists bearings
        and seals, refractories, jet-engine coatings, and O₂ sensors as ceramic uses.
        Share is an industry consensus estimate; USGS does not report per-element end-use
        percentages.
      source_id: usgs_mcs_2025_yttrium
    - application: phosphors_displays_lighting
      share_pct: 25
      confidence: low
      notes: |
        Yttrium-based phosphors include: (1) Y₂O₃:Eu³⁺ (red phosphor), historically the
        dominant use in cathode-ray tube (CRT) televisions and fluorescent lamps; volume
        has declined with CRT phase-out but Y₂O₃:Eu remains in specialty fluorescent and
        UV-lamp applications. (2) YAG:Ce (yttrium aluminum garnet doped with cerium,
        Y₃Al₅O₁₂:Ce³⁺), the dominant wavelength-converter phosphor for white LED lamps
        and displays; YAG:Ce converts blue LED emission to broad-spectrum white light and
        is incorporated in phosphor layers of virtually all white LEDs for general
        lighting, backlights, and automotive lighting globally. This is the fastest-growing
        Y phosphor application as white LED adoption continues. (3) YVO₄:Eu and
        Y₂SiO₅:Ce specialty phosphors for displays and x-ray imaging. USGS MCS 2025
        Yttrium chapter lists phosphors for flat-panel displays and lighting as leading
        Y end uses.
      source_id: usgs_mcs_2025_yttrium
    - application: catalysts
      share_pct: 12
      confidence: low
      notes: |
        Yttrium compounds (Y₂O₃, yttrium stabilized catalysts) are used in fluid
        catalytic cracking (FCC) of petroleum and as promoters in chemical synthesis
        catalysts. USGS MCS 2025 Yttrium chapter and the Domestic Production and Use
        section both cite catalysts as a leading Y end use (the Rare Earths chapter also
        identifies catalysts as the "estimated leading domestic end use of rare earths"
        in the US). Y₂O₃ improves catalyst thermal stability and selectivity in FCC
        units processing heavy crude fractions. Share is an industry consensus estimate.
      source_id: usgs_mcs_2025_yttrium
    - application: metallurgical_additives_superalloys
      share_pct: 10
      confidence: low
      notes: |
        Yttrium metal and Y₂O₃ are used in metallurgical applications: (1) Grain-refining
        additive and deoxidizer in specialty steels and aluminum alloys — USGS MCS 2025
        Yttrium chapter explicitly cites grain-refining and deoxidizing. (2) Heating-
        element alloys (e.g., FeCrAl + Y "Kanthal" alloys) — Y additions (~0.1–0.5 wt%)
        dramatically improve the high-temperature oxidation resistance of iron-chromium-
        aluminum resistance heaters; used in industrial furnaces, electric stoves, and
        catalytic converters. (3) Nickel-based superalloys for jet engine and industrial
        turbine components — Y additions stabilize the α-Al₂O₃ oxide scale against
        spallation. (4) High-temperature superconductors (HTS): YBCO (YBa₂Cu₃O₇₋δ)
        rare-earth barium copper oxide wire is the dominant second-generation HTS
        conductor for MRI magnets, power cables, and future fusion machine coils. USGS
        cites heating-element alloys, high-temperature superconductors, and superalloys
        as Y metallurgical uses.
      source_id: usgs_mcs_2025_yttrium
    - application: lasers_yag
      share_pct: 8
      confidence: low
      notes: |
        Yttrium aluminum garnet (YAG, Y₃Al₅O₁₂) is one of the most widely used solid-
        state laser host crystals. USGS MCS 2025 Yttrium chapter: "Yttrium was an
        important component in yttrium-aluminum-garnet laser crystals used in dental and
        medical surgical procedures, digital communications, distance and temperature
        sensing, industrial cutting and welding, nonlinear optics, photochemistry, and
        photoluminescence." Nd:YAG (1064 nm) is a mature platform for medical laser
        surgery, rangefinders, and industrial machining. Er:YAG (2940 nm) is used in
        dental and dermatological procedures. Ho:YAG (2097 nm) in urological surgery.
        Tm:YAG (2013 nm) and Yb:YAG (1030 nm) are modern ultrashort-pulse platforms.
        YAG is also the host for Ce³⁺ in scintillator crystals (YAG:Ce scintillators)
        used in electron microscopy and x-ray imaging. Significant Y₂O₃ is consumed
        in YAG boule growth for all these applications.
      source_id: usgs_mcs_2025_yttrium
    - application: electronics_yig_microwave
      share_pct: 5
      confidence: low
      notes: |
        Yttrium-iron garnet (YIG, Y₃Fe₅O₁₂) is the preferred material for microwave
        and millimeter-wave signal processing components. USGS MCS 2025 Yttrium chapter:
        "In electronics, yttrium-iron garnets were components in microwave radar to
        control high-frequency signals." YIG exhibits the narrowest ferromagnetic
        resonance linewidth of any known material, enabling low-loss, frequency-tunable
        filters, oscillators, and isolators in military radar, electronic warfare, and
        communications systems. YIG-based tunable bandpass filters are used in spectrum
        analyzers, signal generators, and phased-array radar. Small-volume but high-
        value strategic end use; essentially no substitute.
      source_id: usgs_mcs_2025_yttrium
  completeness: complete

