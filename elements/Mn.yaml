  notes: |
    USGS MCS 2025 Events section: "Manganese is included in the U.S. list of
    critical minerals." The EU Critical Raw Materials Act entered into force
    in May 2024 and includes manganese as a critical raw material and
    high-purity manganese (battery grade) as a strategic raw material. US
    net import reliance = 100% for all years 2020–2024 (no domestic mine
    production since 1970).

