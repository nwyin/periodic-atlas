    (1,700,000 kt), consistent with country-level rounding. South Africa
    holds ~33% of economic reserves and an estimated ~70% of world resources.
    USGS MCS 2025 world resources text: "Land-based manganese resources are
    large but irregularly distributed; those in the United States are very
    low grade and have potentially high extraction costs. South Africa
    accounts for an estimated 70% of the world's manganese resources." No
    explicit global resource quantity is provided; resources field is null.

byproduct_of: []
feedstock_origins:
  - substrate: manganese_oxide_ores
    notes: |
      Pyrolusite (MnO₂) and other oxide-class manganese minerals are the
      primary ore types mined in South Africa, Australia, and Gabon —
      the three largest producing countries. These high-grade oxide ores
      are processed into metallurgical-grade concentrates for ferroalloy
      production.
    source_id: usgs_mcs_2025_manganese
  - substrate: manganese_carbonate_ores
    notes: |
      Rhodochrosite (MnCO₃) and carbonate-class ores are significant in
      China, where lower-grade ore is predominant. Carbonate ores require
      roasting to convert to oxide before smelting.
    source_id: usgs_mcs_2025_manganese

substitutes:
  - application: steel_alloying_deoxidizer_desulfurizer
    availability: none
    notes: |
      USGS MCS 2025 substitutes paragraph: "Manganese has no satisfactory
      substitute in its major applications." As a deoxidizer and desulfurizer
      in steel, and as an alloying element in ferromanganese and
      silicomanganese, no other element performs the combined role at
      comparable cost and effectiveness. This is a key driver of manganese's
      presence on the US critical minerals list despite its relatively
      abundant global reserves.
    source_id: usgs_mcs_2025_manganese

end_uses:
  uses:
    - application: steel_ferromanganese_silicomanganese
      share_pct: 90
      confidence: low
      notes: |
        USGS MCS 2025: "Consumption of manganese closely follows the steel
        industry." The dominant use globally is as a deoxidizer, desulfurizer,
        and alloying addition to steel, supplied as ferromanganese (74–95% Mn)
        and silicomanganese. USGS does not give an explicit global percentage
        breakdown; 90% is an industry-standard estimate consistent with the
        chapter text. US 2024e: ferromanganese 300 kt + silicomanganese 230 kt
        + ore at steel plants (not separately quantified).
      source_id: usgs_mcs_2025_manganese
    - application: nonmetallurgical_other
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025: Other companies consumed ore for animal feed, brick
        colorant, dry cell batteries, fertilizers, and manganese dioxide
        production. Battery-grade high-purity manganese (EMD/CMD) is a growing
        sub-segment; the EU Critical Raw Materials Act (May 2024) designates
        battery-grade manganese as a strategic raw material, indicating
        recognised strategic importance beyond steel. The 10% estimate covers
        all non-steel metallurgical and non-metallurgical applications.
      source_id: usgs_mcs_2025_manganese
  completeness: partial

