symbol: Mn
atomic_number: 25
name: manganese
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports world mine production in thousand metric tons of
  manganese content (not gross ore tonnage). Manganese ore typically contains
  35–54% Mn; ferromanganese ranges 74–95% Mn. US prices are quoted as cost,
  insurance, and freight (CIF) China in dollars per metric ton unit (mtu),
  where 1 mtu = 1% Mn per dry metric ton of ore = 10 kg Mn. The reference
  grade for price quotations is 44% Mn metallurgical ore; price per tonne of
  ore = value_in_mtu × 44. All production quantities converted from USGS
  thousand metric tons to tonnes (× 1,000).

