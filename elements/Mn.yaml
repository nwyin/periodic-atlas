geopolitical_events:
  - date: 2024-05
    event: "EU Critical Raw Materials Act enters into force; manganese designated as critical raw material, battery-grade high-purity manganese as strategic raw material"
    impact: |
      Formally recognizes manganese's dual role in steel (critical) and
      battery supply chains (strategic). Creates regulatory framework for
      European supply-chain resilience targets for manganese.
    source_id: usgs_mcs_2025_manganese
  - date: 2024-01
    event: "Australia-based company receives US DoD and DoE grants to accelerate development of manganese mine and battery-grade manganese production facility in Arizona"
    impact: |
      US Government investment to establish domestic battery-grade manganese
      supply, reducing 100% import reliance for this high-value manganese form.
    source_id: usgs_mcs_2025_manganese
  - date: 2023-11
    event: "Two manganese mining and processing plants in Ukraine idle since November 2023 due to war; two others resume minimum production in Q2 2024"
    impact: |
      Ukraine was previously a significant manganese producer. Idling of
      major plants reduced global supply and may have contributed to price
      movements. Partial resumption in 2024 indicates some resilience.
    source_id: usgs_mcs_2025_manganese
  - date: 2024-01
    event: "Tropical cyclone causes suspension of a manganese mine in northern Australia"
    impact: "Supply disruption contributed to increase in manganese ore prices in 2024."
    source_id: usgs_mcs_2025_manganese

narrative: |
  Manganese is a high-volume workhorse metal with no satisfactory substitute
  in its primary application: steel production. Over 90% of manganese output
  is consumed as ferromanganese or silicomanganese to deoxidize, desulfurize,
  and strengthen steel. South Africa (37% of global mine production, ~33% of
  reserves) and Gabon (23%) together dominate the seaborne manganese ore
  trade, while Australia (14%) supplies a growing share. The United States
  has had zero domestic mine production since 1970 and runs 100% import
  reliance — yet holds manganese on its critical minerals list precisely
  because no substitute exists and supply is geographically concentrated.

  Global manganese ore output reached an estimated 20 million tonnes (Mn
  content) in 2024, up slightly from 19.6 Mt in 2023, tracking closely with
  the steel cycle. The World Steel Association estimated global finished steel
  demand fell 0.9% in 2024, dampening demand growth. Price moved to $5.80/mtu
  CIF China in 2024 ($255/t ore) from $4.80/mtu in 2023, partly due to a
  tropical cyclone–induced supply disruption at an Australian mine. Ukraine's
  manganese sector, which had idled two major plants since November 2023,
  saw partial resumption in Q2 2024 but remains significantly curtailed.

  Battery-grade high-purity manganese is an emerging second market that could
  reshape the commercial landscape. The EU's Critical Raw Materials Act
  (May 2024) designated battery-grade manganese as a strategic raw material —
  distinct from standard metallurgical manganese — and the US Department of
  Defense and Department of Energy funded an Australia-based company to build
  a battery-grade manganese facility in Arizona. As lithium manganese iron
  phosphate (LMFP) and other manganese-intensive battery chemistries scale,
  manganese demand could diversify beyond its traditional steel monoculture.

