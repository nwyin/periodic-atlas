symbol: P
atomic_number: 15
name: phosphorus
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS reports phosphate rock on a "marketable phosphate rock" basis in thousand
  metric tons (kt) unless otherwise noted. Marketable product is beneficiated
  phosphate rock with P2O5 content suitable for phosphoric acid or elemental
  phosphorus production. The primary grade indicator is % P2O5. US f.o.b. mine
  price is a weighted average across all grades (mostly Florida soft rock and
  Western phosphate pebble). Elemental phosphorus (white/yellow P4) is a
  downstream processed form; USGS does not publish separate world production
  statistics for elemental phosphorus in this chapter.

