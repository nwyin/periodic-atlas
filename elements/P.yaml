geopolitical_events:
  - date: 2024-09
    event: "Hurricanes Helene and Milton cause flooding at phosphate plants and mines in central Florida"
    impact: |
      Several facilities closed for as much as 2 weeks in September–October 2024;
      fertilizer production and shipments halted during that period. US production
      for 2024 still estimated at 20,000 kt (slightly up from 19,600 kt in 2023),
      suggesting disruption was temporary rather than year-altering.
    source_id: usgs_mcs_2025_phosphate
  - date: 2024-01
    event: "Two new mines and purified phosphoric acid plants under development in Quebec, Canada for LFP battery cathode material"
    impact: |
      One project targets lithium-iron-phosphate (LFP) battery cathode active
      material (CAM); the other targets high-purity phosphoric acid for both LFP
      CAM and food/industrial applications. In 2024, >90% of all LFP batteries
      were manufactured in China, creating pressure to diversify supply chains.
    source_id: usgs_mcs_2025_phosphate
  - date: 2024-01
    event: "Global P2O5 fertilizer consumption estimated at 47.5 million tons in 2024; projected to reach 51.8 million tons by 2028"
    impact: |
      Growth driven by Asia and South America. Global phosphate production
      capacity (P2O5) projected to reach 70.6 million tons by 2028 vs 65.0 million
      tons in 2024. Capacity expansions in Brazil, Kazakhstan, Mexico, Morocco,
      and Russia expected by 2027; new projects in Canada, Congo (Brazzaville),
      Guinea-Bissau, and Senegal planned post-2027.
    source_id: usgs_mcs_2025_phosphate
  - date: 2024-01
    event: "US imports of phosphate rock rise 35% to 3.5 million tons in 2024; Peru remains dominant source at 98%"
    impact: |
      Net import reliance was 13% in 2024 (vs 16% in 2023). Peru accounts for
      98% of US imports; Morocco supplies the remaining 2%. US producers stopped
      exporting phosphate rock in 2003.
    source_id: usgs_mcs_2025_phosphate

narrative: |
  Phosphate rock is the foundational raw material for modern agriculture: more than
  95% of mined output is converted to phosphoric acid for fertilizers (DAP, MAP,
  TSP) and animal feed supplements, with a small fraction directed to elemental
  phosphorus synthesis for industrial uses such as glyphosate herbicide. Global
  mine production reached an estimated 240 million metric tons in 2024, up slightly
  from 233 million metric tons in 2023. China (46%), Morocco (12.5%), the United
  States (8.3%), Russia (5.8%), and Jordan (5.0%) are the five largest producers.
  The US f.o.b. mine price was approximately $100 per metric ton in 2024, barely
  changed from 2023, after rising sharply to $99–101 in 2022–2023 from $76 in 2020.

  Morocco's geopolitical position is uniquely consequential: it holds approximately
  68% of proven global reserves (50 billion of 74 billion metric tons), primarily in
  its Western Sahara deposits managed by state-owned OCP Group. This single-country
  concentration — unmatched in any other major commodity — creates a structural
  dependency for net-importing regions. The EU depends substantially on imports for
  its fertilizer sector, and has listed phosphate rock on its Critical Raw Materials
  list continuously since 2014. In the 2024 EU Critical Raw Materials Act
  (Regulation 2024/1252), both phosphate rock (Annex II Critical) and phosphorus
  (Annex I Strategic) are designated, reflecting food security concerns. There is
  no agricultural substitute: phosphorus is biologically irreplaceable as a plant
  macronutrient.

  The emerging demand driver is the LFP (lithium-iron-phosphate) battery sector.
  In 2024, more than 90% of all LFP batteries were manufactured in China, but new
  high-purity phosphoric acid plants are under development in Quebec, Canada targeting
  LFP cathode active material. Phosphate production disruptions in central Florida
  from Hurricanes Helene and Milton (September–October 2024) temporarily shut
  multiple facilities but had limited annual-scale impact. World phosphate resources
  exceed 300 billion metric tons with no imminent shortage horizon; the structural
  challenge is geographic concentration of reserves and political stability of supply
  routes rather than absolute scarcity.

