byproduct_of: []

feedstock_origins:
  - substrate: sedimentary_marine_phosphorite
    typical_concentration_pct: 28.0
    notes: |
      The dominant ore type globally. Sedimentary marine phosphorites form the
      principal deposits in Morocco, Western Sahara, Middle East (Jordan, Syria,
      Saudi Arabia, Israel), North Africa (Tunisia, Algeria, Egypt), and the
      United States (Florida, Idaho). P2O5 content of ore typically 10–35%;
      marketable product is beneficiated to >28% P2O5.
    source_id: usgs_mcs_2025_phosphate
  - substrate: igneous_apatite_rock
    notes: |
      Significant igneous apatite deposits are found in Brazil (Araxa), Canada
      (Quebec), Finland (Siilinjärvi), Russia (Khibiny/Kovdor), and South Africa
      (Phalaborwa). These carbonatite-hosted or intrusive deposits often have
      lower P2O5 grades than sedimentary phosphorites but favorable mineralogy.
    source_id: usgs_mcs_2025_phosphate

substitutes:
  - application: agriculture_fertilizers
    availability: none
    notes: |
      USGS MCS 2025 Substitutes paragraph: "There are no substitutes for
      phosphorus in agriculture." Phosphorus is an essential macronutrient
      (one of NPK) and cannot be replaced by any other element in biological
      metabolism. This makes phosphate rock uniquely inelastic among bulk
      industrial minerals.
    source_id: usgs_mcs_2025_phosphate

end_uses:
  uses:
    - application: fertilizer_phosphoric_acid
      share_pct: 95
      notes: |
        USGS MCS 2025: more than 95% of US phosphate rock mined was used to
        manufacture wet-process phosphoric acid and superphosphoric acid,
        which served as intermediate feedstocks for granular and liquid
        ammonium phosphate fertilizers (DAP, MAP) and animal feed supplements.
        About 25% of wet-process phosphoric acid was exported as DAP, MAP,
        merchant-grade phosphoric acid, and other fertilizer products.
      source_id: usgs_mcs_2025_phosphate
    - application: industrial_elemental_phosphorus
      share_pct: 5
      notes: |
        USGS MCS 2025: the balance of phosphate rock mined was for manufacture
        of elemental phosphorus for industrial applications, primarily glyphosate
        herbicide production and other organophosphorus compounds. This is a
        residual estimate (100% minus the >95% fertilizer share).
      source_id: usgs_mcs_2025_phosphate
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Phosphate rock (Annex II Critical Raw Material) and phosphorus (Annex I
    Strategic Raw Material) are both listed in EU Regulation 2024/1252 (the
    Critical Raw Materials Act). Phosphate rock has appeared on EU CRM lists
    since 2014 owing to high supply concentration (Morocco alone holds ~68% of
    global reserves) and the lack of any agricultural substitute. The United
    States is NOT on the US 2022 Final Critical Minerals List; the US has
    domestic production meeting most of its own needs and runs only a 13% net
    import reliance (2024 estimate).

