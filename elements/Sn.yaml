geopolitical_events:
  - date: 2024-09
    event: "US DoD awards $19 million under Defense Production Act Title III to establish a tin smelting, refining, and recycling facility in Coatesville, PA"
    impact: |
      First significant US investment in domestic tin smelting capacity since the last
      US tin smelter closed in 1989. Reflects US Government concern over supply-chain
      exposure: net import reliance for refined tin = 73%, with the leading sources
      (Peru, Bolivia, Indonesia, Brazil) all outside North America. The DPA Title III
      mechanism is reserved for materials deemed critical to national defense.
    source_id: usgs_mcs_2025_tin
  - date: 2024-09
    event: "State-owned leading refined-tin producers from China and Indonesia enter strategic partnership covering mining, smelting, refining, trading, and downstream development"
    impact: |
      China and Indonesia together account for approximately 40% of world mine
      production (2024e: CN 69,000 t + ID 50,000 t = 119,000 t of 300,000 t world
      total). A formal strategic partnership between the dominant state-owned producers
      in both countries could influence global tin pricing and trade flows; both countries
      are also major tin refiners. The partnership may also affect supply to Western
      markets that have been diversifying away from Chinese-controlled supply chains.
    source_id: usgs_mcs_2025_tin
  - date: 2024-05
    event: "Mauritius-based company begins production at new tin processing plant in North Kivu Province, Congo (Kinshasa); annual output expected to rise from 12,000 to 20,000 metric tons"
    impact: |
      If realized, the North Kivu expansion would add approximately 8,000 metric tons
      per year of Congolese tin output — increasing DRC's share of world production
      from ~8% to ~12–13%. DRC production has grown from 20,000 t (2023) to 25,000 t
      (2024e). Conflict minerals transparency requirements (US Dodd-Frank Section 1502,
      EU Conflict Minerals Regulation) apply to tin from the DRC and adjoining countries.
    source_id: usgs_mcs_2025_tin
  - date: 2024-04
    event: "Uganda-based tin-mining company commissions a tin refinery in Mbarara, Uganda, expected to produce ~1,000 metric tons per year of 99%+ pure tin ingots"
    impact: |
      Establishment of a Uganda-based refining operation marks growth in African
      in-country value addition for tin. Historically, Central and East African tin
      concentrate has been exported to China or Europe for refining; domestic refining
      capacity enables greater economic capture. Uganda is a relatively small tin
      producer but a growing one.
    source_id: usgs_mcs_2025_tin
  - date: 2024-01
    event: "US Department of Commerce proposes antidumping and countervailing duties on tin mill product imports from Canada, China, Germany, and Republic of Korea; US ITC concludes no material injury — duties not implemented"
    impact: |
      The investigation reflected US domestic tin mill products industry concerns
      about import competition, but the US International Trade Commission's
      non-injury determination precluded implementation of duties. The outcome
      maintained US access to imported tin mill products (tinplate) from major
      supplier nations. This does not directly affect raw tin supply chains but
      signals ongoing trade friction around downstream tin products.
