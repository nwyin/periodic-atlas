narrative: |
  Tin is a post-transition metal with a tightly concentrated global supply chain and
  no domestic US production at either the mine or smelter level. World mine output
  (tin content) reached an estimated 300,000 metric tons in 2024, led by China (23%)
  and Indonesia (17%), which together account for roughly 40% of global production.
  Burma/Myanmar (11%), Peru (10%), Brazil (10%), and the Democratic Republic of Congo
  (8%) are the next-largest producers, giving six countries control of about 80% of
  global supply. The United States has not mined tin since 1993 or smelted it since
  1989, running a 73% import reliance on refined tin in 2024, sourced primarily from
  Peru (30%), Bolivia (23%), Indonesia (20%), and Brazil (11%).

  LME cash tin prices rebounded 19% in 2024 to approximately $30,865 per metric ton
  ($1,400/c/lb), recovering from a 2023 low of ~$25,948/t after a 2021 peak of
  ~$32,584/t driven by post-COVID supply-chain stress and electronics demand. The 2024
  price recovery reflected supply concerns — Indonesia's output fell sharply from 69,000
  to 50,000 metric tons — alongside steady demand from the solder and electronics
  sectors. US domestic recycling supplied approximately 18,000 metric tons of tin in
  2024 (27% of apparent consumption), a meaningful but insufficient offset to import
  dependence. The US DoD awarded $19 million under the Defense Production Act Title III
  in September 2024 to establish a domestic tin smelting facility in Pennsylvania —
  the first meaningful investment in US tin smelting capacity in over three decades.

  Tin's end-use profile in the United States spans packaging (tinplate, 23%), chemicals
  (22%), solder (11%), and a range of alloy and industrial applications. Lead-free
  solder mandates have structurally increased tin intensity in electronics assembly, and
  the growing electronics sector has supported solder demand even as tin-free steel
  (chromium-coated) competes in the packaging segment. The September 2024 strategic
  partnership between China's and Indonesia's state-owned tin producers — the two largest
  national suppliers — adds a geopolitical dimension to an already concentrated supply
  landscape. World reserves exceed 4.2 million metric tons (principally in China, Burma,
  Australia, Russia, and Brazil), and global resources are described by USGS as extensive
  relative to current production rates, providing a long-term geological buffer against
  scarcity.

