symbol: Sn
atomic_number: 50
name: tin
category: post_transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports all tin production data in metric tons, tin content, unless
  otherwise specified. Tin alloy and waste/scrap import/export statistics are reported
  in gross weight. LME cash prices are quoted in cents per pound (c/lb); converted to
  USD per metric ton using the factor 22.0462 (2,204.623 lb/tonne ÷ 100 c/USD). The
  USGS MCS 2025 tin chapter publishes a single world mine production table; no separate
  world smelter or refinery production table by country appears in MCS 2025. Commercial
  trade forms include unwrought refined tin (99.85%+ purity, LME grade), tin alloys,
  tin concentrate (cassiterite), and tinplate (electrolytic tin-coated steel). Standard
  temperature conventions do not apply to this chapter.

