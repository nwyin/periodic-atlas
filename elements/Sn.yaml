byproduct_of: []

feedstock_origins:
  - substrate: cassiterite
    typical_concentration_pct: null
    notes: |
      Cassiterite (SnO₂, tin dioxide) is the overwhelmingly dominant ore mineral for
      commercial tin production globally, accounting for the large majority of mined
      tin content. It occurs in primary hard-rock deposits (greisen-type, skarn,
      and hydrothermal vein systems associated with granite intrusions) and as alluvial
      placer deposits derived from the erosion of primary cassiterite deposits. The major
      producing countries (China, Indonesia, Burma, Peru, Brazil, Bolivia) all rely on
      cassiterite as the primary feedstock.
    source_id: usgs_mcs_2025_tin
  - substrate: stannite_polymetallic_ores
    typical_concentration_pct: null
    notes: |
      Stannite (Cu₂FeSnS₄) and related sulfosalt minerals contribute to tin production
      in some polymetallic sulfide deposits, particularly in Bolivia's Andes vein systems.
      These deposits yield tin as a secondary product alongside copper, zinc, and silver.
      Production from stannite ores is smaller than cassiterite-based production.
    source_id: usgs_mcs_2025_tin

substitutes:
  - application: cans_and_containers
    availability: full
    notes: |
      USGS MCS 2025 substitutes paragraph: "Aluminum, glass, paper, plastic, or
      tin-free steel substitute for tin in cans and containers." Tin-free steel
      (TFS, using chromium or chromium oxide coating) is a significant substitute
      for tinplate in food and beverage packaging. The availability of full
      substitutes in packaging restrains tin demand growth from this segment.
    source_id: usgs_mcs_2025_tin
  - application: solder
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Epoxy resins [substitute] for solder."
      The transition to lead-free solders (mandated under the EU RoHS directive and
      widely adopted globally) actually increased tin content in solder alloys.
      Conductive epoxy adhesives partially substitute in some electronics applications
      but cannot replace solder in most through-hole and surface-mount assemblies
      without performance trade-offs.
    source_id: usgs_mcs_2025_tin
  - application: bronze_and_copper_alloys
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Aluminum alloys, alternative copper-base
      alloys, and plastics [substitute] for bronze." Aluminum bronzes and other
      tin-free copper alloys can replace tin bronzes in some structural and bearing
      applications, but tin bronzes retain performance advantages in corrosion
      resistance and bearing properties for specific end uses.
    source_id: usgs_mcs_2025_tin
  - application: bearing_metals
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Plastics [substitute] for bearing metals
      that contain tin." High-performance engineering plastics (PTFE composites, nylon,
      acetal) replace babbitt metal (tin-base alloy) in many light-duty bearings.
      Heavy-duty industrial bearings under high loads still often use tin-base babbitt
      for its superior conformability and embeddability properties.
    source_id: usgs_mcs_2025_tin
  - application: tin_chemicals
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Compounds of lead and sodium [substitute]
      for some tin chemicals." Organotin stabilizers for PVC have been partially replaced
      by calcium-zinc, barium-zinc, or organic stabilizer systems in regions where
      organotin compounds face regulatory restrictions. However, tin chemicals retain
      strong positions in specialized applications such as electronic-grade tin oxide
      and inorganic tin compounds.
    source_id: usgs_mcs_2025_tin

end_uses:
  uses:
    - application: tinplate_cans_containers
      share_pct: 23
      confidence: high
      notes: |
        USGS MCS 2025 domestic production and use section: tinplate = 23% of US tin
        consumption in 2024. Tinplate (electrolytically tin-coated steel) is the
        largest single US end use, primarily for food and beverage cans. Global
        share is broadly similar; tinplate is historically the dominant end use worldwide.
      source_id: usgs_mcs_2025_tin
    - application: tin_chemicals
      share_pct: 22
      confidence: high
      notes: |
        USGS MCS 2025: chemicals = 22% of US tin consumption in 2024. Includes
        inorganic tin compounds (SnCl₂, SnO₂, tin fluoride for toothpaste) and
        organotin compounds (PVC heat stabilizers, biocides, catalysts).
      source_id: usgs_mcs_2025_tin
    - application: solder
      share_pct: 11
      confidence: high
      notes: |
        USGS MCS 2025: solder = 11% of US tin consumption in 2024. Lead-free solder
        alloys (predominantly Sn-Ag-Cu, SAC alloys) have increased tin content per
        unit compared with traditional Sn-Pb solders, supporting solder demand
        from electronics assembly.
      source_id: usgs_mcs_2025_tin
    - application: alloys_other
      share_pct: 10
      confidence: high
      notes: |
        USGS MCS 2025: alloys = 10% of US tin consumption in 2024. Covers tin
        alloys not separately classified (pewter, low-melting alloys, bearing alloys
        beyond babbitt).
      source_id: usgs_mcs_2025_tin
    - application: babbitt_brass_bronze_tinning
      share_pct: 6
      confidence: high
      notes: |
        USGS MCS 2025: babbitt, brass and bronze, and tinning = 6% of US tin
        consumption in 2024 (combined). Babbitt metal (tin-base bearing alloy)
        is used in heavy machinery, marine, and rail applications. Hot-dip tinning
        is used for copper wire and other industrial coatings.
      source_id: usgs_mcs_2025_tin
    - application: bar_tin
      share_pct: 2
      confidence: high
      notes: "USGS MCS 2025: bar tin = 2% of US tin consumption in 2024. Bar tin is high-purity refined tin (99.85%+) sold in ingot or bar form for downstream alloying and coating applications."
      source_id: usgs_mcs_2025_tin
    - application: other_uses
      share_pct: 26
      confidence: high
      notes: |
        USGS MCS 2025: other uses = 26% of US tin consumption in 2024. This catch-all
        category includes a range of smaller applications such as electroplating,
        glass coatings (SnO₂ coatings for glass bottles and architectural glass),
        and other industrial uses not individually enumerated.
      source_id: usgs_mcs_2025_tin
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_2022_critical_minerals_list
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Tin is included on the US 2022 final Critical Minerals List (Federal Register
    Vol. 87, No. 37, February 22, 2022). The DoD Defense Production Act Title III
    award of $19 million in September 2024 for a domestic tin smelting, refining,
    and recycling facility in Coatesville, PA reflects ongoing US Government concern
    about supply-chain resilience: the United States has had no domestic tin smelting
    since 1989 and no mining since 1993, with net import reliance of 73% for refined
    tin in 2024. Tin does not appear on either the EU Critical Raw Materials list or
    the EU Strategic Raw Materials list under Regulation (EU) 2024/1252 as of 2024.

