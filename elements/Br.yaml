    USGS MCS 2025 world total reserves are reported as "Large" (not a quantified figure).
    Quantified country reserves: U.S. = 11,000,000 t; Jordan = 360,000 t; China = 130,000 t.
    Israel reserves are also listed as "Large" (not quantified); India, Japan, and Ukraine
    are NA (not available). Share percentages are computed against the quantifiable subset
    (U.S. + Jordan + China = 11,490,000 t); completeness is "partial" because Israel's
    "Large" reserves and the unquantified U.S. portion of the world total are excluded.
    World resources are effectively unlimited relative to current production — seawater
    contains an estimated 100 trillion tons of bromine at ~65 ppm concentration, and the
    Dead Sea alone is estimated to hold 1 billion tons (USGS MCS 2025 World Resources).

byproduct_of: []

feedstock_origins:
  - substrate: underground_bromide_brine
    notes: |
      The primary commercial feedstock is bromide-rich underground brine (formation water)
      extracted from sedimentary basins. In the United States, two companies operate brine
      wells in the Smackover Formation of Arkansas; extracted brine is treated with chlorine
      gas to oxidize bromide to elemental bromine, which is then stripped and condensed.
      Israel and Jordan extract bromine from Dead Sea brine, which is among the world's
      most concentrated natural bromine sources; the Dead Sea contains an estimated
      1 billion tons of bromine per USGS MCS 2025.
    source_id: usgs_mcs_2025_bromine
  - substrate: seawater
    notes: |
      Bromine is recovered from seawater as a co-product during salt evaporation in some
      facilities. Seawater contains approximately 65 parts per million bromine (an estimated
      100 trillion tons globally per USGS MCS 2025), an effectively inexhaustible feedstock.
      However, seawater-based bromine recovery is a minor commercial route compared with
      concentrated underground brine extraction, owing to the high energy and processing
      costs of treating dilute seawater.
    source_id: usgs_mcs_2025_bromine

substitutes:
  - application: chemical_reactions_and_sanitation
    availability: partial
    notes: |
      USGS MCS 2025 substitutes: "Chlorine and iodine may be substituted for bromine
      in a few chemical reactions and for sanitation purposes." Chlorine is the most
      common disinfection/oxidation substitute; it is cheaper and more widely available.
      Iodine serves specific sanitation niches such as water purification tablets.
      Substitution is application-specific and not universal.
    source_id: usgs_mcs_2025_bromine
  - application: oil_gas_well_completion
    availability: none
    notes: |
      USGS MCS 2025 substitutes: "There are no comparable substitutes for bromine in
      various oil- and gas-well-completion and packer applications." Clear brine fluids
      based on zinc bromide (ZnBr₂), calcium bromide (CaBr₂), and calcium
      chloride/bromide blends are used as high-density completion and workover fluids
      in deep oil/gas wells. No equivalent non-bromine chemistry meets the density,
      solids-free, and non-damaging reservoir requirements.
    source_id: usgs_mcs_2025_bromine
  - application: flame_retardants
    availability: partial
    notes: |
      USGS MCS 2025 substitutes: "aluminum hydroxide, magnesium hydroxide, organic
      chlorine compounds, and phosphorus compounds can be substituted for bromine as
      fire retardants in some uses." Mineral hydroxide flame retardants (aluminium
      trihydrate, magnesium dihydroxide) are effective in wire/cable and polyolefin
      applications but require higher loading levels and sacrifice mechanical properties.
      Organophosphate flame retardants serve as partial substitutes in some thermoplastic
      and thermoset applications. Substitution is application-specific and often involves
      performance trade-offs.
    source_id: usgs_mcs_2025_bromine

end_uses:
  uses:
    - application: brominated_flame_retardants
      share_pct: 35
      confidence: low
      notes: |
        USGS MCS 2025 identifies brominated flame retardants (BFRs) as one of the two
        leading global applications of bromine. No explicit percentage is given. BFRs are
        incorporated into plastics, electronics, textiles, and construction materials.
        Major BFR classes include tetrabromobisphenol A (TBBPA, listed by HTS
        2908.19.2500), decabromodiphenyl oxide (HTS 2909.30.0700), and dibromoneopentyl
        glycol (HTS 2905.59.3000). Share estimate (~35%) is approximate; no explicit
        percentage stated in the chapter.
      source_id: usgs_mcs_2025_bromine
    - application: clear_brine_drilling_fluids
      share_pct: 35
      confidence: low
      notes: |
        USGS MCS 2025 identifies clear brine drilling fluids as one of the two leading
        global applications. High-density clear brines (zinc bromide, calcium bromide,
        calcium chloride/bromide blends) are used as completion and workover fluids in
        oil and gas wells where solids-free, high-density fluids are required to control
        reservoir pressure without damaging formations. U.S. export destinations (Guyana
        29%, Saudi Arabia 25%, UK 14% through July 2024) reflect oil/gas industry demand.
        Share estimate (~35%) is approximate.
      source_id: usgs_mcs_2025_bromine
    - application: industrial_uses_and_intermediates
      share_pct: 15
      confidence: low
      notes: |
        USGS MCS 2025 notes "industrial uses, as intermediates" among bromine applications.
        Includes organobromide pharmaceutical intermediates, agricultural chemistry,
        specialty chemicals such as hydrobromic acid (HTS 2811.19.3000), and mercury
        emission control from coal-fired power plants (bromine oxidises elemental mercury
        for scrubber capture).
      source_id: usgs_mcs_2025_bromine
    - application: water_treatment
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 notes water treatment among bromine applications. Bromine-based
        biocides (e.g., BCDMH: bromo-chloro-dimethylhydantoin) are used in cooling
        towers, swimming pools, and industrial water systems as algaecides and
        bactericides. Bromine offers advantages over chlorine at high pH and elevated
        temperature.
      source_id: usgs_mcs_2025_bromine
    - application: other_uses
      share_pct: 5
      confidence: low
      notes: |
        Other uses include zinc-bromine flow batteries for grid energy storage (bromine
        can be completely recovered and reused at end of battery life per USGS chapter),
        photographic chemicals (silver bromide), and remaining food/beverage additive
        uses. Brominated vegetable oil (BVO) was revoked as an authorised U.S. food
        additive in July 2024.
      source_id: usgs_mcs_2025_bromine
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Bromine is not included on the US 2022 Critical Minerals List, the EU Critical Raw
    Materials list (CRM 2023), or the EU Strategic Raw Materials list (CRMA 2024).
    Although U.S. imports are heavily concentrated from Israel (83% of gross import
    weight, 2020–23 average) and Jordan (9%), the United States itself is a major
    domestic producer with substantial capacity and large reserves (11 million tonnes).
    Net import reliance was "E" (net exporter) in 2020–21 and <25% in 2022–24, indicating
    domestic production substantially offsets import exposure. World resources are
    effectively unlimited given bromine's abundance in seawater (~100 trillion tonnes).
    Industrial tier 4 reflects bromine's high-volume commercial status without the
    supply-chain concentration risk that would warrant critical designation.

