geopolitical_events:
  - date: "2024-07"
    event: "US FDA revokes authorization for brominated vegetable oil (BVO) as a food additive in beverages"
    impact: |
      FDA revocation published in Federal Register v.89, no.128, July 3, 2024 (p.55040–55045).
      BVO had been used since the 1920s to stabilize fruit flavoring oils in beverages; it
      lost GRAS classification in 1970 and was capped at 15 ppm but continued in use until
      a collaborative study found no safe dietary level could be established. The revocation
      eliminates a long-standing bromine end use in food and beverage manufacturing. The
      volume impact is minor relative to total bromine demand but reflects ongoing regulatory
      pressure on brominated food additives.
    source_id: usgs_mcs_2025_bromine
  - date: "2024-01"
    event: "US imports of bromine and bromine compounds increase 20% from 2023; Israel accounts for 87% of gross imports through July 2024"
    impact: |
      Total U.S. imports (bromine content) rose to 61,000 metric tons in 2024e from
      50,800 in 2023, driven by U.S. apparent consumption exceeding 2023 levels. Israel
      remained the dominant import supplier (87% of gross weight through July 2024),
      followed by Jordan (10%). The average import unit value fell 8% to $2.70/kg from
      $2.92/kg in 2023. Together, bromides and bromide oxides of ammonium, calcium, or
      zinc and bromides of sodium or potassium accounted for more than 90% of total
      imported bromine in both gross weight and bromine content.
    source_id: usgs_mcs_2025_bromine
  - date: "2024-01"
    event: "US exports of bromine and compounds decrease 13% from 2023; leading destinations are Guyana (29%), Saudi Arabia (25%), and United Kingdom (14%)"
    impact: |
      U.S. export volume fell to 34,000 metric tons (bromine content) in 2024e from
      38,900 in 2023. Export destinations through July 2024 were dominated by Guyana
      (29%), reflecting clear brine fluid demand for Guyana's expanding deepwater oil
      sector; Saudi Arabia (25%) and the United Kingdom (14%) reflect Arabian Gulf and
      North Sea drilling fluid demand. Export unit value held at ~$3.30/kg vs $3.28/kg
      in 2023.
    source_id: usgs_mcs_2025_bromine
  - date: "2024-01"
    event: "USGS revises Jordan bromine reserves downward based on company reports in MCS 2025"
    impact: |
      Jordan reserves revised in USGS MCS 2025 based on company data. Jordan and Israel
      together operate the Dead Sea region brine complex, which represents the largest
      natural bromine concentration outside U.S. Smackover Formation reserves. The revision
      does not materially alter the supply outlook but updates the published reserve base.
    source_id: usgs_mcs_2025_bromine

narrative: |
  Bromine is a high-volume halogen commodity produced from bromide-rich underground brines
  and natural salt lakes. The global supply chain is structured around three geographic
  clusters: the Smackover Formation brine deposits of Arkansas (United States), the Dead
  Sea evaporite system shared by Israel and Jordan, and Chinese coastal brine deposits.
  U.S. production — operated by two companies in Arkansas — is withheld by USGS to protect
  proprietary data, but the chapter notes that the U.S. "account[s] for a large percentage
  of world production capacity." The published world total (excluding U.S.) was 400,000
  metric tons in 2024, led by Israel (140,000 t, 35% of ex-U.S. total), Jordan (120,000 t,
  30%), and China (100,000 t, 25%).

  The two dominant global end uses are brominated flame retardants (BFRs) and clear brine
  drilling fluids for oil and gas well completion. BFRs provide fire safety performance in
  electronics, plastics, textiles, and construction materials and face ongoing regulatory
  scrutiny in many jurisdictions. Clear brine fluids — particularly zinc bromide and calcium
  bromide blends — are irreplaceable in high-density, solids-free well completion and workover
  operations; USGS explicitly notes no comparable substitutes exist for this application.
  U.S. export patterns (Guyana 29%, Saudi Arabia 25%, UK 14% through mid-2024) reflect
  drilling fluid demand in active oil-field jurisdictions, particularly Guyana's rapidly
  expanding deepwater sector. Other significant uses include industrial chemical intermediates,
  water treatment biocides, and emerging applications in zinc-bromine flow batteries for
  energy storage.

  The regulatory environment is an active factor in bromine demand. The FDA's July 2024
  revocation of brominated vegetable oil (BVO) authorization eliminated a long-standing
  food-additive application. U.S. import sources are heavily concentrated — Israel supplied
  83% of gross import weight (2020–23 average), with Jordan at 9% and China at 3% — but
  this geopolitical dependence is partially offset by substantial domestic U.S. production
  capacity and large Arkansas reserves (11 million tonnes, roughly 96% of the quantifiable
  world reserve total). Net import reliance was "E" (net exporter) in 2020–21, shifting
  to under 25% in 2022–24 as domestic consumption grew. Seawater, containing an estimated
  100 trillion tonnes of bromine at 65 ppm, represents an effectively unlimited long-run
  resource; the Dead Sea alone holds an estimated 1 billion tonnes. Supply constraints are
  economic (extraction and processing costs), not geological.

