symbol: Br
atomic_number: 35
name: bromine
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Bromine (Br₂) is a volatile, reddish-brown liquid at room temperature (density
  3.10 g/mL, boiling point 58.8 °C). Commercial bromine is produced by oxidising
  bromide-rich brines with chlorine gas; elemental bromine is then stripped by steam
  or air and condensed. Trade forms are: liquid elemental bromine in corrosion-resistant
  lead-lined or polyethylene-lined steel drums and tank cars; and a wide range of
  compounds including hydrobromic acid, sodium bromide, ammonium bromide, zinc bromide,
  calcium bromide, and organic derivatives.

  USGS MCS 2025 reports all production and trade data in metric tons of bromine content,
  not gross weight of compounds, unless otherwise specified. U.S. domestic production
  is withheld (W) to avoid disclosing company proprietary data; the published world
  total therefore excludes U.S. output. Prices cited are the average unit value of
  U.S. imports on a cost, insurance, and freight (CIF) basis, in U.S. dollars per
  kilogram of bromine content.

