symbol: B
atomic_number: 5
name: boron
category: metalloid
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Boron does not occur in nature in elemental form; all commercial production is in the
  form of borates — compounds of boron with oxygen and sodium or calcium. The four principal
  borate minerals are colemanite (Ca₂B₆O₁₁·5H₂O), kernite (Na₂B₄O₇·4H₂O), tincal
  (borax, Na₂B₄O₇·10H₂O), and ulexite (NaCaB₅O₉·8H₂O), which account for 90% of borate
  minerals used by industry worldwide. Commercial products include refined borax (sodium
  tetraborate decahydrate), boric acid (H₃BO₃), sodium perborate, colemanite concentrates,
  and high-purity elemental boron for specialty applications.

  USGS MCS 2025 reports production in thousand metric tons, but with forms varying by
  country: Turkey in refined borates, China in boric oxide (B₂O₃) equivalent, Chile and
  Bolivia in ulexite, Argentina and Peru in crude ore, and Russia in datolite ore. Because
  forms differ across countries, USGS cannot calculate a meaningful world total (reported
  as XX). Reserves are reported by country in thousand metric tons of B₂O₃. Prices are
  the average unit value of US imports on a cost, insurance, and freight (CIF) basis in
  USD per metric ton across all import forms.

