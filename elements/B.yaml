geopolitical_events:
  - date: "2023-12"
    event: "US DoD awards $49.6 million under Defense Production Act Title III for domestic boron carbide capacity"
    impact: |
      December 2023: the US Department of Defense awarded $49.6 million to a company
      headquartered in Golden, CO, to increase domestic boron carbide (B₄C) production
      capacity. Boron carbide is one of the hardest materials known and is used in nuclear
      reactor control rods, personal armor (body armor tiles), and ballistic protection for
      vehicles. The award reflects supply-chain concerns about global borate production
      concentration in Turkey and limited domestic boron carbide manufacturing capacity.
      This is the first known Defense Production Act award specifically targeting boron
      supply-chain security.
    source_id: usgs_mcs_2025_boron
  - date: "2024-01"
    event: "Third US borate producer begins solution mining in Newberry Springs, California"
    impact: |
      January 2024: a domestic company began mining borates using solution-mining techniques
      in Newberry Springs, CA (San Bernardino County), becoming the third US borate producer.
      In April 2024, the company began boric acid production with initial capacity of ~1,800
      tonnes per year and plans to expand to ~8,200 tonnes per year. The facility targets
      specialty boron products for defense, electric transportation, food security, and
      decarbonization industries — adding new US production capacity for the first time in
      many years.
    source_id: usgs_mcs_2025_boron
  - date: "2024-09"
    event: "Turkey opens Bigadiç Granular Boron Production Facility; Turkish production up 36% through August 2024"
    impact: |
      September 2024: Turkey opened the Bigadiç Granular Boron Production Facility with a
      production capacity of 35,000 tonnes per year of granulated boron products for the
      fertilizer industry. By end of August 2024, Turkish borate production had increased 36%
      compared with the same period in 2023. Turkey's 2024e production reached 3,000,000
      tonnes of refined borates (3,000 thousand metric tons), up 20% from 2,500,000 tonnes
      in 2023. Turkey's continued capacity expansion reinforces its dominant position as the
      world's largest borate producer and exporter.
    source_id: usgs_mcs_2025_boron
  - date: "2024-09"
    event: "BLM approves Nevada boric acid project; 175,000 t/yr facility targeted for 2028 production start"
    impact: |
      September 2024: the US Bureau of Land Management completed its final environmental
      impact statement for an Australia-based company's boric acid project in Nevada,
      determining that development may proceed. The project is designed to produce ~175,000
      tonnes per year of boric acid over a 26-year mine life, with initial production expected
      in 2028. If completed, this would significantly diversify US borate supply and reduce
      dependence on Turkish imports, representing a major addition to North American production
      capacity.
    source_id: usgs_mcs_2025_boron

narrative: |
  Boron's commercial supply chain is built on borate minerals rather than the element itself —
  boron does not occur in elemental form in nature. The four principal borate minerals (colemanite,
  kernite, tincal, and ulexite) account for 90% of all borate minerals used industrially. Turkey
  dominates global production with an estimated 3,000,000 tonnes of refined borates in 2024, roughly
  66% of the named-country ex-US total. With 950,000 thousand metric tons of B₂O₃ reserves —
  over 87% of quantified world reserves — Turkey's resource dominance is structural and self-
  reinforcing. Chile (420,000 t, 9%), China (340,000 t, 7%), and Peru (300,000 t, 7%) are the
  next-largest producers. US production from three companies in southern California is withheld
  by USGS, but the US is a net exporter: domestic production exceeds consumption for all years
  2020–2024, with China, India, Canada, Indonesia, and Mexico among the leading US borate export
  destinations.

  Glass and ceramics are the overwhelmingly dominant applications for boron worldwide, together
  consuming an estimated 65% of global borate output. The USGS chapter states that "more than
  three-quarters of world consumption" is in ceramics, detergents, fertilizers, and glass —
  reflecting boron's critical role as a flux (lowering melting points), a thermal expansion
  modifier in borosilicate glass, and a flame retardant and structural component in fiberglass
  insulation and textile. Other significant applications include sodium perborate bleach in
  laundry detergents, micronutrient boron fertilizers (where the Bigadiç facility's launch
  targets this growing segment), and specialty uses such as boron carbide for armor and nuclear
  reactor control rods, boron nitride lubricants, and boron as a semiconductor dopant. Borate
  import prices in the US rose steadily from $380/tonne in 2020 to a peak of $606/tonne in 2023
  before easing to $560/tonne in 2024, reflecting global supply-chain costs and strong downstream
  demand.

  The geopolitical dimension of boron is primarily a European concern: the EU designated boron
  as both a Critical and Strategic Raw Material under Regulation 2024/1252, driven by its 70%+
  import dependence on Turkey. The United States, with its own substantial production and large
  reserves, is less exposed — though the DoD's December 2023 Defense Production Act investment
  in domestic boron carbide capacity signals awareness of the defense-sector supply chain for
  boron's specialty applications. A Nevada boric acid project approved by the BLM in September
  2024 — targeting 175,000 tonnes/yr from 2028 — could meaningfully diversify North American
  supply and reduce reliance on Turkish borates over the coming decade.

