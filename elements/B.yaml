feedstock_origins:
  - substrate: borate_ore
    notes: |
      The primary commercial feedstocks are borate ore deposits containing kernite, tincal
      (borax), ulexite, and colemanite. In the US (Mojave Desert, California), open-pit
      mining of kernite and tincal ore is the dominant extraction method; kernite is used
      to produce boric acid, tincal produces sodium borate (refined borax), and ulexite
      is used as a primary ingredient in specialty glasses and ceramics. Four borate
      minerals — colemanite, kernite, tincal, and ulexite — account for 90% of borate
      minerals used by industry worldwide (USGS MCS 2025).
    source_id: usgs_mcs_2025_boron
  - substrate: brine_solution
    notes: |
      Solution-mining of boron-bearing brines is used by at least two US companies in
      California (including the third company that began mining in January 2024). This
      technique avoids open-pit mining by extracting boron from subsurface brine. Natural
      brine deposits in the Andean belt (Chile, Bolivia, Argentina) also yield ulexite from
      evaporitic processes. Brine-sourced boron generally requires less beneficiation than
      hard-rock ore but may have higher processing costs per unit.
    source_id: usgs_mcs_2025_boron
  - substrate: datolite_ore
    notes: |
      Russia's primary boron feedstock is datolite (CaBSiO₄OH), a calcium borosilicate
      mineral distinct from the calcium and sodium borate deposits dominant elsewhere.
      Datolite is a lower-grade boron source, but Russia holds substantial reserves at
      40,000 thousand metric tons B₂O₃.
    source_id: usgs_mcs_2025_boron

substitutes:
  - application: detergents_and_cleaning
    availability: partial
    notes: |
      USGS MCS 2025: "Sodium percarbonate can replace borates in detergents and requires
      lower temperatures to undergo hydrolysis, which is an environmental consideration."
      Sodium percarbonate (Na₂CO₃·1.5H₂O₂) functions as an oxygen-based bleach in cold-
      water laundry formulations but lacks the water-softening and pH-buffering properties
      of borates, limiting full substitution in all detergent applications.
    source_id: usgs_mcs_2025_boron
  - application: ceramics_and_glazes
    availability: partial
    notes: |
      USGS MCS 2025: "Some enamels can use other glass-producing substances, such as
      phosphates." Phosphate glasses can partially substitute for borosilicate glass in
      some optical and enamel applications. However, boron's unique combination of fluxing
      properties, low thermal expansion, and chemical durability makes borosilicate glass
      largely irreplaceable for laboratory glassware, pharmaceutical containers, and
      heat-resistant glass.
    source_id: usgs_mcs_2025_boron
  - application: insulation
    availability: full
    notes: |
      USGS MCS 2025: "Insulation substitutes include cellulose, foams, and mineral wools."
      Cellulose insulation, polyurethane foams, and mineral wool (rock wool, slag wool) are
      established commercial alternatives to fiberglass insulation that do not require boric
      acid or borax as flame retardants or binders.
    source_id: usgs_mcs_2025_boron
  - application: soaps
    availability: full
    notes: |
      USGS MCS 2025: "In soaps, sodium and potassium salts of fatty acids can act as
      cleaning and emulsifying agents." Conventional soap formulations based on sodium
      stearate and potassium palmitate do not require boron; boron's use is confined to
      specialty antiseptic and pH-buffering soap formulations where full substitution is
      available for general-purpose applications.
    source_id: usgs_mcs_2025_boron

end_uses:
  uses:
    - application: glass_manufacturing
      share_pct: 50
      confidence: low
      notes: |
        USGS MCS 2025 identifies glass and ceramics as the "leading domestic users" of boron
        products, and states that "more than three-quarters of world consumption was used in
        ceramics, detergents, fertilizers, and glass." Glass is the single largest application:
        fiberglass insulation and textile, borosilicate glass (laboratory and pharmaceutical),
        specialty optical glass, and heat-resistant glass (from Turkish colemanite). Share (~50%)
        is an estimate; no explicit percentage is provided in the chapter.
      source_id: usgs_mcs_2025_boron
    - application: ceramics_and_glazes
      share_pct: 15
      confidence: low
      notes: |
        USGS MCS 2025 identifies ceramics alongside glass as the leading domestic sector.
        Borates are used as fluxes in ceramic glazes, porcelain enamels, and frits, reducing
        firing temperatures and improving chemical resistance. Share (~15%) is an estimate.
      source_id: usgs_mcs_2025_boron
    - application: detergents_and_cleaning
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 includes detergents among the four leading global applications. Sodium
        perborate (a bleaching agent derived from borax) was historically a major European
        laundry-detergent ingredient; it has been partially displaced by sodium percarbonate
        but remains significant globally. Share (~10%) is an estimate.
      source_id: usgs_mcs_2025_boron
    - application: agriculture_and_fertilizers
      share_pct: 5
      confidence: low
      notes: |
        USGS MCS 2025 includes fertilizers among the four leading applications. Boron is an
        essential micronutrient for plant growth, and boron fertilizers (borax, boric acid,
        ulexite granules) are applied to high-demand crops including alfalfa, canola, cotton,
        and fruit trees. The Bigadiç Granular Boron Production Facility (Turkey, opened Sept.
        2024, 35,000 t/yr) primarily targets the fertilizer industry. Share (~5%) is an estimate.
      source_id: usgs_mcs_2025_boron
    - application: other_industrial
      share_pct: 20
      confidence: low
      notes: |
        USGS MCS 2025 lists additional boron applications: abrasives (boron carbide, B₄C, one
        of the hardest materials known); insecticides (boric acid as cockroach and ant bait);
        cleaning products; insulation (boric acid as flame retardant); and semiconductors (boron
        as a p-type dopant in silicon). Specialty uses include boron carbide in nuclear reactor
        control rods and body armor, and boron nitride as a high-performance lubricant and
        abrasive. The US DoD awarded $49.6 million in December 2023 for domestic boron carbide
        capacity under the Defense Production Act, Title III. Share (~20%) is an estimate.
      source_id: usgs_mcs_2025_boron
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crm_regulation_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crm_regulation_2024
  notes: |
    Boron (borate) is listed as both a Critical Raw Material and a Strategic Raw Material
    in Annex I of EU Regulation 2024/1252 (the EU Critical Raw Materials Act), reflecting
    the EU's heavy dependence on Turkey for over 70% of its borate supply and the strategic
    importance of borates for glass, ceramics, and advanced materials manufacturing. The
    United States has not designated boron on its 2022 Critical Minerals List (US Department
    of the Interior, 50 minerals), but the US Department of Defense awarded $49.6 million under
    the Defense Production Act, Title III, in December 2023 to increase domestic boron carbide
    (B₄C) production capacity — indicating defense-sector concern about availability of boron
    for armor and nuclear applications. US net import reliance = E (net exporter) for all years
    2020–2024; three California companies produce sufficient borates to supply domestic demand
    and generate significant export surpluses. The EU CRM designation is driven primarily by
    the EU's concentrated import reliance on Turkey.

