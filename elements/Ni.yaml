byproduct_of: []
feedstock_origins:
  - substrate: nickel_laterite_ore
    notes: |
      USGS: 54% of global nickel resources are in laterites. Predominantly in
      Indonesia, Philippines, New Caledonia, and Australia. Processed via
      rotary kiln electric furnace (RKEF) to produce nickel pig iron (NPI)
      or ferronickel, or via high-pressure acid leach (HPAL) to produce
      mixed hydroxide precipitate (MHP) for battery-grade nickel.
    source_id: usgs_mcs_2025_nickel
  - substrate: nickel_sulfide_ore
    notes: |
      USGS: 35% of global nickel resources are in magmatic sulfide deposits.
      Major sources: Sudbury basin (Canada), Norilsk (Russia), Kambalda (Australia).
      Yields high-purity Class I nickel via conventional smelting and refining.
    source_id: usgs_mcs_2025_nickel

substitutes:
  - application: stainless_and_alloy_steel
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Low-nickel, duplex, or
      ultrahigh-chromium stainless steels have been substituted for
      austenitic grades in construction. Nickel-free specialty steels
      are sometimes used in place of stainless steel in the
      power-generating and petrochemical industries. Titanium alloys
      can substitute for nickel metal or nickel-base alloys in
      corrosive chemical environments."
    source_id: usgs_mcs_2025_nickel

end_uses:
  uses:
    - application: stainless_and_alloy_steel
      share_pct: 85
      notes: |
        USGS MCS 2025: "Stainless and alloy steel and nickel-containing alloys
        typically account for more than 85% of domestic consumption." This is
        US-specific; globally the stainless steel share is similarly dominant.
        Figure represents the ">85%" USGS lower bound, rounded to 85%.
      source_id: usgs_mcs_2025_nickel
    - application: electroplating_catalysts_chemicals_other
      share_pct: 15
      notes: |
        USGS lists "electroplating, and other uses including catalysts and
        chemicals" as secondary end uses. The 15% is the implied remainder
        after the >85% stainless/alloy steel category. Growing battery
        demand (EV nickel sulfate) is not separately quantified in this chapter.
      source_id: usgs_mcs_2025_nickel
  completeness: complete

