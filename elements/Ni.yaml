  notes: |
    Nickel is on the US 2022 Final Critical Minerals List. EU CRMA 2023/2024
    (Regulation 2024/1252) lists nickel on both Annex I (Strategic Raw Materials)
    and Annex II (Critical Raw Materials). Net import reliance (US) was 48% in
    2024 per USGS salient statistics table; excluding secondary/scrap, net
    import reliance would be nearly 100%.

