symbol: Ni
atomic_number: 28
name: nickel
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS reports nickel on a contained-metal basis (metric tons of nickel content)
  unless otherwise noted. Class I refined nickel (≥99.8% Ni) is the LME
  deliverable grade; ferronickel (~20–40% Ni) and nickel pig iron (NPI, 1–15% Ni)
  are distinct commercial forms used primarily in stainless steel production.
  LME cash prices quoted per metric ton and per pound refer to Class I nickel cathode.

