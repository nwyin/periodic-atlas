reserves:
  economic_reserves:
    value: 12000
    unit: million_m3
    form: gas_crude
    approximate: true
    notes: |
      Sum of USGS-reported country reserves (US 8,550 + Algeria 1,800 +
      Russia 1,700 + Poland 24 ≈ 12,074 Mm3). USGS does not publish a
      world-total reserves figure ("NA" in the 2024 column). Qatar reserves
      described as "Large" without a number. This sum therefore excludes
      Qatar and should be treated as a lower bound on global reserves.
    source_id: usgs_mcs_2025_helium
  resources:
    value: 39800
    unit: million_m3
    form: gas_crude
    approximate: true
    notes: |
      USGS: "The mean volume of recoverable helium within the known geologic
      natural gas reservoirs in the United States was estimated to be 8,490
      million cubic meters" plus 51.5 million cubic meters (1.86 Bcf) in
      the Federal helium inventory. "Helium resources of the world,
      exclusive of the United States, were estimated to be about 31.3
      billion cubic meters (1.13 trillion cubic feet)." Total: ~39.8 Bm3.
      Major ex-US deposits: Qatar 10.1, Algeria 8.2, Russia 6.8, Canada 2.0,
      China 1.1 billion cubic meters.
    source_id: usgs_mcs_2025_helium
  reserves_by_country:
