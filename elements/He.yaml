byproduct_of: []
feedstock_origins:
  - substrate: natural_gas
    typical_concentration_pct: 0.5
    notes: |
      US crude helium extraction "produced crude helium that generally
      ranged from 50% to 80% helium" per USGS. Raw natural gas helium
      concentration varies dramatically by basin — economically extractable
      starting around 0.3% in high-volume fields. Qatar helium is
      co-produced with LNG from Ras Laffan.
    source_id: usgs_mcs_2025_helium
  - substrate: cliffside_field_storage
    notes: |
      "The Federal Helium System operated the Cliffside Field storage
      reservoir" — not a feedstock per se but a critical inventory buffer.
      All Federal Helium System assets were transferred to a single private
      company on June 27, 2024; the storage and pipeline system is now in
      private hands.
    source_id: usgs_mcs_2025_helium

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Nothing substitutes for helium
      in cryogenic applications if temperatures below −429 degrees
      Fahrenheit are required. Superconductors, including those in
      magnetic resonance imaging scanners, are being developed to operate
      at higher temperatures using nitrogen instead of helium as a
      coolant. Hydrogen can be substituted for helium in some
      lighter-than-air applications in which the flammable nature of
      hydrogen is not objectionable. Argon can be substituted for helium
      in welding. Hydrogen can be used as a substitute for helium in
      deep-sea diving applications."
    source_id: usgs_mcs_2025_helium

end_uses:
  uses:
    - application: analytical_engineering_lab_specialty_gases
      share_pct: 22
      notes: |
        USGS MCS 2025 p.88 lists this as the largest US 2024 end use
        category: "analytical, engineering, lab, science, and specialty
        gases". USGS does not break out 'semiconductor specialty gases'
        separately — they are grouped into the controlled atmospheres
        category below.
      source_id: usgs_mcs_2025_helium
    - application: lifting_gas
      share_pct: 18
      notes: "USGS 2024 US-consumption: 'lifting gas (18%)' — balloons, party gas, scientific balloons."
      source_id: usgs_mcs_2025_helium
    - application: mri_cryogenics
      share_pct: 17
      notes: "USGS 2024 US-consumption: 'magnetic resonance imaging (17%)' — cooling superconducting magnets."
      source_id: usgs_mcs_2025_helium
    - application: controlled_atmospheres_fiber_optics_semiconductors
      share_pct: 15
      notes: |
        USGS 2024 US-consumption: 'controlled atmospheres, fiber optics,
        and semiconductors (15%)'. This is the grouped category that
        includes wafer-handling inert atmosphere and fiber draw-tower
        applications. IMPORTANT: USGS does not report semiconductors as
        a separate category, so any claim that "semiconductors overtook
        MRI" cannot be sourced from this document.
      source_id: usgs_mcs_2025_helium
    - application: welding_shield_gas
      share_pct: 8
      source_id: usgs_mcs_2025_helium
    - application: aerospace_pressuring_purging
      share_pct: 7
      notes: "Rocket tank pressurization and purge gas. NASA is the historical largest single consumer in this category."
      source_id: usgs_mcs_2025_helium
    - application: leak_detection
      share_pct: 5
      source_id: usgs_mcs_2025_helium
    - application: diving_breathing_gas
      share_pct: 5
      notes: "Heliox for saturation diving."
      source_id: usgs_mcs_2025_helium
    - application: other
      share_pct: 3
      notes: "USGS: 'various other minor applications (3%)'."
      source_id: usgs_mcs_2025_helium
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  eu_crm_list_as_of_2024: true
  eu_strategic_list_as_of_2024: false
  notes: "Helium is on the US Critical Minerals List and the EU CRM list but not the EU Strategic list."
  source_id: usgs_mcs_2025_helium

prices:
  - year: 2024
    value: 14
    unit: usd_per_m3
    form: gas_grade_a
    basis: price_list
    region: US
    notes: |
      USGS MCS 2025 p.88: "The estimated base price for Grade-A helium was
      about $14 per cubic meter ($390 per thousand cubic feet) in 2024,
      with producers posting surcharges to this price."
    source_id: usgs_mcs_2025_helium

geopolitical_events:
  - date: 2022-01
    event: "Helium Shortage 4.0 begins — simultaneous outages at Cliffside, Amur, and Algeria"
    impact: "Semiconductor fabs begin aggressive recovery programs; BLM auction delayed multiple times"
    source_id: inquiry_periodic_elements_2025
  - date: 2024-01-25
    event: "Federal Helium System assets sold in two lots by the General Services Administration"
    impact: |
      Lot 1: ~28 Mm3 (1.0 Bcf) Federally-owned crude helium. Lot 2: Federal
      Helium System infrastructure + ~22 Mm3 (800 MMcf) crude helium. Both
      lots sold to a single company, transfer completed June 27, 2024.
      Ends 62 years of US government helium market participation.
    source_id: usgs_mcs_2025_helium
  - date: 2024-06-25
    event: "EU adopts sanctions package imposing import ban on helium from Russia, effective September 26, 2024"
    impact: "Constrains ~9% of global supply for EU buyers; reroutes Russian volumes toward Asian markets."
    source_id: usgs_mcs_2025_helium
  - date: 2024-08-11
    event: "Cliffside Helium Enrichment Unit (CHEU) lease to BLM expires without renewal"
    impact: |
      The CHEU, owned by a private entity, was leased to the BLM historically.
      The lease expired August 11, 2024 and was not renewed by expiration.
      The District Court of Amarillo, TX allowed the new Cliffside Field
      owner to operate the equipment to maintain domestic supply while
      negotiations continued. Unresolved at end of 2024 per USGS.
    source_id: usgs_mcs_2025_helium

narrative: |
  Helium is non-renewable on any human timescale — once released to the
  atmosphere it escapes to space. USGS MCS 2025 reports 2024 world
  production of 180 Mm3, with the US (45%), Qatar (36%), Russia (9%),
  and Algeria (6%) providing 96% of supply. The US Federal Helium System
  ceased government operation in 2024: all storage and pipeline assets
  were sold to a single private company on June 27, and the CHEU
  purification unit lease expired in August with unresolved legal status
  at year-end. Grade-A helium base price in 2024 was $14 per cubic meter
  ($390 per thousand cubic feet) per USGS.

  The US 2024 end-use breakdown shows analytical/specialty gases (22%)
  as the largest category, followed by lifting gas (18%), MRI (17%), and
  the grouped "controlled atmospheres, fiber optics, and semiconductors"
  category (15%). USGS does not break out semiconductors as a standalone
  line item, so claims about semiconductors "overtaking MRI" cannot be
  sourced from this document.

