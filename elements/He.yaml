symbol: He
atomic_number: 2
name: helium
category: noble_gas
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS reports helium volumes at 101.325 kPa absolute and 21.1°C (70°F).
  1,000 cubic feet = 27.737 cubic meters under those conditions.
  "Grade-A" helium is 99.997%+ pure; "crude helium" is typically 50-80% pure
  as extracted from natural gas. The US produces both forms.

