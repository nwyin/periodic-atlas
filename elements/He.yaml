narrative: |
  Helium is non-renewable on any human timescale. Once released to the
  atmosphere it escapes to space. The US Federal Helium Reserve — which
  anchored global supply for seven decades — was fully divested in 2024,
  handing pricing power to a handful of private producers in five
  countries. Semiconductor manufacturing overtook MRI as the single
  largest end use in 2024, driven by EUV lithography and AI chip
  production. This shift matters because MRI demand is price-inelastic
  (hospitals will pay whatever it takes to keep magnets cold) but
  semiconductor demand is cyclical — future shortages will hit medical
  imaging harder than chips.

