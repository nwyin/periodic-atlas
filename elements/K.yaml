symbol: K
atomic_number: 19
name: potassium
category: alkali_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025

form_notes: |
  USGS MCS 2025 reports potash production and prices in potassium oxide (K2O) equivalent
  unless otherwise noted. Commercial trade forms are:
    - MOP (Muriate of Potash) = potassium chloride (KCl, ≥95% pure) — the dominant
      form, used for most agricultural and industrial applications.
    - SOP (Sulfate of Potash) = potassium sulfate (K2SO4) — required for chloride-sensitive
      crops; commands a premium over MOP.
    - SOPM (Sulfate of Potash-Magnesia) = langbeinite (K2Mg2(SO4)3) — specialty fertilizer
      for magnesium-deficient soils; produced mainly in New Mexico.
  Prices are f.o.b. mine in USD per metric ton K2O equivalent. K2O conversion factors:
  KCl × 0.632 = K2O; K2SO4 × 0.540 = K2O. One stream is reported (world potash mine
  production in K2O equivalent) because the USGS chapter does not separately tabulate
  the downstream KCl vs. K2SO4 product breakdown in national quantities.

