byproduct_of: []

feedstock_origins:
  - substrate: sylvinite_ore
    notes: |
      Sylvinite is a natural mixture of potassium chloride (KCl, sylvite) and sodium
      chloride (NaCl, halite), the primary ore for MOP production. Mined underground
      in New Mexico and Saskatchewan (Canada) and via deep-well solution mining in
      New Mexico and Utah. Beneficiated by flotation, heavy-media separation, or
      dissolution-recrystallization.
    source_id: usgs_mcs_2025_potash
  - substrate: langbeinite_ore
    notes: |
      Langbeinite (K2Mg2(SO4)3) is a potassium-magnesium sulfate mineral mined
      exclusively in New Mexico alongside sylvinite. Yields SOPM directly after
      beneficiation, used for chloride-sensitive crops requiring magnesium.
    source_id: usgs_mcs_2025_potash
  - substrate: potash_brine_dead_sea
    notes: |
      Dead Sea brines (Israel and Jordan) contain high concentrations of potassium
      chloride. ICL Group (Israel) and Arab Potash Company (Jordan) extract KCl by
      solar evaporation of pumped brine. USGS footnote: Dead Sea contains nearly
      2 billion tons of potassium chloride.
    source_id: usgs_mcs_2025_potash
  - substrate: potash_brine_salt_lake
    notes: |
      Great Salt Lake (Utah) brines processed by Compass Minerals via solar evaporation
      to produce SOP and other byproducts. Qaidam Basin salt lakes (Qinghai, China) are
      the primary Chinese feedstock. Atacama brine (Chile) produces SOP via SQM.
    source_id: usgs_mcs_2025_potash

substitutes:
  - application: plant_nutrition
    availability: none
    notes: |
      USGS MCS 2025 substitutes paragraph: "No substitutes exist for potassium as
      an essential plant nutrient and as an essential nutritional requirement for
      animals and humans. Manure and glauconite (greensand) are low-potassium-content
      materials that can be profitably transported only short distances to crop fields.
      Glauconite is used as a potassium source for organic farming."
    source_id: usgs_mcs_2025_potash

end_uses:
  uses:
    - application: fertilizer_agriculture
      share_pct: 85
      notes: |
        USGS MCS 2025: "The fertilizer industry used about 85% of U.S. potash sales."
        Potash is the third macronutrient (N-P-K) in commercial fertilizers, essential
        for crop yield and quality. Applied as MOP (KCl), SOP (K2SO4), or SOPM
        (langbeinite). US end-use figures; global fertilizer share is similarly dominant.
      source_id: usgs_mcs_2025_potash
    - application: chemical_and_industrial
      share_pct: 15
      notes: |
        USGS MCS 2025: "the remainder [of US potash sales] was used for chemical and
        industrial applications." Includes potassium hydroxide (KOH) for liquid soaps and
        detergents, potassium carbonate (K2CO3) for glass and ceramics, potassium nitrate
        (KNO3) for fertilizer and food preservation, and other specialty chemicals.
        About 70% of US potash production was SOPM and SOP (chloride-sensitive crop
        fertilizer); 30% MOP.
      source_id: usgs_mcs_2025_potash
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Potash is not on the US 2022 Critical Minerals List, EU Critical Raw Materials list
    (Regulation 2024/1252), or EU Strategic Raw Materials list. Despite the US being
    ~93% net import reliant on Canada (79% of US imports in 2020–23) and Canada + Russia
    + Belarus controlling ~65% of world mine production, potash is classified as an
    agricultural commodity rather than a technologically critical mineral. The US
    Department of Agriculture — not the Department of the Interior — oversees food-security
    aspects of potash supply.

