symbol: At
atomic_number: 85
name: astatine
category: reactive_nonmetal
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No bulk commodity form exists. Present-day astatine activity is limited to
  special-order At-211 batches produced for radiopharmaceutical work and sold in
  millicuries rather than mass units. DOE NIDC's 12/2024 product sheet lists
  two shipment forms: sodium astatide in NaCl solution at pH 6.5-7 from the
  University of Washington, or At-211 absorbed on a 3-octanone impregnated
  column from Texas A&M University; both originate from alpha irradiation of
  bismuth metal and must move on an hours-scale because the isotope half-life is
  7.214 hours.

