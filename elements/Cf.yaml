symbol: Cf
atomic_number: 98
name: californium
category: actinide
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  Californium's commercial reality is the isotope market for Cf-252 rather than an
  element-level metal market. DOE NIDC sells Cf-252 in microgram quantities, with
  the product sheet listing "solution or custom form" chemistry, dried-solution
  quartz-ampoule primary containment, >60-80% atom-percent radionuclidic purity,
  and stock availability. ORNL's production route converts irradiated curium targets
  into purified californium that can then be fabricated into palladium-californium
  wire for sealed neutron-source assemblies.

isotope_markets:
  - isotope: Cf-252
    half_life_seconds: 83469852
    production_mode: reactor_generated
    reporting_year: 2025
    precursor: |
      Successive neutron captures and beta decays of curium isotopes in specially
      fabricated curium composite targets irradiated in ORNL's High Flux Isotope
      Reactor. After irradiation, the targets are chemically processed at the
      Radiochemical Engineering Development Center, where californium is separated
      from other heavy elements and fission products and the curium is recycled into
      new targets.
    delivery_form: |
      DOE NIDC sells Cf-252 as solution or custom form, with dried solution in a
      quartz ampoule as the standard primary container and micrograms as the unit of
      sale. ORNL's downstream source-fabrication route adds Cf oxide to palladium
      metal and rolls the resulting palladium-californium cermet into wire to meet
      requested neutron-source specifications.
    producers:
      shares:
        - country: US
          share_pct: 70
          confidence: medium
          notes: |
            ORNL stated in its February 2013 contract announcement that Cf-252
            produced at Oak Ridge supplied approximately 70% of global demand. Later
            ORNL isotope pages still describe ORNL as the only producer in the
            Western Hemisphere and as producing more than 70% of world supply,
            indicating continued US dominance even though a current exact market
            split is not publicly published.
          source_id: ornl_cf252_contract_2013
        - country: RU
          share_pct: 30
          confidence: low
          notes: |
            ORNL identified Dimitrovgrad, Russia, as the only other facility capable
            of producing Cf-252. The 30% share is the residual implied by ORNL's
            approximate 70% Oak Ridge share and should be treated as an inferred
            counterparty share rather than a directly reported current figure.
          source_id: ornl_cf252_contract_2013
      completeness: complete
    notes: |
      Cf-252 is a specialty neutron-source isotope made in milligram quantities, not
      a bulk commodity. ORNL's 2020 production review reports 78 production
      campaigns from 1966 through May 2019 yielding cumulative output of 10.2 g of
      Cf-252, which is useful for scale but not an annual production figure. Public
      primary sources reviewed here do not disclose current annual output or price.

byproduct_of:
  - Cm

feedstock_origins:
  - substrate: curium_composite_targets
    notes: |
      The direct feedstock is fabricated curium composite targets loaded into HFIR
      for irradiation. ORNL's californium isotope sheet shows the targets are later
      dissolved, californium is separated, and the remaining curium is recycled to
      fabricate more targets.
    source_id: ornl_cf252_sheet

substitutes:
  - application: portable_neutron_source_applications
    availability: none
    notes: |
      ORNL describes Cf-252 as a "unique, portable neutron source" used across
      analysis, detection, and nuclear-energy tasks. This supports the commercial
      reality that there is no full drop-in substitute spanning the entire compact
      neutron-source application set served by Cf-252.
    source_id: ornl_cf252_contract_2013

end_uses:
  uses:
    - application: portable_neutron_source_applications
      share_pct: 100
      confidence: medium
      notes: |
        Official ORNL materials consistently describe the isotope as an intense
        neutron source for reactor startup and industrial analysis. Specific cited
        applications include neutron radiography and materials analysis, reactor
        startup, coal and cement impurity analysis, oil-well logging, and radiation
        detector calibration for port-security operations. This 100% share reflects
        that the commercial Cf-252 market is the neutron-source market.
      source_id: ornl_cf252_sheet
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  us_critical_source_id: us_federal_register_critical_minerals_2025
  eu_crm_list_as_of_2024: false
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Californium does not appear on the 2025 US critical minerals list or the EU's
    2024 critical or strategic raw-materials annexes. The isotope is strategically
    important for niche reactor-startup and neutron-source applications, but its
    market is handled through isotope-program and nuclear-supply channels rather than
    mainstream mineral-policy frameworks.

geopolitical_events:
  - date: 2025-09
    event: "ORNL advanced nearly $1 billion of isotope-facility projects to reinforce domestic radioisotope supply chains"
    impact: |
      ORNL said the Stable Isotope Production Facility, Stable Isotope Production and
      Research Center, and proposed Radioisotope Processing Facility were intended to
      strengthen US isotope independence and competitiveness. For Cf-252 this matters
      because ORNL is the Western Hemisphere's only producer and domestic supply is
      still tied to aging Oak Ridge hot-cell infrastructure.
    source_id: ornl_isotope_investment_2025

narrative: |
  Californium is commercially real, but only as an isotope business centered on
  Cf-252. The product is made by irradiating curium targets in HFIR, chemically
  separating the resulting transplutonium mixture at REDC, and selling finished
  material through the DOE isotope program in microgram quantities. What customers
  buy is not californium metal for alloying or chemistry, but a very intense neutron
  emitter delivered as solution, custom form, or source-fabrication feed.

  The market is tiny in mass and outsized in functional value. Official ORNL
  materials describe uses in reactor startup, neutron radiography and materials
  analysis, oil-well logging, coal and cement analysis, and calibration of radiation
  detectors used in port security. Oak Ridge has long been one of only two cited
  world production centers, with ORNL stating it supplies roughly 70% of global
  demand and remains the only producer in the Western Hemisphere. Public sources do
  not disclose current annual output or list pricing, so the atlas record focuses on
  supply-chain structure and trade form rather than fabricated tonnage.

