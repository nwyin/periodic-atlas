symbol: Cf
atomic_number: 98
name: californium
category: actinide
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  Californium's commercial reality is the isotope market for Cf-252 rather than a
  bulk element market. DOE NIDC lists Cf-252 with stock availability, micrograms
  as the unit of sale, and "solution or custom form" chemistry; the standard
  primary container is dried solution in a quartz ampoule. ORNL's downstream
  source-fabrication flow converts purified californium oxide into a
  palladium-californium wire for sealed neutron-source assemblies.

isotope_markets:
  - isotope: Cf-252
    half_life_seconds: 83469852
    production_mode: reactor_generated
    reporting_year: 2025
    precursor: |
      Successive neutron captures and beta decays of curium isotopes in curium
      composite targets irradiated in ORNL's High Flux Isotope Reactor. After
      irradiation the targets are dissolved and processed in the Radiochemical
      Engineering Development Center, where californium is separated from other
      heavy elements and fission products and the curium is recycled into new
      targets.
    delivery_form: |
      DOE NIDC sells Cf-252 as solution or custom form with micrograms as the
      unit of sale; the standard primary container is dried solution in a quartz
      ampoule. ORNL's source-fabrication route then adds californium oxide to
      palladium metal and rolls the resulting palladium-californium material into
      wire to customer specifications.
    producers:
      shares:
        - country: US
          share_pct: 70
          confidence: medium
          notes: |
            ORNL said in its 2013 contract announcement that Oak Ridge supplied
            approximately 70% of global demand for Cf-252. ORNL's later isotope
            sheet still describes the lab as the only producer in the Western
            Hemisphere, supporting continued U.S. dominance even though a more
            recent public market-share split is not published.
          source_id: ornl_cf252_contract_2013
        - country: RU
          share_pct: 30
          confidence: low
          notes: |
            ORNL identified Dimitrovgrad, Russia, as the only other facility
            capable of producing Cf-252. The 30% figure is the residual implied
            by ORNL's approximate 70% Oak Ridge share rather than a separately
            published current market statistic.
          source_id: ornl_cf252_contract_2013
      completeness: complete
    notes: |
      Public primary sources reviewed here do not disclose current annual output
      or list pricing. ORNL's 2020 production review does, however, establish the
      scale of the business: 78 production campaigns from 1966 through May 2019
      yielded a cumulative 10.2 grams of Cf-252.

feedstock_origins:
  - substrate: curium_composite_targets
    notes: |
      ORNL fabricates curium composite pellets into specially designed targets,
      irradiates them in HFIR, then dissolves the irradiated targets in REDC hot
      cells so californium can be separated and the curium recycled into future
      targets.
    source_id: ornl_cf252_sheet_2021

substitutes:
  - application: reactor_startup_sources
    availability: partial
    notes: |
      Cf-252 is used to start up naval and commercial reactors, but NRC's reactor
      glossary defines startup neutron sources generically and notes that they can
      use antimony-beryllium, plutonium-beryllium, americium-beryllium, or other
      neutron-emitting materials. That supports only a partial substitute claim:
      some startup roles can use alternate neutron sources, while Cf-252 remains a
      distinctive compact option across the wider neutron-source market.
    source_id: nrc_glossary_startup_source

end_uses:
  uses:
    - application: neutron_source_applications
      share_pct: 100
      confidence: medium
      notes: |
        The commercial Cf-252 market is the neutron-source market. ORNL's isotope
        materials and production review cite reactor startup, oil-well logging,
        coal and cement analysis, nondestructive materials analysis, detector
        calibration, homeland-security instruments, and related industrial and
        defense uses.
      source_id: ornl_cf252_production_2020
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  us_critical_source_id: us_federal_register_critical_minerals_2025
  eu_crm_list_as_of_2024: false
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Californium does not appear on the 2025 U.S. critical-minerals list or the
    EU's 2024 critical and strategic raw-materials annexes. Its commercial supply
    chain is managed through isotope-program and nuclear-infrastructure channels
    rather than mainstream mineral-policy frameworks.

geopolitical_events:
  - date: 2013-02-28
    event: ORNL began implementing a new six-year DOE Isotope Program contract with industry for Cf-252 production.
    impact: |
      The contract formalized continued industrial supply from one of only two
      world production centers and followed a prior four-year program serving
      energy, detection, and nuclear applications.
    source_id: ornl_cf252_contract_2013
  - date: 2025-09-30
    event: ORNL advanced isotope-facility projects totaling nearly $1 billion in proposed DOE funding.
    impact: |
      ORNL said the planned Radioisotope Processing Facility would expand output of
      larger quantities and more radioisotopes while relieving capacity pressure in
      aging Oak Ridge facilities. That matters for Cf-252 because ORNL remains the
      Western Hemisphere's only producer and current isotope facilities are at
      capacity.
    source_id: ornl_isotope_investment_2025

narrative: |
  Californium is commercially meaningful only as a tiny-mass isotope business
  centered on Cf-252. DOE's isotope catalog sells the material in microgram
  quantities, and the production chain is not a mine-refinery commodity flow but
  a nuclear-manufacturing sequence: curium target fabrication, irradiation in
  HFIR, radiochemical separation in REDC hot cells, and source fabrication into
  forms suitable for neutron-emitter applications.

  The isotope's value comes from function rather than tonnage. ORNL's primary
  materials describe uses in reactor startup, oil-well logging, coal and cement
  analysis, nondestructive testing, detector calibration, and security systems.
  Public sources do not disclose current annual output or public price lists, but
  ORNL's 2020 production review shows how small the market is in absolute mass:
  all Oak Ridge campaigns from 1966 through May 2019 yielded only 10.2 grams of
  Cf-252, even while the lab stated it supplied about 70% of world demand.

