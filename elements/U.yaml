    notes: |
      EIA UMAR 2024 Table S1b: US civilian reactor operator weighted-average purchase price
      2021 = $33.91/lb U₃O₈e. Spot prices began recovering in late 2021, rising from ~$30/lb
      at the start of the year as the Sprott Physical Uranium Trust and other financial buyers
      entered the market; but long-term contract prices (which dominate US purchasing)
      remained near 2020 levels.
