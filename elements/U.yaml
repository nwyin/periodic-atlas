geopolitical_events:
  - date: "2022-02"
    event: "Russia-Ukraine war reshapes global uranium and enrichment supply chains; utilities scramble for non-Russian alternatives"
    impact: |
      Russia's invasion of Ukraine in February 2022 triggered a fundamental reassessment of
      nuclear fuel supply security across Europe and North America. Russia's Rosatom/TVEL
      provides enrichment services to approximately 20% of global nuclear reactors, including
      reactors in Bulgaria, Czech Republic, Finland, Hungary, Slovakia, and Ukraine that use
      Russian-designed VVER reactors with Russian fuel assemblies. EU and US utilities began
      seeking alternative enrichment suppliers (Urenco, Orano, Centrus). The spot uranium
      price surged from ~$43/lb to ~$64/lb between February and April 2022. Russia also
      supplies natural uranium UF6 conversion services and had mine equity stakes via
      Uranium One in Kazakhstan. Utilities began rebuilding inventories and signing new
      long-term contracts at sharply higher prices.
    source_id: nea_iaea_redbook_2024
  - date: "2023-07"
    event: "Military coup in Niger disrupts Orano's uranium operations; threatens EU nuclear fuel supply"
    impact: |
      A military coup overthrew Niger's elected government on 26 July 2023. Niger had been
      France's and the EU's primary source of uranium supply for decades; French operator
      Orano (formerly Areva) operated SOMAIR (open-pit mine at Arlit) and had been developing
      the large Imouraren deposit. Post-coup, Niger's junta: (1) terminated Orano's Imouraren
      mining permit (June 2024); (2) revoked the SOMAIR operating license (September 2024);
      (3) expelled Orano from Niger entirely. Niger accounted for ~20% of EU uranium imports
      in prior years. Niger's production dropped from 2,020 tU in 2022 to 1,130 tU in 2023.
      This event accelerated EU diversification efforts toward Kazakhstan, Canada, Australia,
      and Namibia.
    source_id: nea_iaea_redbook_2024
  - date: "2023-12"
    event: "COP28 nuclear declaration: 22+ countries pledge to triple nuclear capacity by 2050, boosting long-term uranium demand outlook"
    impact: |
      At the 28th Conference of the Parties (COP28) in Dubai in December 2023, more than 22
      countries (subsequently expanding to 30+) signed a joint declaration to triple global
      installed nuclear power capacity by 2050 relative to 2020 levels (from ~413 GWe to
      ~1,200 GWe). Signatories include the United States, France, Japan, South Korea, Canada,
      the UK, and 15+ others. The NEA/IAEA Red Book 2024 notes this as a significant driver
      of the uranium spot price surge to $91/lb at year-end 2023 and $106/lb in January 2024.
      Tripling nuclear capacity would require ~130,000–140,000 tU/yr of uranium demand by 2050
      versus ~59,000 tU in 2023 — more than double current mine production.
    source_id: nea_iaea_redbook_2024
  - date: "2024-05"
    event: "US Prohibiting Russian Uranium Imports Act bans most Russian low-enriched uranium imports effective August 2024"
    impact: |
      The United States enacted the Prohibiting Russian Uranium Imports Act (signed into law
      May 2024; effective 11 August 2024), banning imports of low-enriched uranium (LEU)
      produced in Russia for use in US nuclear reactors. The US had been importing Russian
      LEU under long-standing supply agreements (Techsnabexport/TVEL). The Act includes a
      waiver mechanism for DOE to permit limited Russian imports through 2027 to prevent
      near-term supply disruptions. The law accelerated US domestic enrichment investment
      (Centrus Energy, Urenco USA) and Canadian enrichment expansion (Cameco/Westinghouse
      GLE centrifuge project). In response to the Act, Russia threatened to suspend its own
      export of uranium and enrichment services to Western utilities.
    source_id: nea_iaea_redbook_2024
  - date: "2024-01"
    event: "Uranium spot price reaches $106/lb (USD 275/kgU), highest in 17 years, driven by supply security and demand expectations"
    impact: |
      In January 2024, the uranium spot price broke through USD 100/lb U₃O₈ for the first
      time since 2007 and reached a high of USD 106/lb (USD 275/kgU) as utility procurement
      accelerated and financial buyers (Sprott Physical Uranium Trust, Yellow Cake plc)
      accumulated uranium. Supply-side pressures included Kazatomprom's sulphuric acid
      shortages (Kazakhstan), Niger disruptions, and deferred production ramp-ups. From
      March through August 2024, the spot price averaged USD 80–90/lb before partially
      correcting to ~$73/lb by year-end 2024. The 2024 price surge prompted multiple
      idled US, Australian, and Canadian mines to announce restart plans.
    source_id: nea_iaea_redbook_2024

narrative: |
  Uranium is the world's nuclear fuel feedstock: essentially all global mine production
  is converted to enriched uranium for use in commercial nuclear power reactors, which
  together generate approximately 10% of the world's electricity. The global uranium market
  is concentrated — Kazakhstan alone supplies ~39% of world mine output via in-situ recovery
  (ISR) operations operated or co-owned by state company Kazatomprom, while Canada (McArthur
  River and Cigar Lake, both in the Athabasca Basin) contributes ~20%. The top six producing
  nations — Kazakhstan, Canada, Namibia, Australia, Uzbekistan, and Russia — together account
  for over 92% of world output. Global mine production reached 54,345 tU in 2023, recovering
  from the 47,361 tU COVID-19 low in 2021 but still below the 2016 peak of ~63,000 tU.
  US domestic production effectively ceased in 2017–2022 under sustained low prices, though
  domestic ISR capacity has been rapidly reactivated since 2023, reaching 677,000 lb (~260 tU)
  in 2024. US reactor operators remain heavily import-dependent, purchasing 55.9 million lb
  U₃O₈e from foreign suppliers in 2024.

  The uranium market underwent a structural price reset from 2022 to 2024. Spot prices had
  declined from a 2007 peak of ~$140/lb to ~$20/lb by 2016, keeping marginal mines on
  care-and-maintenance for years. The Russia-Ukraine war (February 2022) disrupted enrichment
  supply chains and prompted European and US utilities to rebuild inventory and sign new
  long-term contracts at higher prices. The military coup in Niger (July 2023) removed a key
  EU uranium supply source and reinforced supply-security concerns. The uranium spot price
  surged from ~$47/lb at year-end 2022 to $91/lb at year-end 2023 and $106/lb in January 2024,
  the highest in 17 years. The US Prohibiting Russian Uranium Imports Act (enacted May 2024,
  effective August 2024) further accelerated Western nuclear fuel supply chain restructuring
  away from Russian enrichment services. Meanwhile, at COP28 in December 2023, over 22
  countries pledged to triple global nuclear capacity by 2050, materially raising the long-term
  demand outlook.

  The global uranium resource base is sufficient to meet projected demand well into the second
  half of this century. Identified recoverable resources at <USD 130/kgU total 5.9 million tU
  (NEA/IAEA Red Book 2024), with Australia (28%), Kazakhstan (14%), Canada (10%), and Namibia
  (8%) holding the largest shares. However, bringing new mines into production requires 10–15
  years from discovery through permitting and construction, meaning the current price signal
  must be sustained to fund the investment needed to close the anticipated supply gap by
  ~2027–2030 under high-demand scenarios. Kazatomprom's sulphuric acid supply constraints,
  Niger's political instability, and the concentration of supply in Kazakhstan (a single
  country, further concentrated within Kazatomprom's portfolio) represent the primary
  near-term supply risks. Uranium is not on the US 2022 Critical Minerals List — it was removed
  in the 2022 revision — and is excluded from the EU Critical Raw Materials framework (nuclear
  materials fall under the Euratom Supply Agency's separate regulatory mandate). Nevertheless,
  nuclear fuel supply security is a central concern of every energy policy framework in
  countries operating nuclear fleets.

