feedstock_origins:
  - substrate: uraninite_ore
    typical_concentration_pct: 0.1
    notes: |
      Uraninite (pitchblende, UO₂/UO₃) is the primary uranium mineral in high-grade
      unconformity-type deposits (Athabasca Basin, Canada: 10–20% U₃O₈) and lower-grade
      deposits globally. Conventional underground or open-pit mining followed by crushing,
      grinding, leaching (acid or alkaline), solvent extraction, and precipitation to
      yellowcake (U₃O₈). Average ore grade in unconformity deposits (~0.5–20% U₃O₈) is
      far above typical sandstone (~0.05–0.15%) or other deposit types.
    source_id: nea_iaea_redbook_2024
  - substrate: sandstone_uranium_ore
    typical_concentration_pct: 0.05
    notes: |
      Sandstone-hosted uranium deposits (roll-front type in permeable, reduced sediments)
      are the dominant form for in-situ recovery (ISR/ISL). Dilute sulfuric acid or sodium
      bicarbonate solution is injected to dissolve uranium in situ; pregnant solution is
      pumped to surface for processing. ISR accounted for approximately 52% of world uranium
      production by method in 2024 (WNA). Kazakhstan's entire production and ~80% of US
      production uses ISR. No milling of physical ore required; lower environmental
      disturbance footprint than conventional mining.
    source_id: wna_uranium_production_2024
  - substrate: phosphate_rock
    typical_concentration_pct: 0.015
    notes: |
      Phosphate rock (marine phosphorite, fluorapatite) contains trace uranium (50–200 ppm
      U₃O₈). Uranium is a byproduct of phosphate fertilizer manufacture; most is lost in
      processing unless specifically recovered. Historically significant in the 1970s–1980s;
      currently minimal commercial recovery. Red Book unconventional resource: seawater
      (~4.5 billion tU at ~3 ppb U) and phosphate deposits represent vast unconventional
      resources not currently economic.
    source_id: nea_iaea_redbook_2024

substitutes:
  - application: nuclear_power_fuel
    availability: partial
    notes: |
      No direct substitute for enriched uranium in conventional light water reactors (LWRs),
      which supply ~70% of global nuclear electricity. MOX fuel (mixed oxide, a blend of
      uranium dioxide and plutonium dioxide from reprocessed spent fuel) is a partial
      substitute used in LWRs in France, Germany (historically), Japan, Belgium, and
      Switzerland; it displaces ~10–15% of fresh uranium requirements on a per-reactor basis.
      Thorium (as ThO₂ with U-233 or Pu-239 driver in molten salt or heavy-water reactors)
      is a longer-term potential substitute but no commercial-scale thorium reactor operates
      as of 2025. Highly enriched uranium (HEU) from decommissioned weapons, downblended to
      LEU, served as a secondary supply equivalent to ~10% of annual mine production during
      the 1990s–2013 Megatons-to-Megawatts programme; this source is now essentially exhausted.
      Fast breeder reactors and closed fuel cycles could dramatically reduce primary uranium
      demand by breeding fissile material from U-238 or Th-232, but no commercial-scale
      fleet exists.
    source_id: nea_iaea_redbook_2024
  - application: nuclear_power_fuel
    availability: none
    notes: |
      For conventional uranium enrichment in gas centrifuge or gaseous diffusion plants, there
      is no substitute material that achieves LEU without uranium feedstock. Enrichment
      underfeeding (operating enrichment plants at higher separative work per kg of product to
      reduce uranium feed) can temporarily reduce uranium demand but is constrained by enrichment
      capacity and economics; it does not eliminate uranium demand. The Red Book notes that
      secondary sources including HEU downblend, re-enrichment of depleted uranium tails, and
      underfeeding have historically supplied 15–25% of annual requirements but are declining.
    source_id: nea_iaea_redbook_2024

end_uses:
  uses:
    - application: nuclear_power_fuel
      share_pct: 99
      confidence: medium
      notes: |
        Nuclear power (commercial civilian reactors) consumes approximately 99% of world
        uranium mine production. As of 1 January 2023, 438 commercial nuclear reactors
        were operational globally with 394 GWe net generating capacity requiring ~59,018 tU
        annually (NEA/IAEA Red Book 2024). This figure represents virtually all global uranium
        demand from primary mine supply plus secondary sources (HEU downblend, re-enriched
        tails, commercial inventories). Global nuclear power generation in 2023 was
        approximately 2,600 TWh, covering ~10% of world electricity supply. Low-enriched
        uranium (<5% U-235) fuel assemblies serve light water reactors (PWR, BWR); CANDU
        reactors use natural uranium (unenriched). Growth in demand is expected as more
        than 30 countries at COP28 (December 2023) pledged to triple installed nuclear
        capacity by 2050.
      source_id: nea_iaea_redbook_2024
    - application: research_reactors_defense_other
      share_pct: 1
      confidence: low
      notes: |
        Approximately 1% of uranium is consumed in research reactors (~220 operating
        globally), naval nuclear propulsion (submarine and surface warship reactors using
        highly enriched uranium), weapons stockpile maintenance (HEU and plutonium pit
        replacement), and industrial/medical isotope production (Mo-99/Tc-99m generator
        material). Exact defense consumption is classified; most Western naval uranium
        programs use existing HEU stockpiles rather than freshly mined material. This 1%
        estimate is based on the proportion of total demand not attributable to commercial
        power reactors.
      source_id: nea_iaea_redbook_2024
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Uranium was removed from the US 2022 Final List of Critical Minerals (Federal Register
    87 FR 10381, 24 February 2022), having been on the 2018 list (83 FR 23295). The USGS
    MCS 2025 overview explicitly states that uranium was among the minerals removed from
    the 2022 revision alongside helium, potash, rhenium, and strontium. The rationale for
    removal was that uranium has sufficient domestic and allied-nation supply capacity to
    meet US nuclear fuel requirements, even though US domestic mine production is minimal.
    Uranium is not on the EU Critical Raw Materials list (Regulation EU 2024/1252) nor the
    EU Strategic Raw Materials list; nuclear materials are governed under a separate Euratom
    Treaty framework (Euratom Supply Agency/ESA). Despite its absence from formal criticality
    lists, uranium's strategic importance for energy security and nuclear deterrence is
    universally acknowledged; the US, France, UK, and others maintain uranium stockpiles and
    reserve supply arrangements outside the commercial market.

