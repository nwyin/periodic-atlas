      2020 = $33.27/lb U₃O₈e. Includes spot and long-term contract deliveries; predominantly
      long-term contract prices (~76% long-term in 2020). This is the average price paid by
      US reactor operators, not the open-market spot price (which reached a low of ~$25/lb in
      early-mid 2020 at the start of COVID-19 production curtailments).
