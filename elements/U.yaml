symbol: U
atomic_number: 92
name: uranium
category: actinide
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Uranium is traded commercially as uranium concentrate (yellowcake), whose nominal composition
  is triuranium octoxide (U₃O₈, typically 65–85% U₃O₈ by mass) produced at mine sites or uranium
  mills by processing uranium ore or in-situ recovery (ISR) leachate. The NEA/IAEA Red Book
  convention — used throughout this file — reports all production and resource figures in tonnes
  of uranium content (tU), where 1 tU = 1.17926 tonnes U₃O₈ equivalent. Market prices are quoted
  universally in US dollars per pound of U₃O₈ equivalent ($/lb U₃O₈e). Subsequent processing
  converts U₃O₈ concentrate to uranium hexafluoride (UF₆) at conversion facilities, then to
  enriched UF₆ or low-enriched uranium (LEU, <5% U-235) at enrichment plants, and finally to
  sintered ceramic UO₂ fuel pellets at fuel-fabrication facilities. These downstream stages are
  distinct from the mining/milling stage tracked here. No standard temperature convention applies;
  all reserve and resource figures are as of 1 January 2023 (the Red Book 2024 reference date).

