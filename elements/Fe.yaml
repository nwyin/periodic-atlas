byproduct_of: []
feedstock_origins:
  - substrate: iron_ore_magnetite
    notes: |
      Magnetite (Fe₃O₄) ore is the primary feedstock for US taconite
      processing. US ores are low-grade; all eight domestic mines require
      beneficiation and pelletizing before use in blast furnaces or DRI
      plants. Taconite concentrates from the Lake Superior district contain
      ~65% Fe after processing.
    source_id: usgs_mcs_2025_iron_ore
  - substrate: iron_ore_hematite
    notes: |
      Hematite (Fe₂O₃) and goethite ores are high-grade direct-shipping
      ores (DSO) mined predominantly in Australia (Pilbara) and Brazil
      (Carajás). Australian benchmark ores run ~57-62% Fe; Brazilian
      Carajás ore is ~65% Fe.
    source_id: usgs_mcs_2025_iron_ore
  - substrate: iron_ore_dr_grade_pellets
    notes: |
      Direct-reduction (DR)-grade pellets require ≥67% Fe and low gangue.
      A Hibbing, MN plant began producing 4 Mt/yr of DR-grade pellets in
      May 2024 for use in DRI/HBI furnaces and electric arc furnaces.
      DR-grade is distinct from blast-furnace-grade pellets.
    source_id: usgs_mcs_2025_iron_ore

substitutes:
  - application: steelmaking_raw_material
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "The only source of primary iron
      is iron ore, used directly as direct-shipping ore or converted to
      briquettes, concentrates, DRI, iron nuggets, pellets, or sinter. DRI,
      iron nuggets, and scrap are extensively used for steelmaking in electric
      arc furnaces and in iron and steel foundries. Technological advancements
      have been made that allow hematite to be recovered from tailings basins
      and pelletized." Steel scrap is the primary secondary feedstock
      substituting for virgin iron ore in EAF-based steelmaking.
    source_id: usgs_mcs_2025_iron_ore

end_uses:
  uses:
    - application: steel_industry
      share_pct: 98
      notes: |
        USGS MCS 2025: "98% of domestic usable iron ore products for
        consumption in the steel industry." This covers all steel product
        sectors — construction, infrastructure, automotive, mechanical
        engineering, and appliances. The USGS Iron Ore chapter does not
        break out sub-sectors within steelmaking.
      source_id: usgs_mcs_2025_iron_ore
    - application: nonsteel_uses
      share_pct: 2
      notes: |
        USGS MCS 2025: "The remaining 2% of domestic iron ore products were
        consumed in nonsteel end uses" — includes iron powder for metallurgy,
        pigments, and heavy-media mineral separation.
      source_id: usgs_mcs_2025_iron_ore
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Iron ore is not on the US Critical Minerals List, EU CRM list, or EU
    Strategic list. The US is a net exporter (USGS salient statistics
    "Net import reliance" = E/Net Exporter for all years 2020-2024).
    Canada added high-purity iron to its Critical Minerals List in June 2024,
    citing its role in decarbonization, but Canada's list is not represented
    in these schema fields.

