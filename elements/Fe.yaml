symbol: Fe
atomic_number: 26
name: iron
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports iron ore mine production in thousand metric tons of
  usable ore (beneficiated concentrate, pellets, sinter, lump ore). Iron content
  is tracked separately (world 2024 iron content: 1,600 million metric tons).
  Benchmark pricing references 62% Fe fines CFR China. Crude steel is measured
  in metric tons of liquid steel and tracked as a separate stream. Both streams
  are reported in million_tonnes_per_year in this file; reserves are reported
  in tonnes (converted from USGS million metric tons by multiplying by 10^6).

