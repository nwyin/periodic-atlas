geopolitical_events:
  - date: 2024-02
    event: "Nevada iron ore mine receives water permits for up to 11.5 Mt/yr of iron ore mining northeast of Reno, with a colocated merchant pig iron plant planned"
    impact: "Potential new US iron ore source; still in pre-production permitting stage as of 2024."
    source_id: usgs_mcs_2025_iron_ore
  - date: 2024-05
    event: "Hibbing, MN plant begins production of DR-grade iron ore pellets (67% Fe, 4 Mt/yr capacity) using upgraded technology"
    impact: "Expands US supply of high-grade DRI/EAF feedstock, supporting green steel transition."
    source_id: usgs_mcs_2025_iron_ore
  - date: 2024-06
    event: "Canada updates its Critical Minerals List to include high-purity iron"
    impact: "Signals strategic interest in high-grade iron for decarbonization pathways; does not affect bulk ore trade."
    source_id: usgs_mcs_2025_iron_ore
  - date: 2024-01
    event: "China Iron and Steel Association calls for production cuts citing rapidly declining prices and need to balance supply with demand"
    impact: |
      China's NDRC responded with plans for decarbonization, energy reduction,
      support for high-quality steelmakers, and crackdowns on illegal/inefficient
      capacity. Structural overcapacity in Chinese steelmaking remains a global
      price headwind.
    source_id: usgs_mcs_2025_iron_ore
  - date: 2024-12
    event: "Guinea's Simandou iron ore deposit ownership finalized; partnership includes Government of Guinea and multiple international steel companies"
    impact: |
      One of the world's largest high-grade iron ore deposits. Production
      expected to start in 2025; full rate of 60 Mt/yr expected by 2028.
      Could significantly shift global iron ore supply geography away from
      Australia-Brazil duopoly.
    source_id: usgs_mcs_2025_iron_ore

narrative: |
  Iron ore is the world's most produced and consumed metallic ore, with 2024
  global mine output of approximately 2.5 billion metric tons of usable ore.
  Australia (37%) and Brazil (18%) together supply over half of world
  production and dominate seaborne trade; China and India account for an
  additional 22% but produce primarily for domestic consumption. The United
  States is a net exporter, with eight open-pit mines in Michigan, Minnesota,
  and Utah shipping 48 Mt in 2024 — a 7% increase driven by stock replenishment.
  Reserves are immense: USGS reports 200 billion metric tons of economically
  recoverable iron ore, sufficient for many decades at current production rates.

  Crude steel production — the downstream stream that consumes nearly all iron
  ore — reached approximately 1,879 million metric tons in 2024. China accounts
  for ~53% of global crude steel output, a concentration that creates structural
  tensions in global markets: the China Iron and Steel Association publicly
  called for production cuts in 2024 as prices fell, while the NDRC pushed
  decarbonization and efficiency mandates. Steel demand fell 0.9% globally in
  2024, dragged by weakness in automotive, housing construction, and
  manufacturing, partly offset by infrastructure and climate investment spending.

  The most significant long-term supply-side development is Guinea's Simandou
  deposit — expected to reach 60 Mt/yr by 2028 — which will introduce a new
  high-grade source outside the Australia-Brazil duopoly. Domestically, the
  US transition toward direct-reduction ironmaking (DRI/HBI) is accelerating,
  with DR-grade pellet production expanding at Hibbing in 2024. The iron ore
  sector sits upstream of the steel decarbonization challenge: hydrogen-based
  DRI requires either DR-grade pellets (67%+ Fe) or high-grade lump ore,
  creating quality differentiation within what has historically been treated
  as a single bulk commodity.

