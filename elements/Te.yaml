byproduct_of: [Cu]

feedstock_origins:
  - substrate: copper_anode_slimes
    notes: |
      USGS MCS 2025 states that tellurium is recovered principally as a byproduct of the
      electrolytic refining of primary copper, where it accumulates in the residues of
      copper anodes.
    source_id: usgs_mcs_2025_tellurium
  - substrate: lead_refinery_skimmings
    notes: |
      USGS MCS 2025 world-resources paragraph states that part of tellurium supply has been
      derived from skimmings at lead refineries.
    source_id: usgs_mcs_2025_tellurium
  - substrate: bismuth_copper_and_lead_zinc_smelter_flue_dusts_and_gases
    notes: |
      USGS MCS 2025 world-resources paragraph states that additional tellurium has been
      derived from flue dusts and gases generated during the smelting of bismuth, copper,
      and lead-zinc ores.
    source_id: usgs_mcs_2025_tellurium
  - substrate: gold_telluride_ores
    notes: |
      USGS MCS 2025 identifies gold telluride ores as a potential additional source of
      tellurium.
    source_id: usgs_mcs_2025_tellurium

substitutes:
  - application: thin_film_photovoltaics
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: amorphous silicon and copper indium gallium
      diselenide are the two principal competitors with cadmium telluride in thin-film
      photovoltaic solar cells.
    source_id: usgs_mcs_2025_tellurium
  - application: thermoelectric_devices
    availability: partial
    notes: |
      USGS MCS 2025 states that bismuth selenide and organic polymers can substitute for
      bismuth telluride in some thermoelectric devices.
    source_id: usgs_mcs_2025_tellurium
  - application: free_machining_steels
    availability: partial
    notes: |
      USGS MCS 2025 states that bismuth, calcium, lead, phosphorus, selenium, and sulfur
      can be used in place of tellurium in many free-machining steels.
    source_id: usgs_mcs_2025_tellurium
  - application: chemical_catalysis
    availability: partial
    notes: |
      USGS MCS 2025 states that several chemical-process reactions catalyzed by tellurium
      can be carried out with other catalysts or by means of noncatalyzed processes.
    source_id: usgs_mcs_2025_tellurium
  - application: rubber_compounding
    availability: partial
    notes: |
      USGS MCS 2025 states that sulfur and or selenium can act as vulcanization agents in
      place of tellurium in rubber compounding.
    source_id: usgs_mcs_2025_tellurium
  - application: solid_lubricants
    availability: partial
    notes: |
      USGS MCS 2025 states that the selenides and sulfides of niobium and tantalum can
      serve as electrically conducting solid lubricants in place of tellurides of those
      metals.
    source_id: usgs_mcs_2025_tellurium

