symbol: Te
atomic_number: 52
name: tellurium
category: metalloid
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS Mineral Commodity Summaries 2025 reports tellurium quantities in metric tons of
  tellurium content unless otherwise specified. Commercial output is recovered chiefly as
  copper telluride from tellurium-bearing copper anode slimes and then further refined into
  high-purity tellurium metal, tellurium compounds, and tellurium dioxide. The published
  price series is quoted in U.S. dollars per kilogram for minimum 99.95% purity material
  free on board U.S. warehouse and minimum 99.99% purity material in warehouse Rotterdam.

