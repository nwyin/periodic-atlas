feedstock_origins:
  - substrate: lead_zinc_ore
    notes: |
      The single largest source of mine silver. Lead-zinc polymetallic deposits account
      for the largest share of US and world silver resources per USGS MCS 2025. Mexico,
      Peru, Bolivia, and Australia have major lead-zinc operations producing significant
      byproduct silver.
    source_id: usgs_mcs_2025_silver
  - substrate: copper_ore
    notes: |
      Second-largest source of byproduct silver globally. Copper-porphyry and
      copper-skarn deposits, particularly in Chile, Peru, and Kazakhstan, yield
      significant byproduct silver in copper concentrates.
    source_id: usgs_mcs_2025_silver
  - substrate: gold_ore
    notes: |
      Third-ranked source in descending order of silver production per USGS. Most
      recent silver discoveries have been associated with gold occurrences. Gold-silver
      epithermal deposits (e.g., Nevada, Mexico) are important ore types.
    source_id: usgs_mcs_2025_silver
  - substrate: silver_ore
    notes: |
      Silver also occurs as a principal product at some mines (4 dedicated US silver
      mines in 2024 plus 31 byproduct/coproduct operations). Primary silver deposits
      include Coeur d'Alene district (Idaho) and Rochester Mine (Nevada).
    source_id: usgs_mcs_2025_silver

substitutes:
  - application: photography
    availability: full
    notes: |
      USGS MCS 2025 substitutes paragraph: "Digital imaging, film with reduced silver
      content, silverless black-and-white film, and xerography substitute for traditional
      photographic applications for silver." Digital photography has essentially displaced
      silver-based film in consumer and professional markets.
    source_id: usgs_mcs_2025_silver
  - application: surgical_implants
    availability: partial
    notes: |
      USGS MCS 2025: "Surgical pins and plates may be made with stainless steel,
      tantalum, and titanium in place of silver."
    source_id: usgs_mcs_2025_silver
  - application: flatware_silverware
    availability: full
    notes: |
      USGS MCS 2025: "Stainless steel may be substituted for silver flatware."
    source_id: usgs_mcs_2025_silver
  - application: batteries
    availability: partial
    notes: |
      USGS MCS 2025: "Nonsilver batteries may replace silver batteries in some
      applications." Silver oxide batteries retain advantages in hearing aids and
      specialized electronics; other applications have migrated to lithium-ion.
    source_id: usgs_mcs_2025_silver
  - application: mirrors_reflective_surfaces
    availability: partial
    notes: |
      USGS MCS 2025: "Aluminum and rhodium may be used to replace silver that was
      traditionally used in mirrors and other reflecting surfaces."
    source_id: usgs_mcs_2025_silver

end_uses:
  uses:
    - application: physical_investment
      share_pct: 30
      notes: |
        USGS MCS 2025 domestic use estimate 2024: "physical investment (bars), 30%."
        Includes silver bullion bars held by institutional and retail investors.
      source_id: usgs_mcs_2025_silver
    - application: electrical_and_electronics
      share_pct: 29
      notes: |
        USGS MCS 2025 domestic use estimate 2024: "electrical and electronics, 29%."
        Includes contacts, connectors, conductors in consumer electronics, EV batteries,
        and industrial equipment.
      source_id: usgs_mcs_2025_silver
    - application: coins_and_medals
      share_pct: 12
      notes: "USGS MCS 2025 domestic use estimate 2024: 'coins and medals, 12%'."
      source_id: usgs_mcs_2025_silver
    - application: photovoltaics
      share_pct: 12
      notes: |
        USGS MCS 2025 domestic use estimate 2024: "photovoltaics (PV), 12%." Silver
        paste is used as a conductive contact on crystalline silicon solar cells. Global
        industrial silver consumption increase of ~9% in 2024 was partly attributed to
        rising electric vehicle output and solar panel deployment.
      source_id: usgs_mcs_2025_silver
    - application: jewelry_and_silverware
      share_pct: 6
      notes: |
        USGS MCS 2025 domestic use estimate 2024: "jewelry and silverware, 6%."
        Global consumption in this category was estimated to have increased by 4%
        (jewelry) and 7% (silverware) in 2024 per Silver Institute data.
      source_id: usgs_mcs_2025_silver
    - application: brazing_and_soldering
      share_pct: 4
      notes: "USGS MCS 2025 domestic use estimate 2024: 'brazing and solder, 4%'."
      source_id: usgs_mcs_2025_silver
    - application: other_industrial_and_photography
      share_pct: 7
      notes: |
        USGS MCS 2025 domestic use estimate 2024: "other industrial uses and
        photography, 7%." Includes antimicrobial applications (bandages, clothing,
        pharmaceuticals, plastics), batteries, bearings, catalytic converters,
        electroplating, inks, mirrors, water purification, wood treatment,
        ethylene oxide catalyst processing, and dental amalgam.
      source_id: usgs_mcs_2025_silver
  completeness: complete

