geopolitical_events:
  - date: "2023-08"
    event: "Lucky Friday Mine (Idaho) fire"
    impact: |
      Lucky Friday Mine shut down following a fire in August 2023; resumed production
      in January 2024, contributing to the ~6% increase in US mine output in 2024.
    source_id: usgs_mcs_2025_silver
  - date: "2024-01"
    event: "Lucky Friday Mine (Idaho) resumes production after 2023 fire"
    impact: "Return to full production in January 2024 supported US silver output recovery."
    source_id: usgs_mcs_2025_silver
  - date: "2024-01"
    event: "Rochester Mine (Nevada) expansion ramp-up"
    impact: |
      Rochester Mine began ramping up an expansion project in 2024, contributing to
      the increase in US mine production to 1,100 metric tons (estimated).
    source_id: usgs_mcs_2025_silver
  - date: "2024-01-22"
    event: "Silver price hits 2024 low of $22.00/troy oz"
    impact: "USGS MCS 2025 notes price declined to $22.00 per troy ounce on January 22, 2024."
    source_id: usgs_mcs_2025_silver
  - date: "2024-10-22"
    event: "Silver price reaches 2024 high of $34.60/troy oz"
    impact: |
      Price reached $34.60 per troy ounce on October 22, 2024, the high for the first
      10 months of the year, driven by investment demand and supply deficits. Global
      consumption of silver exceeded supply, cited as a reason for price increases.
    source_id: usgs_mcs_2025_silver
  - date: "2024-01"
    event: "Global silver supply deficit persists; industrial demand up 9%"
    impact: |
      In 2024 global silver consumption was an estimated 37,000 metric tons, slightly
      above 2023. Industrial uses grew ~9% year-on-year, driven by growth in consumer
      electronics demand and rising electric vehicle output. Coin and bar investment
      fell 13%; jewelry and silverware rose 4-7%. Overall supply-demand deficit
      supported the 18% average price increase to $27.70/troy oz.
    source_id: silver_institute_world_survey_2024

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Silver is not on the 2025 US Critical Minerals List, the EU CRM 2023 list, or the
    EU Strategic Raw Materials list. It is a tier-4 high-volume commodity with geographically
    diversified supply. US net import reliance on silver was 64% in 2024 (imports minus
    exports as share of apparent consumption), but supply security is maintained through
    broad global production and substantial secondary recovery from scrap (~19% of US
    apparent consumption in 2024).

narrative: |
  Silver occupies a unique commercial position as both an industrial metal and a
  monetary/investment commodity. In 2024, world mine production was approximately
  25,000 metric tons of silver content, with Mexico (25%) firmly leading global output,
  followed by China (13%) and Peru (12%). The US produced 1,100 metric tons from 35
  operations across 12 states, with Alaska and Idaho as the leading states; US refinery
  output reached 2,400 metric tons including both primary (from ores) and secondary
  (from scrap) streams. Silver is overwhelmingly a byproduct metal: the USGS chapter
  notes that silver is "primarily obtained as a byproduct from lead-zinc, copper, and
  gold mines, in descending order of silver production," with polymetallic ore deposits
  accounting for more than two-thirds of world silver resources.

  Industrial demand drove the 2024 price rally, with the average bullion price rising
  18% to $27.70 per troy ounce versus $23.54 in 2023, reaching a 10-month high of
  $34.60 in October. Global industrial silver consumption grew ~9%, led by photovoltaics
  and electronics (including EVs), while physical investment bars and coin demand fell 13%.
  In the US, electrical/electronics (29%) and photovoltaics (12%) together account for
  41% of domestic use, reflecting silver's critical role in the energy transition. Physical
  investment bars (30%) and coins/medals (12%) make the US market unusually investment-
  heavy compared with the global average. Global silver consumption of ~37,000 metric tons
  exceeded supply in 2024, with the resulting deficit supporting higher prices.

  Secondary recovery provides a meaningful supply buffer: in 2024, approximately 1,200
  metric tons of silver was recovered from US scrap, accounting for ~19% of apparent US
  consumption. World reserves stand at 640,000 metric tons (silver content), concentrated
  in Peru (22%), Australia (15%), and Russia (14%). Silver is not on any current critical
  minerals list due to its broad geographic distribution and established scrap recovery
  infrastructure, though its concentrated use in fast-growing solar PV applications warrants
  monitoring.

