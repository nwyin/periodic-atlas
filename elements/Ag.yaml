symbol: Ag
atomic_number: 47
name: silver
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports silver on a silver-content basis in metric tons.
  The salient statistics note: "One metric ton (1,000 kilograms) = 32,150.7
  troy ounces." The bullion price is quoted in U.S. dollars per troy ounce
  (Engelhard industrial bullion quotations via S&P Global Platts Metals Week).
  Mine output includes silver content of base-metal ores and concentrates,
  ash and residues, refined bullion, and dore; it excludes coinage and waste
  and scrap material. US refinery output is split into primary (from domestic
  and foreign ores/concentrates) and secondary (from new and old scrap).

