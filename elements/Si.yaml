symbol: Si
atomic_number: 14
name: silicon
category: metalloid
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports silicon quantities on a silicon-content basis in
  thousand metric tons. Silicon has two distinct commercial streams: ferrosilicon
  (an iron-silicon alloy, typically 50–90% Si by weight, used in steel and
  foundry) and silicon metal (>98.5% Si, used in aluminum alloys, silicones,
  and polysilicon). Both are smelted from quartzite (silica) in electric arc
  furnaces with carbon reducing agents (coal, coke, wood chips). Silicon metal
  may be further refined to polysilicon — semiconductor-grade (>99.9999%) or
  solar-grade (>99.999%) — via the Siemens process or fluidized-bed reactors.
  All production quantities below are reported as silicon content (not gross
  alloy or product weight). US domestic production is withheld (W) in USGS
  tables to avoid disclosing proprietary company data; world totals therefore
  exclude the United States.

