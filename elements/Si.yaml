    impact: |
      Major expansion of US domestic semiconductor manufacturing creates
      growing demand for ultra-high-purity polysilicon. As of October 2024,
      almost all CHIPS Act direct funding ($34B of $39B) has been committed
      across 20 companies.
    source_id: usgs_mcs_2025_silicon
