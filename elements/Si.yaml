reserves:
  notes: |
    USGS MCS 2025: "World and domestic resources for making silicon metal
    and alloys are abundant and, in most producing countries, adequate to
    supply world requirements for many decades. The source of the silicon is
    silica in various natural forms, such as quartzite." No numeric world
    reserves or resources figures are published — silica (SiO2) constitutes
    approximately 28% of the Earth's crust by weight, making silicon the
    second most abundant element. Depletion is not a supply constraint for
    silicon; energy cost and processing capacity are the binding limits.

byproduct_of: []
feedstock_origins:
  - substrate: quartzite_silica
    typical_concentration_pct: 97
    notes: |
      Primary feedstock for both ferrosilicon and silicon metal production.
      High-purity quartzite (97%+ SiO2) is required for silicon metal;
      lower purity quartzite is acceptable for ferrosilicon. USGS: "The
      source of the silicon is silica in various natural forms, such as
      quartzite." US ferrosilicon is "sourced primarily from domestic
      quartzite (silica)."
    source_id: usgs_mcs_2025_silicon
  - substrate: coal_and_coke
    notes: |
      Carbon reducing agents (coal, coke, wood chips, charcoal) react with
      SiO2 at ~1500–2000°C in electric arc furnaces to produce silicon.
      Energy intensity is high: approximately 11–14 MWh per tonne of
      silicon metal. Electricity cost is therefore a primary location driver.
    source_id: usgs_mcs_2025_silicon

substitutes:
  - application: ferrosilicon_steel_and_foundry
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Aluminum, silicon carbide, and
      silicomanganese can be substituted for ferrosilicon in some applications."
      These alternatives are partial substitutes only — aluminum cannot match
      silicon's deoxidation efficiency in all steelmaking contexts.
    source_id: usgs_mcs_2025_silicon
  - application: semiconductor_and_infrared
    availability: partial
    notes: |
      USGS MCS 2025: "Gallium arsenide and germanium are the principal
      substitutes for silicon in semiconductor and infrared applications."
      GaAs and Ge offer superior electron mobility and direct bandgap for
      optoelectronics and high-frequency devices, but cost 100–1000x more
      than silicon per wafer. Silicon remains dominant in logic, memory,
      and solar photovoltaics with no economically viable substitute at scale.
    source_id: usgs_mcs_2025_silicon

end_uses:
  uses:
    - application: steel_deoxidation_and_alloying
      share_pct: 35
      confidence: medium
      notes: |
        Ferrosilicon primary use: added to steel during refining to remove
        dissolved oxygen (deoxidation) and to impart silicon content for
        electrical steels, spring steels, and cast iron. USGS: "Most
        ferrosilicon was consumed in the ferrous foundry and steel industries."
        Share estimated from USGS qualitative description and industry context;
        exact global percentage not stated in USGS MCS 2025.
      source_id: usgs_mcs_2025_silicon
    - application: aluminum_alloys
      share_pct: 25
      confidence: medium
      notes: |
        Silicon metal primary use: alloying addition to aluminum (typically
        5–20% Si) for automotive castings, die castings, and wrought alloys.
        Ferrosilicon is also used in some aluminum alloying. USGS: "The main
        consumers of silicon metal were producers of aluminum alloys."
        Share estimated from USGS qualitative description.
      source_id: usgs_mcs_2025_silicon
    - application: silicones_and_chemicals
      share_pct: 20
      confidence: medium
      notes: |
        Silicon metal is the feedstock for silicone polymers (polysiloxanes)
        used in sealants, lubricants, medical devices, personal care products,
        and industrial fluids. USGS: "the chemical industry, in particular for
        the manufacture of silicones" is a main consumer of silicon metal.
        Share estimated from USGS qualitative description.
      source_id: usgs_mcs_2025_silicon
    - application: polysilicon_solar_and_semiconductors
      share_pct: 15
      confidence: medium
      notes: |
        Silicon metal is refined into polysilicon for photovoltaic cells
        (solar-grade, ~99.999% Si) and integrated circuits (semiconductor-grade,
        ~99.9999999% Si via Siemens process). USGS: "Silicon metal may be
        further processed into ultra-high-purity semiconductor- or solar-grades,
        commonly referred to as polysilicon. Four companies produced polysilicon
        in the United States." Share estimated; solar PV is the fastest-growing
        demand segment.
      source_id: usgs_mcs_2025_silicon
    - application: other_metallurgical_uses
      share_pct: 5
      confidence: medium
      notes: |
        Includes ferrosilicon in copper and other nonferrous alloy production,
        silicon in welding electrode coatings, and other industrial uses not
        separately enumerated in USGS MCS 2025.
      source_id: usgs_mcs_2025_silicon
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_annex_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_annex_2024
  notes: |
    Silicon metal is listed as a Strategic Raw Material in the EU Critical Raw
    Materials Act (CRMA) owing to its importance in semiconductor chips,
    electronics, and solar power generation. Silicon is also on the EU Critical
    Raw Materials list (Annex II of CRMA). Not on the US Critical Minerals
    List (2022 revision). Canada added silicon metal to its critical minerals
    list in 2024 per USGS chapter text.

