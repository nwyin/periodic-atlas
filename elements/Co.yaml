feedstock_origins:
  - substrate: copper_cobalt_stratiform_deposits
    notes: |
      USGS MCS 2025: "The vast majority of global resources are in
      sediment-hosted stratiform copper deposits in Congo (Kinshasa) and
      Zambia."
    source_id: usgs_mcs_2025_cobalt
  - substrate: nickel_laterite_ores
    notes: "Australia, Cuba, Indonesia, and nearby island countries — per USGS chapter."
    source_id: usgs_mcs_2025_cobalt

substitutes:
  - availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "The cobalt contents of
      lithium-ion batteries, the leading global use for cobalt, are being
      reduced; cobalt-free substitutes that use iron and phosphorus held
      significant market share in China in 2023, but Government and
      industry stock changes no longer included." LFP battery adoption is
      the most important demand-side dynamic. Other USGS-listed substitutes:
      barium/strontium ferrites for magnets, copper-iron-manganese for
      unsaturated polyester resins, nickel/ceramic/cermet tools for
      cemented carbides, nickel in petroleum catalysts, rhodium in
      hydroformylation catalysts.
    source_id: usgs_mcs_2025_cobalt

