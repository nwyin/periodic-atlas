narrative: |
  Cobalt is the canonical example of a material where mining geography
  (DRC 76%) is decoupled from refining geography (China leading, with
  processing concentration that USGS acknowledges qualitatively but does
  not quantify in MCS 2025). Chinese firms own the majority of DRC mine
  stakes and the refining stage, so the February 2025 DRC export ban
  addresses the wrong chokepoint. LFP battery adoption is the most
  important demand-side dynamic — USGS explicitly notes that cobalt-free
  iron-phosphate chemistries already hold significant market share in
  China. 2024 was a record-high production year for both mine and
  refinery output, driving prices down and idling the US Idaho operation.

