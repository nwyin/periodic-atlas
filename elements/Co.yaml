narrative: |
  Cobalt is the canonical example of a material where the mining geography
  (DRC dominance) is decoupled from the refining geography (Chinese
  dominance). Chinese firms control both the DRC mine ownership and the
  processing stage, so even the February 2025 DRC export ban did not shift
  the chokepoint materially. LFP battery chemistry is the most important
  demand-side dynamic: every percentage point of LFP market share erodes
  cobalt's structural demand floor.

