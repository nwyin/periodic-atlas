    impact: |
      USGS MCS 2025 Government Stockpile table lists NdPr oxide and NdFeB magnet blocks
      as potential FY2024–2025 acquisitions alongside samarium-cobalt alloy, cerium (550 t
      FY2024), and lanthanum (1,300 t FY2024, 1,100 t FY2025). The explicit naming of NdPr
      oxide in US stockpile targeting signals official recognition of Pr as a strategically
      critical material for defense magnet supply chains, distinct from the broader REE
      basket policy.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "Global REE mine production increased to 390,000 t REO, driven by growth in China, Nigeria, and Thailand; Burma declined 28%"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from 376,000 t
      in 2023. China rose from 255,000 to 270,000 t; Nigeria from 7,200 to 13,000 t;
      Thailand from 3,600 to 13,000 t. Burma fell from 43,000 to 31,000 t. For Pr
      specifically, the Nigerian and Thai production growth is less directly relevant as
      these are heavy-REE-focused deposits; the Chinese and US increases are the primary
      Pr-supply events.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US net import reliance for REE compounds and metals declined to 80% in 2024e, reflecting domestic compound production growth at Mountain Pass"
    impact: |
      US domestic compound and metal production reached 1,300 t reported (7,600 t total
      including California and Utah production not in reported totals, per USGS footnote 3)
      in 2024, up from 250 t reported (1,920 t total) in 2023. This includes praseodymium
      and neodymium compounds specifically named in USGS footnote 3. Import reliance fell
      to 80% from >95% in 2020–2023. Despite improvement, China remains the dominant
      source (70% of US imports 2020–23 average).
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "REE reserves revised for Russia, South Africa, United States, and Vietnam based on company and government reports"
    impact: |
      USGS MCS 2025 notes reserve revisions for four countries, affecting the global REO
      reserve base used to derive Pr reserve estimates. The direction and magnitude of each
      revision are not stated in the chapter text. US reserves remain 1,900,000 t REO.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Praseodymium's commercial identity is almost entirely fused with neodymium. The two
  elements are chemically similar and are routinely sold as a blended NdPr oxide because
  separation into pure Pr and Nd streams requires additional solvent-extraction steps
  that add cost without proportional value in the dominant magnet application. NdPr
  permanent magnets — the core input for EV traction motors, offshore wind turbines,
  defense actuators, and industrial drives — account for an estimated 80–85% of Pr
  demand. Pr's remaining uses include ceramic yellow-green pigmentation, minor
  metallurgical alloying, and trace use in FCC catalysts.

  Global REE mine production reached 390,000 tonnes REO in 2024, up from 376,000 t in
  2023, driven by growth in China (270,000 t), Nigeria (13,000 t), and Thailand
  (13,000 t), partially offset by Burma's decline (31,000 t from 43,000 t in 2023).
  Applying Pr's typical basket share of ~4.5% yields an estimated 2024 Pr production of
  ~17,550 tonnes Pr₆O₁₁ equivalent — a figure not directly reported by USGS but
  derivable from aggregate REO totals. China's share of ~69% of world REE mine output,
  combined with its ~90% control of separation and refining capacity, means China
  effectively sets the supply conditions for NdPr oxide available to global magnet
  manufacturers. Non-Chinese supply is primarily routed through Lynas's Mt. Weld /
  LAMP chain (Australia/Malaysia) and the early-stage Mountain Pass separation
  operations (California).

  The US government's FY2024–2025 potential stockpile acquisitions — explicitly naming
  neodymium-praseodymium oxide alongside NdFeB magnet blocks — mark a policy shift
  that treats Pr as a named strategic material rather than a passive component of the
  REE basket. US net import reliance fell to 80% in 2024 from over 95% in prior years,
  reflecting Mountain Pass concentrate output and the start of domestic NdPr compound
  production (7,600 t total in 2024 vs. 1,920 t in 2023 per USGS). Nevertheless, China
  continues to supply 70% of US REE compound and metal imports, and the path to supply
  chain resilience for Pr runs through building non-Chinese separation and magnet
  manufacturing capacity — not simply expanding mine output in North America.

