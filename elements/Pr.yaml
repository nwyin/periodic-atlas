byproduct_of: []

feedstock_origins:
  - substrate: bastnaesite_ore
    typical_concentration_pct: 4.5
    notes: |
      Bastnaesite (fluorocarbonate mineral, CeFCO₃) is the primary commercial source of
      light rare earth elements including Pr. Mountain Pass (MP Materials, California)
      and Bayan Obo (China, Inner Mongolia) are the world's largest bastnaesite deposits.
      Pr₆O₁₁ typically represents ~4.5–5.5% of total REOs in commercial bastnaesite
      concentrates. USGS MCS 2025 confirms bastnaesite was mined as a primary product at
      Mountain Pass in 2024.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 4.0
    notes: |
      Monazite (phosphate mineral, (Ce,La,Pr,Nd)PO₄) is stockpiled as a separated
      concentrate or recovered as an accessory mineral in heavy-mineral-sand concentrates.
      USGS MCS 2025 confirms monazite was stockpiled in the southeastern United States in
      2024. Pr typically represents ~4–5% of total REOs in monazite. Thorium content in
      monazite complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 2.5
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma, Thailand) are enriched in heavy rare earths (Tb, Dy, Ho, Er)
      and contain lower Pr proportions (~2–3% of total REOs) than bastnaesite. These
      deposits account for most world heavy REE supply and for the production in Thailand
      and Burma reported by USGS MCS 2025.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For permanent magnet applications, ferrite (iron oxide) magnets
      can substitute in low-performance uses but have significantly lower energy density
      than NdPr-Fe-B magnets. Within the NdFeB alloy, Pr can partially substitute for
      Nd at up to ~25% Pr (by NdPr mass) without significant performance loss, meaning
      Pr and Nd are partially interchangeable within the magnet application itself. For
      glass and ceramics coloring, other colorants can substitute for Pr-derived yellow-
      green hues. No large-scale substitute exists for NdPr magnets in EV traction motors
      or wind turbine generators where high coercivity and energy density are required.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: magnets_ndfeb_permanent
      share_pct: 83
      confidence: low
      notes: |
        Praseodymium is co-processed with neodymium as NdPr oxide and alloy for NdFeB
        permanent magnet production — the dominant end use. Applications include EV
        traction motors, wind turbine generators, industrial motors, hard disk drives,
        and defense systems. USGS MCS 2025 notes "significant amounts of rare earths are
        imported as permanent magnets embedded in finished goods." Government FY2024–2025
        potential stockpile acquisitions specifically list neodymium-praseodymium oxide
        and NdFeB magnet blocks. Share is an industry consensus estimate; USGS does not
        report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: ceramics_and_glass
      share_pct: 8
      confidence: low
      notes: |
        Pr₆O₁₁ imparts a characteristic yellow-green color to ceramics and glass. Used
        in ceramic tile glazes, artist pigments, and specialty optical glass. USGS MCS
        2025 lists "ceramics and glass" as an end use for REEs overall. Share is an
        estimate for Pr specifically.
      source_id: usgs_mcs_2025_rare_earths
    - application: metallurgical_additives
      share_pct: 5
      confidence: low
      notes: |
        Pr is used in mischmetal (mixed rare earth metal alloy) and as a minor additive
        in high-strength low-alloy steels. USGS MCS 2025 lists "metallurgical applications
        and alloys" as an end use. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: catalysts_and_polishing
      share_pct: 4
      confidence: low
      notes: |
        Minor Pr contribution to fluid catalytic cracking (FCC) catalysts (dominated by
        La and Ce in the REE basket) and polishing compounds. USGS MCS 2025 lists
        "catalysts" as the leading domestic end use for REEs overall and "polishing" as
        an additional use. Pr share in these applications is small relative to Ce and La.
        Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Praseodymium is classified as critical under the US 2022 Critical Minerals List (as
    part of "rare earth elements"), the EU Critical Raw Materials Regulation 2024/1252
    (light and heavy rare earths), and the EU Critical Raw Materials Act 2024 strategic
    materials list. Net import reliance for REE compounds and metals was 80% in 2024e
    (down from >95% in 2020–2023) and 100% for mineral concentrates historically. US
    government potential stockpile acquisitions for FY2024–2025 specifically include
    neodymium-praseodymium oxide and NdFeB magnet blocks, underscoring Pr's strategic
    designation. Import sources 2020–23: China 70%, Malaysia 13%, Japan 6%, Estonia 5%.

