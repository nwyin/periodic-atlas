      - country: MY
        share_pct: 7
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate producing separated NdPr oxide and other REE
          products. LAMP is the world's largest non-Chinese rare earth separation facility.
          USGS cites Malaysia as 13% of US REE compound and metal import sources (2020–23).
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
