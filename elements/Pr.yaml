symbol: Pr
atomic_number: 59
name: praseodymium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent. Praseodymium is
  commercially traded as Pr₆O₁₁ (praseodymium oxide) or as mixed
  neodymium-praseodymium (NdPr) oxide, which is the dominant commercial form for
  permanent magnet applications. All production figures in this file are derived by
  multiplying the USGS-reported aggregate REO totals by Pr's typical share of the
  REE basket (~4.5%), which is not reported directly by USGS. The basket share varies
  by deposit type: bastnaesite and carbonatite deposits (Mountain Pass CA, Mt. Weld
  AU, Bayan Obo CN) yield ~4.5–5.5% Pr₆O₁₁; ion adsorption clay deposits (SE Asia,
  southern China) are heavy-REE enriched and yield lower Pr percentages (~2–3%). All
  data are in metric tons REO equivalent unless otherwise noted. Prices for Pr are not
  reported separately in USGS MCS 2025 (only Nd oxide price is given); Pr typically
  trades at a small discount to Nd as part of the NdPr basket price.

