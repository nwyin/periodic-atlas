narrative: |
  Protactinium is a real chemical element but not a commercial commodity. The authoritative
  IUPAC review notes that primordial Pa has long since disappeared from Earth and that the
  only terrestrial source is ongoing radioactive decay of heavier elements, principally in
  uranium ores, where Pa-231 and Pa-234 occur in equilibrium proportions. In practice that
  means protactinium exists as a trace radiochemical separation problem, not as a mined or
  refined supply chain [iupac_pa_review_2000; iupac_iptei_pa].

  Modern work is research-driven and isotope-specific. ORNL's 2024 Analytical Chemistry
  paper describes separating Pa-230 from proton-irradiated Th-232 targets as part of a
  medical-isotope workflow for harvesting ingrown U-230. That is the relevant commercial
  reality for 2025: protactinium appears in specialist nuclear laboratories as an intermediate
  or research radionuclide, with no published reserves, no quoted market price, and no
  country-level mine or refining statistics [ornl_pa230_sep_2024].

