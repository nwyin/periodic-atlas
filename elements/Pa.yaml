research_only:
  longest_lived_isotope: Pa-231
  half_life_seconds: 1025580000000
  discovered_year: 1918
  iupac_recognized_year: 1949
  discovered_at: |
    Otto Hahn and Lise Meitner identified the long-lived isotope Pa-231 in 1918 in Berlin;
    Frederick Soddy and John Cranston independently identified it in Britain the same year
    [iupac_pa_review_2000].
  production_mode: decay_product
  active_production_labs:
    - Oak Ridge National Laboratory
  notes: |
    IUPAC's isotopic review describes Pa-231 as the dominant terrestrial isotope with a
    half-life of 3.25(1) x 10^4 years, produced naturally in uranium decay series rather
    than preserved as a primordial nuclide [iupac_pa_review_2000; iupac_iptei_pa]. NNDC's
    current ENSDF index maintains an adopted-levels dataset for ^231Pa, consistent with its
    status as the reference isotope for the element [nndc_ensdf_pa231]. Contemporary
    production is still laboratory-scale: ORNL reported rapid isolation of no-carrier-added
    Pa-230 from proton-irradiated Th-232 metal targets for targeted-alpha-therapy research,
    showing that active handling remains confined to isotope R&D rather than any commercial
    element market [ornl_pa230_sep_2024].

