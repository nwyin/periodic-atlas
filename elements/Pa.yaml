symbol: Pa
atomic_number: 91
name: protactinium
category: actinide
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade exists for protactinium. In terrestrial materials, Pa is present only
  in trace radiogenic equilibrium with uranium-series parents, so chemists obtain it by
  radiochemical separation from uranium-bearing feed rather than mining a protactinium ore
  or selling a standard metal/oxide product [iupac_pa_review_2000; iupac_iptei_pa]. Modern
  laboratory work instead handles no-carrier-added isotopes such as Pa-230 separated from
  proton-irradiated thorium targets; these are research fractions, not commercial trade forms
  [ornl_pa230_sep_2024].

