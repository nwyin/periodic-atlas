reserves:
  resources:
    value: 5000000000
    unit: tonnes
    form: unspecified
    approximate: true
    confidence: low
    notes: |
      USGS MCS 2025 p.173: "Resources of elemental sulfur in evaporite and
      volcanic deposits, and sulfur associated with natural gas, petroleum,
      tar sands, and metal sulfides, total about 5 billion tons." Additionally,
      "The sulfur in gypsum and anhydrite is almost limitless, and 600 billion
      tons of sulfur is contained in coal, oil shale, and shale that is rich
      in organic matter." The domestic US sulfur resource is about one-fifth
      of the world total. 5 billion metric tons assumed (USGS MCS 2025
      production data are in metric tons; interpreted accordingly).
    source_id: usgs_mcs_2025_sulfur
  notes: |
    USGS MCS 2025: "Reserves of sulfur in crude oil, natural gas, and sulfide
    ores are large. Because most sulfur production is a result of the processing
    of fossil fuels, supplies are expected to be adequate for the foreseeable
    future." No quantitative economic reserves are provided by country; USGS
    notes that sulfur production may not be in the country to which the reserves
    were attributed (e.g., Saudi Arabian oil may be refined in the United States).
    Government stockpile: none.

byproduct_of: []

feedstock_origins:
  - substrate: petroleum_crude_oil
    notes: |
      The largest source of recovered elemental sulfur in the United States.
      Sulfur is removed from crude oil during hydrodesulfurization (HDS) at
      petroleum refineries via the Claus process, recovering H₂S from refinery
      gas streams and converting it to elemental sulfur. USGS MCS 2025: US
      elemental sulfur from petroleum refineries led domestic production in
      2024. Refinery sulfur production expected to remain about the same as
      refining utilization stays high.
    source_id: usgs_mcs_2025_sulfur
  - substrate: natural_gas
    notes: |
      Natural-gas-processing plants are the second-largest domestic source of
      recovered elemental sulfur. Sulfur is removed from sour natural gas
      (containing H₂S) via sweetening/amine treatment, followed by Claus
      recovery. USGS MCS 2025: natural-gas-processing was the second source
      of US elemental sulfur by tonnage in 2024.
    source_id: usgs_mcs_2025_sulfur
  - substrate: metallurgical_coke_coal
    notes: |
      Coking plants (coal carbonization for steel industry) recover elemental
      sulfur from coking gas. USGS MCS 2025: coking plants ranked third in
      US elemental sulfur production by tonnage in 2024.
    source_id: usgs_mcs_2025_sulfur
  - substrate: metal_sulfide_ore
    notes: |
      Five nonferrous-metal smelters in four US States produce byproduct
      sulfuric acid (four companies, 2024). Smelting of copper, zinc, lead,
      and other metal sulfide concentrates generates SO₂ in flue gases, which
      is captured as sulfuric acid. This stream accounts for ~8% of US
      sulfur production in all forms. USGS MCS 2025: byproduct sulfuric acid
      "expected to remain relatively constant, unless one or more of the
      remaining nonferrous-metal smelters close."
    source_id: usgs_mcs_2025_sulfur

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Substitutes for sulfur at present
      or anticipated price levels are not satisfactory; some acids, in certain
      applications, may be substituted for sulfuric acid, but usually at a
      higher cost." No viable commercial substitute exists for the primary
      application of sulfur in phosphate fertilizer manufacturing.
    source_id: usgs_mcs_2025_sulfur

end_uses:
  uses:
    - application: sulfuric_acid_production
      share_pct: 90
      notes: |
        USGS MCS 2025 domestic production section: "About 90% of sulfur
        consumed was in the form of sulfuric acid." Sulfuric acid is the
        intermediary for nearly all sulfur end uses; the largest downstream
        application is phosphate fertilizer production (wet-process phosphoric
        acid). The events section notes domestic phosphate rock consumption
        in 2024 was about the same as 2023, and that new sulfur demand from
        phosphate fertilizer projects is expected mostly in Africa and west Asia.
      source_id: usgs_mcs_2025_sulfur
    - application: other_industrial_uses
      share_pct: 10
      confidence: medium
      notes: |
        Residual 10% from USGS MCS 2025 (derived: 100% minus 90% sulfuric
        acid). Includes elemental sulfur used in rubber vulcanization,
        agricultural fungicides and pesticides, pharmaceuticals, pigments,
        explosives, and paper/pulp production.
      source_id: usgs_mcs_2025_sulfur
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Sulfur is not on the US Critical Minerals List, EU CRM List, or EU
    Strategic Raw Materials list. It is a high-volume byproduct of fossil
    fuel processing and nonferrous metal smelting, with supplies expected to
    be adequate for the foreseeable future per USGS MCS 2025. Net import
    reliance for the US was 7% in 2024, with Canada supplying 70% of total
    imports.

