geopolitical_events:
  - date: 2024-01
    event: "US total sulfur production and shipments in 2024 estimated 5% below 2023 levels; elemental sulfur from petroleum refineries and natural gas operations down 6%"
    impact: |
      Modest domestic supply decline; refinery sulfur production expected to
      remain stable going forward as refining utilization stays high. Byproduct
      sulfuric acid expected to remain relatively constant absent smelter closures.
    source_id: usgs_mcs_2025_sulfur
  - date: 2024-01
    event: "Contract sulfur prices in Tampa, FL began 2024 at $69/long ton, rising to $81/long ton in early March, declining to $76/long ton in early July, then surging to $116/long ton in Q4 2024"
    impact: |
      High intra-year price volatility reflects sulfur demand volatility, which
      USGS attributes to fluctuating demand from the phosphate fertilizer sector.
      Annual average unit value (FOB mine/plant) was $50.00/metric ton.
    source_id: usgs_mcs_2025_sulfur
  - date: 2024-01
    event: "World sulfur production 2024 estimated at 85 million tons, down slightly from 85.8 million tons in 2023"
    impact: "Minor global supply contraction; structural oversupply from fossil fuel processing continues to limit price upside."
    source_id: usgs_mcs_2025_sulfur
  - date: 2025-01
    event: "Middle East sulfur production expected to increase starting 2025 due to refinery upgrades and new refining projects"
    impact: |
      Saudi Arabia, UAE, Qatar, and Kuwait already account for ~21% of world
      sulfur production. Expansion of Middle Eastern refining capacity will
      add further byproduct sulfur to global supply, potentially weighing on
      prices unless phosphate fertilizer demand grows commensurately.
    source_id: usgs_mcs_2025_sulfur
  - date: 2024-01
    event: "Growth in high-pressure acid leach (HPAL) nickel projects for battery materials expected to increase sulfur demand"
    impact: |
      HPAL processing of nickel laterite ore consumes large quantities of
      sulfuric acid. Expanding battery-grade nickel supply chains (driven by
      EV demand) represent a new and growing demand lever for sulfur, partially
      offsetting demand softness in other sectors.
    source_id: usgs_mcs_2025_sulfur

narrative: |
  Sulfur is the world's highest-volume byproduct commodity: almost all
  commercial supply (85 Mt/yr globally in 2024) is recovered involuntarily
  during oil refining, natural gas sweetening, coking, and metal smelting,
  rather than intentionally mined. This structural reality makes sulfur
  unique among high-volume industrial elements — supply is tethered to fossil
  fuel processing rates, not to sulfur demand, and no economically viable
  alternative source exists. USGS reports no quantitative economic reserves
  by country; the concept of sulfur "reserves" is subsumed by oil, gas, and
  metal sulfide ore reserves. World resources in elemental form total
  approximately 5 billion metric tons (evaporite, volcanic, petroleum, gas,
  tar sands, and metal sulfides), with far larger amounts in gypsum, anhydrite,
  coal, and organic shale where extraction is currently uneconomic.

  About 90% of all sulfur consumed is converted to sulfuric acid, and the
  single largest downstream use is phosphate fertilizer production — the link
  that connects fossil fuel infrastructure to global food supply. China
  dominates world production at 22%, with Russia, Saudi Arabia, UAE,
  Kazakhstan, and Canada each supplying 6–9%. The United States is modestly
  import-reliant (7% net import reliance in 2024), sourcing ~70% of its
  imported sulfur from Canada. US production fell 5% in 2024 to 8.2 Mt,
  driven by a 6% decline at petroleum refineries and natural gas plants.
  Price volatility is a structural feature: the 5-year range spans $24.90/t
  (2020) to $177.80/t (2022), with swings driven by phosphate fertilizer
  demand cycles rather than supply constraints. In 2024, average unit value
  was $50/t while Tampa contract prices swung from $69 to $116/long ton
  within a single year.

  Looking forward, two opposing forces shape sulfur's supply-demand balance.
  On the supply side, Middle Eastern refinery expansions will add byproduct
  sulfur from 2025 onward, and the long-run energy transition gradually reduces
  fossil fuel throughput — implying eventual structural tightening of recovered
  sulfur supply. On the demand side, high-pressure acid leach (HPAL) nickel
  processing for battery materials is a growing new sulfur consumer, and
  phosphate fertilizer demand in Africa and west Asia is expanding. The
  substitutes picture is stark: USGS notes "substitutes for sulfur at present
  or anticipated price levels are not satisfactory," particularly for
  fertilizer applications.

