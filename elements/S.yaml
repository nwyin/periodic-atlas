symbol: S
atomic_number: 16
name: sulfur
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports sulfur in "thousand metric tons, sulfur content, unless
  otherwise specified." This covers recovered elemental sulfur (from petroleum
  refineries, natural-gas-processing plants, and coking plants) and byproduct
  sulfuric acid (from nonferrous-metal smelters), both expressed as sulfur-
  equivalent content. The world production table is "Production, all forms."
  US average unit value is "free on board, mine and (or) plant, dollars per
  metric ton of elemental sulfur." Contract prices in Tampa, FL are quoted
  per long ton (1 long ton ≈ 1.016 metric tons). All production quantities
  are converted to million_tonnes_per_year (1,000 thousand metric tons = 1 Mt).

