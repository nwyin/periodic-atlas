geopolitical_events:
  - date: "2024-01"
    event: "South African PGM output fell amid low prices, deep-level mining costs, labor disputes, and electricity disruptions"
    impact: |
      USGS reports lower 2024 South African PGM mined-material production than in 2023. Because
      South Africa is the dominant rhodium source, the same mine, power, and labor constraints
      tightened availability for rhodium as well as for the larger platinum and palladium markets.
    source_id: usgs_mcs_2025_pgm
  - date: "2024-01"
    event: "Russian PGM output declined because of natural disasters, lower ore grades and recovery, war-related disruption, and metallurgical outages"
    impact: |
      USGS cites Russia as a major source of PGM disruption in 2024. For rhodium this mattered
      disproportionately because non-South-African supply is small, so disruption in Russian PGM
      output reduces one of the few alternative sources available to refiners and catalyst users.
    source_id: usgs_mcs_2025_pgm
  - date: "2024"
    event: "Chinese fiberglass destocking and softer spot demand reset rhodium pricing to a lower range"
    impact: |
      Implats says rhodium pricing rebased after soft Chinese fabricator demand and fibreglass
      manufacturer destocking, with New York Dealer Trades moving from a $4,000 per ounce trough
      to a brief $5,500 squeeze before closing around $4,650 per ounce.
    source_id: implats_annual_report_2024

byproduct_of:
  - Pt
  - Ni

feedstock_origins:
  - substrate: pgm_reef_ore_bushveld
    notes: |
      The main rhodium feedstock is South African Bushveld reef ore, especially UG2 and Merensky
      PGM concentrates where rhodium is recovered during precious-metals refining as a minor
      byproduct alongside platinum and palladium.
    source_id: usgs_mcs_2025_pgm
  - substrate: nickel_copper_pgm_sulfide_ore
    notes: |
      Russian and North American rhodium originates largely from nickel-copper-PGM sulfide ores.
      USGS notes minor U.S. byproduct recovery from copper-nickel mining in Michigan and major
      Russian PGM output from integrated nickel operations.
    source_id: usgs_mcs_2025_pgm

substitutes:
  - application: autocatalysts
    availability: partial
    notes: |
      USGS states that for some industrial end uses one PGM can substitute for another with losses
      in efficiency. In autocatalysts, palladium and platinum can reduce rhodium loading through
      reformulation and thrifting, but rhodium remains the most effective PGM for NOx reduction in
      gasoline three-way catalyst systems.
    source_id: usgs_mcs_2025_pgm
  - application: other_industrial
    availability: partial
    notes: |
      USGS states that one PGM can substitute for another in some industrial end uses with losses
      in efficiency. Platinum or iridium can replace rhodium in selected glass and chemical-service
      hardware, but usually with tradeoffs in corrosion resistance, catalytic selectivity, or cost.
    source_id: usgs_mcs_2025_pgm

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_critical_minerals_2022
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  notes: |
    Rhodium is covered by the U.S. critical-minerals designation for platinum-group metals and by
    the EU's critical raw materials designation for PGMs. Supply is structurally concentrated in
    South African Bushveld production, with Russian sulfide operations providing one of the only
    meaningful alternative sources.

narrative: |
  Rhodium is a tiny-volume, very high-value platinum-group metal whose commercial reality is set by
  two facts: it is almost always a byproduct, and most of it comes from South African platinum
  mining. In 2024, world primary rhodium supply was about 717 koz, or roughly 22 tonnes, with more
  than four-fifths attributed to South Africa and only small contributions from Russia, Zimbabwe,
  and North America. That makes rhodium structurally supply-inelastic: operators do not mine for Rh
  directly, so output responds mainly to platinum-group mine plans, smelter performance, and scrap
  recovery rather than rhodium's own price.

  Demand is even more concentrated than supply. Implats' 2024 market table puts about 85% of
  rhodium demand in autocatalysts, where the metal's NOx-reduction performance is difficult to
  replicate at comparable loading. The remaining demand is mostly industrial hardware for glass,
  nitric acid, and specialty chemical service. That concentration explains rhodium's price history:
  when the auto market is tight and fabricators scramble for metal, prices can become extreme; when
  automobile demand softens or Chinese industrial buyers destock, the price can collapse quickly.

  The 2020-2024 price series from USGS shows that reset clearly, from more than $20,000 per troy
  ounce in 2021 to about $4,600 in 2024. Even after that decline, rhodium remains strategically
  important because there are few producing regions, little direct mine flexibility, and limited
  substitutes in its core emissions-control role. For policy purposes it remains on the U.S.
  critical minerals list and within the EU's critical raw materials basket for PGMs.

