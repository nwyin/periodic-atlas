symbol: Rh
atomic_number: 45
name: rhodium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS Mineral Commodity Summaries 2025 reports platinum-group metals as a grouped commodity in
  kilograms of PGM content, with rhodium prices quoted in US dollars per troy ounce. Commercial
  rhodium trades mainly as high-purity metal sponge, powder, or fabricated salts and coatings for
  autocatalyst and glass applications.

production:
- reporting_year: 2024
  mine:
    value: 22300
    unit: kg_per_year
    form: contained_element
    approximate: true
    confidence: medium
    notes: |
      Approximate 2024 world rhodium mine supply derived as a grouped-reporting PGM stream using
      a rhodium basket share of roughly 5% of the full mined PGM basket, cross-checked against
      Implats' 2024 rhodium primary-supply estimate of 717,000 troy ounces (about 22.3 tonnes).
      USGS MCS 2025 does not tabulate rhodium separately by country or world total; it reports
      PGMs collectively and provides palladium and platinum tables plus rhodium import and price
      data. The 22.3-tonne estimate is consistent with sharply lower rhodium prices since 2022
      and with a market still dominated by South African byproduct supply.
    source_id: implats_annual_report_2024
  grouped_reporting: true
  commodity_group: platinum_group_metals
  mining_by_country:
    shares:
      - country: ZA
        share_pct: 82.6
        quantity:
          value: 18400
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: medium
          source_id: implats_annual_report_2024
        confidence: medium
        notes: |
          Implats 2024 rhodium primary supply: South Africa 592 koz out of 717 koz global primary
          supply, converted to about 18.4 tonnes. South African rhodium is recovered chiefly as a
          byproduct of Bushveld Complex platinum mining and remains highly concentrated in UG2 and
          Merensky reef processing circuits.
        source_id: implats_annual_report_2024
      - country: RU
        share_pct: 8.4
        quantity:
          value: 1900
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: medium
          source_id: implats_annual_report_2024
        confidence: medium
        notes: |
          Implats reports 60 koz of 2024 rhodium supply as Russian sales, equivalent to about
          1.9 tonnes. Russian rhodium is co-produced from nickel-copper-PGM sulfide ores at the
          Norilsk-Talnakh complex and sold into the refined market rather than reported by USGS as
          a separate rhodium mine line.
        source_id: implats_annual_report_2024
      - country: ZW
        share_pct: 6.3
        quantity:
          value: 1400
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: medium
          source_id: implats_annual_report_2024
        confidence: medium
        notes: |
          Implats 2024 rhodium primary supply: Zimbabwe 45 koz, equivalent to about 1.4 tonnes.
          Supply comes from Great Dyke PGM operations such as Zimplats, Mimosa, and Unki.
        source_id: implats_annual_report_2024
      - country: ZZ
        share_pct: 2.7
        quantity:
          value: 600
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: low
          source_id: implats_annual_report_2024
        confidence: low
        notes: |
          Residual bucket combining North America (14 koz) and other producers (5 koz) in the
          Implats rhodium market table, equivalent to about 0.6 tonnes total. USGS notes one
          Montana PGM producer and small copper-nickel byproduct recovery in Michigan, but does
          not disaggregate rhodium from those streams.
        source_id: implats_annual_report_2024
    completeness: complete
  refining_by_country:
    shares:
      - country: ZA
        share_pct: 65
        confidence: low
        notes: |
          Estimated dominant rhodium refining location because South Africa supplies more than
          four-fifths of primary rhodium and retains the leading integrated PGM refining base.
          USGS does not publish rhodium refining shares.
        source_id: implats_annual_report_2024
      - country: RU
        share_pct: 10
        confidence: low
        notes: |
          Estimated Russian refining share associated with the country's nickel-copper-PGM output.
          Implats reports this material as Russian sales rather than a separate mine-production line.
        source_id: implats_annual_report_2024
      - country: BE
        share_pct: 10
        confidence: low
        notes: |
          Belgium is included as a low-confidence estimate for secondary rhodium refining in Europe.
          USGS does not publish rhodium-specific refinery output by country.
        source_id: implats_annual_report_2024
      - country: DE
        share_pct: 8
        confidence: low
        notes: |
          Germany is included as a low-confidence estimate for secondary rhodium refining and salt
          fabrication serving European autocatalyst and chemical markets.
        source_id: implats_annual_report_2024
      - country: ZZ
        share_pct: 7
        confidence: low
        notes: |
          Other refining centers include North America and smaller European and Asian PGM
          recyclers. This distribution is inferred because neither USGS nor Implats tabulates a
          rhodium refinery-country table.
        source_id: implats_annual_report_2024
    completeness: top_producers_only

reserves:
  economic_reserves:
    value: 4200
    unit: tonnes
    form: contained_element
    approximate: true
    confidence: low
    notes: |
      Derived estimate. USGS MCS 2025 reports combined world PGM reserves of more than
      81,000 tonnes (81,000,000 kg) rather than per-element reserves. Applying the same roughly
      5% rhodium basket share used for 2024 supply implies indicative rhodium economic reserves of
      about 4,200 tonnes. This is a coarse approximation because rhodium grade varies strongly by
      orebody and USGS publishes only basket reserves.
    source_id: usgs_mcs_2025_pgm
  resources:
    value: 5200
    unit: tonnes
    form: contained_element
    approximate: true
    confidence: low
    notes: |
      Derived from the USGS statement that world PGM resources exceed 100,000 tonnes, with the
      largest concentration in South Africa's Bushveld Complex. Applying an approximate 5% rhodium
      share gives an indicative world rhodium resource base above 5,000 tonnes.
    source_id: usgs_mcs_2025_pgm
  reserves_by_country:
    shares:
      - country: ZA
        share_pct: 77.5
        notes: |
          South Africa holds 63,000 tonnes of the more than 81,000 tonnes of reported world PGM
          reserves. Rhodium-specific tonnage is not published, but South Africa overwhelmingly
          dominates the Bushveld-hosted PGM reserve base from which most rhodium is recovered.
        source_id: usgs_mcs_2025_pgm
      - country: RU
        share_pct: 19.7
        notes: |
          Russia holds 16,000 tonnes of reported PGM reserves using the Russian classification
          system cited by USGS. Rhodium is present in Norilsk sulfide ores as a byproduct metal.
        source_id: usgs_mcs_2025_pgm
      - country: ZW
        share_pct: 1.5
        notes: "Zimbabwe reported 1,200 tonnes of combined PGM reserves in the Great Dyke."
        source_id: usgs_mcs_2025_pgm
      - country: US
        share_pct: 1.0
        notes: "The United States reported 820 tonnes of combined PGM reserves in the Stillwater Complex."
        source_id: usgs_mcs_2025_pgm
      - country: CA
        share_pct: 0.4
        notes: "Canada reported 310 tonnes of combined PGM reserves, mainly associated with nickel-copper-PGM deposits."
        source_id: usgs_mcs_2025_pgm
    completeness: partial
  notes: |
    USGS publishes only combined PGM reserve and resource figures. Rhodium reserve tonnages are
    therefore indicative basket-share derivations rather than reported standalone reserve estimates.

end_uses:
  uses:
    - application: autocatalysts
      share_pct: 85.2
      confidence: medium
      notes: |
        Implats reports 2024 rhodium demand of 918 koz in automotive applications out of total
        demand of 1,077 koz. Rhodium is the key NOx-reduction metal in three-way catalytic
        converters for gasoline and hybrid vehicles and remains the overwhelmingly dominant end use.
      source_id: implats_annual_report_2024
    - application: other_industrial
      share_pct: 14.8
      confidence: medium
      notes: |
        Implats reports 159 koz of 2024 rhodium demand in non-automotive industrial uses. This
        bucket includes glass-fiber and specialty-glass bushings, nitric-acid gauzes, thermocouples,
        electrical contacts, and niche chemical-catalyst applications.
      source_id: implats_annual_report_2024
  completeness: complete

