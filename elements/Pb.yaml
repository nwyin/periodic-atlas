geopolitical_events:
  - date: 2024-01
    event: "US domestic lead mine production of recoverable lead increased 10% from 2023 to 290 kt in 2024e"
    impact: |
      US mine production recovery increased net mine output by ~27 kt, modestly
      reducing import dependence. Nonetheless, net import reliance for refined metal
      remained 28% in 2024e. All US lead concentrate continues to be exported for
      overseas refining; the US has had no primary lead smelter since 2013.
    source_id: usgs_mcs_2025_lead
  - date: 2024-09
    event: "Global LME lead warehouse stocks reached 199,000 tons at end of September 2024, up 49% from yearend 2023"
    impact: |
      Elevated LME warehouse inventories dampened North American lead prices; the
      2024 average price of 110 c/lb was 4% below the 2023 annual average. Higher
      global stocks reflect ILZSG's forecast of global refined production (13.5 Mt)
      exceeding consumption (13.1 Mt) by ~400 kt in 2024.
    source_id: usgs_mcs_2025_lead
  - date: 2024-09
    event: "ILZSG forecasts global refined lead production +2.4% to 13.5 Mt and consumption +0.2% to 13.1 Mt in 2024"
    impact: |
      The global lead market moved into slight surplus in 2024. Increased refined
      production outpaced modest consumption growth, contributing to higher LME
      inventory levels. Source: International Lead and Zinc Study Group press release,
      Lisbon, Portugal, September 30, 2024 (cited as footnote 5 in USGS MCS 2025).
    source_id: usgs_mcs_2025_lead
  - date: 2024-01
    event: "20 million spent SLI lead-acid batteries exported in first 9 months of 2024, up 11% from same period in 2023"
    impact: |
      Growing US exports of spent batteries reflect the shift in secondary lead
      processing to offshore smelters (Mexico, South Korea, Canada). Battery export
      trade flows are a key indicator of secondary supply dynamics; US secondary
      production (1.0 Mt) remained roughly stable even as battery exports grew.
    source_id: usgs_mcs_2025_lead
  - date: 2025-01
    event: "China and Russia lead reserves revised upward in USGS MCS 2025 based on Government reports"
    impact: |
      China reserves revised to 22,000 kt and Russia to 8,900 kt. China's revised
      reserves reinforce its position as the world's second-largest reserve holder
      (after Australia's 35,000 kt). These revisions do not materially change the
      near-term supply outlook given both nations' existing production levels, but
      extend the long-term resource base.
    source_id: usgs_mcs_2025_lead

narrative: |
  Lead is a high-volume industrial metal whose commercial reality is dominated by
  the lead-acid battery supply chain. The lead-acid battery industry absorbed an
  estimated 86% of US lead consumption in 2024, and the metal's economics are
  deeply intertwined with automotive SLI batteries, standby power systems, and
  industrial motive power. The most distinctive feature of the lead market is its
  closed-loop recycling infrastructure: in the United States, secondary production
  (~1.0 Mt in 2024) accounts for 70% of apparent consumption, and globally,
  secondary smelting of recycled batteries contributes an estimated 9.2 Mt of the
  ~13.5 Mt total refined supply — more than double the 4.3 Mt contributed by
  primary mining. This gives lead among the highest secondary-production ratios
  of any major industrial metal.

  China dominates primary mine production at 44% of the 4.3 Mt global 2024 total,
  followed by Australia (10%), the United States (7%), Peru (6%), Russia (5%), and
  India (5%). Australia holds the world's largest identified lead reserves at 35 Mt
  (lead content), with giant Pb-Zn-Ag deposits at Broken Hill, Mount Isa, and
  McArthur River. The United States has not had an operating primary lead refinery
  since 2013; all domestic lead concentrate is exported for overseas smelting, and
  refined metal is reimported mainly from Canada (32%), South Korea (16%), Mexico
  (14%), and Australia (11%). US net import reliance for refined metal was 28% in
  2024e, down from a peak of 38% in 2022. The global refined market moved into
  modest surplus in 2024 per ILZSG forecasts, with LME lead warehouse stocks rising
  49% over the year, pressuring North American prices to 110 c/lb — a 4% decline
  from 2023.

  Lead's long-run demand trajectory faces secular headwinds from environmental and
  health regulation. Lead has been progressively eliminated from cable sheathing
  (replaced by PVC), food-can solder (banned by food safety rules), potable water
  plumbing (replaced by tin alloys), electronics (RoHS-driven shift to SAC alloys),
  CRT displays (rendered obsolete by flat panels), and wheel weights (steel and zinc
  alternatives mandated in many jurisdictions). These substitutions continue to
  erode non-battery uses, concentrating lead demand ever more tightly in the battery
  sector. The trajectory of battery technology — whether competing chemistries such
  as lithium-ion can displace lead-acid in automotive and stationary applications —
  represents the key demand uncertainty for the lead market over the coming decades.

