byproduct_of: []

feedstock_origins:
  - substrate: galena_ore
    notes: |
      Lead is extracted primarily from galena (PbS, lead sulfide), the principal lead
      ore mineral. Galena occurs in three main deposit types: Mississippi Valley-type
      (MVT) carbonate-hosted deposits (Missouri, USA); sediment-hosted massive sulfide
      (SHMS) deposits (McArthur River, Australia); and volcanogenic massive sulfide /
      polymetallic skarn deposits (Broken Hill, Mount Isa, Red Dog). Ore grades at
      producing mines typically range from 1% to 12% Pb; lead is almost always
      co-mined with zinc, silver, or copper. US lead is produced from five dedicated
      lead mines in Missouri and as byproduct at two zinc mines in Alaska and two
      silver mines in Idaho.
    source_id: usgs_mcs_2025_lead
  - substrate: recycled_lead_acid_batteries
    notes: |
      Secondary lead — produced by smelting spent lead-acid batteries (both SLI and
      industrial types) — is the dominant supply stream in mature markets. In the US,
      ~1.0 Mt secondary lead was produced in 2024 from old scrap, principally used
      lead-acid batteries, representing 70% of apparent domestic consumption. The
      closed-loop battery → secondary smelter → new battery cycle achieves >99%
      collection rates for SLI batteries in North America and Europe. Globally,
      secondary production (~9.2 Mt implied) exceeds primary mine output (4.3 Mt)
      by a factor of ~2.1×.
    source_id: usgs_mcs_2025_lead

substitutes:
  - application: cable_covering
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "Substitution by plastics has reduced the use of
      lead in cable covering." Polyvinyl chloride (PVC) and polyethylene have largely
      replaced lead sheathing in telecommunications and power cables; the transition
      is substantially complete in most markets.
    source_id: usgs_mcs_2025_lead
  - application: food_cans
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "Substitution by plastics has reduced the use of
      lead in cans." Lead solder in food-can seams has been eliminated in most
      countries due to food safety regulations; tin-free and aluminum cans replaced
      lead-soldered cans.
    source_id: usgs_mcs_2025_lead
  - application: potable_water_solder
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "Tin has replaced lead in solder for potable water
      systems." Lead-free tin-silver and tin-copper solders mandated in plumbing for
      drinking water in the US (Safe Drinking Water Act amendments, 1986, 2011) and
      EU. The substitution is regulatory-enforced and essentially complete.
    source_id: usgs_mcs_2025_lead
  - application: electronics_soldering
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "The electronics industry has moved toward lead-free
      solders." RoHS Directive (EU, 2003, revised 2011) and similar regulations globally
      mandated transition to tin-silver-copper (SAC) alloy solders in consumer
      electronics. The transition is largely complete for most product categories.
    source_id: usgs_mcs_2025_lead
  - application: crt_shielding
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "flat-panel displays that do not require lead
      shielding." CRT televisions and monitors used lead in glass for X-ray shielding;
      LCD/OLED flat panels eliminated this application. CRT production has effectively
      ceased in consumer markets.
    source_id: usgs_mcs_2025_lead
  - application: wheel_weights
    availability: full
    notes: |
      USGS MCS 2025 substitutes: "Steel and zinc are common substitutes for lead in
      wheel weights." Regulatory bans in several US states and the EU have driven
      widespread adoption of steel and zinc wheel weights, reducing a once-significant
      lead end use.
    source_id: usgs_mcs_2025_lead

end_uses:
  uses:
    - application: lead_acid_batteries
      share_pct: 86
      confidence: high
      notes: |
        USGS MCS 2025: "Lead-acid battery industry accounted for an estimated 86%
        of reported U.S. lead consumption during 2024." End uses within this category:
        starting-lighting-ignition (SLI) batteries for automobiles; industrial
        batteries for standby power (computer and telecommunications network backup);
        motive power batteries for forklifts, golf carts, etc. In the first 9 months
        of 2024, 20 million spent SLI batteries were exported (up 11% from same
        period 2023), reflecting strong US recycling flows to offshore smelters.
      source_id: usgs_mcs_2025_lead
    - application: ammunition_shot_and_weights
      share_pct: 6
      confidence: low
      notes: |
        Ammunition (bullets, shot, primers) and weights are traditional lead end uses.
        Historical USGS data places ammunition at ~4–7% of US consumption. MCS 2025
        does not provide an explicit percentage; share inferred from historical USGS
        lead end-use tables.
      source_id: usgs_mcs_2025_lead
    - application: other_industrial_uses
      share_pct: 8
      confidence: low
      notes: |
        Residual uses include sheet lead and building products, lead oxides for
        glass/ceramics/pigments, cable sheathing in specialty applications, radiation
        shielding, and miscellaneous castings. Historical USGS data places this
        combined category at ~8–10% of US consumption. MCS 2025 does not provide
        explicit percentages for these sub-uses.
      source_id: usgs_mcs_2025_lead
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Lead is not on the US 2022 Critical Minerals List or the EU Critical Raw Materials
    list. It is an abundant commodity with well-diversified global mine production
    (China 44%, Australia 10%, US 7%, Peru 6%, Russia 5%, India 5%), large identified
    reserves (96,000 kt), and extensive secondary production (recycling) that reduces
    primary supply dependence. The principal supply-chain concern for lead is not
    scarcity but ongoing regulatory pressure to eliminate lead from traditional
    applications due to toxicity (neurotoxin), which continues to erode non-battery
    end uses.

