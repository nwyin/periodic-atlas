symbol: Pb
atomic_number: 82
name: lead
category: post_transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports salient statistics "in thousand metric tons, lead content,
  unless otherwise specified." World mine production table values are in thousand
  metric tons of lead content. In this file, quantities are converted from USGS
  thousand metric tons to tonnes (×1,000). Prices are from S&P Global Platts
  Metals Week and are quoted as North American average in cents per pound; stored
  here as USD per pound (÷100). Lead is produced both as primary mine concentrate
  (mined galena/PbS ore) and as secondary refined metal, principally from recycled
  lead-acid batteries. The US has had no primary lead refinery since 2013; nearly
  all domestic lead concentrate is exported.

