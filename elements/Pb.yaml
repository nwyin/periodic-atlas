    notes: |
      ILZSG (as cited in USGS MCS 2025, footnote 5): global refined lead production
      2024 forecast to increase 2.4% to 13.5 million tons. Source: International Lead
      and Zinc Study Group press release, Lisbon, Portugal, September 30, 2024.
      US secondary refinery production (old scrap) 2024e = 1,000 kt per USGS salient
