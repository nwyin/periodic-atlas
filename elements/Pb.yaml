      lead refinery since 2013 (primary refined = zero all years 2020–2024).
    source_id: usgs_mcs_2025_lead
  notes: |
    Global refined lead production (13.5 Mt) substantially exceeds world mine production
    (4.3 Mt) because secondary smelting of recycled lead-acid batteries contributes
    roughly 9.2 Mt globally. In the US, secondary production (1.0 Mt) equals 70% of
    apparent consumption (1.4 Mt). Nearly all secondary lead is recovered from old
    scrap, predominantly spent lead-acid batteries. ILZSG also forecast global refined
    lead consumption of 13.1 Mt in 2024, implying a small global surplus of ~0.4 Mt.

