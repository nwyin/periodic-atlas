symbol: Cr
atomic_number: 24
name: chromium
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports chromium salient statistics "in thousand metric tons, chromium
  content, unless otherwise specified." The world mine production table is explicitly
  labeled "(gross weight)" — values in thousand metric tons of shipping-grade chromite ore,
  with mine and reserve figures normalized to 45% Cr₂O₃ for most countries (US normalized
  to 7% Cr₂O₃; Finland normalized to 26% Cr₂O₃). In this file, mine production quantities
  are converted to million_tonnes_per_year (1 kt = 0.001 Mt); reserve quantities are in
  tonnes (1 kt = 1,000 t). Chromite ore prices are in US dollars per metric ton gross
  weight; ferrochromium prices are in US dollars per pound of chromium content; chromium
  metal prices are in US dollars per pound gross weight. All prices from Argus Media Group,
  Argus Non-Ferrous Markets (USGS MCS 2025 footnote 5).

