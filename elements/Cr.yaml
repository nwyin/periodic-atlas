geopolitical_events:
  - date: 2024-01
    event: "South Africa chromite production increased an estimated 7% in 2024 vs 2023, driven by higher average chromite ore prices"
    impact: |
      South Africa strengthened its position as the world's leading chromite producer
      (~44.7% of world output in 2024), contributing to a ~4% global production increase.
      Structural risks remain: deep-level mining complexity, higher labor costs, Transnet
      rail transportation reliability, and electricity grid instability (load-shedding)
      continue to affect supply predictability from the world's most critical chromite source.
    source_id: usgs_mcs_2025_chromium
  - date: 2024-01
    event: "China ferrochromium and stainless steel production affected by oversupply, weakened consumer demand, and escalating trade tensions"
    impact: |
      As the leading ferrochromium-producing, stainless-steel-producing, and chromium-consuming
      country, China's market conditions set the global floor for chromium demand. Ferrochromium
      prices fell from $2.55/lb in 2023 to $1.80/lb in 2024 (−29%), reflecting Chinese
      overcapacity and weak end-market demand, even as upstream chromite ore prices rose.
    source_id: usgs_mcs_2025_chromium
  - date: 2025-01
    event: "Kazakhstan chromite reserves revised upward based on a Government report, reflected in USGS MCS 2025"
    impact: |
      Kazakhstan's published reserves increased to 320,000 kt shipping-grade chromite ore.
      Kazakhstan is both a major chromite producer (6,500 kt in 2024e) and a major
      ferrochromium smelter; it supplied 11% of total US chromium imports and 14% of
      US primary metal imports over 2020–23.
    source_id: usgs_mcs_2025_chromium

narrative: |
  Chromium is an indispensable transition metal with no viable substitute in its two
  dominant strategic applications — stainless steel and superalloys. The global chromite
  ore market is highly geographically concentrated: South Africa alone produced 44.7% of
  the estimated 47 million metric ton world output in 2024, followed by Turkey (17%) and
  Kazakhstan (14%). The United States has had no domestic chromite mine production since
  the 1960s and depends almost entirely on imports (net import reliance: 77% in 2024),
  sourcing 96% of its chromite ore from South Africa and 11% of total chromium imports
  from Kazakhstan. World reserves exceed 1.2 billion metric tons of shipping-grade
  chromite ore, overwhelmingly concentrated in Zimbabwe (540 Mt), Kazakhstan (320 Mt),
  and South Africa (200 Mt) — together 88% of world reserves — providing centuries of
  supply at current production rates.

  China dominates the demand side: as the world's leading ferrochromium producer, stainless
  steel producer, and chromium consumer, China's industrial cycle sets the global price tone
  for downstream chromium products. In 2024, Chinese stainless steel was pressured by
  domestic overcapacity, weakening consumer demand, and escalating trade tensions, driving
  ferrochromium prices down 29% to $1.80/lb — even as upstream chromite ore prices rose
  6% to $340/metric ton. This inverted price move reflects margin compression at the
  ferrochromium smelting step. The value of US chromium material consumption reached $900
  million in 2024 (up 6% from 2023), suggesting stable or growing volumes despite falling
  metal prices. Recycled chromium from stainless-steel scrap provided 23% of US apparent
  consumption, partially offsetting import dependence.

  The supply concentration and import reliance that define the chromium supply chain have
  earned it formal critical-mineral designation in both the US (2022 Critical Minerals List)
  and the EU (EU Critical Raw Materials Act, Regulation (EU) 2024/1252). South Africa's
  Bushveld Igneous Complex is the single most important chromite source globally; operational
  risks there — deep-level mining, rail logistics, and electricity reliability — represent
  the primary near-term supply-side vulnerability. Kazakhstan's reserve upgrade in 2025
  modestly improved the long-term supply picture for the second-largest producing country.

