byproduct_of: []

feedstock_origins:
  - substrate: chromite_ore
    notes: |
      Chromite ore (FeCr₂O₄, iron chromium oxide spinel) is the sole commercial ore
      mineral of chromium. It is mined by open-cast and underground methods in South Africa,
      Turkey, Kazakhstan, India, Finland, Brazil, and Zimbabwe. Processing involves crushing,
      beneficiation (gravity or magnetic separation), and then either pyrometallurgical
      smelting to ferrochromium or chemical processing to chromic acid / chromium chemicals.
      High-grade direct-shipping ore (DSO, ≥45% Cr₂O₃) is used directly; lower-grade ores
      require pelletizing or sintering. The United States imported chromite ore from South
      Africa (96%) and Turkey (3%) during 2020–23, consumed by one domestic chemical company.
    source_id: usgs_mcs_2025_chromium

substitutes:
  - application: stainless_steel
    availability: none
    notes: |
      USGS MCS 2025 substitutes paragraph: "Chromium has no substitute in stainless steel,
      the leading end use, or in superalloys, the major strategic end use." Chromium content
      of ≥10.5% by mass is what makes stainless steel stainless — it forms a self-healing
      passive oxide layer (Cr₂O₃). No other alloying element replicates this at commercially
      viable cost. Chromium content in stainless steels typically ranges from 10.5% to 30%.
    source_id: usgs_mcs_2025_chromium
  - application: superalloys
    availability: none
    notes: |
      USGS MCS 2025: No substitute for chromium in superalloys (described as "the major
      strategic end use"). Chromium provides oxidation resistance and hot-corrosion resistance
      in nickel- and cobalt-base superalloys used in jet engine turbine sections and industrial
      gas turbines. Aerospace and defense applications depend on chromium-bearing superalloys.
    source_id: usgs_mcs_2025_chromium
  - application: ferrochromium_metallurgical_uses
    availability: partial
    notes: |
      USGS MCS 2025: "Chromium-containing scrap can substitute for ferrochromium in some
      metallurgical uses." In 2024, recycled chromium from stainless-steel scrap receipts
      accounted for 23% of US apparent consumption, providing a partial domestic offset to
      imported ferrochromium. Scrap availability is constrained by the existing stainless
      steel stock in circulation.
    source_id: usgs_mcs_2025_chromium

end_uses:
  uses:
    - application: stainless_and_heat_resisting_steel
      share_pct: 70
      confidence: low
      notes: |
        USGS MCS 2025: "Stainless-steel and heat-resisting-steel producers were the leading
        consumers of ferrochromium." The 2025 chapter does not provide an explicit end-use
        percentage breakdown. The ~70% share for stainless and heat-resisting steel is
        consistent with historical USGS chromium end-use data and ICDA industry figures.
        Ferrochromium grades for stainless steel range from high-carbon (4–9% C) to
        low-carbon (<0.5% C) depending on the steel grade.
      source_id: usgs_mcs_2025_chromium
    - application: alloy_steels
      share_pct: 19
      confidence: low
      notes: |
        Alloy steels (tool steels, structural steels, ball-bearing steels, and other
        engineering steels) require chromium for hardenability, wear resistance, and
        corrosion resistance. Share based on historical USGS chromium end-use data;
        not explicitly stated in the MCS 2025 chapter.
      source_id: usgs_mcs_2025_chromium
    - application: superalloys_and_nonferrous_alloys
      share_pct: 5
      confidence: low
      notes: |
        USGS MCS 2025 substitutes section identifies superalloys as "the major strategic
        end use" of chromium. Nickel- and cobalt-base superalloys for jet engines, gas
        turbines, and aerospace components require chromium for high-temperature oxidation
        and corrosion resistance. Share based on historical USGS chromium data; not
        explicitly stated in MCS 2025.
      source_id: usgs_mcs_2025_chromium
    - application: chromium_chemicals
      share_pct: 3
      confidence: low
      notes: |
        USGS MCS 2025: "Imported chromite ore was consumed by one chemical company to
        produce chromium chemicals." Chemical uses include chromium oxide green (Cr₂O₃)
        pigments, chromic acid for metal finishing and surface treatment, leather tanning
        agents, and catalysts. Share based on historical USGS data; not explicitly stated.
      source_id: usgs_mcs_2025_chromium
    - application: refractories
      share_pct: 3
      confidence: low
      notes: |
        Chrome-magnesite refractories (MgO-Cr₂O₃) are used in electric arc furnace linings,
        cement kilns, and nonferrous smelting furnaces. Share based on historical USGS data;
        not explicitly stated in the MCS 2025 chapter. Regulatory pressure on hexavalent
        chromium (Cr⁶⁺) formation in used refractories has constrained some applications
        in developed markets.
      source_id: usgs_mcs_2025_chromium
  completeness: partial

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_chromium
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_chromium
  eu_strategic_list_as_of_2024: false
  notes: |
    Chromium is on the US 2022 Final Critical Minerals List (Federal Register, February 2022).
    Net import reliance was 77% in 2024 per USGS salient statistics; the United States has
    had no active chromite mine production since the 1960s. Chromium is on the EU Critical
    Raw Materials list (Annex II of Regulation (EU) 2024/1252, EU Critical Raw Materials Act),
    reflecting supply concentration risk and economic importance for stainless steel and
    superalloy production. Chromium is NOT on the EU Strategic Raw Materials list (Annex I
    of EU CRMA), which focuses on materials for green/digital transitions.

