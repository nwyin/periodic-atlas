symbol: Mc
atomic_number: 115
name: moscovium
category: synthetic_superheavy
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade. Moscovium is produced atom-by-atom in heavy-ion fusion
  experiments, so reported quantities are decay events and isotope half-lives
  rather than any mass, assay, or market-delivery convention.

research_only:
  longest_lived_isotope: Mc-290
  half_life_seconds: 0.65
  discovered_year: 2003
  iupac_recognized_year: 2015
  discovered_at: |
    Joint Institute for Nuclear Research (JINR), Dubna, Russia, at the U-400
    accelerator complex of the G. N. Flerov Laboratory of Nuclear Reactions.
    The discovery was credited by IUPAC to the JINR-Lawrence Livermore
    National Laboratory-Oak Ridge National Laboratory collaboration.
  production_mode: accelerator_generated
  active_production_labs:
    - JINR Dubna Superheavy Element Factory
  notes: |
    Moscovium remains a laboratory research nuclide rather than a commodity.
    JINR reported in 2021 that a three-week SHE Factory campaign on the
    48Ca + 243Am reaction recorded more than thirty decay events from Mc-288
    and Mc-289, roughly doubling the accumulated statistics from the
    2003-2012 U-400 campaigns.

feedstock_origins:
  - substrate: americium_243_target
    notes: |
      Synthesis uses accelerated calcium-48 ions on americium-243 actinide
      targets.
    source_id: jinr_naming_2016

end_uses:
  uses: []
  completeness: complete

narrative: |
  Moscovium has no commercial supply chain. It exists only as a research-only
  superheavy element synthesized in accelerator experiments, with discovery
  experiments at JINR Dubna and IUPAC recognition of the JINR-LLNL-ORNL
  collaboration in 2015. The accepted name "moscovium" and symbol "Mc" were
  formally approved by IUPAC in 2016.

  The practical production route is fusion of calcium-48 beams with
  americium-243 targets at Dubna. NNDC's ENSDF dataset identifies Mc-290 as
  the longest-lived moscovium isotope currently established in the evaluated
  data, with a half-life of about 0.65 s. JINR's SHE Factory program was still
  actively generating new Mc decay statistics in 2021, underscoring that the
  element's "market" is pure nuclear-physics experimentation.

