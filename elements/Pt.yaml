narrative: |
  Platinum is the flagship element of the platinum-group metals and one of the world's
  rarest commercially traded industrial metals. With 2024e world mine production of
  170,000 kg (~170 tonnes), it is produced in quantities roughly 20 times smaller than
  gold by weight, yet commands comparable geopolitical scrutiny. Its industrial importance
  rests on three pillars: automotive catalysis (the leading end use), chemical process
  catalysis (nitric acid production, petroleum reforming), and jewelry. Supply is
  extraordinarily concentrated: the Bushveld Igneous Complex in South Africa accounts
  for ~71% of world mine production, with Zimbabwe's Great Dyke (a BIC-related structure)
  adding another ~11%. No other deposit type or geography approaches this concentration
  level. Combined, two countries — South Africa and Zimbabwe — control roughly 82% of
  world platinum mine supply from what is geologically a single magmatic province.

  The 2024 price environment (~$950/troy oz) reflects two intersecting pressures. First,
  palladium substituted into platinum's traditional gasoline-engine catalytic converter
  market over the preceding decade when palladium traded at a discount; this reduced
  platinum's largest end-use share. Second, weak automotive production growth in major
  markets and post-COVID normalization of PGM demand created surplus conditions, driving
  prices down across the basket (rhodium -31%, palladium -27% in 2024). The depressed
  pricing contributed directly to mine curtailments: South Africa reduced output by ~4%,
  Russia by ~14%, and the US's Stillwater Complex placed one operation on care-and-
  maintenance. The US is approximately 85% net import reliant for platinum, sourcing
  primarily from South Africa (45%), Belgium (12%), and Germany (10%) — the latter two
  largely re-processing southern African and Russian metal.

  Looking forward, platinum's potential role in green hydrogen infrastructure (PEM
  electrolyzers and fuel cells) is frequently cited as a demand growth catalyst. PEM
  electrolysis requires platinum-group catalysts with no current commercial-scale PGM
  substitute. Secondary supply — autocatalyst recycling — provides approximately 8,500
  kg/year from US sources alone (roughly 12% of US apparent consumption), growing as
  the legacy vehicle fleet ages. Despite this, the structural supply concentration in
  the Bushveld Complex and the associated political and infrastructure risks in South
  Africa ensure platinum remains among the highest-supply-risk commodities in the US
  and EU critical minerals frameworks.

