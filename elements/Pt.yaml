symbol: Pt
atomic_number: 78
name: platinum
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports platinum-group metals (PGMs) as a single grouped commodity
  chapter covering all six elements: platinum, palladium, iridium, osmium, rhodium,
  and ruthenium. Production data are expressed in kilograms of PGM content. Mine
  production is reported separately for platinum and palladium by country; iridium,
  osmium, rhodium, and ruthenium production are not disaggregated by country. Prices
  are quoted in US dollars per troy ounce (Engelhard unfabricated metal average annual
  price; source: S&P Global Platts Metals Week). One troy ounce = 31.1035 g; one
  metric ton = 32,150.7 troy ounces per the USGS chapter note. Platinum is traded
  commercially as refined metal sponge or ingot (≥99.95% Pt), PGM concentrates (as
  mined at source), and platinum salts/compounds for catalytic applications. Platinum
  is the second-most-produced PGM by weight: 2024e world total of 170,000 kg Pt vs.
  190,000 kg Pd; together they represent ~94% of the two primary PGMs. Platinum's
  basket share of combined Pt+Pd production is approximately 47% (170,000 / 360,000
  kg 2024e). All production figures in this file are in kg PGM content unless otherwise
  noted.

production:
- reporting_year: 2024
  mine:
    value: 170000
    unit: kg_per_year
    form: contained_element
    approximate: true
    confidence: high
    notes: |
      USGS MCS 2025 world mine production 2024e: 170,000 kg Pt (rounded), down from
      179,000 kg in 2023 (~5% decline). Platinum is the second-largest PGM by production
      weight after palladium (190,000 kg world 2024e); combined Pt+Pd accounts for
      approximately 94% of the two primary PGMs. Platinum's basket share of Pt+Pd combined
      is ~47% (170,000 / 360,000 kg). Iridium, osmium, rhodium, and ruthenium world mine
      production is not disaggregated in this USGS chapter; from US import data, Rh
      (15,000 kg US imports), Ru (10,000 kg), and Ir (1,400 kg) are substantially smaller
      markets. Platinum is the primary commercial product from the Bushveld Igneous Complex
      in South Africa, which accounts for ~71% of world platinum mine output.
    source_id: usgs_mcs_2025_pgm
  grouped_reporting: true
  commodity_group: platinum_group_metals
  mining_by_country:
    shares:
      - country: ZA
        share_pct: 70.6
        quantity:
          value: 120000
          unit: kg_per_year
          form: contained_element
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          South Africa 2024e: 120,000 kg Pt, down from 125,000 kg in 2023. South Africa
          is overwhelmingly the world's dominant platinum producer; the Bushveld Igneous
          Complex (BIC) hosts the largest known PGM resource, mined from the Merensky
          Reef and UG2 Reef. Production declined owing to declining PGM prices, higher
          costs of deep-level mining, labor disputes, and ongoing electricity supply
          disruptions. Primary producers: Anglo American Platinum (Amplats), Impala Platinum
          (Implats), Sibanye Stillwater (SA operations), Northam Platinum.
        source_id: usgs_mcs_2025_pgm
      - country: ZW
        share_pct: 11.2
        quantity:
          value: 19000
          unit: kg_per_year
          form: contained_element
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Zimbabwe 2024e: 19,000 kg Pt, essentially flat vs. 19,200 kg in 2023. Zimbabwe's
          Great Dyke complex contains substantial PGM resources. Primary producer: Zimplats
          (majority-owned by Impala Platinum). Zimbabwe is the second-largest platinum
          producer globally after South Africa.
        source_id: usgs_mcs_2025_pgm
      - country: RU
        share_pct: 10.6
        quantity:
          value: 18000
          unit: kg_per_year
          form: contained_element
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Russia 2024e: 18,000 kg Pt, down from 21,000 kg in 2023 (~14% decline). Russian
          PGM production is dominated by Nornickel (Norilsk Nickel), where Pt and Pd are
          recovered as co-products of nickel-copper sulfide mining at the Norilsk-Talnakh
          deposit in Siberia and Kola Peninsula. Production declined owing to disruptions
          from natural disasters, lower metal grades and ore recovery, ongoing issues related
          to the Russia-Ukraine conflict, and planned outages at a major metallurgical plant.
          Russia is the world's largest palladium producer but only the third-largest
          platinum producer.
        source_id: usgs_mcs_2025_pgm
      - country: CA
        share_pct: 3.1
        quantity:
          value: 5200
          unit: kg_per_year
          form: contained_element
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Canada 2024e: 5,200 kg Pt (stable vs. 5,170 kg in 2023). Canadian platinum
          is primarily recovered as a co-product of nickel-copper mining in Sudbury,
          Ontario (Vale, Glencore) and from other Ni-Cu sulfide deposits.
        source_id: usgs_mcs_2025_pgm
      - country: US
        share_pct: 1.2
        quantity:
          value: 2000
          unit: kg_per_year
          form: contained_element
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          United States 2024e: 2,000 kg Pt, down from 3,040 kg in 2023 (~34% decline).
          Virtually all US platinum mine production comes from one company in Montana
          (Sibanye Stillwater's Stillwater Complex, one of the few significant primary
          PGM deposits outside southern Africa). The company placed one of its operations
          on care-and-maintenance status in 2024 and reduced employment from ~1,450 to
          ~900 workers owing to high operating costs and declining PGM prices. Small
          byproduct quantities are also recovered from copper-nickel mining in Michigan
          and sold abroad for refining. The 2024 total estimated value of US PGM mine
          output was ~$310 million, down 42% from $541 million in 2023.
        source_id: usgs_mcs_2025_pgm
      - country: ZZ
        share_pct: 2.7
        quantity:
          value: 4600
          unit: kg_per_year
          form: contained_element
          confidence: medium
          source_id: usgs_mcs_2025_pgm
        notes: |
          Other countries 2024e: 4,600 kg Pt (down from 5,710 kg in 2023). Includes
          small production from Colombia, Ethiopia, and other minor sources. USGS MCS
          2025 production table does not separately identify these countries.
        source_id: usgs_mcs_2025_pgm
    completeness: complete

