  notes: |
    Reserve figures are total PGM content (all six elements combined) as reported by
    USGS MCS 2025. Per-element breakdowns are not publicly available. Russia's reserve
    figure uses Russian Classification A+B+C1+C2 (USGS footnote) and is not comparable
    to JORC/SEC standards. The world total of >81,000,000 kg is a floor value; listed
    country totals (81,330,000 kg) sum slightly above the floor owing to rounding.
    "Other countries: NA" in the original USGS table — no other countries reported.

end_uses:
  uses:
    - application: autocatalysts
      share_pct: 40
      confidence: low
      notes: |
        USGS MCS 2025 identifies catalytic converters for automobile emission control as
        "the leading domestic use of platinum." Platinum dominates diesel catalytic
        converters (heavy-duty trucks, buses, diesel passenger cars). Palladium has
        substituted for platinum in most gasoline-engine converters owing to historically
        lower palladium prices, but platinum retains significant share in diesel
        after-treatment. Global platinum autocatalyst demand estimated at approximately
        40% of total consumption; not explicitly quantified in percentage terms by USGS.
      source_id: usgs_mcs_2025_pgm
    - application: jewelry
      share_pct: 28
      confidence: low
      notes: |
        USGS MCS 2025 lists jewelry as a named platinum end use. Platinum jewelry is
        particularly significant in Japan, China, and Europe where platinum wedding
        bands and luxury items are common. Estimated at approximately 28% of total
        platinum demand; not explicitly quantified by USGS.
      source_id: usgs_mcs_2025_pgm
    - application: chemical_and_industrial_catalysts
      share_pct: 17
      confidence: low
      notes: |
        USGS MCS 2025 lists "catalysts for the production of bulk chemicals and petroleum
        refining" as a major platinum end use. Includes platinum gauze catalysts for nitric
        acid synthesis (ammonia oxidation), silicone polymer curing, petroleum reforming
        (platforming), and fuel cell electrocatalysts. Estimated at approximately 17% of
        total platinum demand; not explicitly quantified by USGS.
      source_id: usgs_mcs_2025_pgm
    - application: investment
      share_pct: 8
      confidence: low
      notes: |
        USGS MCS 2025 lists investment as a named platinum end use. Includes platinum
        bullion coins, bars, and exchange-traded fund (ETF) holdings. Estimated at
        approximately 8% of total platinum demand.
      source_id: usgs_mcs_2025_pgm
    - application: other_industrial
      share_pct: 7
      confidence: low
      notes: |
        USGS MCS 2025 lists dental and medical devices, electronic applications (computer
        hard disks, hybridized integrated circuits, multilayer ceramic capacitors), glass
        manufacturing (platinum-rhodium alloy bushings for fiberglass and glass fiber
        production), and laboratory equipment as further platinum end uses. Combined
        estimated at approximately 7% of total platinum demand.
      source_id: usgs_mcs_2025_pgm
  completeness: complete

byproduct_of: []

feedstock_origins:
  - substrate: bushveld_pgm_ore
    typical_concentration_pct: null
    notes: |
      South Africa's Bushveld Igneous Complex (BIC) is the world's largest primary PGM
      source (~71% of world Pt supply). Platinum is the primary-value PGM recovered from
      Merensky Reef (typically 4–6 g/t combined 4E PGM including Au) and UG2 Reef (higher
      chromite content, Cr co-product). Pt is the dominant product; Pd, Rh, Ru, Ir, Os,
      and Au are co-products. Concentration is in g/t (parts per million) — sub-ppm mass
      fractions not expressed as percentage.
    source_id: usgs_mcs_2025_pgm
  - substrate: nickel_copper_sulfide_ore
    typical_concentration_pct: null
    notes: |
      In Russia (Norilsk-Talnakh Ni-Cu sulfide deposit; ~11% of world Pt) and Canada
      (Sudbury basin; ~3%), platinum and palladium are recovered as economically significant
      co-products of primary nickel and copper mining. Nickel is the primary-value metal;
      PGMs are recovered during Ni-Cu smelting and refining. This distinguishes the
      Russian/Canadian supply stream from the South African primary-Pt stream.
    source_id: usgs_mcs_2025_pgm

substitutes:
  - application: autocatalysts
    availability: partial
    notes: |
      USGS MCS 2025: "Palladium has been used as a substitute for platinum in most
      gasoline-engine catalytic converters because of the historically lower price for
      palladium relative to that of platinum. About 25% of palladium can routinely be
      substituted for platinum in diesel catalytic converters; the proportion can be as
      much as 50% in some applications."
    source_id: usgs_mcs_2025_pgm
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025: "For some industrial end uses, one PGM can substitute for another,
      but with losses in efficiency." Non-PGM substitutes for platinum are limited in
      high-temperature catalysis and jewelry; in proton-exchange membrane (PEM) fuel
      cells and electrolyzers, reducing or replacing Pt loading is an active research
      area but no commercial non-Pt catalyst has yet achieved comparable performance
      and durability at scale.
    source_id: usgs_mcs_2025_pgm

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_pgm
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Platinum-group metals are on the US 2022 Final List of Critical Minerals (Federal
    Register Vol. 87, No. 37; reaffirmed through 2025). The US is approximately 85%
    net import reliant for platinum in 2024e (USGS MCS 2025 salient statistics; 71,000 kg
    apparent consumption vs. 2,000 kg domestic mine production). Primary import sources
    2020–23: South Africa 45%, Belgium 12%, Germany 10%, Italy 9%, other 24%. Under EU
    Regulation 2024/1252 (Critical Raw Materials Act, CRMA), platinum-group metals are
    listed as both Critical Raw Materials (Annex I) and Strategic Raw Materials (Annex II).
    Criticality is driven by extreme geographic concentration of primary production (South
    Africa ~71% + Zimbabwe ~11% both sourcing from a single geological feature — the
    Bushveld Igneous Complex or its Great Dyke extension) and high Western import reliance.

geopolitical_events:
  - date: "2024"
    event: "Sibanye Stillwater places one Stillwater Complex mine on care-and-maintenance; US platinum output falls 34% YoY"
    impact: |
      USGS MCS 2025 reports the sole significant US PGM producer placed one of its
      Montana operations on care-and-maintenance status in 2024, citing high operating
      costs and declining PGM prices. US platinum mine production fell from 3,040 kg
      (2023) to 2,000 kg (2024e), a 34% decline. Employment at the mine fell from
      ~1,450 to ~900 workers. Total estimated value of US PGM mine output was ~$310
      million in 2024, down 42% from $541 million in 2023. The Stillwater Complex is
      the only significant primary PGM deposit in the Western Hemisphere outside South
      America; its curtailment further concentrates US import reliance.
    source_id: usgs_mcs_2025_pgm
  - date: "2024"
    event: "South Africa PGM production declines; deep-level mining costs, labor disputes, and electricity disruptions reduce output"
    impact: |
      South Africa, the world's leading platinum producer, saw mine output decline from
      125,000 kg (2023) to 120,000 kg (2024e), approximately a 4% decline. USGS MCS
      2025 attributes this to declining PGM prices, higher costs associated with deep-level
      mining, labor disputes, and ongoing electricity supply disruptions (Eskom load-shedding
      context). South Africa holds ~71% of world platinum production; any sustained output
      reduction materially tightens global supply balances.
    source_id: usgs_mcs_2025_pgm
  - date: "2024"
    event: "Russia PGM production declines; Ukraine conflict disruptions, natural disasters, and plant outages reduce Nornickel output"
    impact: |
      Russian platinum production fell from 21,000 kg (2023) to 18,000 kg (2024e),
      a ~14% decline. USGS MCS 2025 attributes this to disruptions from natural disasters,
      lower metal grades and ore recovery, ongoing issues related to the Russia-Ukraine
      conflict, and planned outages at a major metallurgical plant. Russia is the world's
      largest palladium producer and the third-largest platinum producer; its PGM exports
      to Western markets have faced geopolitical scrutiny and sanctions-related logistics
      complications since 2022.
    source_id: usgs_mcs_2025_pgm
  - date: "2024"
    event: "Platinum price remains below $1,000/troy oz amid PGM basket-wide price deflation"
    impact: |
      USGS MCS 2025 salient statistics: estimated 2024 average platinum price ~$950/troy
      oz, slightly down from $973 in 2023 and well below the 2021 high of $1,094/troy oz.
      Rhodium fell 31% in 2024, palladium -27%; price declines attributed to decreased
      demand, investor uncertainty, and oversupply. The depressed price environment
      contributed directly to mine curtailments in South Africa and the US, creating a
      self-reinforcing cycle of supply reduction.
    source_id: usgs_mcs_2025_pgm

