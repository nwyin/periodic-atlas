      USGS MCS 2025 world total PGM reserves: >81,000,000 kg (floor value). Reserves
      are reported as total PGM content — not disaggregated by individual element.
      World PGM resources are estimated at more than 100,000,000 kg per the same
      chapter. The world's largest PGM reserves and resources are concentrated in the
      Bushveld Igneous Complex, South Africa.
