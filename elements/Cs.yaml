symbol: Cs
atomic_number: 55
name: cesium
category: alkali_metal
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  Commercial cesium is sold mainly as specialty chemicals derived from pollucite
  rather than as elemental metal. USGS MCS 2026 reports data in metric tons of
  cesium oxide unless otherwise specified and notes that the leading products
  consumed globally are cesium carbonate and cesium hydroxide, followed by
  cesium formate, cesium iodide, cesium nitrate, and cesium chloride. The same
  source notes that cesium metal is not traded in commercial quantities, while
  publicly quoted prices are retail list prices for small laboratory packages
  such as 1-gram metal ampoules or 25-gram salt lots.

production:
  - reporting_year: 2025
    stream: cesium_formate_brine_replacement
    refined:
      value: 550
      unit: tonnes_per_year
      form: compound_other
      approximate: true
      confidence: medium
      notes: |
        USGS MCS 2026 states that an estimated 11,000 tons of cesium formate
        were in use worldwide and that 5% were depleted and replaced per year.
        This implies an annual replacement flow of about 550 metric tons per
        year of cesium formate brine. It is the clearest recent quantified
        commercial flow in the primary source, but it does not represent all
        cesium chemicals.
      source_id: usgs_mcs_2026_cesium
    mining_by_country:
      shares: []
      completeness: partial
    refining_by_country:
      shares: []
      completeness: partial
    notes: |
      USGS says there are no official sources for cesium production data. The
      2026 chapter identifies intermittent cesium production and processing from
      mined ore and stockpiles at Canada's Tanco Mine during 2025 and restarted
      recovery from tailings at Zimbabwe's Bikita Mine for shipment to China,
      but it does not publish tonnages or country shares for either stream.

reserves:
  economic_reserves:
    value: 70000000
    unit: kg
    form: contained_element
    approximate: true
    notes: |
      USGS's 2004 cesium commodity profile estimated the world reserve base of
      contained cesium at 70 million kilograms, with more than two-thirds at
      Bernic Lake in Manitoba. The report's country table listed Canada with
      70 million kilograms of contained cesium reserves and no quantified
      reserve entries for other countries.
    source_id: usgs_cesium_profile_2004
  resources:
    value: 110000000
    unit: kg
    form: contained_element
    approximate: true
    notes: |
      USGS's 2004 cesium commodity profile reported a 110 million kilogram
      world cesium reserve base. The same table listed reserve-base entries of
      73 million kilograms for Canada, 23 million kilograms for Zimbabwe, and
      9 million kilograms for Namibia. This older "reserve base" concept is
      mapped here to `resources` because later USGS MCS editions no longer
      publish a contained-cesium resource total.
    source_id: usgs_cesium_profile_2004
  reserves_by_country:
    shares:
      - country: CA
        share_pct: 100
        quantity:
          value: 70000000
          unit: kg
          form: contained_element
          approximate: true
          notes: |
            The USGS 2004 profile table lists Canada with 70 million kilograms
            of contained cesium reserves, matching the full quantified reserve
            total in that source.
          source_id: usgs_cesium_profile_2004
        notes: |
          Bernic Lake (Tanco), Manitoba, was described by USGS as holding more
          than two-thirds of the world's reserve base and as the dominant
          reported reserve concentration for pollucite-derived cesium.
        source_id: usgs_cesium_profile_2004
    completeness: complete
  notes: |
    Reserve reporting for cesium is unusually weak. USGS MCS 2026 says no
    reliable country reserve data were available and instead gives only a
    global statement that Australia, Canada, China, and Namibia together were
    estimated to have less than 200,000 tons of pollucite-type reserves. The
    older 2004 contained-cesium table is therefore retained here because it is
    still the only explicit reserve ledger the USGS has published for cesium.

feedstock_origins:
  - substrate: pollucite_ore
    notes: |
      Pollucite is the principal cesium ore mineral. USGS describes it as
      occurring mainly in lithium-rich, lepidolite-bearing or petalite-bearing
      zoned granite pegmatites and notes that commercial extraction is by acid
      digestion or related processing routes that yield cesium chloride and
      other refined compounds.
    source_id: usgs_mcs_2026_cesium
  - substrate: cesium_bearing_tailings
    notes: |
      USGS MCS 2026 notes that recovery and processing of cesium from tailings
      at the Bikita Mine in Zimbabwe for shipment to China had restarted in
      recent years, making tailings a live secondary feedstock in the current
      market.
    source_id: usgs_mcs_2026_cesium

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2026 says cesium and rubidium can be used interchangeably in
      many applications because of their similar physical properties and atomic
      radii, but rubidium is no more readily available than cesium.
    source_id: usgs_mcs_2026_cesium
  - application: oil_and_gas_drilling_and_completion_fluids
    availability: partial
    notes: |
      The USGS 2004 cesium profile says heavy brines such as zinc bromide can
      substitute for some cesium-sodium-potassium formate fluids, but they are
      more corrosive, less safe to handle, and impose cleanup and disposal
      costs.
    source_id: usgs_cesium_profile_2004

end_uses:
  uses: []
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false

