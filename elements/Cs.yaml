geopolitical_events:
  - date: 2020
    event: "Cesium iodide recycling from X-ray panels became the industry standard."
    impact: |
      USGS MCS 2026 says one company developed an X-ray panel recycling program
      in 2020 that recovered cesium iodide for reuse in new panels and that this
      was believed to have become the industry standard. That reduced the need
      for fresh primary cesium iodide in one of cesium's identifiable
      industrial applications.
    source_id: usgs_mcs_2026_cesium
  - date: 2025
    event: "Intermittent Tanco production and renewed Bikita tailings recovery defined the visible primary supply."
    impact: |
      USGS MCS 2026 describes one Canadian company reporting intermittent cesium
      production and processing from mined ore and stockpiles at Tanco in 2025,
      while recovery from Bikita tailings in Zimbabwe for shipment to China had
      also restarted. The combination underscores that contemporary cesium
      supply is thin, episodic, and tied to a handful of pollucite or tailings
      streams rather than a broad mining industry.
    source_id: usgs_mcs_2026_cesium
  - date: 2025
    event: "U.S. policy continued pushing cesium-137 blood irradiators toward replacement by 2027."
    impact: |
      USGS MCS 2026 states that Congress set a goal for the National Nuclear
      Security Administration to eliminate cesium-137 blood irradiators by
      2027 and that X-ray alternatives had been partially implemented. This
      does not affect the small elemental-chemical market directly, but it does
      shrink one visible radioactive-cesium application in the United States.
    source_id: usgs_mcs_2026_cesium

narrative: |
  Cesium is commercially real, but it is not a bulk metal market. The modern
  trade is a thin specialty-chemicals business built on pollucite feedstock and
  sold mainly as carbonate, hydroxide, formate, iodide, chloride, nitrate, and
  other derivative salts. USGS still characterizes the United States as 100%
  import reliant, notes that elemental cesium itself is not traded in
  commercial quantities, and withholds conventional production, consumption,
  and trade series because the market is so small and opaque.

  What can be seen publicly is a supply chain with very few moving parts.
  Canada remains the anchor because Tanco is still one of the only named mined
  ore and stockpile processing centers in current USGS reporting, while
  Zimbabwe tailings recovery for shipment to China has re-emerged as a second
  feed. The most recent quantified flow USGS publishes is not a mine tonnage
  but the replacement demand implied by cesium formate drilling brines already
  in circulation. That is typical of cesium: commercial significance is driven
  by niche functionality in catalysts, dense clear brines, X-ray panels,
  scintillators, and timing or isotope applications, not by large tonnage.

