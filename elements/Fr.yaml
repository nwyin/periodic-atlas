symbol: Fr
atomic_number: 87
name: francium
category: alkali_metal
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade exists. Francium is handled only at atom-scale in research
  settings, typically as short-lived radioactive ion beams, neutralized atomic
  beams, or laser-trapped atoms. The longest-lived isotope, Fr-223, has a
  22.00-minute half-life in NNDC ENSDF/NuDat; practical handling is therefore in
  counts of atoms or beam yields rather than any commercial mass unit.

