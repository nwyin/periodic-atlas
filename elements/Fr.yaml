narrative: |
  Francium has no commercial market. Its physical presence is fleeting even in
  nature: IUPAC's isotopes review describes Fr-223 as the longest-lived isotope,
  formed in uranium minerals through actinium decay, with only about 30 g
  estimated to exist in Earth's crust at any one time. Because the ground-state
  half-life is only 22.00 minutes, nothing resembling a mine-to-refinery supply
  chain exists; the real-world handling unit is atoms in a beam, trap, or decay
  chain rather than kilograms or tonnes.

  The element survives economically only as a laboratory subject. IUPAC notes
  that artificial production for research can be done by proton bombardment of
  thorium, and CERN's 2024 ISOLDE study shows active beam production of francium
  isotopes from uranium-carbide targets. ORNL publications likewise show
  atom-scale francium chemistry remains experimentally active. The atlas record
  therefore treats francium as a research-only element whose "end use" is
  entirely fundamental nuclear, atomic, and radiochemical research.

