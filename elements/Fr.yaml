research_only:
  longest_lived_isotope: Fr-223
  half_life_seconds: 1320
  discovered_year: 1939
  iupac_recognized_year: 1949
  discovered_at: |
    Curie Institute, Paris, France. Marguerite Perey identified element 87 in
    actinium decay products in 1939.
  production_mode: accelerator_generated
  active_production_labs:
    - CERN ISOLDE
    - Oak Ridge National Laboratory
  notes: |
    Francium was the last element first discovered in nature rather than
    synthesized. IUPAC's element-by-element isotopes review states that Fr-223
    occurs naturally in uranium minerals via actinium decay, but no more than
    about 30 g are present in Earth's crust at any given time. The same review
    notes that francium can be produced artificially for research by bombarding
    thorium with protons. Modern beam-production work at CERN ISOLDE reports
    active extraction of francium isotopes from thick uranium-carbide targets,
    while ORNL publications document ongoing atom-scale francium chemistry
    experiments.

