geopolitical_events:
  - date: "2024"
    event: "Global zircon mine production increases 4% to estimated 1.5 million tonnes gross weight"
    impact: |
      World mine production of zirconium mineral concentrates rose approximately 4% year-on-year
      in 2024, with South Africa and Mozambique posting notable gains (South Africa: 289 kt → 300 kt;
      Mozambique: 144 kt → 160 kt). Senegal also grew (48 kt → 60 kt). Sierra Leone declined
      (28 kt → 20 kt). Australia held steady at 500 kt. Growth reflects resumed investment in
      HMS mining and processing capacity.
    source_id: usgs_mcs_2025_zr_hf
  - date: "2024"
    event: "US zirconium mineral concentrate imports decrease; exports increase in 2024"
    impact: |
      US imports of zirconium mineral concentrates (ZrO2 content) fell from 20,400 tonnes (2023)
      to 19,000 tonnes (2024e), continuing a multi-year decline from the 31,900-tonne peak in 2022.
      US exports of Zr mineral concentrates rose from 13,200 to 16,000 tonnes, with the US
      remaining a net importer on a ZrO2-content basis. Imports were dominated by South Africa
      (46%), Australia (35%), and Senegal (16%) over 2020-23.
    source_id: usgs_mcs_2025_zr_hf
  - date: "2024"
    event: "US exports of unwrought hafnium fall ~80% after near-fourfold increase in 2023"
    impact: |
      US unwrought hafnium exports declined from 58 tonnes (2023) to 10 tonnes (2024e), reversing
      the large increase seen in 2023. US imports of unwrought hafnium also declined ~30% from
      70 to 50 tonnes. Leading global exporters of unwrought hafnium were China, Germany, and
      the Netherlands in 2024. The price of unwrought hafnium fell from $6,150/kg (2023) to
      $4,600/kg (2024e) after a sharp 2022-23 spike.
    source_id: usgs_mcs_2025_zr_hf
  - date: "2024"
    event: "Exploration and development projects advance in Australia, Mozambique, South Africa, Sri Lanka, and Tanzania"
    impact: |
      Several companies continued exploration and development of new zirconium mineral concentrate
      projects across multiple jurisdictions. These projects, when commissioned, could add meaningful
      supply to a market dominated by Australia and South Africa. Sri Lanka and Tanzania are among
      the potential new entrants.
    source_id: usgs_mcs_2025_zr_hf
  - date: "2025"
    event: "US Government Stockpile targets acquisition of 2,300 tons of zirconium in FY2025"
    impact: |
      USGS MCS 2025 Appendix B lists FY2025 potential stockpile acquisitions of 2,300 short tons
      of zirconium, confirming zirconium's ongoing strategic designation in the US defense industrial
      base. This reflects the critical role of nuclear-grade zirconium alloys in reactor fuel
      rod cladding and the US policy priority to reduce import reliance for strategic materials.
    source_id: usgs_mcs_2025_zr_hf

narrative: |
  Zirconium's commercial identity is almost entirely shaped by zircon (ZrSiO4), the primary ore
  mineral. Global zircon mine production reached approximately 1.5 million tonnes gross weight
  in 2024 (975,000 tonnes ZrO2 content), concentrated in Australia (~33%) and South Africa (~20%),
  with Mozambique, the United States, China, and Indonesia as secondary producers. China is the
  world's dominant importer of zirconium mineral concentrates, importing zircon in both mixed and
  separated heavy-mineral-sand concentrates to feed its large ceramics and chemical industries.
  The key end uses for zircon are ceramics and opacifiers (tile glazes, zirconia structural
  ceramics), refractories (glass tank AZS blocks, steel-casting nozzles), foundry sand (precision
  casting moulds), and zirconium chemicals (paper, textiles, antiperspirants). Zirconium metal —
  produced via chlorination of zircon and Kroll reduction — is a minor but strategic stream,
  consumed primarily by the nuclear industry for hafnium-free fuel rod cladding alloys (Zircaloy,
  ZIRLO, M5) and by the chemical process industry for corrosion-resistant vessels.

  Zircon prices rose sharply in 2021-2022 (from ~$1,490 to $2,170/t CIF China) before plateauing
  near $2,000-2,100/t in 2023-2024. Zirconium sponge prices (ex-works China) have been remarkably
  stable at $25-30/kg over the 2020-2024 period, reflecting both the relatively thin traded market
  for nuclear-grade sponge and steady demand from the nuclear fuel cycle. In contrast, associated
  hafnium prices spiked dramatically from $781/kg (2021) to $6,150/kg (2023) before partially
  correcting to $4,600/kg (2024e), driven by tight supply and strategic demand for Hf in
  superalloys and nuclear control rods.

  The United States designates zirconium as a critical mineral (2022 Federal Register) and
  maintains an active government stockpile program targeting 2,300 tons of acquisitions in FY2025.
  Net import reliance for US zirconium mineral concentrates was below 25% in 2024, as domestic
  HMS mining in Florida and Georgia covers a significant share of domestic refinery feed. Australia
  and South Africa control the majority of world reserves (>75% of the identified 73 million tonnes
  ZrO2), providing geographic concentration risk for downstream processors in Asia and Europe who
  rely on imported zircon. Exploration and development activity in Mozambique, Tanzania, Sri Lanka,
  and elsewhere indicates continued supply expansion through the late 2020s.

