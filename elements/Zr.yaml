feedstock_origins:
  - substrate: zircon_sand
    typical_concentration_pct: 65.0
    notes: |
      Zircon (ZrSiO4, zirconium silicate) is the dominant commercial source of zirconium.
      Typical ZrO2 content by weight is 65% (USGS MCS 2025 footnote 1). Zircon is recovered
      from heavy-mineral-sand (HMS) deposits by surface mining or dredging, then separated by
      gravity, magnetic, and electrostatic methods. Major producing districts include Eastern
      Strands (South Africa), Murray Basin and Eucla Basin (Australia), Mozambique coast,
      Senegal coast, and Florida/Georgia Trail Ridge (US).
    source_id: usgs_mcs_2025_zr_hf
  - substrate: heavy_mineral_sand_concentrate
    notes: |
      Heavy-mineral-sand (HMS) operations mine coastal or aeolian beach-sand deposits
      containing suites of heavy minerals: zircon, ilmenite, rutile, leucoxene, monazite,
      and garnet. Zircon is co-recovered alongside titanium mineral concentrates (ilmenite
      and rutile). US domestic operations in Florida and Georgia recover zircon as a coproduct
      of HMS mining; abrasive sands, monazite, and titanium mineral concentrates are also
      coproducts.
    source_id: usgs_mcs_2025_zr_hf
  - substrate: baddeleyite
    notes: |
      Baddeleyite (ZrO2) is a minor zirconium mineral found in carbonatite complexes,
      most notably at Palabora (South Africa) where it is recovered as a byproduct of copper
      mining. Significantly smaller production volumes than zircon. USGS MCS 2025 notes that
      world resources of hafnium are associated with those of zircon and baddeleyite.
    source_id: usgs_mcs_2025_zr_hf

substitutes:
  - application: foundry_sand
    availability: partial
    notes: |
      USGS MCS 2025: "Chromite and olivine can be used instead of zircon for some foundry
      applications." Zircon sand is valued for its high melting point (~2,200 °C), low thermal
      expansion, and chemical stability; chromite and olivine sand have lower thermal conductivity
      and are generally lower cost but inferior in dimensional precision for high-quality castings.
    source_id: usgs_mcs_2025_zr_hf
  - application: refractories
    availability: partial
    notes: |
      USGS MCS 2025: "Dolomite and spinel refractories can also substitute for zircon in certain
      high-temperature applications." Zirconia and zircon refractories are preferred for glass-contact
      and steel-contact applications; dolomite and magnesia-spinel bricks are alternatives in
      rotary cement kilns and some steelmaking vessels but cannot match zirconia's performance in
      glass tanks.
    source_id: usgs_mcs_2025_zr_hf
  - application: nuclear_cladding
    availability: partial
    notes: |
      USGS MCS 2025: "Niobium (columbium), stainless steel, and tantalum provide limited
      substitution in nuclear applications." Zirconium alloys (Zircaloy-2, Zircaloy-4, ZIRLO,
      M5) are the dominant cladding material for light-water reactor fuel rods due to extremely
      low thermal-neutron absorption cross-section; stainless steel has much higher neutron
      absorption and is used only in older reactors or research reactors where thermal efficiency
      is less critical.
    source_id: usgs_mcs_2025_zr_hf
  - application: chemical_process_equipment
    availability: partial
    notes: |
      USGS MCS 2025: "Titanium and synthetic materials may substitute in some chemical processing
      plant applications." Zirconium metal offers exceptional corrosion resistance in hydrochloric
      and sulfuric acid environments; titanium Grade 2/7 and high-alloy stainless steels (duplex,
      904L) or fluoropolymer liners can substitute in less-aggressive chemical environments.
    source_id: usgs_mcs_2025_zr_hf

end_uses:
  uses:
    - application: ceramics_and_opacifiers
      share_pct: 45
      confidence: low
      notes: |
        USGS MCS 2025 lists ceramics and opacifiers among the "leading end uses for zircon."
        Zircon and stabilized zirconia are used as opacifiers in ceramic glazes (tiles,
        sanitaryware, tableware), as zirconia toughened alumina (ZTA) and partially stabilized
        zirconia (PSZ) for structural ceramics, and as zirconia for solid oxide fuel cells
        (SOFCs) and thermal barrier coatings. Estimated ~45% of zircon/zirconia consumption.
        No explicit percentage given in the USGS chapter.
      source_id: usgs_mcs_2025_zr_hf
    - application: refractories
      share_pct: 20
      confidence: low
      notes: |
        USGS MCS 2025 lists refractories among the "leading end uses for zircon." Zircon and
        zirconia-based refractories are used in glass-melting tanks (AZS blocks — alumina-
        zirconia-silica), steel-casting nozzles and ladles, and kiln furniture. Estimated ~20%
        of consumption. No explicit percentage given.
      source_id: usgs_mcs_2025_zr_hf
    - application: foundry_sand
      share_pct: 15
      confidence: low
      notes: |
        USGS MCS 2025 lists foundry sand among the "leading end uses for zircon." Zircon sand
        is used as a moulding and core material for investment casting and sand casting of steel,
        iron, and non-ferrous alloys, valued for its high fusion point and low thermal expansion.
        Estimated ~15% of consumption.
      source_id: usgs_mcs_2025_zr_hf
    - application: chemicals
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 lists chemicals among the end uses for zircon/zirconium. Zirconium chemicals
        (zirconyl chloride, ammonium zirconium carbonate, zirconium acetate, etc.) are used in
        antiperspirants, paper wet-strength additives, textile water-repellent treatments, and
        catalysts. Estimated ~10% of consumption.
      source_id: usgs_mcs_2025_zr_hf
    - application: nuclear_and_chemical_process_metal
      share_pct: 5
      confidence: low
      notes: |
        USGS MCS 2025: "The leading consumers of zirconium metal are the chemical process and
        nuclear energy industries." Nuclear applications use hafnium-free zirconium alloys (Zircaloy,
        ZIRLO, M5) for fuel rod cladding and structural components in light-water reactors.
        Chemical process uses include corrosion-resistant vessels, heat exchangers, and piping.
        Estimated ~5% of total Zr consumption (zirconium metal is a small fraction of total Zr use).
      source_id: usgs_mcs_2025_zr_hf
    - application: other_uses
      share_pct: 5
      confidence: low
      notes: |
        USGS MCS 2025 other end uses include abrasives, metal alloys, and welding rod coatings.
        Zircon abrasives are used for surface finishing; zirconium metal alloys appear in specialty
        applications; zircon-bearing flux coatings improve weld quality. Estimated ~5% residual.
      source_id: usgs_mcs_2025_zr_hf
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_critical_minerals_2022
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Zirconium is on the US 2022 Final List of Critical Minerals (Federal Register Vol. 87,
    No. 37, February 22, 2022). The US Department of Defense Government Stockpile includes
    zirconium, with FY2025 potential acquisitions of 2,300 tons per USGS MCS 2025 Appendix B.
    Zirconium is not currently on the EU Critical Raw Materials Act (Regulation EU 2024/1252)
    Annex I (Strategic Raw Materials) or Annex II (Critical Raw Materials) lists; hafnium
    (associated with zirconium production) is listed separately in those annexes.
    US criticality reflects strategic use in nuclear fuel rod cladding and concentration of
    global zircon production in Australia (~33%) and South Africa (~20%), with China as the
    dominant importer and downstream processor.

