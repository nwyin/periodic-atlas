symbol: Zr
atomic_number: 40
name: zirconium
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports world mine production of zirconium mineral concentrates in
  "thousand metric tons, gross weight." ZrO2 content is calculated as 65% of gross
  weight (footnote 1 in the chapter). US salient statistics data for imports and
  exports of zirconium metal (unwrought, powder, wrought) and hafnium are in metric
  tons. Zircon prices are in US dollars per metric ton gross weight. Zirconium sponge
  (Kroll-process metal) prices are in US dollars per kilogram, ex-works China (source:
  Argus Media Group, Argus Non-Ferrous Markets, annual average). The primary commercial
  forms are zircon sand (ZrSiO4, 65% ZrO2 by weight), zirconia (ZrO2) ceramic powders
  and stabilised zirconia, nuclear-grade zirconium sponge and tube (Zircaloy/Zr-4 alloy),
  and chemical-grade zirconium compounds (zirconyl chloride, zirconium oxychloride, etc.).
  The USGS publishes a combined "Zirconium and Hafnium" chapter; this file covers
  zirconium; a companion Hf.yaml covers hafnium.

