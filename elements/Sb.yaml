byproduct_of: []

feedstock_origins:
  - substrate: antimony_ore_and_concentrates
    notes: |
      Primary antimony metal and oxide production in the United States used imported feedstock
      in 2024. USGS lists commercial trade in ore and concentrates, oxide, and unwrought metal
      and powder; 2024 imports for consumption were 310 metric tons of ore and concentrates,
      20,000 metric tons of oxide, and 4,100 metric tons of unwrought metal and powder.
    source_id: usgs_mcs_2025_antimony
  - substrate: spent_lead_acid_batteries
    notes: |
      Secondary antimony production came from antimonial lead recovered from spent lead-acid
      batteries and was intended for the lead-acid battery industry. Recycling supplied about
      15% of estimated US apparent consumption in 2024.
    source_id: usgs_mcs_2025_antimony

substitutes:
  - application: flame_retardants
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: selected organic compounds and hydrated aluminum
      oxide are substitutes for antimony as flame retardants.
    source_id: usgs_mcs_2025_antimony
  - application: nonmetal_products
    availability: partial
    notes: |
      USGS MCS 2025 states that chromium, tin, titanium, zinc, and zirconium compounds
      substitute for antimony chemicals in enamels, paint, and pigments.
    source_id: usgs_mcs_2025_antimony
  - application: metal_products
    availability: partial
    notes: |
      USGS MCS 2025 states that combinations of calcium, copper, selenium, sulfur, and tin
      can substitute for antimony-bearing alloys in lead-acid batteries.
    source_id: usgs_mcs_2025_antimony

