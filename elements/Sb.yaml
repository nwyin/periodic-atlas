geopolitical_events:
  - date: "2024-02"
    event: "A mining company in Idaho receives additional US Department of Defense funding to reestablish a domestic antimony source"
    impact: |
      USGS reports the conditional February 2024 award raised total Department of Defense
      funding for the Idaho project to $59.4 million. The project is tied to the Stibnite
      Gold Project reserve base and reflects US concern over 85% net import reliance and the
      absence of marketable domestic mine output.
    source_id: usgs_mcs_2025_antimony
  - date: "2024-08"
    event: "China imposes export-license requirements on antimony ore, metal, oxides, hydrides, indium antimonides, organo-antimony compounds, and gold-antimony separation technology"
    impact: |
      After the August 2024 announcement, the antimony metal price nearly doubled according
      to the USGS-cited Argus series, rising from $8.91/lb in July to $17.50/lb in November.
      The licensing regime tightened the already concentrated global antimony supply chain.
    source_id: usgs_mcs_2025_antimony
  - date: "2024-12"
    event: "China bans all antimony exports to the United States"
    impact: |
      USGS reports that China escalated from licensing to a US-specific export ban in
      December 2024. Because China remained the dominant mine producer at 60% of 2024 world
      output and supplied 63% of US metal-and-oxide imports in 2020–23, the ban materially
      heightened US supply-chain vulnerability.
    source_id: usgs_mcs_2025_antimony

narrative: |
  Antimony sits in the narrow band of industrial minerals that matter far more than their
  tonnage suggests. World mine supply in 2024 was only about 100,000 metric tons antimony
  content, but the market is structurally exposed because China alone accounted for about 60%
  of that output and also dominates trade in oxide and metal. The United States had no
  marketable mine production in 2024, relied on imports for roughly 85% of apparent
  consumption, and kept a secondary stream alive mainly through antimonial lead recovered
  from spent lead-acid batteries.

  Commercial demand in the United States is split across metal products such as antimonial
  lead and ammunition (40%), flame retardants (39%), and nonmetal products such as ceramics,
  glass, and rubber (21%). The trade forms match that split: oxide is the largest import
  stream by volume, while secondary recycling feeds directly back into the battery industry.
  Substitutes exist in each major use class, but they are application-specific rather than
  universal, which limits how quickly demand can move away from antimony when supply tightens.

  The 2024 market confirmed how geopolitical this element has become. China first imposed
  export-license requirements in August and then banned all antimony exports to the United
  States in December; over the same period the cited antimony metal price jumped from
  $8.91/lb in July to $17.50/lb in November. That shock coincided with US Department of
  Defense funding to restart domestic mine supply in Idaho, underscoring that antimony is
  now treated less as a routine alloying or flame-retardant additive and more as a strategic
  chokepoint material.

