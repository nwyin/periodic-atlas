symbol: Sb
atomic_number: 51
name: antimony
category: metalloid
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports antimony data in metric tons of antimony content unless otherwise
  specified. Commercial trade forms in the chapter include ore and concentrates, antimony
  oxide, unwrought metal and powder, antimony articles, and secondary antimonial lead
  recovered from spent lead-acid batteries. The published price series is for antimony
  metal minimum 99.65% purity on a cost-insurance-freight basis, quoted in US dollars
  per pound by Argus Media Group.

