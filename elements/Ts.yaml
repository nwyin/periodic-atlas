symbol: Ts
atomic_number: 117
name: tennessine
category: synthetic_superheavy
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade. Tennessine is produced atom-by-atom in heavy-ion fusion
  experiments; half-lives in the nuclear-data sources are reported in
  milliseconds and converted here to SI seconds.

research_only:
  longest_lived_isotope: Ts-294
  half_life_seconds: 0.051
  discovered_year: 2010
  iupac_recognized_year: 2015
  discovered_at: |
    First synthesized at the Flerov Laboratory of Nuclear Reactions, Joint
    Institute for Nuclear Research (Dubna, Russia), in collaboration with Oak
    Ridge National Laboratory, Lawrence Livermore National Laboratory,
    Vanderbilt University, and the Research Institute of Atomic Reactors. The
    synthesis used calcium-48 beams on a berkelium-249 target prepared from
    Oak Ridge material.
  production_mode: accelerator_generated
  active_production_labs:
    - JINR Dubna
  notes: |
    Tennessine has no commercial supply chain and exists only as a few
    short-lived atoms created in fusion experiments. The 2010 discovery run
    produced six atoms of element 117, and later confirmation work at JINR and
    GSI supported the IUPAC recognition announced on 2015-12-30. As of the
    2025 snapshot, superheavy-element synthesis infrastructure remains centered
    on JINR's Dubna program rather than any industrial market.

narrative: |
  Tennessine is a research-only superheavy halogen with no extractive,
  refining, or end-use market. It is made by fusing calcium-48 ions with a
  berkelium-249 target at extremely low event rates, then identifying the new
  nuclide through correlated alpha-decay chains.

  The isotope with the longest confirmed half-life in the primary nuclear-data
  sources is Ts-294 at about 51 milliseconds, which is still far too short for
  any bulk handling or chemistry-based commercialization. Commercial reality is
  therefore limited to state-funded accelerator campaigns, target-material
  production, and detector development supporting superheavy-element physics.

