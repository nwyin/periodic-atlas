symbol: Sr
atomic_number: 38
name: strontium
category: alkaline_earth
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 tracks strontium primarily through celestite (strontium sulfate,
  SrSO₄), its principal commercial mineral. World mine production statistics are
  reported in gross weight of celestite in metric tons. The strontium content of
  celestite ore is 43.88% (USGS footnote 1), used for converting gross-weight
  celestite to strontium-content basis. US salient statistics are reported in metric
  tons on a strontium-content basis, combining celestite and strontium compound
  imports. The principal commercial compound is strontium carbonate (SrCO₃,
  strontium content 59.35%), used as feedstock for ceramic ferrite magnets and other
  strontium chemicals. Strontium nitrate (strontium content 41.40%) is the second most
  traded compound, used in pyrotechnics. Prices are reported as average unit values of
  celestite imports at the port of exportation (FOB origin) in USD per metric ton.
  Large-scale domestic US production of strontium carbonate ceased in 2006; US strontium
  minerals have not been mined since 1959.

