geopolitical_events:
  - date: "2024-01"
    event: "US celestite imports drop 95% in 2024 due to drilling slowdown and stockpile drawdown"
    impact: |
      USGS MCS 2025: imports of celestite in 2024 decreased by 95% compared with 2023,
      driven by reduced use in oil and gas drilling fluids combined with consumption of
      stockpiled celestite imported in prior years. The weekly average active US rig count
      decreased 15% in the first 9 months of 2024 vs. the same period in 2023, remaining
      39% lower than the pre-COVID-19 pandemic period in 2019. Substitution of celestite
      by barite in drilling mud — where barite is preferred — also contributed to reduced
      celestite demand. The dramatic volume decline combined with a small quantity of
      high-value mineral specimen imports drove the average unit price from $82/ton (2023)
      to $390/ton (2024e).
    source_id: usgs_mcs_2025_strontium
  - date: "2024-01"
    event: "Strontium compound imports increase 20% in 2024; strontium carbonate dominates trade"
    impact: |
      USGS MCS 2025: imports of strontium compounds were estimated to have increased by
      20% in 2024, reaching approximately 4,000 metric tons (strontium content). Strontium
      carbonate is the most traded strontium compound and the raw material from which other
      strontium compounds are derived. Germany (49%) and Mexico (43%) supplied the majority
      of strontium compound imports on a 2020–23 average basis. The increase reflects
      sustained demand for ceramic ferrite magnets and pyrotechnic applications.
    source_id: usgs_mcs_2025_strontium
  - date: "2024-02"
    event: "US DoD Defense Production Act Investment awards domestic manufacturing capacity for strontium nitrate, oxalate, and peroxide"
    impact: |
      In February 2024, the US Department of Defense announced results of a funding
      opportunity under the Defense Production Act Investments program to establish
      domestic manufacturing for 22 critical chemicals. A company in Louisiana and a
      company in Ohio were selected for the domestic production of strontium nitrate,
      strontium oxalate, and strontium peroxide, among other chemicals. These awards were
      expected to improve the domestic supply chain, modernize manufacturing capacity, and
      lead to new jobs. The action reflects defense concerns about 100% import reliance on
      strontium compounds used in pyrotechnics, signal flares, and other defense applications.
    source_id: usgs_mcs_2025_strontium
  - date: "2024-01"
    event: "Strontium atomic clock recognized as most accurate timepiece to date; strontium identified in spectra of oldest known stars"
    impact: |
      USGS MCS 2025: In 2024, a strontium atomic clock was recognized as the most accurate
      timepiece to date, reflecting the frontier research status of optical lattice clocks
      using strontium-87 atoms. Also in 2024, three of the oldest stars in the universe
      were identified through low amounts of strontium and barium in their spectra. These
      developments highlight novel high-value applications of strontium in metrology and
      astrophysical research, though these uses consume negligible quantities relative to
      ferrite magnets and pyrotechnics.
    source_id: usgs_mcs_2025_strontium

narrative: |
  Strontium's commercial supply chain is built almost entirely around celestite (SrSO₄),
  a dense mineral mined at roughly 510,000 metric tons per year globally. Iran and Spain
  each produce approximately 200,000 tons annually — together accounting for ~78% of world
  output — followed by China (16%) and Mexico (5%). The United States has not mined
  strontium since 1959 and is 100% import-reliant, sourcing celestite almost exclusively
  from Mexico and strontium carbonate primarily from Germany and Mexico. Celestite is the
  feedstock for strontium carbonate (SrCO₃), the principal commercial compound, from which
  the remainder of the strontium chemical tree — strontium nitrate, oxide, hydroxide, and
  metal — is derived.

  Two applications dominate US consumption in roughly equal measure: ceramic ferrite magnets
  (40%) and pyrotechnics and signal flares (40%). Strontium ferrite (SrFe₁₂O₁₉) is the
  world's most widely produced permanent magnet material by volume, used in motors,
  loudspeakers, and consumer electronics. Strontium nitrate produces the most vivid red
  coloration of any commercial pyrotechnic material, making it essentially irreplaceable
  for military signal flares and low-noise fireworks. Barium can substitute for strontium
  in ferrite magnets with some reduction in maximum operating temperature, but no practical
  substitute exists for pyrotechnic applications. Drilling fluids (celestite as a barite
  substitute) account for roughly 2% of US consumption, a share that shrank sharply in
  2024 as US rig counts declined and operators reverted to barite.

  The strontium market saw unusual price behavior in 2024: celestite import volumes
  collapsed 95% from 2023 levels as drillers drew down stockpiles and rig activity fell,
  while the average import price spiked to $390/ton from $82/ton in 2023 — a volume-price
  dynamic partly influenced by a small quantity of high-value mineral specimen imports
  distorting the unit value. In contrast, strontium compound imports rose 20%, driven by
  sustained ferrite magnet and pyrotechnic demand. The US Department of Defense's February
  2024 investment in domestic strontium nitrate and related compound manufacturing under
  the Defense Production Act signals recognition of strontium's defense criticality — even
  though it does not appear on the formal US or EU critical minerals lists — given that
  strontium compounds are essential to signal flares, tracer ammunition, and low-noise
  pyrotechnic munitions.

