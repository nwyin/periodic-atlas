byproduct_of: []

feedstock_origins:
  - substrate: celestite_ore
    typical_concentration_pct: 43.88
    notes: |
      Celestite (SrSO₄, strontium sulfate) is the overwhelmingly dominant commercial
      mineral source of strontium. Celestite ore is processed to produce strontium
      carbonate (the principal commercial compound) and other strontium chemicals.
      Strontium carbonate is sintered with iron oxide to produce permanent ceramic
      ferrite magnets, and is the feedstock from which strontium nitrate, strontium
      oxide, and other downstream compounds are derived. The strontium content of
      celestite ore is 43.88% (USGS MCS 2025 footnote 1). Witherite (BaCO₃) deposits
      sometimes contain strontium as a minor component but are not a commercial source.
      Large-scale domestic US production of strontium carbonate from celestite ceased
      in 2006; a few domestic companies manufacture small quantities of downstream
      strontium chemicals from imported strontium carbonate.
    source_id: usgs_mcs_2025_strontium

substitutes:
  - application: ceramic_ferrite_magnets
    availability: partial
    notes: |
      USGS MCS 2025: "Barium can be substituted for strontium in ceramic ferrite magnets;
      however, the resulting barium composite will have a reduced maximum operating
      temperature when compared with that of strontium composites." Barium ferrite
      (BaFe₁₂O₁₉) is the primary substitution candidate; the trade-off in thermal
      performance limits its suitability for higher-temperature motor and generator
      applications.
    source_id: usgs_mcs_2025_strontium
  - application: pyrotechnics_and_signals
    availability: none
    notes: |
      USGS MCS 2025: "Substituting for strontium in pyrotechnics is hindered by
      difficulty in obtaining the desired brilliance and visibility imparted by strontium
      and its compounds." Strontium compounds produce a vivid red flame with high
      luminous intensity that alternative elements cannot replicate at equivalent cost
      or performance, making substitution impractical for military signal flares and
      low-noise fireworks requiring brilliant red coloration.
    source_id: usgs_mcs_2025_strontium
  - application: drilling_fluids
    availability: full
    notes: |
      USGS MCS 2025: "In drilling mud, barite is the preferred material, but celestite
      may substitute for some barite, especially when barite prices are high." In this
      application, celestite substitutes for barite (BaSO₄) rather than being
      irreplaceable itself; when barite prices rise, drillers can shift to celestite.
      Barite has a higher specific gravity (4.2–4.5 g/cm³) than celestite (~4.0 g/cm³),
      making barite the preferred default for high-density drilling fluids.
    source_id: usgs_mcs_2025_strontium

end_uses:
  uses:
    - application: ceramic_ferrite_magnets
      share_pct: 40
      confidence: high
      notes: |
        USGS MCS 2025: ceramic ferrite magnets account for approximately 40% of US
        strontium consumption. Strontium carbonate (SrCO₃) is sintered with iron oxide
        to produce strontium ferrite (SrFe₁₂O₁₉), the dominant type of permanent
        ferrite magnet used in motors, loudspeakers, holding magnets, and consumer
        electronics. Based on import distribution data.
      source_id: usgs_mcs_2025_strontium
    - application: pyrotechnics_and_signals
      share_pct: 40
      confidence: high
      notes: |
        USGS MCS 2025: pyrotechnics and signals account for approximately 40% of US
        strontium consumption. Strontium nitrate (Sr(NO₃)₂) contributes a brilliant red
        color to fireworks and signal flares, including low-noise fireworks. Strontium
        compounds produce the most vivid red flame of any commercial pyrotechnic colorant.
        Based on import distribution data.
      source_id: usgs_mcs_2025_strontium
    - application: drilling_fluids
      share_pct: 2
      confidence: high
      notes: |
        USGS MCS 2025: drilling fluids account for approximately 2% of US strontium
        consumption. Virtually all celestite consumed in the US since 2006 is estimated
        to have been used as an additive in drilling fluids for oil and natural gas wells.
        Celestite is ground but undergoes no chemical processing for this application.
        Based on import distribution data.
      source_id: usgs_mcs_2025_strontium
    - application: other_industrial
      share_pct: 18
      confidence: medium
      notes: |
        USGS MCS 2025: other uses account for approximately 18% of US strontium
        consumption. Includes electrolytic production of zinc (strontium carbonate added
        to purify zinc electrolyte), glass production, master alloys for aluminum casting,
        pigments and fillers, and strontium metal for specialty uses. Novel applications
        including medical and technological uses, and ultraprecise strontium atomic clocks,
        are actively researched but remain small-scale as of 2024.
      source_id: usgs_mcs_2025_strontium
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Strontium is not on the US 2022 Critical Minerals List (50 minerals designated by
    the US Department of the Interior), the EU Critical Raw Materials list (Regulation
    2024/1252), or the EU Strategic Raw Materials list (CRMA 2024). However, the US
    Department of Defense announced in February 2024 that it had selected companies in
    Louisiana and Ohio under the Defense Production Act Investments program to establish
    domestic manufacturing capacity for strontium nitrate, strontium oxalate, and
    strontium peroxide, reflecting defense-supply-chain concerns for pyrotechnic and
    signal-flare applications. US net import reliance = 100%, with Mexico supplying
    all celestite and Germany (49%) and Mexico (43%) supplying most strontium compounds.

