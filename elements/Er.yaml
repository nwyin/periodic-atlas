criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Erbium is classified as critical under the US 2022 Critical Minerals List as part
    of "rare earth elements" (a group designation). US net import reliance for REE
    compounds and metals was 80% in 2024e (USGS MCS 2025 salient statistics). Heavy rare
    earth elements including erbium are designated as Critical Raw Materials and Strategic
    Raw Materials under EU Regulation 2024/1252 (Critical Raw Materials Act, CRMA); the EU
    explicitly distinguishes light REEs and heavy REEs as separate CRM entries. Erbium's
    criticality is amplified by its role as the sole viable gain medium for C-band fiber
    optic amplifiers — a non-substitutable function in global telecommunications
    infrastructure — and by its near-complete dependence on Chinese HREE supply chains
    (ion adsorption clay processing). Import sources 2020–23: China 70%, Malaysia 13%,
    Japan 6%, Estonia 5% (for REE compounds and metals broadly; Er-specific import
    data not separately reported by USGS).

geopolitical_events:
  - date: "2024"
    event: "Global REE mine production increases to 390,000 t REO in 2024e; Burma REE production falls 28% YoY, reducing HREE supply"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t, up from 376,000 t
      in 2023, driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
      and Thailand (+9,400 t to 13,000 t). However, Burma (Myanmar) fell from 43,000 t
      to 31,000 t REO (-28% YoY). Burma's ion adsorption clay deposits are HREE-enriched
      (high Er content ~1–2% Er₂O₃), so its 12,000 t decline has a disproportionate
      impact on world Er supply relative to its 8% share of total REO. At 0.5% basket
      average, Burma's 12,000 t decline implies ~60 t less Er, but the true reduction may
      be higher given above-average Er fractions in Burmese clay deposits. Production data
      for Burma estimated from China import records (USGS footnote 12).
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "US net import reliance for REE compounds and metals declines to 80% in 2024e; no domestic Er₂O₃ separation capacity"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds and
      metals at 80% in 2024e, down from >95% in 2020–2023, reflecting growth in domestic
      compound production to 7,600 t total in 2024. However, this improvement is concentrated
      in LREE processing (NdPr compounds in California, RE compounds in Utah). No domestic US
      separation of Er₂O₃ at commercial scale is reported. Mountain Pass concentrate, which
      contains trace quantities of Er (~0.1–0.2% of REO), is processed in China. US users of
      erbium for fiber optic and laser applications remain entirely dependent on imported
      Er₂O₃ from Chinese separation facilities.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Erbium occupies a unique niche within the rare earth supply chain: it is the only rare
  earth element with a non-substitutable role in global telecommunications infrastructure.
  The erbium-doped fiber amplifier (EDFA), commercialized in the early 1990s, exploits the
  Er³⁺ ion's gain spectrum at 1530–1565 nm — precisely matching the minimum-loss transmission
  window of silica optical fiber. Every long-haul optical fiber network in operation today
  depends on EDFAs to regenerate signal strength over transoceanic and transcontinental
  distances. Unlike neodymium or dysprosium, whose clean-energy applications face ongoing
  substitution research, no commercially viable alternative exists for C-band erbium fiber
  amplification in installed long-haul infrastructure. This single physical property makes
  erbium strategically important to communications and data infrastructure in a way that
  transcends its modest production volume.

  Erbium is a heavy rare earth element (HREE), and like Dy, Tb, and Gd, its supply is
  disproportionately concentrated in China's ion adsorption clay (IAC) deposits in Jiangxi,
  Fujian, and Guangdong provinces, which contain ~1–2% Er₂O₃ — well above the global basket
  average of ~0.5% applied to USGS aggregate REO data. At that basket share, world 2024
  erbium production is estimated at ~1,950 t Er₂O₃ derived from 390,000 t world REO
  production reported by USGS MCS 2025, though actual production may differ given deposit-
  type concentration effects. USGS does not disaggregate REE production or reserves by
  individual element. Burma (Myanmar), a meaningful HREE source via its own IAC deposits,
  saw production fall 28% in 2024, tightening global HREE supply, while Thailand's 261%
  YoY growth partially offset this decline. Mountain Pass bastnaesite, the dominant US REE
  source, is LREE-dominant and contributes minimally to actual Er supply despite representing
  11.5% of world REO tonnage by USGS accounting.

  Erbium was not among the seven heavy rare earth elements directly named in China's April
  2025 export controls (Sm, Gd, Tb, Dy, Lu, Sc, Y), suggesting somewhat lower near-term
  supply disruption risk than the directly targeted HREEs. Nevertheless, Er's supply chain
  remains overwhelmingly Chinese: China controls both the dominant IAC ore base and the
  downstream high-purity Er₂O₃ separation capacity required for fiber optic and laser
  applications. As global fiber bandwidth requirements grow with artificial intelligence
  infrastructure build-out, 5G densification, and hyperscale data center expansion, demand
  for erbium is structurally supported. The gap between the strategic importance of EDFAs
  and the near-absence of non-Chinese Er separation capacity represents a quiet but
  consequential supply-chain vulnerability in communications infrastructure.

