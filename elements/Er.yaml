symbol: Er
atomic_number: 68
name: erbium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single grouped commodity chapter
  ("rare earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element
  tonnage is not published for individual REEs. Per-element attribution for erbium
  requires multiplying the aggregate by Er's typical basket share. Erbium is
  commercially traded primarily as Er₂O₃ (erbium(III) oxide) at ≥99.9% minimum
  purity for optical and laser applications; Er metal and Er-doped crystal material
  are used in laser manufacturing. All production figures in this file are derived
  by multiplying USGS-reported aggregate REO totals by Er's typical basket share of
  ~0.5%, which is not reported directly by USGS. The basket share varies by deposit
  type: bastnaesite and carbonatite deposits (Mountain Pass CA, Bayan Obo CN, Mt.
  Weld AU) are LREE-dominant and yield low Er fractions (~0.1–0.2% Er₂O₃ of total
  REOs); ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong)
  and Southeast Asia (Burma/Myanmar, Thailand) yield higher Er proportions (~1–2%)
  because these deposits are enriched in heavy rare earth elements. Monazite from
  heavy mineral sands typically contains ~0.5–1.5% Er₂O₃. A global weighted average
  of ~0.5% is used as the central estimate, reflecting the dominance of Chinese
  mixed bastnaesite-IAC production in the world total. Er₂O₃ prices are NOT listed
  in the USGS MCS 2025 salient statistics table; only Ce, Dy, Eu, La, mischmetal,
  Nd, and Tb oxide prices are reported therein. All data are in metric tons REO
  equivalent unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 1950
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Er's typical basket share of ~0.5% gives
      ~1,950 t Er₂O₃ equivalent. Erbium's basket share is not reported separately by
      USGS; the 0.5% factor is an industry consensus figure for the global weighted
      average across deposit types. LREE-dominant bastnaesite mines at Mountain Pass
      (CA), Bayan Obo (CN), and Mt. Weld (AU) have Er fractions of only ~0.1–0.2% of
      REO; ion adsorption clay deposits in southern China and Southeast Asia contain
      ~1–2% Er₂O₃, making them disproportionately important Er sources relative to
      their share of total REO tonnage. Monazite in heavy mineral sands yields ~0.5–1.5%
      Er₂O₃. Actual Er output is not officially disaggregated from the REE basket in
      public USGS data; this figure carries low confidence. The 2023 comparable estimate
      is ~1,880 t at the same 0.5% share applied to 376,000 t world total.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        quantity:
          value: 1350
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          China 2024e REE total: 270,000 t REO (production quota per USGS footnote 14;
          excludes undocumented production). China share of world: 270,000 / 390,000 =
          69.2%. Estimated Er component at 0.5% basket share: ~1,350 t Er₂O₃. However,
          China's actual Er share is higher than 69.2% because southern China ion
          adsorption clay deposits (Jiangxi, Fujian, Guangdong) contain ~1–2% Er₂O₃ —
          well above the global basket average — and are the world's primary commercial
          HREE source. Bayan Obo bastnaesite (LREE-dominant, ~0.1% Er) dilutes the
          national average. China's 2024 quota rose from 255,000 t in 2023 to 270,000 t.
        source_id: usgs_mcs_2025_rare_earths
      - country: US
        share_pct: 11.5
        quantity:
          value: 225
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          US 2024e REE total: 45,000 t REO from bastnaesite concentrates at Mountain Pass,
          CA (MP Materials), valued at ~$260 million. Estimated Er at 0.5% global average:
          ~225 t. This is a significant overestimate for Mountain Pass: bastnaesite from
          Mountain Pass contains approximately 0.1–0.2% Er₂O₃ of total REOs, well below
          the 0.5% global basket average applied here. Actual US Er content in Mountain
          Pass concentrate is likely only ~45–90 t. Mountain Pass concentrate is shipped
          primarily to China for separation; virtually no commercial Er₂O₃ is separated
          domestically.
        source_id: usgs_mcs_2025_rare_earths
      - country: MM
        share_pct: 7.9
        quantity:
          value: 155
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Burma (Myanmar) 2024e REE total: 31,000 t REO, down from 43,000 t in 2023
          (-28% YoY). Share: 31,000 / 390,000 = 7.9%. Estimated Er at 0.5% average:
          ~155 t. Burma produces primarily from ion adsorption clay deposits in Kachin
          State and Shan State, which are heavy-REE enriched; actual Er fraction in
          Burmese production (~1–2% Er₂O₃) likely exceeds the global basket average
          applied here, meaning real Er output from Burma may be 310–620 t rather than
          the derived ~155 t. The 28% YoY production decline reduced global HREE supply
          disproportionately. Production estimated from China import records (USGS
          footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: AU
        share_pct: 3.3
        quantity:
          value: 65
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Australia 2024e REE total: 13,000 t REO, down from 16,000 t in 2023. Lynas
          Rare Earths Mt. Weld carbonatite mine (Western Australia), processed at LAMP
          (Malaysia). Mt. Weld is LREE-dominant; Er content is low (~0.1–0.3% of REOs).
          Applying the 0.5% global average overestimates actual Australian Er output;
          real Er from Mt. Weld is likely only ~13–40 t. Estimated at 0.5% global
          average for consistency: ~65 t. Production estimated from China import data
          (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: NG
        share_pct: 3.3
        quantity:
          value: 65
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Nigeria 2024e REE total: 13,000 t REO, up from 7,200 t in 2023 (+81% YoY).
          USGS cites Nigeria as a driver of 2024 global production growth. Estimated Er
          at 0.5% global average: ~65 t. Nigerian REE deposit types are not specified in
          USGS data; actual Er content is uncertain. Production estimated from China
          import data (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: TH
        share_pct: 3.3
        quantity:
          value: 65
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Thailand 2024e REE total: 13,000 t REO, up from 3,600 t in 2023 (+261% YoY).
          Thailand produces from ion adsorption clay deposits; Er content is likely above
          the global basket average (~1–1.5% Er₂O₃). Applying 0.5% global average gives
          ~65 t, which likely understates actual Thai Er output. Cited by USGS as a
          driver of global production growth alongside China and Nigeria. Production
          estimated from China import data (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 2.3
        quantity:
          value: 45
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          Remaining producers 2024e: India (2,900 t), Russia (2,500 t), Madagascar
          (2,000 t), Other USGS bucket (1,100 t), Vietnam (300 t), Malaysia (130 t),
          Brazil (20 t) ≈ 8,950 t total REO, ~2.3% of world. Estimated combined Er
          contribution ~45 t at 0.5% global basket average. India produces from monazite
          in heavy mineral sands (moderate Er content ~0.5–1.0%); Russia from apatite-
          nepheline at Kola (very low Er). Overall Er contribution from this group is
          uncertain.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 90
        notes: |
          China controls approximately 90% of global REE separation and refining
          capacity; for heavy REEs like Er, China's dominance is even greater than for
          LREEs because the primary ore sources (southern China ion adsorption clays)
          are processed domestically, and because Er separation requires sophisticated
          solvent extraction or ion exchange infrastructure concentrated in Chinese
          facilities. High-purity Er₂O₃ (≥99.9%) production for fiber optic and laser
          applications is concentrated in specialized Chinese separation facilities.
          USGS MCS 2025 import sources (2020–23) confirm China supplied 70% of US REE
          compound and metal imports; China's actual share of Er₂O₃ separation is
          higher (~90%+) given its dominance of both IAC ore supply and downstream
          processing.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 5
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate and produces separated REE oxides. However,
          as Mt. Weld concentrate is LREE-dominant, LAMP's contribution to global Er₂O₃
          output is minimal. USGS cites Malaysia as 13% of US REE compound and metal
          imports (2020–23), but most of that is LREE products (La, Ce, NdPr). LAMP's
          Er₂O₃ output fraction is small.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 5
        notes: |
          Other non-Chinese Er₂O₃ producers are limited: Neo Performance Materials
          (Sillamäe, Estonia, 5% of US imports 2020–23), Japanese processors (Japan 6%
          of US imports 2020–23), and nascent US separation capacity. Estonia and Japan
          source feed from Australian and Chinese intermediates per USGS chapter text.
          High-purity Er₂O₃ for fiber amplifier applications is an overwhelmingly
          Chinese specialty product.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Er-specific figures derived from REO totals using the ~0.5%
    basket share assumption; actual per-element disaggregation is not available from
    public USGS data. Erbium as a HREE is disproportionately concentrated in southern
    China IAC deposits and HREE-enriched Myanmar/Thailand clay mines relative to its
    share of total REO tonnage. The 0.5% global average likely underestimates actual
    Er output from HREE-rich IAC sources and overestimates it from LREE-dominant
    mines (Mountain Pass, Mt. Weld). Country shares sum to ~100.8% due to rounding
    of reported integers against the rounded world total.

