feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 1.5
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma/Myanmar, Thailand) are the world's most important commercial
      source of erbium and other heavy rare earth elements. These deposits are enriched
      in HREEs relative to LREE-dominant bastnaesite and carbonatite mines. Er₂O₃
      typically represents ~1–2% of total REOs in southern China ionic clay concentrates,
      compared to ~0.1–0.2% in bastnaesite. USGS MCS 2025 cites Myanmar and Thailand
      production as estimated from China import data; these represent predominantly
      clay-derived HREE concentrates. The high Er fraction in IAC deposits makes them
      the economic backbone of global Er supply despite contributing only ~30% of world
      REO tonnage.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.15
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary commercial source of
      light REEs (La, Ce, Pr, Nd) but contains modest erbium. Er₂O₃ typically represents
      only ~0.1–0.2% of total REOs in commercial bastnaesite concentrates (Mountain Pass
      CA ~0.1–0.15%; Bayan Obo CN ~0.15–0.2%). USGS MCS 2025 confirms bastnaesite was
      mined as a primary product at Mountain Pass in 2024. Small amounts of Er are
      recovered during Chinese processing of mixed bastnaesite concentrate, but Mountain
      Pass concentrate contributes a minor fraction of world Er supply relative to
      HREE-enriched clay-deposit sources.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.8
    notes: |
      Monazite (rare-earth phosphate) is stockpiled as a separated concentrate or
      recovered as an accessory mineral in heavy-mineral-sand concentrates. USGS MCS
      2025 confirms monazite was stockpiled in the southeastern United States in 2024.
      Er typically represents ~0.5–1.5% of total REOs in monazite, making it a
      meaningful Er source from Indian and other heavy mineral sand operations. Thorium
      content in monazite complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: fiber_optic_amplifiers_edfa
    availability: none
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For erbium's dominant application — erbium-doped fiber amplifiers
      (EDFAs) operating in the C-band (1530–1565 nm) and L-band (1565–1625 nm) — there
      is no practical substitute at commercial scale. The Er³⁺ ion's emission spectrum
      uniquely aligns with the minimum-loss transmission window of silica optical fiber
      at 1550 nm. Thulium-doped fiber amplifiers (TDFAs) operate in the S-band
      (~1460–1530 nm) and extend bandwidth coverage but do not replace C-band EDFAs.
      Semiconductor optical amplifiers (SOAs) can amplify light in the 1550 nm window
      but have higher noise figures, polarization sensitivity, and nonlinearity that
      limit use in high-capacity long-haul systems. For installed long-haul fiber
      infrastructure, EDFAs are the overwhelmingly dominant amplification technology
      with no commercial-scale substitute.
    source_id: usgs_mcs_2025_rare_earths
  - application: er_yag_medical_laser
    availability: partial
    notes: |
      For erbium's application in Er:YAG lasers (2.94 μm wavelength), holmium:YAG
      (Ho:YAG at 2.09 μm) substitutes for some soft-tissue surgical procedures
      (urological lithotripsy, arthroscopic surgery, ENT procedures) and CO₂ lasers
      (10.6 μm) substitute for some skin resurfacing and dermatological applications.
      However, no substitute fully replicates the 2.94 μm Er:YAG output, which
      coincides with the peak water absorption coefficient and enables the most
      precise superficial tissue ablation with minimal thermal damage — a requirement
      for dental hard-tissue procedures and precision dermatological resurfacing.
      USGS MCS 2025 general substitutes statement applies.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: fiber_optic_amplifiers_edfa
      share_pct: 55
      confidence: low
      notes: |
        Erbium's dominant commercial application is as the active gain medium in
        erbium-doped fiber amplifiers (EDFAs), the enabling technology for long-haul
        optical fiber telecommunications networks. Small quantities of Er₂O₃ (~100–1,000
        ppm by weight) are incorporated into the silica fiber core; when pumped at 980 nm
        or 1480 nm, Er³⁺ ions produce stimulated emission at 1530–1565 nm (C-band),
        amplifying optical data signals without electronic conversion. EDFAs, developed
        commercially in the early 1990s, allow fiber links to span thousands of kilometers
        with periodic optical amplification, underpinning global internet backbone,
        submarine cable networks, and data center interconnects. Demand grows with
        expanding fiber bandwidth (coherent transmission beyond 400G per channel), 5G
        backhaul fiber densification, and hyperscale data center build-out. USGS MCS 2025
        lists fiber optics as a major REE end use. The 55% share is an industry consensus
        estimate; USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: er_yag_lasers_medical_industrial
      share_pct: 20
      confidence: low
      notes: |
        Erbium-doped solid-state lasers are the second-largest end use. Er:YAG
        (erbium:yttrium aluminum garnet) produces output at 2.94 μm, coinciding with
        the peak water absorption coefficient, enabling precise and minimally invasive
        ablation of biological tissue. Applications include dermatological skin
        resurfacing and fractional laser treatments, dental hard-tissue drilling and
        cavity preparation (without drill noise/vibration), ophthalmological procedures,
        and minimally invasive soft-tissue surgery. Er:glass (erbium-doped silicate glass)
        lasers operating at ~1.54 μm are used in eye-safe rangefinders and laser
        designators (1.54 μm is outside the retinal hazard zone), with military and
        industrial ranging applications. USGS MCS 2025 lists lasers as a major REE
        end use. Share is an industry consensus estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: specialty_optical_glass_and_coatings
      share_pct: 10
      confidence: low
      notes: |
        Er₂O₃ is used as a colorant in specialty glass, producing a characteristic pink
        to rose hue (from Er³⁺ absorption in the green visible spectrum). Applications
        include decorative glassware, optical filter glass, sunglasses lenses, and
        specialty optical components. Erbium is also incorporated into fluoride and
        chalcogenide glass compositions for mid-infrared optics and upconversion
        phosphors. High-purity Er compounds are used in optical coatings and thin films
        for photonic devices. Share is an estimate combining several small-volume
        specialty optical applications.
      source_id: usgs_mcs_2025_rare_earths
    - application: metallurgical_additives_alloys
      share_pct: 10
      confidence: low
      notes: |
        Small additions of erbium (typically <0.2 wt%) to aluminum alloys improve grain
        refinement, high-temperature strength, and recrystallization resistance, with
        applications in aerospace structural components. Er additions to magnesium alloys
        improve corrosion resistance and mechanical properties at elevated temperatures.
        Er is also used as a minor additive to vanadium and other specialty metals to
        improve properties. These metallurgical uses are small-volume compared to optical
        applications. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_uses
      share_pct: 5
      confidence: low
      notes: |
        Other minor applications include upconversion phosphors incorporating Er₂O₃
        (NaYF₄:Er,Yb nanoparticles for bioimaging and anti-counterfeiting), nuclear
        reactor applications exploiting Er-167's high neutron capture cross-section
        for burnable poison rods, specialty ceramics, and research-grade host materials
        for luminescent and photonic applications. Aggregate of several small-volume
        specialty applications.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

