symbol: Cl
atomic_number: 17
name: chlorine
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Chlorine (Cl₂) is produced commercially by electrolysis of sodium chloride
  brine (chlor-alkali process: 2 NaCl + 2 H₂O → Cl₂ + H₂ + 2 NaOH), with
  ~95% of global production using membrane-cell or diaphragm-cell electrolysis
  and the remainder from hydrochloric acid oxidation and specialty routes.
  Commercial forms are: liquefied Cl₂ gas in pressurised railcars, ISO tanks,
  or cylinders; and on-site or off-site generated sodium hypochlorite (bleach)
  solutions. The chlor-alkali process co-produces caustic soda (NaOH) and
  hydrogen gas (H₂) in fixed stoichiometric ratios (1 tonne Cl₂ : 1.128 tonne
  NaOH : 0.028 tonne H₂), meaning chlorine and caustic soda supply are
  structurally linked.

  USGS MCS 2025 does not publish a dedicated chlorine commodity chapter;
  the closest USGS primary source is the salt chapter at
  https://pubs.usgs.gov/periodicals/mcs2025/mcs2025-salt.pdf, since sodium
  chloride brine is the dominant feedstock (chlor-alkali accounts for ~40%
  of global salt consumption). World chlorine production statistics are
  published by trade associations: Euro Chlor for Europe and the Chlorine
  Institute for North America. All production quantities are in million metric
  tonnes of Cl₂ equivalent per year. Salt prices in USGS MCS are in USD per
  metric tonne of salt (not chlorine); dedicated chlorine merchant-market
  prices are not reported in USGS MCS 2025.

production:
- reporting_year: 2024
  refined:
    value: 75.0
    unit: million_tonnes_per_year
    form: unspecified
    approximate: true
    confidence: medium
    notes: |
      World chlorine production estimated at approximately 75 million metric
      tonnes Cl₂ per year for 2024. This aggregate is constructed from
      authoritative regional data (Euro Chlor: Europe 8.04 Mt in 2024;
      Chlorine Institute / EPA: US ~11 Mt circa 2022) plus capacity-based
      estimates for China (~35 Mt derived from apparent caustic soda
      consumption ~40.6 Mt using stoichiometry 40.6 × 70.9/80 ≈ 35.4 Mt Cl₂)
      and rest of world. An independent cross-check via USGS MCS 2025 salt
      feedstock gives 280 Mt world salt × 40% chlor-alkali share × 0.607
      NaCl→Cl₂ mass factor ≈ 68 Mt, consistent with the 75 Mt estimate
      within ±10% uncertainty.
