  notes: |
    Chlorine is electrochemically manufactured from brine (not mined), so the
    production block uses `refined:` for Cl₂ output. Country production data
    are not published in a single authoritative world table; all non-European,
    non-US figures are approximate estimates derived from capacity data and
    stoichiometric cross-checks. Euro Chlor's confirmed European total for
    2024 is 8,036,860 tonnes = ~8.04 Mt (up 10.2% vs 7.29 Mt in 2023),
    representing the sum of DE + NL + BE + FR + UK + other Euro Chlor member
    countries. China accounts for the majority of world production with a
    chlorine capacity of ~46 Mt and estimated production ~35 Mt/year.

reserves:
  notes: |
    Chlorine has no extractable reserves in the conventional sense — it is
    manufactured from sodium chloride brine rather than mined as a mineral ore.
    The primary feedstock has effectively unlimited resources: USGS MCS 2025
    (salt chapter) states that reserves are "Large. Economic and subeconomic
    deposits of salt are substantial in principal salt-producing countries.
    The oceans contain a virtually inexhaustible supply of salt." Seawater
    chloride concentration is ~19.4 g/L Cl⁻, providing a near-limitless
    chemical reservoir. Chlorine supply is constrained by energy input
    (3,000–3,400 kWh per tonne Cl₂ for modern membrane-cell electrolysis),
    not by raw-material scarcity.

byproduct_of: []

feedstock_origins:
  - substrate: sodium_chloride_brine
    typical_concentration_pct: 25.0
    notes: |
      Sodium chloride (NaCl) brine is the dominant feedstock for chlorine,
      consumed at ~1.65 tonnes NaCl per tonne Cl₂ produced. Brine is sourced
      from solution-mined underground salt deposits or dissolved surface salt.
      USGS MCS 2025 (salt chapter): "Salt in brine [accounted for] 42% of
      US salt sold or used in 2024," primarily for chlor-alkali chemistry.
      Chlor-alkali accounts for ~40% of global salt consumption globally.
      Typical NaCl saturation in process brine: ~25–26 wt%.
    source_id: usgs_mcs_2025_salt
  - substrate: potassium_chloride
    notes: |
      Potassium chloride (KCl) brine is an alternative feedstock used in
      plants that co-produce potassium hydroxide (KOH) rather than NaOH.
      A minor route; US EPA (2022) identifies KCl membrane-cell technology
      as accounting for ~9% of US chlorine production, primarily at
      specialty sites targeting KOH markets.
    source_id: epa_chlorine_supply_2022

substitutes:
  - application: water_treatment
    availability: partial
    notes: |
      For primary and residual disinfection: ozone (O₃), UV irradiation,
      chloramines (NH₂Cl), peracetic acid, and chlorine dioxide can
      substitute for elemental chlorine in water treatment. Each alternative
      involves trade-offs in efficacy, cost, or by-product profiles. USGS
      MCS 2025 salt chapter: "No economic substitutes or alternatives for
      salt exist in most applications" (referring to chlorine's feedstock);
      for chlorine itself in water treatment, alternatives exist but at
      higher capital or operating cost.
    source_id: usgs_mcs_2025_salt
  - application: pvc_manufacture
    availability: partial
    notes: |
      PVC substitution with other thermoplastics (polyethylene, polypropylene,
      PET) is technically feasible in some pipe, packaging, and construction
      applications, but requires product redesign and does not substitute
      directly. VCM/EDC production (PVC precursors) has no viable route that
      avoids chlorine chemistry. End-product substitution is therefore partial
      and application-specific.
    source_id: epa_chlorine_supply_2022
  - application: pulp_paper_bleaching
    availability: full
    notes: |
      Elemental chlorine (Cl₂) for pulp bleaching has been largely replaced
      by elemental-chlorine-free (ECF) technology using chlorine dioxide
      (ClO₂) and totally-chlorine-free (TCF) technology using hydrogen
      peroxide and ozone in Europe and North America. Substitution is
      commercially mature for this application.
    source_id: epa_chlorine_supply_2022

end_uses:
  uses:
    - application: pvc_manufacture
      share_pct: 35
      confidence: medium
      notes: |
        Polyvinyl chloride (PVC) via vinyl chloride monomer (VCM) and
        ethylene dichloride (EDC) is the single largest chlorine end use
        worldwide, particularly in China which dominates global PVC
        capacity. US EPA (2022): "construction applications such as
        polyvinyl chloride and epoxies accounted for the largest single
        demand of chlorine" in 2021. Global PVC apparent consumption in
        China alone totaled ~20 million tonnes in 2024 (primarily via
        calcium carbide-based VCM route in China, salt-based in the West).
      source_id: epa_chlorine_supply_2022
    - application: other_organic_chemicals
      share_pct: 27
      confidence: low
      notes: |
        Chlorine as feedstock for organic intermediates excluding PVC:
        propylene oxide (~7%), methylene diphenyl diisocyanate / toluene
        diisocyanate (MDI/TDI, ~8%), epichlorohydrin (~3%), chlorinated
        solvents (CCl₄, CHCl₃, methylene chloride), and other intermediates.
        ~68% of US chlorine production is consumed captively within
        chlor-alkali facilities for derivative chemical production (EPA 2022).
      source_id: epa_chlorine_supply_2022
    - application: inorganic_chemicals
      share_pct: 18
      confidence: low
      notes: |
        Production of inorganic chlorine compounds: hydrochloric acid (HCl)
        sold on merchant market (~7%), sodium hypochlorite bleach (~5%),
        calcium hypochlorite (~2%), ferric chloride (water treatment coagulant),
        chlorates and perchlorates, and other inorganic derivatives.
      source_id: epa_chlorine_supply_2022
    - application: water_treatment
      share_pct: 8
      confidence: medium
      notes: |
        Direct use of Cl₂ gas for municipal drinking water and wastewater
        disinfection, algae control, and on-site generation of chlorine
        dioxide. US EPA (2022): water treatment (including industrial
        applications) accounts for approximately 9% of all domestic US
        chlorine production; of that, municipal water/wastewater represents
        ~5% of total US production. 32% of US chlorine reaches the merchant
        market, of which water treatment is the second-largest use.
      source_id: epa_chlorine_supply_2022
    - application: pulp_paper_bleaching
      share_pct: 4
      confidence: medium
      notes: |
        Chlorine use in pulp bleaching has declined sharply in Europe and
        North America following the shift to ECF (elemental-chlorine-free)
        and TCF (totally-chlorine-free) processes. Remaining use is in
        chlorine dioxide generation at kraft pulp mills and specialty
        paper grades.
      source_id: epa_chlorine_supply_2022
    - application: other
      share_pct: 8
      confidence: low
      notes: |
        Other uses: agrochemicals and pharmaceuticals (chlorine in active
        ingredients), textile bleaching, metal cleaning, rubber production,
        and miscellaneous industrial applications.
      source_id: epa_chlorine_supply_2022
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Chlorine is not included on the US Critical Minerals List, the EU Critical
    Raw Materials list, or the EU Strategic Raw Materials list. It is an
    industrial chemical produced at large scale in major consuming nations
    (US, China, Europe) with distributed domestic manufacturing capacity.
    However, US EPA's 2022 Chlorine Supply Chain Profile classified chlorine
    as "Moderate-High" supply disruption risk for the water sector specifically,
    citing: high criticality (essential for water disinfection), high likelihood
    of disruption (COVID-19 + Winter Storm Uri precedent), and low vulnerability
    (distributed US manufacturing). Supply is not import-constrained for the US
    — imports from Canada represent only ~2% of US consumption.

geopolitical_events:
  - date: 2021-02
    event: "Winter Storm Uri (February 2021) directly impacted Gulf Coast region, causing ~28% temporary loss of US domestic chlor-alkali production capacity"
    impact: |
      Temporary supply shock compounded by concurrent COVID-19-driven demand
      surge (increased disinfection requirements) and subsequent equipment
      failures at facilities in West Virginia, Utah, and Washington.
      Resulted in chlorine allocation reductions to water utilities across
      at least 12 US states. Gulf Coast concentration of chlor-alkali
      facilities amplified single-event vulnerability.
    source_id: epa_chlorine_supply_2022
  - date: 2021-06
    event: "Permanent US chlor-alkali capacity reductions announced 2021: Olin Corporation (Alabama), Occidental Chemical (Niagara Falls NY), and others — multiple plants closed or downsized"
    impact: |
      Structural reduction in US merchant chlorine supply. Combined with
      temporary outages, created a multi-year supply tightness in the US
      merchant market. EPA assessed supply disruption risk as elevated for
      water utilities dependent on merchant-market chlorine.
    source_id: epa_chlorine_supply_2022
  - date: 2022-02
    event: "Russia–Ukraine war and resulting European energy price surge reduced European chlor-alkali capacity utilisation to ~60% through 2022–2023"
    impact: |
      Electrolysis is the single largest operating cost for chlor-alkali
      (3,000–3,400 kWh/tonne Cl₂). Elevated European natural gas and
      electricity prices made marginal European chlor-alkali plants
      uneconomic, leading to temporary shutdowns. Euro Chlor reports
      European chlorine production of 7.29 Mt in 2023, recovering to
      8.04 Mt in 2024 (+10.2%), as energy prices normalised.
    source_id: eurochlor_dec2024
  - date: 2024-01
    event: "Global salt brine demand for chlor-alkali expected to increase, led by Asia; salt exports from Australia and India increased to meet growing demand"
    impact: |
      USGS MCS 2025 salt chapter: "Demand for salt brine used in the
      chloralkali industry was expected to increase in 2024 as demand for
      caustic soda and polyvinyl chloride increases globally, especially
      in Asia." Reflects continued capacity buildout in China and India.
    source_id: usgs_mcs_2025_salt
  - date: 2022-09
    event: "Threatened US rail carrier work stoppage in September 2022 highlighted chlorine supply chain dependence on national rail network"
    impact: |
      ~85% of long-distance chlorine shipments in the US move by rail
      (Branscomb et al. 2010; confirmed Chlorine Institute 2022). Gulf
      Coast concentration of chlor-alkali plants combined with geographically
      dispersed water utilities creates long-haul dependence. A rail
      disruption would directly curtail water treatment chemical supply
      within days to weeks.
    source_id: epa_chlorine_supply_2022

narrative: |
  Chlorine is one of the largest-volume industrial chemicals in the world,
  produced at approximately 75 million metric tonnes per year via the chlor-alkali
  electrolysis process. Unlike mined commodities, chlorine supply is a function
  of electrochemical manufacturing capacity — not geological reserves — with
  sodium chloride brine providing a near-inexhaustible feedstock. The chlor-alkali
  process co-produces chlorine, caustic soda (NaOH), and hydrogen in fixed
  stoichiometric ratios, meaning the markets for these three products are
  permanently linked: excess chlorine cannot be produced without creating
  surplus NaOH, and vice versa. This structural coupling gives rise to the
  "electrochemical unit" (ECU) pricing concept and periodically creates
  economic dislocations when the PVC market (chlorine-driven) and the
  alumina/chemical markets (caustic soda-driven) diverge.

  China dominates global chlorine production at approximately 35 million tonnes
  per year (~47% of world output), driven by one of the largest PVC industries
  on earth: Chinese apparent PVC consumption reached approximately 20 million
  tonnes in 2024. The United States produces ~11 Mt/year, predominantly for
  captive use within its own chemical complex (68% of production in 2022 was
  captive). Europe, via Euro Chlor member companies, produced 8.04 Mt in 2024
  (up 10.2% from 7.29 Mt in 2023 as energy prices normalised post-Ukraine war).
  The three largest end uses globally are PVC manufacture (~35%), other organic
  chemical intermediates (~27%), and inorganic chemicals (HCl, hypochlorites,
  ~18%); water treatment accounts for approximately 8% of global consumption.
  Chlorine is not on any government critical-minerals list, though EPA assessed
  US supply as Moderate-High risk specifically for the water sector.

  The commodity's risk profile is driven by energy cost and geographic
  concentration of production. The 2021 trifecta of Winter Storm Uri, COVID-19
  demand surge, and planned US facility closures demonstrated how quickly
  distributed but weather-exposed manufacturing can become a systemic supply
  bottleneck. European experience from 2022–2023 confirmed that electricity
  price spikes — a direct consequence of gas supply disruptions — can force
  rapid capacity curtailment in an energy-intensive industry. Looking forward,
  growth in Asian chlor-alkali capacity (China, India) is expected to continue,
  underpinned by expanding PVC and caustic soda demand. In Western markets,
  chlorine use in pulp bleaching has largely migrated to chlorine dioxide
  (ECF), while water treatment demand is expected to grow with infrastructure
  investment.

