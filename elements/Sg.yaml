narrative: |
  Seaborgium is not a commodity. It exists only in atom-at-a-time accelerator
  experiments, beginning with the 1974 Berkeley-Livermore synthesis that IUPAC
  later treated as the first convincing production of element 106 and culminating
  in the 1997 formal adoption of the name seaborgium (Sg). There is no mining,
  refining, reserves accounting, or price discovery because the element decays far
  too quickly and is made only for nuclear-structure research.

  By the 2025 atlas snapshot, the relevant commercial-reality analogue is simply
  research infrastructure. JINR's Superheavy Element Factory was in full-scale
  operation from 2024 and reported continued synthesis work on superheavy nuclides,
  including discovery of the new seaborgium isotope Sg-268 during 2020-2022 runs.
  NNDC ENSDF data identify Sg-269, with a 3.1-minute half-life, as the longest-
  lived seaborgium isotope represented in the evaluated dataset used here.

