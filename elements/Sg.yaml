research_only:
  longest_lived_isotope: Sg-269
  half_life_seconds: 186
  discovered_year: 1974
  iupac_recognized_year: 1997
  discovered_at: |
    Berkeley-Livermore collaboration: Lawrence Berkeley Laboratory and Lawrence
    Livermore Laboratory, California, USA. IUPAC's transfermium review described
    the 1974 Berkeley-Livermore synthesis as the first convincing demonstration of
    element 106, while noting contemporaneous Dubna work that did not yet meet the
    same evidentiary standard.
  production_mode: accelerator_generated
  active_production_labs:
    - JINR Dubna
  notes: |
    Seaborgium is a research-only superheavy element with no commercial supply
    chain, reserves, or downstream market. IUPAC's 1997 naming recommendation fixed
    the name and symbol as seaborgium (Sg), and JINR's Superheavy Element Factory
    remained an active source of new seaborgium isotopes by 2025, including the
    2022-2023 work that identified Sg-268 in thorium-calcium fusion experiments.

