    estimated to contain approximately 90 billion tons of iodine. Seaweeds of the
    Laminaria family can accumulate up to 0.45% iodine on a dry basis and represented
    the major commercial source of iodine prior to 1959 (USGS MCS 2025 World Resources).

byproduct_of: []

feedstock_origins:
  - substrate: caliche_ore
    notes: |
      Chilean iodine is extracted from caliche — sodium nitrate evaporite deposits of the
      Atacama Desert. Iodate minerals (predominantly lautarite and dietzeite) co-occur
      with nitrate salts in the caliche horizon. During leaching operations, iodate ions
      dissolve with the nitrate and are subsequently reduced with sodium bisulfite to
      precipitate iodine crystals. Chile produced 22,000 metric tons in 2024e (~67% of
      world production ex-US). USGS MCS 2025 describes this as production from "Chilean
      desert nitrate mines."
    source_id: usgs_mcs_2025_iodine
  - substrate: gas_and_oil_brine
    notes: |
      Iodine-rich brine co-produced with natural gas and oil from deep subsurface
      reservoirs is the dominant feedstock outside Chile. In Japan (9,300 t/yr in 2024e,
      world's second-largest producer), iodine is extracted from brine associated with
      petroleum and gas fields in Chiba and Miyazaki Prefectures; elemental iodine is
      recovered by oxidizing iodide with chlorine and blowing out the iodine vapor. In
      the United States (three companies in northwestern Oklahoma), iodine-rich brine is
      extracted from Anadarko Basin formations. Azerbaijan, Turkmenistan, Russia, and Iran
      also produce iodine from gas- and oil-field brines. USGS MCS 2025 describes these
      as production from "gasfields and oilfields in Japan" and "iodine-rich brine wells
      in northwestern Oklahoma."
    source_id: usgs_mcs_2025_iodine

substitutes:
  - application: animal_feed_catalytic_nutritional_pharmaceutical_photographic
    availability: none
    notes: |
      USGS MCS 2025 substitutes: "No comparable substitutes exist for iodine in many of
      its principal applications, such as in animal feed, catalytic, nutritional,
      pharmaceutical, and photographic uses." Iodine's unique chemistry — its role as an
      essential micronutrient (thyroid hormone synthesis requires iodine), the radiopaque
      properties of iodinated contrast agents in X-ray and CT imaging, and its specific
      reactivity in catalysis and photographic silver iodide chemistry — makes it
      essentially irreplaceable in these applications.
    source_id: usgs_mcs_2025_iodine
  - application: biocide_colorant_ink
    availability: partial
    notes: |
      USGS MCS 2025 substitutes: "Bromine and chlorine could be substituted for iodine
      in biocide, colorant, and ink, although they are usually considered less desirable
      than iodine." Chlorine and bromine-based disinfectants are effective in many
      contexts but may underperform iodine at certain pH ranges, temperatures, or against
      specific pathogens such as Cryptosporidium.
    source_id: usgs_mcs_2025_iodine
  - application: iodine_biocides
    availability: partial
    notes: |
      USGS MCS 2025 substitutes: "Antibiotics can be used as a substitute for iodine
      biocides." In wound and skin antisepsis, topical antibiotics (such as bacitracin
      or mupirocin) or alternative antiseptics (chlorhexidine) can replace iodine-based
      preparations in some clinical settings, though antibiotic resistance concerns limit
      this substitution.
    source_id: usgs_mcs_2025_iodine

end_uses:
  uses:
    - application: x_ray_contrast_media
      share_pct: 35
      confidence: low
      notes: |
        USGS MCS 2025 lists X-ray contrast media (XRCM) as the leading worldwide use of
        iodine in descending order of quantity consumed. Triiodinated benzene derivatives
        (e.g., iohexol, iomeprol, iopamidol) are used as contrast agents in CT scanning,
        angiography, myelography, and urography. Share estimate (~35%) is approximate;
        USGS MCS 2025 does not provide explicit percentage breakdowns for worldwide end
        uses; the ordering is stated as descending by quantity consumed.
      source_id: usgs_mcs_2025_iodine
    - application: pharmaceuticals
      share_pct: 20
      confidence: low
      notes: |
        USGS MCS 2025 lists pharmaceuticals as the second leading worldwide use of iodine.
        Applications include antiseptics (povidone-iodine), thyroid disorder treatments,
        disinfectants, and radiopharmaceuticals (I-131 for thyroid cancer treatment).
        Share estimate (~20%) is approximate; no explicit percentage stated in chapter.
      source_id: usgs_mcs_2025_iodine
    - application: liquid_crystal_displays
      share_pct: 15
      confidence: low
      notes: |
        USGS MCS 2025 lists liquid crystal displays (LCDs) as the third leading worldwide
        use of iodine. Iodine is incorporated into polyvinyl alcohol (PVA) polarizing films
        used in LCD panels for televisions, computer monitors, and smartphones. The growth
        of consumer electronics drove strong iodine demand in this application.
        Share estimate (~15%) is approximate.
      source_id: usgs_mcs_2025_iodine
    - application: iodophors
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 lists iodophors as the fourth leading worldwide use of iodine.
        Iodophors are complexes of iodine with a carrier polymer (commonly
        polyvinylpyrrolidone, PVP) used as antiseptics and disinfectants in animal
        husbandry, food processing, and healthcare (e.g., Betadine). Share estimate
        (~10%) is approximate.
      source_id: usgs_mcs_2025_iodine
    - application: animal_feed
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 lists animal feed as the fifth leading worldwide use of iodine.
        Iodine is an essential micronutrient added to animal feeds as potassium iodate,
        calcium iodate, or ethylenediamine dihydroiodide (EDDI) for thyroid function and
        growth. USGS MCS 2025 also notes no comparable substitutes exist for iodine in
        animal feed. Share estimate (~10%) is approximate.
      source_id: usgs_mcs_2025_iodine
    - application: fluorochemicals
      share_pct: 6
      confidence: low
      notes: |
        USGS MCS 2025 lists fluorochemicals as the sixth leading worldwide use of iodine.
        Iodine serves as a catalyst or intermediate in the production of fluorinated
        organic compounds including fluoropolymers and refrigerants via iodofluorocarbon
        intermediates. Share estimate (~6%) is approximate.
      source_id: usgs_mcs_2025_iodine
    - application: other_uses
      share_pct: 4
      confidence: low
      notes: |
        USGS MCS 2025 lists other applications including biocides, food supplements, and
        nylon. Iodized salt (sodium iodate or potassium iodate added to table salt)
        provides iodine as a dietary supplement to prevent iodine deficiency disorders.
        Nylon production may use iodine as an additive. U.S. domestic consumption context:
        crude iodine and inorganic iodine compounds account for approximately 80% of
        domestic consumption; organic iodine compounds account for about 20% (USGS MCS
        2025 Domestic Production and Use).
      source_id: usgs_mcs_2025_iodine
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Iodine is not included on the U.S. 2022 Critical Minerals List, the EU Critical Raw
    Materials list (CRM 2023/Regulation 2024/1252), or the EU Strategic Raw Materials
    list (CRMA 2024). Although the U.S. is heavily import-reliant for iodine (net import
    reliance >50% in 2020-22 and 2024e, <50% in 2023), with Chile supplying 90% and
    Japan 9% of imports (2020-23 average), the element does not appear on government
    critical minerals frameworks. U.S. domestic production from Oklahoma brine operations
    (three companies) provides a meaningful domestic base, and world resources are
    effectively unlimited given seawater's estimated 90 billion tons of iodine content.

