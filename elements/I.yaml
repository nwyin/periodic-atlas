symbol: I
atomic_number: 53
name: iodine
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports all production, import, and export data in metric tons of
  elemental iodine content, unless otherwise specified. Commercial iodine is traded
  primarily as crude iodine crystals (flakes or prills, typically ≥99.5% I purity)
  and as a range of inorganic and organic derivatives. The reference price used by
  USGS is the average cost, insurance, and freight (CIF) unit value of U.S. iodine
  imports in U.S. dollars per kilogram of elemental iodine. Industry publications
  (cited in USGS Events text) also report spot prices for iodine crystal in $/kg.
  U.S. domestic production is withheld (W) in all USGS statistics to protect
  company proprietary data; published world production totals therefore exclude U.S.
  output (USGS MCS 2025 table footnote 4: "Excludes U.S. production.").

  NOTE on pdftotext layout artifact: the USGS table footnote superscript "4" is
  appended to the "World total (rounded)" row label; pdftotext merges it into the
  leading digit of the 2023 figure, rendering "32,600" as "432,600". The correct
  world totals are 32,600 (2023) and 33,000 (2024e), consistent with the sum of
  all named-country rows.

