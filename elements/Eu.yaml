criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Europium is classified as critical under the US 2022 Critical Minerals List as part
    of "rare earth elements" (a group designation). US net import reliance for REE
    compounds and metals: 80% in 2024e (down from >95% in 2020–2023) per USGS MCS 2025
    salient statistics. Light rare earth elements and heavy rare earth elements are both
    designated as Critical Raw Materials and Strategic Raw Materials under EU Regulation
    2024/1252 (Critical Raw Materials Act, CRMA); europium's position between the light
    and heavy lanthanide groups means it falls within the broadly-defined "rare earths"
    category on both EU lists. Import sources 2020–23: China 70%, Malaysia 13%,
    Japan 6%, Estonia 5% (USGS MCS 2025).

geopolitical_events:
  - date: "2024"
    event: "Global REE mine production increases to 390,000 t REO in 2024e; Eu output estimated at ~390 t Eu₂O₃ derived at 0.1% basket share"
    impact: |
      USGS MCS 2025 reports world REE production up from 376,000 t in 2023 to 390,000 t
      in 2024e, driven by China (+15,000 t), Nigeria (+5,800 t), and Thailand (+9,400 t),
      partially offset by Burma (-12,000 t). For europium, the implied production increase
      is from ~376 t to ~390 t at 0.1% basket share — a ~3.7% rise largely irrelevant to
      Eu market conditions, which are driven by phosphor demand trends rather than REO
      basket volumes.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "Europium oxide price stabilizes at $27/kg for 2023–2024, down from peak levels exceeding $1,000/kg during 2010–2012 Chinese export restrictions"
    impact: |
      USGS MCS 2025 salient statistics show Eu₂O₃ (99.99%) at $27/kg in both 2023 and
      2024e, $30/kg in 2022, and $31/kg in 2020–2021. The gradual decline reflects
      structural demand contraction from CRT television extinction (early 2010s) and
      accelerating LED adoption displacing CFL and fluorescent lamp phosphors. Unlike
      magnet REEs (Nd, Pr, Dy) which face demand growth from EVs and wind turbines,
      europium's phosphor-dominated demand base is in structural decline, suppressing
      price recovery. The ~$27–31/kg range represents market equilibrium for the current
      phosphor-dominated demand profile.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024"
    event: "US net import reliance for REE compounds and metals declines to 80% in 2024e from >95% in prior years"
    impact: |
      USGS MCS 2025: US domestic REE compound and metal production reached 7,600 t
      total in 2024 (including California NdPr compounds and Utah RE compounds per
      footnote 3), up from 1,920 t in 2023. Net import reliance fell to 80%. For
      europium specifically, no domestic US separation of high-purity Eu₂O₃ is
      reported; phosphor-grade Eu₂O₃ continues to be imported primarily from Chinese
      sources.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Europium occupies a distinctive commercial niche within the rare earth supply chain:
  it is the rarest of the commonly-traded lanthanides by basket share (~0.1% of total
  REO production, yielding an estimated ~390 tonnes Eu₂O₃ in 2024), yet it commands a
  significantly higher price ($27/kg in 2024e for 99.99% Eu₂O₃) than the bulk REEs
  La and Ce ($1/kg) and even Nd ($56/kg for 99.5%). This premium reflects Eu's
  concentrated end-use profile in high-purity phosphor applications, where its unique
  luminescent properties — Eu³⁺ provides narrow-band red emission and Eu²⁺ provides
  blue-to-green emission — are difficult to replicate with cheaper alternatives. USGS
  MCS 2025 explicitly tracks Eu₂O₃ price at 99.99% minimum purity, the only REE in the
  salient statistics table priced at that purity tier alongside the 99.5% bulk grades.

  The defining narrative for europium is structural demand contraction from the LED
  lighting revolution. Eu was historically the critical element in CRT television red
  phosphors and compact fluorescent lamp (CFL) phosphors — both applications now
  essentially extinct or in terminal decline. LED phosphors use far less phosphor mass
  per lumen than fluorescent technology, and some LED formulations use Mn⁴⁺-activated
  or Ce³⁺-based alternatives that avoid Eu entirely. The combination of CRT extinction
  (~2000–2015), CFL displacement by LEDs (~2015–present), and phosphor mass efficiency
  gains has compressed the Eu market significantly from its pre-2010 scale. Unlike
  neodymium and praseodymium, europium does not benefit from EV or wind turbine demand
  growth. Eu prices stabilized in the $27–31/kg range from 2020–2024, far below the
  >$1,000/kg peaks seen during the 2010–2012 Chinese REE export restriction episode.

  China controls approximately 90% of REE separation capacity and dominates Eu₂O₃
  production at phosphor-grade purity. US net import reliance for REE compounds and
  metals was 80% in 2024e (down from >95% in 2020–2023), but high-purity Eu₂O₃ for
  phosphor applications has no significant non-Chinese source. Despite its modest
  market scale, europium retains strategic designation under the US Critical Minerals
  List and EU Regulation 2024/1252 (Critical Raw Materials Act), reflecting its
  supply-chain concentration risk and specialized application profile. Minor but
  stable nuclear applications (neutron absorbers in reactor control), security printing
  (anti-counterfeiting inks exploiting Eu fluorescence), and biochemical assay
  reagents (time-resolved fluorescence immunoassays) diversify Eu demand modestly
  beyond the declining phosphor market.

