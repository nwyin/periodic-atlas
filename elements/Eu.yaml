symbol: Eu
atomic_number: 63
name: europium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a grouped commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element tonnage
  is not published for individual REEs. Per-element attribution for europium requires
  multiplying the aggregate by Eu's typical basket share. Europium is commercially
  traded as Eu₂O₃ (europium(III) oxide) at ≥99.99% minimum purity for phosphor and
  specialty applications — a higher purity specification than the 99.5% grade typical
  for La, Ce, and Nd oxides, reflecting Eu's use in precision luminescent applications.
  USGS MCS 2025 salient statistics table explicitly lists europium oxide at 99.99%
  minimum purity as a tracked price commodity. All production figures in this file are
  derived by multiplying the USGS-reported aggregate REO totals by Eu's typical basket
  share of ~0.1%, which is not reported directly by USGS. The basket share varies by
  deposit type: bastnaesite (Mountain Pass CA, Bayan Obo CN) yields ~0.1–0.15% Eu₂O₃;
  ion adsorption clay deposits (southern China, Myanmar, Thailand) yield ~0.2–0.5%
  Eu₂O₃ due to heavy-REE enrichment. All data are in metric tons REO equivalent unless
  otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 390
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Eu's typical basket share of ~0.1% gives
      ~390 t Eu₂O₃ equivalent. Europium's basket share is not reported separately by
      USGS; the 0.1% factor is an industry consensus figure for the global weighted
      average across bastnaesite-dominant production. Ion adsorption clay deposits
      contributing ~11% of world REO (Myanmar + Thailand + SE Asia) have higher Eu
      content (~0.2–0.5%), suggesting the true global average may be 0.10–0.15%.
      Europium output is not officially disaggregated from the REE basket in public
      USGS data; this figure carries low confidence. The 2023 comparable estimate is
      ~376 t at the same 0.1% share applied to 376,000 t world total.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        notes: |
          China 2024e REE total: 270,000 t REO (production quota per USGS footnote 14;
          excludes undocumented production). China share: 270,000 / 390,000 = 69.2%.
          Estimated Eu component: ~270 t Eu₂O₃ at 0.1% basket share. China's southern
          ion adsorption clay deposits in Jiangxi, Fujian, and Guangdong have above-average
          Eu content, meaning China's actual share of global Eu output may exceed 69%.
          Production increased from 255,000 t REO in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: US
        share_pct: 11.5
        notes: |
          US 2024e REE total: 45,000 t REO from bastnaesite concentrates at Mountain Pass,
          CA (MP Materials), valued at ~$260 million. Share: 45,000 / 390,000 = 11.5%.
          Estimated Eu: ~45 t Eu₂O₃ at 0.1% basket share. Mountain Pass bastnaesite
          contains approximately 0.1–0.15% Eu₂O₃ of total REOs. Production up from
          41,600 t REO in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: MM
        share_pct: 7.9
        notes: |
          Burma (Myanmar) 2024e REE total: 31,000 t REO, down from 43,000 t in 2023
          (-28% YoY). Share: 31,000 / 390,000 = 7.9%. Production primarily from ion
          adsorption clay deposits which are heavy-REE enriched and contain above-average
          Eu concentrations; estimated Eu contribution ~31 t at 0.1% (conservative).
          Production estimated from China import records (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: AU
        share_pct: 3.3
        notes: |
          Australia 2024e REE total: 13,000 t REO, down from 16,000 t in 2023. Lynas
          Rare Earths Mt. Weld carbonatite mine (Western Australia), processed at LAMP
          (Malaysia). Share: 3.3% of world. Estimated Eu: ~13 t at 0.1% basket share.
          Production estimated from China import data (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: NG
        share_pct: 3.3
        notes: |
          Nigeria 2024e REE total: 13,000 t REO, up from 7,200 t in 2023 (+81% YoY).
          USGS cites Nigeria as a driver of 2024 global production growth. Share: 3.3%.
          Estimated Eu: ~13 t at 0.1% basket share. Production estimated from China
          import data (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: TH
        share_pct: 3.3
        notes: |
          Thailand 2024e REE total: 13,000 t REO, up from 3,600 t in 2023 (+261% YoY).
          Ion adsorption clay deposits; Eu content likely above the bastnaesite basket
          average. Share: 3.3% of world. Estimated Eu: ~13 t at 0.1% basket share.
          Production estimated from China import data (USGS footnote 12).
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 2.3
        notes: |
          Remaining producers 2024e: India 2,900 + Russia 2,500 + Madagascar 2,000 +
          Other 1,100 + Vietnam 300 + Malaysia 130 + Brazil 20 ≈ 8,950 t REO, ~2.3%
          of world total. Estimated combined Eu contribution ~9 t at 0.1% basket share.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 90
        notes: |
          China controls approximately 90% of global REE separation and refining
          capacity. High-purity Eu₂O₃ (≥99.99%) production for phosphor applications
          is concentrated in specialized Chinese facilities in Jiangxi and Fujian
          provinces. USGS MCS 2025 import sources (2020–23) confirm China supplied 70%
          of US REE compound and metal imports; China's actual global separation share
          is higher (~85–90%) as non-Chinese separators also serve non-US markets.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 7
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate and produces separated REE products including
          Eu₂O₃. USGS MCS 2025 import sources (2020–23): Malaysia 13% of US REE imports.
          LAMP is the world's largest non-Chinese REE separation facility.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Other non-Chinese Eu₂O₃ producers: Neo Performance Materials (Sillamäe,
          Estonia, 5% of US imports 2020–23), Japanese processors (6% of US imports
          2020–23), and nascent Mountain Pass separation (California). Phosphor-grade
          Eu₂O₃ at ≥99.99% purity is primarily a Chinese specialty product. Estonia
          and Japan source feed from Australian and Chinese intermediates per USGS text.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Eu-specific figures derived from REO totals using the ~0.1% basket
    share assumption; actual per-element disaggregation is not available from public
    USGS data. Europium is the rarest of the commercially-recovered light-to-middle
    lanthanides by basket share; its low tonnage combined with a relatively high price
    (~$27/kg in 2024e) means the Eu market is a small fraction of total REE value.

