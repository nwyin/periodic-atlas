byproduct_of: []

feedstock_origins:
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.12
    notes: |
      Bastnaesite (rare-earth fluorocarbonate) is the primary commercial source of light
      and middle rare earth elements including Eu. Eu₂O₃ typically represents ~0.1–0.15%
      of total REOs in commercial bastnaesite concentrates (Mountain Pass ~0.1–0.15%;
      Bayan Obo ~0.1%). USGS MCS 2025 confirms bastnaesite mined as primary product at
      Mountain Pass in 2024. Europium is typically concentrated in the heavy-fraction
      separation stream during solvent extraction processing.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.1
    notes: |
      Monazite (rare-earth phosphate, (Ce,La,Pr,Nd,Eu)PO₄) stockpiled as a separated
      concentrate or recovered as an accessory mineral in heavy-mineral-sand concentrates.
      USGS MCS 2025 confirms monazite stockpiled in the southeastern United States in 2024.
      Eu typically represents ~0.1% of total REOs in monazite. Thorium content in monazite
      complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 0.3
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Myanmar, Thailand) are enriched in middle and heavy rare earths
      relative to bastnaesite. Eu content is higher (~0.2–0.5% of total REOs) in these
      deposits than in bastnaesite, making them disproportionately important sources of
      Eu despite contributing a minority share of total REO production. These deposits
      account for most of the production from Myanmar and Thailand reported in USGS MCS 2025.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: phosphors_led_and_lamp
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For Eu-based phosphors specifically: manganese(IV)-activated
      potassium fluorosilicate (K₂SiF₆:Mn⁴⁺) provides narrow-band red emission and
      has partially displaced Eu³⁺-based red phosphors in some LED lighting products,
      with comparable luminous efficacy. Ce³⁺-doped YAG (Ce:YAG) phosphors provide
      warm-white LED emission without europium, though with different color rendering
      characteristics. For blue LED phosphors, Eu²⁺-activated BAM
      (BaMgAl₁₀O₁₇:Eu²⁺) faces partial substitution from Ce³⁺-doped alternatives.
      No complete substitute matches the full spectral and efficiency profile of
      Eu-based phosphors across all lighting applications.
    source_id: usgs_mcs_2025_rare_earths
  - application: nuclear_neutron_absorption
    availability: partial
    notes: |
      In nuclear reactor neutron absorption and control applications, gadolinium (Gd)
      and hafnium (Hf) can substitute for Eu-based control rod materials. Gd has an
      even higher thermal neutron absorption cross-section than Eu and is more commonly
      used in neutron poison applications. Partial substitutability exists within the
      neutron-absorber materials class. USGS MCS 2025 general substitutes statement
      applies.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: phosphors_led_and_lamp
      share_pct: 75
      confidence: low
      notes: |
        Phosphors are the dominant end use for europium. Eu³⁺ provides the red
        emission in rare-earth-activated phosphors for fluorescent lamps, compact
        fluorescent lamps (CFLs), and LED lighting (Y₂O₃:Eu, Y₂O₂S:Eu, and related
        host materials). Eu²⁺ provides blue emission in LED phosphors (BAM:Eu²⁺) and
        contributes to warm-white LED spectra. The phosphor market has contracted
        significantly since ~2010 due to: (1) extinction of CRT televisions and
        monitors (a large former Eu consumer); (2) declining CFL market with LED
        substitution; (3) LED phosphors require less total phosphor per lumen than
        fluorescent technology. USGS MCS 2025 lists "ceramics and glass" as a REE
        end use, which includes phosphor applications. The 75% share is an industry
        consensus estimate; USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: glass_ceramics_specialty
      share_pct: 10
      confidence: low
      notes: |
        Eu₂O₃ and Eu-doped compounds are used in specialty glass for UV absorption,
        security printing inks (exploiting Eu fluorescence under UV illumination for
        anti-counterfeiting in banknotes and documents), and luminescent ceramics.
        Eu-doped crystal materials are used in scintillators and X-ray imaging screens.
        Share is an industry estimate; USGS MCS 2025 lists ceramics and glass among
        REE end uses.
      source_id: usgs_mcs_2025_rare_earths
    - application: nuclear_neutron_absorption
      share_pct: 8
      confidence: low
      notes: |
        Europium has a very high thermal neutron absorption cross-section (~4,600 barns
        for Eu-151 and ~9,200 barns for Eu-153 combined), making Eu₂O₃ and Eu-bearing
        compounds useful as neutron poisons and control rod materials in nuclear reactors.
        Applications include burnable absorbers in nuclear fuel and reactor shielding
        elements. Share is an estimate; this application is stable relative to phosphors.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_uses
      share_pct: 7
      confidence: low
      notes: |
        Other applications include Eu-labelled biochemical reagents for medical diagnostics
        (time-resolved fluorescence immunoassays exploiting Eu³⁺ long fluorescence
        lifetime), electroluminescent devices, research-grade Eu-doped laser materials,
        and minor metallurgical additions. Share is an estimate aggregating several minor
        applications.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

