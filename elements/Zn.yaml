geopolitical_events:
  - date: "2023-11"
    event: "Middle Tennessee zinc mines (US) suspend operations"
    impact: |
      Operations suspended November 2023. No production from these mines in 2024. During the
      closure, drilling work was conducted to define additional zinc, germanium, and gallium
      resources, indicating potential future value beyond zinc alone. Contributed to the slight
      decline in US mine production from 767,000 to 750,000 tonnes.
    source_id: usgs_mcs_2025_zinc
  - date: "2024-09"
    event: "US Department of Commerce initiates antidumping and countervailing duty investigations on corrosion-resistant (galvanized) steel from 10 trading partners"
    impact: |
      Investigations cover galvanized steel imported from multiple countries. Creates policy
      uncertainty for US zinc-consuming galvanized steel manufacturers and may affect domestic
      demand for zinc if investigations result in tariffs that curtail galvanized steel imports
      or stimulate domestic production.
    source_id: usgs_mcs_2025_zinc
  - date: "2024-10"
    event: "US International Trade Commission makes preliminary injury determination on galvanized steel imports"
    impact: |
      ITC preliminarily determined that US industry was materially injured by corrosion-resistant
      steel imports. Final determinations expected in 2025. Potential tariff imposition could
      shift competitive dynamics between domestic and imported galvanized steel.
    source_id: usgs_mcs_2025_zinc
  - date: "2024-09"
    event: "ILZSG Lisbon session projects 2024 global zinc refined production-to-consumption deficit of 164,000 tonnes"
    impact: |
      International Lead and Zinc Study Group (September 30, 2024) forecasts global refined
      zinc production declining 1.8% to 13.7 million tonnes due to limited concentrate
      availability, while consumption rises 1.8% to 13.8 million tonnes. The projected deficit
      contrasts with the modest LME price decline in 2024, suggesting inventory drawdown
      rather than immediate price relief.
    source_id: ilzsg_2024_forecast

narrative: |
  Zinc is the world's fourth most consumed metal, with approximately 12 million tonnes of mine
  production per year (zinc content), concentrated primarily in China (33%), Peru (11%), and
  Australia (9%). The metal's commercial identity is inseparable from its galvanizing function:
  roughly half of all zinc produced ends up as a sacrificial corrosion-protection coating on
  steel, exploiting zinc's electrochemical preference to corrode before the underlying iron.
  Galvanized steel is a foundational input for construction, automotive, and infrastructure.

  Pricing in 2024 reflected tightening concentrate supply: the LME cash average for Special
  High Grade zinc was approximately $1.26/lb (~$2,778/tonne), down 5% from 2023, yet the
  International Lead and Zinc Study Group projected a 164,000-tonne production-consumption
  deficit as smelters faced limited concentrate availability. The North American SHG premium
  over LME narrowed in 2024 but remained elevated. US apparent consumption of refined zinc
  fell 11% to 820,000 tonnes in 2024e, while net import reliance on refined metal reached 73%.
  Canada supplied 59% of US refined zinc imports (2020–23 average), with Mexico and Korea also
  significant. US concentrate exports (primarily to Asia) made the US a net exporter of zinc
  in ore form despite relying heavily on imports for refined metal.

  World reserves stand at 230 million tonnes — approximately 19 years of current production —
  and identified resources total approximately 1.9 billion tonnes, with additional undiscovered
  resources in polymetallic volcanic massive sulfide (VMS) and sediment-hosted (SEDEX) systems.
  Australia alone holds 28% of world reserves, reflecting the scale of the McArthur River and
  Mount Isa districts. Zinc is not on the US 2022 Critical Minerals List or EU CRMA lists,
  reflecting its broad geographic distribution, large resource base, and the absence of any
  single controlling supplier.

