symbol: Zn
atomic_number: 30
name: zinc
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports zinc production on a zinc-content basis (metal equivalent),
  not gross ore or concentrate tonnage. The salient statistics table header reads:
  "Data in thousand metric tons, zinc content, unless otherwise specified."
  The primary commercial forms are Special High Grade (SHG) zinc metal (≥99.995% Zn)
  traded on the LME, and zinc concentrate (zinc sulfide/sphalerite, typically 50–55% Zn).
  Prices in the USGS salient statistics table are in U.S. cents per pound; price entries
  below convert to USD per pound. LME prices are for SHG zinc (Grade A equivalent).

