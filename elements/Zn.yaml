feedstock_origins:
  - substrate: zinc_sulfide_ore
    notes: |
      Sphalerite (ZnS, iron-bearing marmatite) is the dominant zinc ore mineral, typically
      grading 3–15% Zn. Primary mining districts include Red Dog (Alaska, US), Mount Isa and
      Century (Australia), Antamina (Peru), Peñasquito (Mexico), and Yunnan/Hunan/Guangxi
      provinces (China). Mined ore is concentrated to ~50–55% Zn for smelter feed.
    source_id: usgs_mcs_2025_zinc
  - substrate: electric_arc_furnace_dust
    notes: |
      USGS MCS 2025 recycling section: "crude zinc oxide recovered from electric arc furnace
      dust" is a key secondary feedstock. EAF dust (generated in electric steelmaking) typically
      contains 15–30% Zn and is processed by Waelz kiln or equivalent to produce crude zinc
      oxide that feeds into primary or secondary zinc smelters.
    source_id: usgs_mcs_2025_zinc
  - substrate: galvanizing_residues
    notes: |
      USGS MCS 2025 recycling section: "galvanizing residues" are a secondary zinc feedstock
      recovered at both primary and secondary US smelters. Includes zinc dross and zinc ash
      from hot-dip galvanizing lines.
    source_id: usgs_mcs_2025_zinc

substitutes:
  - application: galvanized_steel
    availability: partial
    notes: |
      USGS MCS 2025: "Aluminum and plastics substitute for galvanized sheet in automobiles."
      Aluminum-coated steel (Galvalume/Zincalume) and high-strength low-alloy steels with
      organic coatings are the main competitive alternatives in automotive applications.
      Galvanized steel remains preferred for most structural and infrastructure applications.
    source_id: usgs_mcs_2025_zinc
  - application: protective_coatings
    availability: partial
    notes: |
      USGS MCS 2025: "Aluminum alloys, cadmium, paint, and plastic coatings replace zinc
      coatings in other applications." Organic paint systems and thermal spray aluminum are
      used where hot-dip galvanizing is impractical; cadmium has been largely phased out for
      environmental reasons.
    source_id: usgs_mcs_2025_zinc
  - application: zinc_base_alloys
    availability: partial
    notes: |
      USGS MCS 2025: "Aluminum- and magnesium-base alloys are major substitutes for zinc-base
      diecasting alloys." Aluminum die casting is the most common competitive form for structural
      components; magnesium alloys serve weight-sensitive applications.
    source_id: usgs_mcs_2025_zinc
  - application: chemical_electronic_pigment
    availability: partial
    notes: |
      USGS MCS 2025: "Many elements are substitutes for zinc in chemical, electronic, and
      pigment uses." Examples include titanium dioxide in white pigments and alternative
      semiconductor materials in electronics.
    source_id: usgs_mcs_2025_zinc

end_uses:
  uses:
    - application: galvanized_steel
      share_pct: 50
      confidence: low
      notes: |
        USGS MCS 2025: "most was used to produce galvanized steel." No explicit percentage given
        in the chapter. Estimated ~50% based on typical US and global zinc consumption patterns.
        Galvanizing—applying a zinc coating to steel for corrosion protection—is the largest
        single end use of zinc worldwide.
      source_id: usgs_mcs_2025_zinc
    - application: brass_and_bronze
      share_pct: 17
      confidence: low
      notes: |
        USGS MCS 2025 lists brass and bronze as the second-largest US end use after galvanized
        steel. Estimated ~17%. Brass (Cu-Zn alloy) is used extensively in plumbing fixtures,
        electrical connectors, and musical instruments.
      source_id: usgs_mcs_2025_zinc
    - application: zinc_base_alloys
      share_pct: 16
      confidence: low
      notes: |
        USGS MCS 2025 lists zinc-base alloys as the third-largest US end use. Estimated ~16%.
        Primarily high-pressure die casting alloys (Zamak family) for automotive, electronics,
        and consumer hardware components.
      source_id: usgs_mcs_2025_zinc
    - application: other_uses
      share_pct: 17
      confidence: low
      notes: |
        USGS MCS 2025 lists "other uses" as the remaining category. Estimated ~17% residual.
        Includes zinc oxide (rubber vulcanization, ceramics, sunscreen), zinc chemicals,
        architectural rolled zinc sheet and strip, and miscellaneous industrial applications.
      source_id: usgs_mcs_2025_zinc
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Zinc is not on the US 2022 Critical Minerals List, the EU CRM 2023 list, or the EU
    Strategic Raw Materials list (CRMA 2024). It is a tier-4 high-volume workhorse metal with
    geographically diversified production (China 33%, Peru 11%, Australia 9%, India 7%, US 6%,
    Mexico 6%). US net import reliance on refined zinc was 73% in 2024e per USGS salient
    statistics, but abundant global reserves (230 million tonnes) and multiple large producing
    nations preclude critical designation.

