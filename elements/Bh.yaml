research_only:
  longest_lived_isotope: Bh-270
  half_life_seconds: 60.0
  discovered_year: 1981
  iupac_recognized_year: 1997
  discovered_at: |
    Gesellschaft fur Schwerionenforschung (GSI; now GSI Helmholtzzentrum fur
    Schwerionenforschung) in Darmstadt, Germany. GSI reports that element 107
    was first produced on 1981-02-24 from chromium on bismuth, and IUPAC later
    adopted the name and symbol bohrium (Bh) in its 1997 transfermium
    recommendations. [Sources: gsi_new_elements, iupac_transfermium_1997]
  production_mode: accelerator_generated
  active_production_labs:
    - GSI Darmstadt
    - JINR Dubna
  notes: |
    Bohrium has no commercial supply chain and exists only in atom-at-a-time
    superheavy-element experiments. IUPAC's current periodic table denotes the
    longest confirmed mass number for bohrium as [270], while the NNDC ENSDF
    decay dataset labels the relevant parent decay as "270BH A DECAY (1.0 M),"
    so the half-life is represented here as approximately one minute.
    JINR is included as an active production lab by inference from its current
    heavy-ion facilities for superheavy-element synthesis; no economic market
    is associated with that capability. [Sources: iupac_periodic_table_2022,
    nndc_270bh_decay_2019, jinr_facilities]

