symbol: Bh
atomic_number: 107
name: bohrium
category: synthetic_superheavy
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade. Bohrium is produced atom-by-atom in heavy-ion fusion
  experiments rather than sold in metal, oxide, or concentrate form. The
  half-life convention below follows the longest-lived confirmed nuclide shown
  by IUPAC's current periodic table mass-number bracket and NNDC ENSDF decay
  dataset naming. [Sources: iupac_periodic_table_2022, nndc_270bh_decay_2019]

