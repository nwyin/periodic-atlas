narrative: |
  Bohrium is a research-only transactinide with no mine supply, refining base,
  reserves, or price series. Its commercial reality is the absence of commerce:
  laboratories make individual atoms in accelerator campaigns to probe nuclear
  stability, decay chains, and the chemistry of the superheavy region.
  [Sources: gsi_new_elements, iupac_transfermium_1997]

  The accepted discovery route is GSI Darmstadt's 1981 production of element
  107 via chromium-on-bismuth bombardment. IUPAC formalized the name bohrium
  and symbol Bh in 1997, and IUPAC's present periodic table identifies mass
  number 270 as the longest-lived confirmed bohrium nuclide. NNDC ENSDF shows a
  corresponding "270BH A DECAY (1.0 M)" dataset, supporting the one-minute
  order-of-magnitude lifetime used in this record. [Sources:
  gsi_new_elements, iupac_transfermium_1997, iupac_periodic_table_2022,
  nndc_270bh_decay_2019]

