symbol: Pd
atomic_number: 46
name: palladium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports platinum-group metals (PGMs) collectively in one chapter,
  with production data in kilograms of PGM content. Unlike rare earth elements, USGS
  separately reports palladium and platinum production by country; rhodium, ruthenium,
  iridium, and osmium are not individually disaggregated in production tables. Reserves
  are reported as a combined "PGM reserves" figure not split by individual element.
  Palladium is commercially traded as Pd metal sponge, ingot, powder, or in salt form
  (palladium chloride, palladium nitrate) for chemical and catalyst applications. Prices
  are quoted in US dollars per troy ounce (Engelhard unallocated metal average, reported
  by S&P Global Platts Metals Week per USGS footnote 6). All production data are on a
  palladium-content (metal-equivalent) basis in kilograms unless otherwise noted.
  PGM production reporting uses kg as the base unit (1,000 kg = 1 metric ton).

production:
- reporting_year: 2024
  mine:
    value: 190000
    unit: kg_per_year
    form: contained_element
    approximate: true
    confidence: high
    notes: |
      USGS MCS 2025 (p.137): world mine production of palladium 2024e = 190,000 kg
      (rounded), down from 208,000 kg in 2023 (−8.7% YoY). Palladium is directly
      reported by country in the USGS PGM chapter; per-Pd tonnage is not derived
      from a basket share but is explicitly tabulated. Pd represents approximately
      44% of the full 6-PGM basket by 2024e production: Pd 190,000 kg + Pt 170,000
      kg + Rh ~30,000 kg + Ru ~35,000 kg + Ir ~7,000 kg + Os negligible ≈ 432,000 kg
      total PGMs 2024e. Production declined primarily due to Russia disruptions
      (natural disasters, lower ore grades, Russia-Ukraine conflict impacts on
      Nornickel) and South Africa care-and-maintenance decisions amid low prices.
      US mine production 2024e: 8,000 kg from one company in Montana (Sibanye-Stillwater).
    source_id: usgs_mcs_2025_pgm
  grouped_reporting: true
  commodity_group: platinum_group_metals
  mining_by_country:
    shares:
      - country: RU
        share_pct: 39.5
        quantity:
          value: 75000
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Russia 2024e: 75,000 kg Pd; down from 87,000 kg in 2023 (−14% YoY).
          Nornickel (Norilsk Nickel) in the Norilsk-Talnakh district (Krasnoyarsk
          Krai, Siberia) dominates Russian PGM production, processing nickel-copper
          sulfide ores where Pd is the dominant PGM (~60-65% of Norilsk PGM basket).
          Production decreased owing to natural disasters, lower metal grades, ore
          recovery issues, Russia-Ukraine conflict disruptions, and planned outages
          at a major metallurgical plant per USGS chapter text. Russia is historically
          the world's largest Pd producer.
        source_id: usgs_mcs_2025_pgm
      - country: ZA
        share_pct: 37.9
        quantity:
          value: 72000
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          South Africa 2024e: 72,000 kg Pd; down from 74,900 kg in 2023 (−4% YoY).
          Production from the Bushveld Igneous Complex (BIC), mined principally by
          Anglo American Platinum (Amplats), Impala Platinum (Implats), and
          Sibanye-Stillwater. Pd is secondary to Pt in Merensky Reef ores but
          approaches parity in UG-2 reef (~40-45% of PGM basket in BIC depending on
          reef). Production reduced by care-and-maintenance decisions, workforce
          reductions, high electricity costs, deep-level mining challenges, and
          labor disputes per USGS chapter text.
        source_id: usgs_mcs_2025_pgm
      - country: ZW
        share_pct: 7.9
        quantity:
          value: 15000
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Zimbabwe 2024e: 15,000 kg Pd; unchanged from 2023. Mined from the Great
          Dyke intrusion by Zimplats (Impala Platinum subsidiary), Mimosa Mining
          (Sibanye-Stillwater/Impala JV), and Unki Mine (Amplats). The Great Dyke
          is a Pt+Pd deposit with roughly equal proportions of both metals.
          Zimbabwe is the world's third-largest PGM producer.
        source_id: usgs_mcs_2025_pgm
      - country: CA
        share_pct: 7.9
        quantity:
          value: 15000
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          Canada 2024e: 15,000 kg Pd; down from 16,100 kg in 2023. PGMs produced
          as byproducts of nickel-copper mining in the Sudbury Basin (Ontario) by
          Vale and Glencore, and from the Lac des Iles palladium mine (Ontario) by
          North American Palladium (Impala Platinum subsidiary). Lac des Iles is
          one of the few primary Pd mines outside South Africa and Russia.
        source_id: usgs_mcs_2025_pgm
      - country: US
        share_pct: 4.2
        quantity:
          value: 8000
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: high
          source_id: usgs_mcs_2025_pgm
        notes: |
          United States 2024e: 8,000 kg Pd; down from 10,300 kg in 2023 (−22% YoY).
          One company (Sibanye-Stillwater) mined and processed PGMs from the
          Stillwater Complex, Montana, with an estimated value of ~$310 million in
          2024 (down 42% from $541 million in 2023). The company placed operations
          on care-and-maintenance and reduced its workforce owing to high costs and
          declining PGM prices. US mine is the only primary PGM deposit in the
          contiguous United States.
        source_id: usgs_mcs_2025_pgm
      - country: ZZ
        share_pct: 2.2
        quantity:
          value: 4200
          unit: kg_per_year
          form: contained_element
          approximate: true
          confidence: medium
          source_id: usgs_mcs_2025_pgm
        notes: |
          "Other countries" 2024e: 4,200 kg Pd (unchanged from 2023). Includes minor
          production from Finland (byproduct of nickel refining), Australia,
          Madagascar, Botswana, and other sources. USGS does not itemize individual
          countries in this residual bucket.
        source_id: usgs_mcs_2025_pgm
    completeness: complete
  refining_by_country:
    shares:
      - country: ZA
        share_pct: 40
        confidence: low
        notes: |
          South Africa refines the majority of its own PGM output via the three
          major producers' refineries (Amplats Waterval, Implats Precious Metals
          Refinery, Sibanye-Stillwater). Combined ~40% of world Pd refining
          estimated; USGS does not publish world refining shares by country for PGMs.
        source_id: usgs_mcs_2025_pgm
      - country: RU
        share_pct: 40
        confidence: low
        notes: |
          Russia refines its own production through Nornickel's Krastsvetmet refinery
          (Krasnoyarsk) and Norilsk Nickel's integrated metallurgical operations.
          Nornickel is the world's largest Pd refiner by volume. ~40% of world Pd
          refining estimated; USGS does not publish world refining shares for PGMs.
        source_id: usgs_mcs_2025_pgm
      - country: BE
        share_pct: 8
        confidence: medium
        notes: |
          Belgium 2020-23: cited as 8% of US Pd imports per USGS MCS 2025 import
          sources table. Umicore SA (Brussels) is a major secondary PGM refiner,
          recovering Pd from spent autocatalysts and industrial scrap globally.
        source_id: usgs_mcs_2025_pgm
      - country: IT
        share_pct: 8
        confidence: medium
        notes: |
          Italy 2020-23: cited as 8% of US Pd imports per USGS MCS 2025 import
          sources table. Chimet SpA (Arezzo) is Italy's primary PGM refiner.
        source_id: usgs_mcs_2025_pgm
      - country: ZZ
        share_pct: 4
        confidence: low
        notes: |
          Other Pd refiners: Japan (Tanaka Kikinzoku, Asahi Holdings), Germany,
          Canada (Vale CBNC), and others. Secondary refining of spent catalytic
          converters (~45,000 kg Pd recovered globally in 2024 per USGS chapter)
          adds significant recycled supply across multiple countries.
        source_id: usgs_mcs_2025_pgm
    completeness: top_producers_only
  notes: |
    World mine production 2023: 208,000 kg Pd; 2024e: 190,000 kg Pd (−8.7% YoY).
    Country shares sum to 99.6% due to rounding of 2024e world total (190,000 kg
    rounded). Palladium production by country is directly reported in USGS MCS 2025
    PGM chapter tables, not derived from a basket share multiplication.

reserves:
  economic_reserves:
    value: 81000000
    unit: kg
    form: contained_element
    approximate: true
    confidence: medium
    notes: |
      USGS MCS 2025 (p.137): world PGM reserves >81,000,000 kg combined for all
      six platinum-group metals. USGS does not disaggregate reserves by individual
      PGM. Applying Pd's approximate share of the PGM production basket (~44%)
      as a proxy yields an indicative Pd reserve of ~35,600,000 kg; actual Pd
      share of reserves varies by deposit (Norilsk-type Ni-Cu sulfides are ~60-65%
      Pd of PGM content; Bushveld Complex BIC deposits are ~35-45% Pd depending on
      reef). All country figures below are combined PGM reserves from USGS.
      World PGM resources total more than 100,000,000 kg per USGS chapter text;
      the largest resources are in South Africa's Bushveld Complex.
    source_id: usgs_mcs_2025_pgm
  reserves_by_country:
    shares:
      - country: ZA
        share_pct: 77.8
        quantity:
          value: 63000000
          unit: kg
          form: contained_element
          approximate: true
          confidence: medium
          source_id: usgs_mcs_2025_pgm
        notes: |
          South Africa: 63,000,000 kg combined PGM reserves (77.8% of world total).
          Predominantly in the Bushveld Igneous Complex (Merensky Reef, UG-2 Reef,
          Platreef). The BIC is the world's most PGM-rich geological formation.
          USGS does not report Pd-specific SA reserves separately.
        source_id: usgs_mcs_2025_pgm
      - country: RU
        share_pct: 19.8
        quantity:
          value: 16000000
          unit: kg
          form: contained_element
          approximate: true
          confidence: medium
          source_id: usgs_mcs_2025_pgm
        notes: |
          Russia: >16,000,000 kg combined PGM reserves (floor value; USGS footnote 10:
          based on Russian Classification system A+B+C1+C2, which includes reserves
          being developed or prepared for development). Norilsk-Talnakh deposits are
          highly Pd-rich; actual Pd-specific fraction likely ~60-65% of Russian PGM
          reserves, well above the global average.
        source_id: usgs_mcs_2025_pgm
      - country: ZW
