    percentages sum to ~100.5% due to rounding. World PGM resources exceed
    100,000,000 kg per USGS chapter text.

end_uses:
  uses:
    - application: autocatalysts_gasoline_twc
      share_pct: 80
      confidence: medium
      notes: |
        Palladium is the primary PGM in three-way catalytic converters (TWC) for
        gasoline-engine automobiles, reducing CO, hydrocarbons, and NOx emissions.
        USGS MCS 2025: "The leading domestic use for PGMs was in catalytic converters
        to decrease harmful emissions from automobiles." Pd replaced Pt in gasoline
        TWC in the 1990s owing to cost advantage, and now dominates this application.
        Each light-duty vehicle gasoline TWC contains approximately 2-7 grams Pd.
        ~80% share is an industry consensus estimate; USGS does not provide a
        Pd-specific end-use percentage breakdown.
      source_id: usgs_mcs_2025_pgm
    - application: electronics_capacitors_connectors
      share_pct: 10
      confidence: medium
      notes: |
        Pd used in multilayer ceramic capacitors (MLCCs) as internal electrodes
        (Pd-Ag alloys), computer hard disk components, hybridized integrated
        circuits, and connector plating. USGS MCS 2025 chapter text cites
        "electronic applications, such as in computer hard disks, hybridized
        integrated circuits, and multilayer ceramic capacitors" as a major end use.
      source_id: usgs_mcs_2025_pgm
    - application: dental_alloys
      share_pct: 4
      confidence: medium
      notes: |
        Pd-Ag and Pd-Au dental alloys used for crowns, bridges, and inlays.
        USGS MCS 2025 chapter text cites "dental and medical devices" as a
        PGM end use. Market is declining as composite resin and zirconia
        ceramics displace metal alloys in dentistry.
      source_id: usgs_mcs_2025_pgm
    - application: industrial_chemical_catalysts
      share_pct: 3
      confidence: medium
      notes: |
        Pd catalysts for bulk-chemical production (hydrogen peroxide, purified
        terephthalic acid, vinyl acetate monomer) and petroleum refining.
        USGS MCS 2025: "catalysts for bulk-chemical production and petroleum
        refining" cited as a major end use for PGMs.
      source_id: usgs_mcs_2025_pgm
    - application: investment_and_jewelry
      share_pct: 3
      confidence: medium
      notes: |
        Pd investment (coins, small bars) and jewelry (white metal alloy rings,
        watch components). USGS MCS 2025 chapter text cites "investment" and
        "jewelry" as PGM end uses. Pd jewelry demand grew in China 2000s when
        prices were low but has declined with rising prices and return to
        platinum/white-gold preference.
      source_id: usgs_mcs_2025_pgm
  completeness: complete

byproduct_of:
  - Ni
  - Cu

feedstock_origins:
  - substrate: nickel_copper_sulfide_ore
    typical_concentration_pct: null
    notes: |
      Norilsk-type Ni-Cu sulfide ores (Russia Norilsk-Talnakh; Canada Sudbury Basin)
      contain Pd as a byproduct PGM. Typical Pd grades of ~0.5-15 g/t in ore feed
      depending on deposit (Norilsk ores are anomalously PGM-rich; Sudbury ores are
      lower grade). USGS MCS 2025: "Small quantities of PGMs also were recovered as
      byproducts of copper-nickel mining in Michigan." Pd is dominant (~60-65%) among
      PGMs in Norilsk-type deposits due to sulfide mineralogy.
    source_id: usgs_mcs_2025_pgm
  - substrate: platinum_group_mineral_ore_bushveld
    typical_concentration_pct: null
    notes: |
      Bushveld Igneous Complex primary PGM ores (South Africa): UG-2 reef ~3-4 g/t
      4E PGM (Pt+Pd+Rh+Au), Merensky Reef ~4-7 g/t 4E. Pd is ~35-45% of 4E basket
      depending on reef. Mining is by conventional hard-rock underground methods.
      Produced ~72,000 kg Pd from South Africa in 2024e.
    source_id: usgs_mcs_2025_pgm
  - substrate: platinum_group_mineral_ore_great_dyke
    typical_concentration_pct: null
    notes: |
      Zimbabwe Great Dyke intrusion Main Sulfide Zone (MSZ): ~2.5 g/t 4E PGM with
      Pt and Pd in roughly equal proportions. Produced ~15,000 kg Pd in Zimbabwe
      in 2024e. Mined by Zimplats, Mimosa, and Unki Mine operators.
    source_id: usgs_mcs_2025_pgm
  - substrate: stillwater_complex_ore
    typical_concentration_pct: null
    notes: |
      Stillwater Complex (Montana, USA): Pd-dominant PGM deposit (~3:1 Pd:Pt ratio
      at the J-M Reef, contrasting with Bushveld's Pt-dominant ores). One of the
      highest-grade primary PGM deposits in the world (~18-20 g/t 2E at J-M Reef).
      Produced ~8,000 kg Pd from the United States in 2024e.
    source_id: usgs_mcs_2025_pgm

substitutes:
  - application: autocatalysts_gasoline_twc
    availability: partial
    notes: |
      USGS MCS 2025: "Palladium has been used as a substitute for platinum in most
      gasoline-engine catalytic converters because of the historically lower price for
      palladium relative to that of platinum." Substitution is directional — Pd replaced
      Pt in gasoline TWC but the reverse substitution (Pt for Pd) is technically feasible
      via catalyst washcoat reformulation, constrained by automotive engineering lead
      times and PGC price parity (Pd ~$980/oz vs Pt ~$950/oz in 2024, near parity for
      first time since mid-2000s).
    source_id: usgs_mcs_2025_pgm
  - application: autocatalysts_diesel
    availability: partial
    notes: |
      USGS MCS 2025: "About 25% of palladium can routinely be substituted for platinum
      in diesel catalytic converters; the proportion can be as much as 50% in some
      applications." Diesel oxidation catalysts (DOCs) use primarily Pt; Pd blending is
      technically feasible but limited by Pd's lower activity in lean diesel exhaust and
      lower sulfur tolerance than Pt.
    source_id: usgs_mcs_2025_pgm
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025: "For some industrial end uses, one PGM can substitute for another,
      but with losses in efficiency." Within the PGM group, Pd-for-Pt interchangeability
      is the primary commercially relevant substitution path. Rh has no adequate
      substitute in NOx reduction. EV adoption reduces aggregate TWC demand for all PGMs.
    source_id: usgs_mcs_2025_pgm

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_pgm
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  notes: |
    Palladium is included in the US 2022 Critical Minerals List under "platinum-group
    metals" (6 elements: Ir, Os, Pd, Pt, Rh, Ru), designated critical for supply
    risk and economic importance; the US relies on imports for ~36% of apparent
    consumption (2024e) with Russia (32%) and South Africa (32%) as top import
    sources per USGS. EU CRMA Regulation 2024/1252 designates platinum-group metals
    collectively as Critical Raw Materials (Annex I). Platinum (Pt) is separately
    listed in Annex II (Strategic Raw Materials) for its fuel-cell importance;
    Pd is not specifically listed as a strategic raw material as of 2024.

geopolitical_events:
  - date: "2022-02"
    event: "Russia invades Ukraine; financial sanctions and logistics disruptions affect Nornickel PGM export channels"
    impact: "Pd prices spiked above $3,000/oz in March 2022 on supply security fears. Russia supplies ~40% of world Pd; direct PGM sanctions were avoided but financial/shipping channels were disrupted. USGS: ongoing Russia-Ukraine conflict cited as a factor in declining Russian PGM output through 2024."
    source_id: usgs_mcs_2025_pgm
  - date: "2023-01"
    event: "Sibanye-Stillwater reduces US PGM operations; East Boulder mine placed on care-and-maintenance"
    impact: "US Pd production fell from ~11,000 kg (2022) to 10,300 kg (2023) to 8,000 kg (2024e). Value of US output fell 42% to $310 million in 2024. Reflects structural cost pressure at sub-$1,000/oz Pd prices from a single high-cost primary producer."
    source_id: usgs_mcs_2025_pgm
  - date: "2024-01"
    event: "Palladium annual average price falls to ~$980/oz — lowest annual average since 2017; down 27% from $1,352 in 2023 and 59% from $2,419 peak in 2021"
    impact: "Price collapse driven by EV adoption reducing gasoline catalyst demand growth, Chinese automotive market softness, investor liquidation of Pd positions, and supply surplus from secondary recycling. USGS attributes decreases to 'decreased demand, investor uncertainty, and oversupply.' South Africa and Russia both curtailed output in response."
    source_id: usgs_mcs_2025_pgm
  - date: "2024-06"
    event: "South Africa PGM sector enters structural downcycle with multiple mine closures and workforce reductions at Amplats, Implats, and Sibanye-Stillwater"
    impact: "Combined SA Pd output fell 4% in 2024e. Amplats announced closure of Bokoni mine; Sibanye-Stillwater reduced headcount at Stillwater (US). The sector faces prolonged restructuring absent a Pd price recovery above ~$1,200/oz operating threshold for marginal mines."
    source_id: usgs_mcs_2025_pgm

