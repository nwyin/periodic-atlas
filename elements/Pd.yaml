narrative: |
  Palladium is the dominant platinum-group metal by mine volume (~44% of the 6-PGM
  basket) and the world's primary autocatalytic metal for gasoline three-way catalytic
  converters (TWC), which reduce CO, hydrocarbon, and NOx emissions from light-duty
  vehicles. Russia (Nornickel, ~40% of world Pd supply) and South Africa (Bushveld
  Complex, ~38%) together account for ~78% of world mine production, creating acute
  geographic concentration risk. The US produces from the Stillwater Complex (Montana),
  the world's highest-grade primary Pd deposit, though Sibanye-Stillwater's care-and-
  maintenance reductions in 2023-2024 cut US output to 8,000 kg — a single-site
  dependency. Canada's Lac des Iles mine adds a second primary Pd source in North America.

  Palladium's price history is one of the most dramatic in industrial metals: from a
  prolonged discount to platinum through the 2010s (driven by diesel-engine dominance
  in Europe preferring Pt catalysts), to a peak of $2,419/oz annual average in 2021
  (supply tightness, gasoline engine resurgence, Russian supply risk premium), and then
  a 59% collapse to $980/oz in 2024 as electric vehicle adoption erodes gasoline catalyst
  demand growth, Chinese automotive sales softened, and secondary recycling (~45,000 kg
  Pd recovered globally in 2024) added structural supply. At near-Pt-price parity for
  the first time since the early 2000s, autocatalyst engineers are reassessing Pd/Pt
  loading ratios, though full reformulation faces multi-year lead times.

  Supply security concerns remain geopolitically concentrated: Russia (under Western
  financial sanctions since 2022 but with PGM exports not directly sanctioned) is the
  world's largest Pd supplier; South Africa's deepening cost crisis and labor-relations
  challenges are forcing mine closures; and the Stillwater Complex in Montana is the
  sole primary PGM mine in the US. The long-run demand outlook is contested — aggressive
  EV adoption scenarios could structurally erode Pd demand by the 2030s, while the
  hydrogen economy offers a partial offset via Pd use in electrolyzers and some fuel
  cell applications.

