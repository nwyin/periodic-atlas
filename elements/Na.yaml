criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Salt/sodium is not on the US Critical Minerals List, EU CRM List, or EU Strategic
    Raw Materials List. It is one of the most abundant and widely distributed minerals
    on Earth; ocean salt content alone is described as "virtually inexhaustible."
    Net import reliance for the US was 24% in 2024e (imports minus exports as percent
    of apparent consumption), but domestic reserves are large and production comes
    from 26 companies in 16 states, providing resilient domestic supply.

