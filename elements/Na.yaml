end_uses:
  uses:
    - application: highway_deicing
      share_pct: 41
      notes: |
        USGS MCS 2025 domestic production section: highway deicing accounted for
        about 41% of total salt consumed. Rock salt is the primary form used.
        Demand is heavily weather-dependent; mild winter 2023–24 reduced consumption.
      source_id: usgs_mcs_2025_salt
    - application: chemical_industry
      share_pct: 39
      notes: |
        USGS MCS 2025: chemical industry accounted for about 39% of total salt
        sales. Salt in brine accounted for 91% of the salt used for chemical
        feedstock. Chlorine and caustic soda manufacturers were the main consumers.
        Salt is the primary feedstock for the chloralkali process producing Cl₂
        and NaOH, as well as soda ash (Na₂CO₃) and sodium sulfate (Na₂SO₄).
      source_id: usgs_mcs_2025_salt
    - application: distributors
      share_pct: 9
      notes: |
        USGS MCS 2025: distributors accounted for about 9% of total salt sales.
      source_id: usgs_mcs_2025_salt
