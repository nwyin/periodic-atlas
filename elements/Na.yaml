symbol: Na
atomic_number: 11
name: sodium
category: alkali_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports salt in "thousand metric tons" of sodium chloride (NaCl),
  the primary commercial commodity for sodium. Salt is produced in four main trade
  forms: salt in brine (solution mining, ~42% of US supply), rock salt (underground
  mining, ~40%), solar salt (solar evaporation of brine or seawater, ~9%), and
  vacuum and open pan (evaporated pan) salt (~9%). All production quantities are in
  tonnes of NaCl and are converted to million_tonnes_per_year (1,000 thousand metric
  tons = 1 Mt). Prices are quoted free on board (f.o.b.) mine and plant, in US
  dollars per metric ton of each salt type. Elemental sodium metal (produced by
  electrolysis of molten NaCl) is a separate, much smaller market not covered by the
  USGS salt chapter.

