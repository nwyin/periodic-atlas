reserves:
  notes: |
    USGS MCS 2025 p.151: "Reserves: Large. Economic and subeconomic deposits of salt
    are substantial in principal salt-producing countries. The oceans contain a
    virtually inexhaustible supply of salt." No quantitative economic reserves are
    provided by country. World continental resources are described as vast; ocean
    salt content is nearly unlimited. Domestic US rock salt and brine resources are
    primarily in Kansas, Louisiana, Michigan, New York, Ohio, and Texas. Saline lakes
    and solar evaporation facilities are in Arizona, California, Nevada, New Mexico,
    Oklahoma, and Utah. Almost every country in the world has salt deposits or solar
    evaporation operations. Government stockpile: none.

