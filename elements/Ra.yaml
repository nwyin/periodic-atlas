symbol: Ra
atomic_number: 88
name: radium
category: alkaline_earth
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  Radium's commercial reality is an isotope market rather than a bulk metal market.
  The DOE/NIDC catalog sells radium in millicurie units as radioactive isotopes and
  generators, not as metallic radium. Current cataloged forms include Ra-223 nitrate
  solid in a screw-cap vial, Ra-224 as either radium chloride in 1 M HCl solution or
  solid radium nitrate in a glass V-vial, and a Ra-224/Pb-212/Bi-212 generator with
  Ra-224 absorbed on AG MP-50 resin in a one-inch lead pig.

isotope_markets:
  - isotope: Ra-223
    half_life_seconds: 987552
    production_mode: decay_product
    reporting_year: 2025
    precursor: |
      DOE/NIDC states that Ra-223 is obtained from Ac-227 cows through decay of
      Th-227. NIDC's 2017 availability notice said these Ac-227 cows had the
      capability to produce hundreds of millicuries of Ra-223 per month, with product
      separation and purification at Oak Ridge National Laboratory and Pacific
      Northwest National Laboratory.
    delivery_form: |
      NIDC sells Ra-223 as nitrate solid in a screw-cap vial with stock
      availability and millicuries as the unit of sale. Downstream commercial use is
      radium Ra 223 dichloride injection (Xofigo), an intravenous radiotherapeutic
      drug supplied in single-dose vials for treatment of symptomatic bone-metastatic
      castration-resistant prostate cancer.
    producers:
      shares:
        - country: US
          share_pct: 100
          confidence: medium
          notes: |
            The primary-source NIDC availability notice describes routine DOE Isotope
            Program distribution from Oak Ridge National Laboratory and Pacific
            Northwest National Laboratory. This entry only represents the directly
            documented DOE/NIDC supply chain, not the full global Xofigo finished-drug
            manufacturing footprint.
          source_id: nidc_ra223_availability_2017
      completeness: partial
    notes: |
      Commercial radium is measurable here as a medical-isotope supply chain rather
      than as elemental tonnage. Public primary sources reviewed for this file do not
      disclose annual global Ra-223 curie output or pricing.

  - isotope: Ra-224
    half_life_seconds: 313796.16
    production_mode: decay_product
    reporting_year: 2025
    precursor: |
      NIDC product sheets state that Ra-224 is produced by decay of thorium-228.
      DOE later reported that ORNL put thorium-228 into routine production for this
      purpose and that the same Th-228 feedstock is used to make Ra-224/Pb-212
      generators for targeted-alpha-therapy research.
    delivery_form: |
      NIDC sells Ra-224 directly as radium chloride in 1 M HCl solution or as solid
      radium nitrate, both in millicurie units. It also sells a
      Ra-224/Pb-212/Bi-212 generator in which Ra-224 is absorbed on AG MP-50 resin
      and housed in a one-inch lead pig, allowing lead-212 or bismuth-212 to be
      eluted on demand.
    producers:
      shares:
        - country: US
          share_pct: 100
          confidence: medium
          notes: |
            DOE/NIDC states the generator production capability was established at Oak
            Ridge National Laboratory and that the generator is routinely available
            through the NIDC catalog. This represents the documented DOE route rather
            than a full global market-share estimate.
          source_id: nidc_ra224_generator_2015
      completeness: partial
    notes: |
      The February 2025 NIDC generator sheet states routine monthly availability up
      to 16 mCi for the generator, but public sources do not disclose broader annual
      market volume or pricing for either direct Ra-224 sales or generator sales.

feedstock_origins:
  - substrate: actinium_227_cows
    notes: |
      DOE/NIDC states that routine Ra-223 supply is obtained from Ac-227 cows, with
      the radium separated and purified at ORNL and PNNL.
    source_id: nidc_ra223_availability_2017
  - substrate: thorium_228_feedstock
    notes: |
      DOE/NIDC states that Ra-224 and the Ra-224/Pb-212/Bi-212 generator are produced
      from decay of thorium-228; ORNL's routine thorium-228 production supports this
      radium supply chain.
    source_id: nidc_th228_routine_2021
  - substrate: legacy_radium_226_sources
    notes: |
      DOE/NIDC reported that harvested Ra-226 from legacy medical devices was being
      used as starting material for reactor irradiation to make Ac-227, with the
      unconsumed radium target recycled. That legacy-material route underpins part of
      the broader domestic alpha-emitter ecosystem around radium.
    source_id: nidc_cancer_drug_supply_2019

end_uses:
  uses:
    - application: medical_radiotherapy_and_targeted_alpha_therapy_research
      share_pct: 100
      confidence: medium
      notes: |
        The current NIDC radium catalog contains only radioactive medical/research
        offerings: Ra-223, Ra-224, and the Ra-224/Pb-212/Bi-212 generator. This is
        the strongest primary-source indicator that essentially the whole commercial
        radium market is tied to radiotherapy or targeted-alpha-therapy research rather
        than to any bulk metallurgical use.
      source_id: nidc_radium_catalog_2025
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false

geopolitical_events:
  - date: 2015-03
    event: "DOE established domestic Ra-224/Pb-212 generator capability after a private commercialization effort ended"
    impact: |
      NIDC said DOE initiated generator production capability at Oak Ridge National
      Laboratory after discontinuation of supply from a private initiative, restoring a
      routinized domestic source of Ra-224-based generators for Pb-212 and Bi-212
      cancer-therapy research.
    source_id: nidc_ra224_generator_2015
  - date: 2021-09
    event: "ORNL put thorium-228 into routine production to support radium-224 generator supply"
    impact: |
      DOE/NIDC said routine Th-228 production at Oak Ridge strengthened feedstock
      availability for Ra-224/Pb-212 generators, directly supporting targeted-alpha-
      therapy research pathways based on lead-212 and bismuth-212.
    source_id: nidc_th228_routine_2021
  - date: 2022-06
    event: "DOE made research quantities of Ra-226 available to support emerging Ac-225 supply chains"
    impact: |
      DOE/NIDC explicitly linked rising Ac-225 demand to renewed availability of
      Ra-226 feedstock, signaling that radium itself had become a strategic upstream
      bottleneck in the broader targeted-alpha-therapy ecosystem.
    source_id: nidc_ra226_available_2022

narrative: |
  Radium has a real commercial footprint in 2025, but not as a mined alkaline-earth
  metal. The economically relevant market is a tightly controlled isotope business run
  through the DOE isotope system and the medical-radiopharmaceutical chain. NIDC's
  catalog shows three live radium offerings: Ra-223, Ra-224, and a
  Ra-224/Pb-212/Bi-212 generator, all sold in millicurie units. That is the clearest
  indicator that "radium" in commerce means short-lived radioisotopes and generators,
  not elemental metal, refinery output, or reserves tables.

  The two commercial radium streams have distinct functions. Ra-223 is a finished
  therapeutic isotope: NIDC supplies it as nitrate solid, while the downstream drug
  product Xofigo is an FDA-labeled alpha-emitting injection for symptomatic
  bone-metastatic castration-resistant prostate cancer. Ra-224 is both a directly sold
  isotope and a generator parent for Pb-212 and Bi-212, which DOE describes as inputs
  to targeted alpha therapy research. In both cases, the production logic is decay
  supply from parent isotopes, not mine output.

  The supply chain is also unusually path-dependent. DOE sources show Ra-223 coming
  from Ac-227 cows, Ra-224 coming from Th-228, and part of the wider domestic alpha-
  emitter system being rebuilt around recovered Ra-226 from legacy medical devices.
  Public primary sources do not disclose annual global output or price series, so the
  atlas record is strongest on trade form, production route, and medical end use.

