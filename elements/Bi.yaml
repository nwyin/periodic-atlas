symbol: Bi
atomic_number: 83
name: bismuth
category: post_transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports bismuth chapter quantities in metric tons unless otherwise specified.
  Commercial trade forms named in the source include refined bismuth metal, alloys, waste and
  scrap, and a range of downstream chemical compounds such as bismuth nitrate, bismuth
  oxychloride, and bismuth vanadate. The published price series is for 99.99%-purity bismuth
  metal, in warehouse Rotterdam, in minimum lots of 1 metric ton, quoted in U.S. dollars per
  pound by Fastmarkets.

