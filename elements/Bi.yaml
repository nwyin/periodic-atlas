      completeness: complete
    notes: |
      Bismuth is a byproduct-dominated commodity, so USGS does not publish a world mine output
      table. The commercial flow reported in MCS 2025 is refinery production. Country shares are
      computed against the published rounded 2024 world refinery total of 16,000 metric tons; the
      named-country subtotal is 15,900 metric tons, leaving a small rounding gap to the world total.

reserves:
  notes: |
    USGS MCS 2025 states that bismuth reserves and resources data were generally not reported at
    a mine or country level and were therefore difficult to quantify. The chapter further notes
    that bismuth minerals rarely occur in sufficient quantities to be mined as principal products,
    and that only the inactive Tasna Mine in Bolivia and one mine in China are known cases where
    bismuth has been the primary product.

end_uses:
  uses:
    - application: alloys
      share_pct: 30
      confidence: high
      notes: |
        USGS Minerals Yearbook 2022 states that bismuth alloys accounted for 30% of reported U.S.
        bismuth consumption in 2022. The same report describes fusible alloys and metallurgical
        additive uses such as solders, optical-lens holders, fire-sprinkler triggers, and
        machinability additives in aluminum, copper, iron, and steel.
      source_id: usgs_myb_2022_bismuth
  completeness: partial

byproduct_of: [Pb, Zn]

feedstock_origins:
  - substrate: lead_ores
    notes: |
      USGS MCS 2025 states that bismuth is produced most often as a byproduct during the
      processing of lead ores. The chapter also notes that bismuth is contained in some lead ores
      mined domestically, but all U.S. lead concentrates have been exported for smelting since the
      last domestic primary lead smelter closed at yearend 2013.
    source_id: usgs_mcs_2025_bismuth
  - substrate: tungsten_ores
    notes: |
      USGS MCS 2025 states that in China and Vietnam, bismuth is also produced as a byproduct or
      coproduct of tungsten and other metal ore processing.
    source_id: usgs_mcs_2025_bismuth
  - substrate: zinc_ores
    notes: |
      USGS MCS 2025 states that in Japan and the Republic of Korea, bismuth is produced as a
      byproduct or coproduct of zinc ore processing.
    source_id: usgs_mcs_2025_bismuth
  - substrate: other_metal_ores
    notes: |
      Beyond lead, tungsten, and zinc-linked recovery, USGS MCS 2025 notes more generally that
      bismuth in China and Vietnam is recovered from other metal ore processing streams as well.
    source_id: usgs_mcs_2025_bismuth

substitutes:
  - application: pharmaceuticals
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: bismuth compounds can be replaced in pharmaceutical
      applications by alumina, antibiotics, calcium carbonate, and magnesia.
    source_id: usgs_mcs_2025_bismuth
  - application: pigments
    availability: partial
    notes: |
      USGS MCS 2025 states that titanium-dioxide-coated mica flakes and fish-scale extracts are
      substitutes for bismuth compounds in certain pigment uses.
    source_id: usgs_mcs_2025_bismuth
  - application: low_temperature_solders
    availability: partial
    notes: |
      USGS MCS 2025 states that cadmium, indium, lead, and tin can partially replace bismuth in
      low-temperature solders.
    source_id: usgs_mcs_2025_bismuth
  - application: machining_holding_devices
    availability: partial
    notes: |
      USGS MCS 2025 states that resins can replace bismuth alloys used for holding metal shapes
      during machining.
    source_id: usgs_mcs_2025_bismuth
  - application: fire_sprinkler_triggers
    availability: partial
    notes: |
      USGS MCS 2025 states that glycerin-filled glass bulbs can replace bismuth alloys in
      triggering devices for fire sprinklers.
    source_id: usgs_mcs_2025_bismuth
  - application: free_machining_alloys
    availability: partial
    notes: |
      USGS MCS 2025 states that free-machining alloys can use lead, selenium, or tellurium as a
      replacement for bismuth.
    source_id: usgs_mcs_2025_bismuth

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_critical_minerals_2025
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Bismuth appears on the USGS 2025 List of Critical Minerals and on both Annex I (strategic raw
    materials) and Annex II (critical raw materials) of EU Regulation 2024/1252. USGS MCS 2025
    also reports U.S. net import reliance at 89% of apparent consumption in 2024 after running
    between 92% and 97% in 2020-23.

