geopolitical_events:
  - date: "2024"
    event: "Chinese feedstock competition tightened the bismuth market and pushed prices sharply higher"
    impact: |
      USGS MCS 2025 reports that average monthly in-warehouse Rotterdam bismuth prices rose from
      $3.89 per pound in January 2024 to $6.29 per pound in October, taking the annual average to
      $5.30 per pound, 30% above 2023 and the highest since 2018. The chapter attributes the move
      in part to rising feedstock prices in China as domestic smelters competed for bismuth ore.
      USGS also reports that U.S. imports of bismuth metal from China fell 40% year over year to
      580 metric tons in 2024 from 964 metric tons in 2023.
    source_id: usgs_mcs_2025_bismuth

narrative: |
  Bismuth is a small, import-reliant, and structurally byproduct-driven market. The United States
  has had no primary refined bismuth production since 1997, and USGS MCS 2025 reports 89% net
  import reliance in 2024 even after secondary scrap supplied a modest 80 metric tons per year.
  Commercial material moves mainly as refined metal, alloys, scrap, and specialty chemical
  compounds used in pharmaceuticals, pigments, ceramics, crystalware, and low-melting alloys.

  The supply chain is constrained upstream by other metals rather than by standalone bismuth mines.
  USGS states that bismuth is produced most often as a byproduct of lead-ore processing, with
  additional recovery from tungsten- and zinc-linked process streams in Asia. Because mined bismuth
  ore is not reported as a standalone commodity, the most meaningful global production number is
  refinery output: 16,000 metric tons in 2024, of which China alone accounted for just over 81%.
  That concentration makes the market sensitive to feedstock conditions inside China and to shifts
  in byproduct economics elsewhere.

  That thinness showed up clearly in 2024. USGS reports a 30% increase in the annual average
  bismuth price as Chinese smelters competed for ore feed, while U.S. imports of bismuth metal
  from China fell 40% year over year. At the same time, bismuth has policy relevance well beyond
  its tonnage because it often replaces lead in plumbing alloys, solders, hunting shot, and other
  applications where nontoxicity matters. The United States and the European Union both now treat
  bismuth as a critical raw material, and the EU classifies it as strategic as well.

