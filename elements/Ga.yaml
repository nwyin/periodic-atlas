reserves:
  resources:
    value: 1000000
    unit: tonnes
    form: metal
    approximate: true
    notes: |
      USGS MCS 2025 p.75: "Gallium contained in world resources of bauxite
      is estimated to exceed 1 million tons, and a considerable quantity
      could be contained in world zinc resources. However, less than 10%
      of the gallium in bauxite and zinc resources is potentially
      recoverable." USGS does not publish reserves by country for gallium.
    source_id: usgs_mcs_2025_gallium
  notes: |
    Gallium reserves are not broken out by country in USGS MCS 2025;
    only world resources are given. Average gallium content of bauxite is
    50 ppm; some domestic zinc ores contain up to 50 ppm gallium.

byproduct_of: [Al, Zn]
feedstock_origins:
  - substrate: bauxite_ore
    typical_concentration_pct: 0.005
    notes: |
      USGS: "The average gallium content of bauxite is 50 parts per million."
      Most world gallium is extracted from Bayer process liquors during
      alumina production — recovery depends on bauxite throughput at
      Chinese aluminum smelters, not on gallium price signals.
    source_id: usgs_mcs_2025_gallium
  - substrate: zinc_smelter_residues
    typical_concentration_pct: 0.005
    notes: "USGS: 'Some domestic zinc ores contain up to 50 parts per million gallium.' Secondary but meaningful byproduct stream."
    source_id: usgs_mcs_2025_gallium

substitutes:
  - availability: partial
    notes: |
      USGS substitutes paragraph: "Liquid crystals made from organic
      compounds are used in visual displays as substitutes for LEDs.
      Silicon-based complementary metal-oxide semiconductor power
      amplifiers compete with GaAs power amplifiers in midtier
      third-generation (3G) cellular handsets. Indium phosphide
      components can be substituted for GaAs-based infrared laser
      diodes in some specific-wavelength applications, and helium-neon
      lasers compete with GaAs in visible laser diode applications.
      Silicon is the principal competitor with GaAs in solar-cell
      applications. In many defense-related applications, GaAs- and
      GaN-based ICs are used because of their unique properties, and
      no effective substitutes exist for GaAs and GaN in these
      applications."
    source_id: usgs_mcs_2025_gallium

end_uses:
  uses:
    - application: integrated_circuits
      share_pct: 79
      notes: |
        USGS MCS 2025 p.74: "ICs accounted for 79% of domestic gallium
        consumption" (US 2024). Primarily GaAs and GaN compound
        semiconductors. Uses include defense applications, high-
        performance computers, and telecommunications equipment.
      source_id: usgs_mcs_2025_gallium
    - application: optoelectronic_devices
      share_pct: 20
      notes: |
        USGS: "optoelectronic devices accounted for 20%" of US 2024
        gallium consumption. Includes laser diodes, LEDs, photodetectors,
        and solar cells; end-user categories include aerospace, consumer
        goods, industrial, medical, and telecommunications.
      source_id: usgs_mcs_2025_gallium
    - application: research_and_development
      share_pct: 1
      source_id: usgs_mcs_2025_gallium
  completeness: complete

