symbol: Ga
atomic_number: 31
name: gallium
category: post_transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS tracks two distinct gallium streams: "low-purity primary gallium"
  (~99.99%) recovered as a byproduct of bauxite and zinc ore processing,
  and "high-purity refined gallium" (99.999% to 99.99999%) purified from
  primary metal or from new scrap. The two streams have very different
  geographies — primary is near-monopoly Chinese, refined is split across
  Canada, China, Japan, Slovakia, US.

