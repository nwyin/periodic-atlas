  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_critical_minerals_2022
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_annex_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_annex_2024
  notes: |
    Tungsten appears on the U.S. 2022 Final List of Critical Minerals and in both Annex I
    (Strategic Raw Materials) and Annex II (Critical Raw Materials) of Regulation (EU)
    2024/1252. The designation matches the market structure in the USGS chapter: no U.S.
    mine production since 2015, net import reliance above 50%, and Chinese dominance at
    roughly 83% of 2024 world mine output.

