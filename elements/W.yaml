symbol: W
atomic_number: 74
name: tungsten
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports tungsten data in metric tons, tungsten content, unless otherwise
  specified. The chapter's trade-facing feed forms are tungsten concentrates,
  ammonium paratungstate (APT), tungsten oxide, and scrap; downstream U.S. processors
  convert these into tungsten metal powder, tungsten carbide powder, and tungsten
  chemicals. The reported reference price is concentrate quoted in dollars per dry
  metric ton unit (dmtu) of tungsten trioxide (WO3) in-warehouse Rotterdam; one dmtu
  WO3 contains 7.93 kilograms of tungsten per USGS footnote 6, so the price series
  below is converted to `usd_per_kg` of contained tungsten. No temperature convention
  is specified in the chapter.

