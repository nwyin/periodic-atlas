byproduct_of: []

feedstock_origins:
  - substrate: tungsten_concentrate
    notes: |
      USGS states that seven U.S. companies can convert tungsten concentrates into tungsten
      metal powder, tungsten carbide powder, and tungsten chemicals.
    source_id: usgs_mcs_2025_tungsten
  - substrate: ammonium_paratungstate
    notes: |
      Ammonium paratungstate (APT) is identified by USGS as a commercial intermediate that
      U.S. processors can convert into metal powder, carbide powder, and chemicals.
    source_id: usgs_mcs_2025_tungsten
  - substrate: tungsten_oxide
    notes: |
      Tungsten oxide is another trade intermediate named in the USGS domestic production
      section as a feed to U.S. downstream processors.
    source_id: usgs_mcs_2025_tungsten
  - substrate: tungsten_scrap
    notes: |
      USGS identifies scrap as an important raw-material source for the tungsten industry,
      both in the domestic production section and in the events/trends discussion.
    source_id: usgs_mcs_2025_tungsten

substitutes:
  - application: cemented_carbides
    availability: partial
    notes: |
      USGS substitutes paragraph: possible alternatives to cemented tungsten carbides include
      cemented carbides based on molybdenum carbide, niobium carbide, or titanium carbide,
      ceramics, cermets, and tool steels. USGS adds that most reduce rather than replace the
      amount of tungsten used.
    source_id: usgs_mcs_2025_tungsten
  - application: mill_products
    availability: partial
    notes: "USGS substitutes paragraph: molybdenum can substitute for certain tungsten mill products."
    source_id: usgs_mcs_2025_tungsten
  - application: tungsten_steels
    availability: partial
    notes: |
      USGS substitutes paragraph: molybdenum steels can substitute for tungsten steels,
      although most molybdenum steels still contain some tungsten.
    source_id: usgs_mcs_2025_tungsten
  - application: lighting
    availability: partial
    notes: |
      USGS substitutes paragraph: carbon-nanotube filaments, induction technology, and
      LEDs can substitute for lighting based on tungsten electrodes or filaments.
    source_id: usgs_mcs_2025_tungsten
  - application: radiation_shielding_and_high_density_components
    availability: partial
    notes: |
      USGS substitutes paragraph: depleted uranium or lead can substitute for tungsten or
      tungsten alloys where high density or radiation shielding is required.
    source_id: usgs_mcs_2025_tungsten
  - application: armor_piercing_projectiles
    availability: partial
    notes: |
      USGS substitutes paragraph: depleted uranium alloys or hardened steel can substitute
      for cemented tungsten carbides or tungsten alloys in armor-piercing projectiles.
      USGS cautions that substitution can increase cost or reduce performance.
    source_id: usgs_mcs_2025_tungsten

end_uses:
  uses:
    - application: cemented_carbides
      share_pct: 60
      notes: |
        USGS domestic production and use section: an estimated 60% of tungsten consumed in
        the United States was used in cemented carbide parts for cutting and wear-resistant
        applications, primarily in construction, metalworking, mining, and oil- and gas-
        drilling.
      source_id: usgs_mcs_2025_tungsten
    - application: other_alloys_electrical_and_chemical_applications
      share_pct: 40
      notes: |
        USGS domestic production and use section: the remainder was used to make various
        alloys and specialty steels; electrodes, filaments, wires, and other components for
        electrical, electronic, heating, lighting, and welding applications; and chemicals
        for various applications.
      source_id: usgs_mcs_2025_tungsten
  completeness: complete

