end_uses:
  uses:
    - application: electricity_generation_and_heat
      share_pct: 38
      confidence: low
      notes: |
        Author synthesis from primary sources. Coal remains heavily anchored in
        power generation: IEA Coal 2024 states the power sector was the main
        driver of coal demand growth and coal-fired generation reached an
        all-time high in 2024; IEA Global Energy Review 2025 adds that the
        increase in global energy demand was led by the power sector and that
        gas- and coal-fired generation still rose in 2024. This makes power and
        heat the single largest commercial use of bulk carbon, but no single
        primary source publishes a unified coal+oil+gas end-use split.
      source_id: iea_coal_2024
    - application: transport_fuels
      share_pct: 31
      confidence: low
      notes: |
        Author synthesis. IEA Global Energy Review 2025 states that non-
        feedstock oil use remains dominated by road transport, aviation and
        shipping, even though road-fuel demand is now flattening. Transport is
        therefore still the largest end market for liquid hydrocarbon carbon.
      source_id: iea_global_energy_review_2025_oil
    - application: industrial_process_heat_and_reducing_agent
      share_pct: 15
      confidence: low
      notes: |
        Author synthesis. Industrial demand is the main non-power sink for coal
        and gas, including coke in iron and steel, kiln fuels, and direct heat.
        IEA Coal 2024 notes industrial coal consumption also increased, while
        IEA Global Energy Review 2025 notes gas demand in the European Union
        grew notably for industrial use.
      source_id: iea_global_energy_review_2025_key_findings
    - application: petrochemicals_and_non_combusted_feedstocks
      share_pct: 10
      confidence: low
      notes: |
        Author synthesis. IEA Global Energy Review 2025 identifies chemical
        feedstocks as accounting for around half of oil demand growth in energy
        terms in 2024 and says the post-2019 increase in global oil consumption
        was almost entirely due to higher petrochemical feedstock demand.
      source_id: iea_global_energy_review_2025_oil
    - application: buildings_heating_and_cooking
      share_pct: 6
      confidence: low
      notes: |
        Author synthesis. Buildings remain an important direct-use market for
        gas and oil, though relative share is shrinking as electrification and
        heat pumps spread. IEA Global Energy Review 2025 highlights heat pumps
        and electrification as key substitutes reducing fossil demand growth.
      source_id: iea_global_energy_review_2025_key_findings
  completeness: partial

