symbol: C
atomic_number: 6
name: carbon
category: reactive_nonmetal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Bulk carbon is not traded as elemental carbon metal; the dominant commercial
  forms are fossil carbon streams: coal, crude oil and condensate, and natural
  gas. The Energy Institute Statistical Review 2025 reports coal production in
  million tonnes of commercial solid fuels, oil production in both thousand
  barrels per day and million tonnes, and natural-gas production in billion
  cubic metres standardized to 15°C and 1013 mbar with a gross calorific value
  of 40 MJ/m3. This file preserves those stream distinctions and converts gas to
  million_m3_per_year for schema compatibility. Graphite is treated separately
  in the atlas and is not represented here.

