geopolitical_events:
  - date: 2024-06-02
    event: "OPEC+ agreed to extend core crude-output cuts into 2025 while outlining a gradual unwind of some voluntary cuts"
    impact: |
      The oil market's largest coordinated supply-management bloc kept a floor
      under global liquid-carbon prices and delayed the return of some barrels
      to market. Carbon as a commercial stream remains highly exposed to cartel
      policy, unlike most mined elements.
    source_id: opec_press_release_2024_06_02
  - date: 2024-09
    event: "United Kingdom closed its last coal-fired power plant"
    impact: |
      The Ratcliffe-on-Soar closure was symbolically important because it marked
      the first G7 economy to end coal-fired generation, reinforcing the demand
      collapse for thermal coal in advanced economies even while global coal use
      still rose elsewhere.
    source_id: iea_coal_2024
  - date: 2024
    event: "Russian coal exporters remained constrained by sanctions, rail bottlenecks, tariffs, and shifting Asian trade routes"
    impact: |
      IEA Coal 2024 describes a continuing reshuffle of trade flows after the EU
      coal import ban, plus added US sanctions and logistics constraints. The
      result was lower profitability and a structurally less flexible export
      position for Russian coal despite still-large production volumes.
    source_id: iea_coal_2024

