substitutes:
  - application: energy_services
    availability: partial
    notes: |
      IEA Global Energy Review 2025 identifies renewable power, nuclear, EVs,
      heat pumps, and efficiency gains as the main technologies slowing fossil
      carbon demand growth. They substitute for carbon in electricity, mobility,
      and building heat, but they are not one-for-one substitutes for
      petrochemical feedstocks or metallurgical carbon.
    source_id: iea_global_energy_review_2025_key_findings

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Bulk carbon is systemically indispensable but is not listed as a U.S.
    critical mineral or an EU critical/strategic raw material. Regulatory
    treatment focuses on carbon emissions and fuel markets rather than mineral
    criticality.

narrative: |
  Carbon is the largest commercial element in the world economy by throughput,
  but not in elemental form. Its trade reality is a set of enormous fossil
  carbon streams: coal, crude oil and condensate, and natural gas. In 2024 all
  three remained at or near record levels in global markets. Coal exceeded
  9.2 billion tonnes of output, oil production reached 4.5 billion tonnes, and
  marketed natural gas rose above 4.1 trillion cubic metres. These are not
  interchangeable streams: coal remains most exposed to power generation and
  steel, oil to transport and petrochemicals, and gas to power, heating,
  fertilizer, and industry.

  The commercial reality is also unusually political. Oil is shaped by OPEC+
  quota management, gas by pipeline geography and LNG infrastructure, and coal
  by sanctions, rail capacity, and regional power-system stress. IEA's 2024
  market commentary shows a world in which decarbonization technologies are
  visibly slowing oil demand growth and collapsing coal demand in some advanced
  economies, yet total fossil carbon demand still grew because electricity
  demand, industrial production, cooling loads, and Asian energy consumption
  kept expanding.

  For atlas purposes, carbon is best treated as a bundle of traded energy
  molecules rather than a mined elemental commodity. That is why the file is
  stream-based, why end uses are only partial author synthesis from primary
  energy sources, and why graphite is excluded to its own dedicated element
  entry.

