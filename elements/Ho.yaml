          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          US 2024e REE total: 45,000 t REO from bastnaesite concentrates at Mountain Pass,
          CA (MP Materials), valued at ~$260 million. Share: 45,000 / 390,000 = 11.5%.
          Estimated Ho at 0.15% basket: ~67 t — but this is a significant overestimate.
          Mountain Pass bastnaesite is LREE-dominant with very low Ho content (~0.04–0.08%
          Ho₂O₃ of total REOs, roughly 2–4× below the global basket average). Actual Ho
          from Mountain Pass concentrate is likely ~18–36 t at deposit-specific Ho
          concentration; concentrate is shipped to China for separation and essentially
          no Ho is separated domestically. The 67 t derived figure should be treated as a
          ceiling assuming the global average basket applies, which it does not here.
