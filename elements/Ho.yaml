byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 0.35
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma, Thailand) contain higher proportions of heavy REEs including
      Ho (~0.2–0.5% of total REOs) than bastnaesite-dominant mines. These deposits are
      the primary commercial source of holmium and account for the preponderance of
      global Ho supply. USGS MCS 2025 confirms Thailand and Burma production is from
      clay-type or ion adsorption deposits.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.06
    notes: |
      Bastnaesite (fluorocarbonate mineral, CeFCO₃) is the primary commercial source
      of light rare earth elements but contains only minor Ho (~0.04–0.08% of total REOs
      at Mountain Pass; ~0.1–0.2% at Bayan Obo). Bastnaesite-sourced Ho is a low-value
      co-product rarely recovered commercially. USGS MCS 2025 confirms bastnaesite was
      mined as a primary product at Mountain Pass in 2024.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.15
    notes: |
      Monazite (phosphate mineral, (Ce,La,Pr,Nd)PO₄) as recovered from heavy-mineral-sand
      concentrates contains moderate Ho (~0.1–0.2% of total REOs). Monazite processing
      in India and its stockpiling in the southeastern United States (per USGS MCS 2025)
      provide a secondary Ho source. Thorium content in monazite complicates processing
      under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: holmium_yag_lasers
    availability: partial
    notes: |
      USGS MCS 2025 states "Substitutes are available for many applications but generally
      are less effective." For Ho:YAG solid-state lasers operating at 2.09 μm — the
      dominant medical laser wavelength for urological lithotripsy (kidney/bladder stone
      ablation), soft-tissue surgery, and ophthalmology — alternatives include Er:YAG
      (2.94 μm, effective but different tissue penetration depth), Nd:YAG with frequency
      conversion (less efficient), and thulium fiber lasers (1.9 μm, increasingly adopted
      in urological applications). Thulium fiber lasers are growing as a partial substitute
      for Ho:YAG in lithotripsy due to improved pulse shaping; however, Ho:YAG remains
      dominant for high-energy stone ablation and is preferred for some surgical applications.
      No complete drop-in substitute exists across all Ho:YAG application contexts.
    source_id: usgs_mcs_2025_rare_earths
  - application: specialty_magnets
    availability: partial
    notes: |
      Holmium is used as a minor additive in some NdFeB formulations and in research
      magnetostrictive materials. For NdFeB magnet high-temperature performance
      enhancement, dysprosium and terbium are the primary heavy REE additives; Ho
      is not a principal NdFeB dopant and its substitution question is therefore largely
      moot in commercial magnet production. In specialized ultra-high-field research
      magnets exploiting Ho's extreme magnetic moment at cryogenic temperatures, no
      substitute element offers equivalent performance.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: lasers_medical_surgical
      share_pct: 45
      confidence: low
      notes: |
        Ho:YAG (holmium-doped yttrium aluminum garnet) lasers operating at 2.09 μm are
        the dominant commercial application for holmium. The 2.09 μm wavelength is strongly
        absorbed by water in biological tissue, enabling precise soft-tissue ablation with
        limited thermal spread. Medical applications include urological lithotripsy (laser
        ablation of kidney and bladder stones — the largest single market), prostate
        treatments (holmium laser enucleation of the prostate, HoLEP), soft-tissue surgery,
        and ophthalmology. Ho:YAG systems are produced by companies including Lumenis,
        Olympus, and Boston Scientific. USGS MCS 2025 lists "lasers" as an REE end use.
        Share is an industry estimate; USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: specialty_magnets_additives
      share_pct: 25
      confidence: low
      notes: |
        Holmium is incorporated in small quantities in specialty permanent magnet alloys
        and in experimental high-field magnets. Ho has the highest magnetic moment per
        atom of any natural element (10.6 μB) but practical exploitation requires
        cryogenic temperatures, limiting commercial magnet applications. Ho is also used
        in magnetostrictive research materials and as a minor additive in some HREE-doped
        NdFeB formulations. USGS MCS 2025 lists "magnets" and "metallurgical additives"
        as REE end uses. Share is an industry estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: glass_ceramics_optical
      share_pct: 20
      confidence: low
      notes: |
        Ho₂O₃ produces a distinctive yellow to orange-red coloration in glass and ceramics,
        and holmium-doped glass is used as a calibration standard for optical spectrometers
        due to its sharp, well-defined absorption peaks across the UV-visible spectrum.
        Specialty applications include Ho-doped optical filter glass, neutron-absorbing glass
        for nuclear shielding, and use in holmium-doped fiber amplifiers for wavelength-
        division-multiplexed telecommunications in the 2 μm window. USGS MCS 2025 lists
        "ceramics and glass" as an REE end use. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_nuclear_research
      share_pct: 10
      confidence: low
      notes: |
        Residual end uses including Ho's application in nuclear reactor design (Ho-165
        has a significant thermal neutron capture cross-section of ~65 barns, enabling
        use in neutron-absorbing control materials), holmium compounds in specialty
        catalysis research, and Ho-doped scintillators. USGS MCS 2025 lists "catalysts"
        and "other" as REE end-use categories. These applications are commercially minor
        relative to Ho:YAG laser uses. Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

prices: []

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Holmium is classified as critical under the US 2022 Critical Minerals List (as
    part of "rare earth elements"), the EU Critical Raw Materials Regulation 2024/1252
    (as a heavy rare earth element), and the EU Critical Raw Materials Act 2024 strategic
    materials list. Net import reliance for REE compounds and metals was ~80% in 2024e
    per USGS MCS 2025 salient statistics (down from >95% in 2020–2023 due to domestic
    compound production growth). Ho's criticality is amplified by its specific role in
    Ho:YAG medical lasers — a commercially dominant application with limited near-term
    substitutes — and by the near-total dependence on Chinese heavy-REE separation
    capacity for Ho₂O₃ production. Import sources 2020–23 for REE overall: China 70%,
    Malaysia 13%, Japan 6%, Estonia 5% (USGS MCS 2025). Ho was not directly named in
    China's April 2025 export controls (which targeted Sm, Gd, Tb, Dy, Lu, Sc, and Y),
    but broader basket supply dynamics were affected.

geopolitical_events:
  - date: "2025-04"
    event: "China imposes export controls on 7 HREEs (Sm, Gd, Tb, Dy, Lu, Sc, Y) — holmium not directly targeted but heavy REE basket dynamics affected"
    impact: |
      China's April 2025 export controls required export licenses for samarium, gadolinium,
      terbium, dysprosium, lutetium, scandium, and yttrium but did not explicitly name
      holmium. However, the controls elevated awareness of heavy REE supply chain
      vulnerability across the basket and disrupted some supply logistics for HREE
      separation intermediates from which Ho co-occurs. Ho:YAG laser manufacturers
      monitoring supply chain risk noted holmium's similar single-source dependency
      on Chinese ion adsorption clay operations, even without direct license requirements.
    source_id: china_mofcom_export_controls_2025
  - date: "2024-01"
    event: "Global REE mine production increased to 390,000 t REO in 2024e, driven by China, Nigeria, and Thailand; Burma declined 28%"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from 376,000 t
      in 2023. China rose from 255,000 to 270,000 t; Nigeria from 7,200 to 13,000 t;
      Thailand from 3,600 to 13,000 t; Burma fell from 43,000 to 31,000 t. For Ho, the
      Burma decline is particularly significant since Burmese ion adsorption clay operations
      are heavy-REE enriched and disproportionately important for HREE supply including Ho.
      At the ~0.15% basket share, world Ho production rose from ~564 t in 2023 to ~585 t
      in 2024e, but the Burma decline constrained heavy-REE contribution to global supply.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US net import reliance for REE compounds and metals declined to 80% in 2024e"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds and
      metals at 80% in 2024e, down from >95% in 2020–2023. Domestic compound production grew
      to 1,300 t reported in 2024. Despite this improvement, Ho-specific domestic processing
      capacity is absent: no US facility produces Ho₂O₃ or Ho:YAG crystal intermediates
      from domestic concentrates, meaning US medical device and laser manufacturers are
      entirely dependent on imported Ho oxides, primarily from Chinese suppliers.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Holmium is a minor heavy rare earth element whose commercial importance is
  concentrated in a single dominant application: Ho:YAG (holmium-doped yttrium
  aluminum garnet) solid-state lasers operating at 2.09 μm. This wavelength is strongly
  absorbed by biological water, enabling Ho:YAG systems to achieve precise tissue
  ablation with limited thermal damage — making them the preferred tool for urological
  lithotripsy (laser ablation of kidney and bladder stones), prostate surgery (HoLEP),
  and a range of soft-tissue surgical procedures. Ho:YAG laser systems from manufacturers
  including Lumenis and Olympus represent the primary commercial demand for holmium oxide,
  and medical device supply chains are therefore the main interface between holmium's
  geological reality and its economic relevance.

  Global Ho production is estimated at ~585 tonnes Ho₂O₃ equivalent in 2024 (derived
  from the USGS-reported 390,000 t world REE total at a ~0.15% basket share), with China
  supplying ~69% of mine output at aggregate REO shares — but a meaningfully higher actual
  share when deposit-type correction is applied, since Ho is enriched in China's southern
  ion adsorption clay deposits (~0.2–0.5% Ho₂O₃) rather than in LREE-dominant bastnaesite.
  China controls approximately 92% of global heavy REE separation capacity including Ho₂O₃
  production. Burma's ion adsorption clay operations, before their 28% output decline in 2024,
  were a significant secondary Ho source due to the same HREE-enriched deposit character.

  Unlike dysprosium or terbium, holmium was not directly targeted in China's April 2025
  heavy REE export control measures (which named Sm, Gd, Tb, Dy, Lu, Sc, and Y). However,
  the structural supply chain reality is identical: near-total dependence on Chinese
  separation capacity for a material with no short-term domestic substitute production in
  the United States or Europe. Thulium fiber lasers at 1.9 μm are emerging as partial
  substitutes in some urological applications, but Ho:YAG remains the gold standard for
  high-energy stone ablation and broader surgical use. The path to supply chain resilience
  for Ho:YAG medical devices requires non-Chinese Ho₂O₃ separation capacity — a gap not
  yet addressed by current diversification investments that focus primarily on NdPr and HREE
  magnets.

