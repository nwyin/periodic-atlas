          Remaining producers 2024e: India 2,900 + Russia 2,500 + Madagascar 2,000 +
          Other 1,100 + Vietnam 300 + Malaysia 130 + Brazil 20 ≈ 8,950 t REO, ~2.3%
          of world total. Estimated combined Ho contribution ~13 t at 0.15% basket share.
          India produces primarily from monazite in heavy mineral sands (moderate Ho
          content ~0.1–0.2%); Russia from apatite-nepheline at Kola (very low Ho).
          Overall Ho contribution from this residual group is uncertain.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 92
        notes: |
          China controls approximately 90–92% of global REE separation and refining
          capacity. Ho₂O₃ separation is concentrated in southern China, particularly
          Jiangxi and Fujian provinces where ion adsorption clay mining operations co-locate
          with separation facilities. Ho:YAG crystal growth for laser applications is also
          predominantly a Chinese capability. USGS MCS 2025 import sources (2020–23)
          confirm China supplied 70% of US REE compound and metal imports; for heavy REEs
          like Ho the actual global separation share is higher (~90–92%).
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 5
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate into separated REE products. USGS MCS 2025
          import sources (2020–23): Malaysia 13% of US REE imports. Mt. Weld is
          LREE-dominant; LAMP's Ho output is minimal relative to China's. LAMP's
          contribution to the heavy REE separation market is small.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Other non-Chinese Ho₂O₃ separation: Neo Performance Materials (Sillamäe,
          Estonia, 5% of US imports 2020–23), Japanese processors (6% of US imports
          2020–23), and nascent US separation capacity. Ho metal and Ho:YAG crystal
          production outside China is very limited; laser-grade Ho doping intermediates
          are largely a Chinese capability. Estonia and Japan source intermediates from
          Australian and Chinese concentrates per USGS chapter text.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Ho-specific figures derived from REO totals using the ~0.15%
    basket share assumption; actual per-element disaggregation is not available from
    public USGS data. Ho's heavy-REE character means its actual geographic concentration
    is higher than the REO basket totals imply: Chinese southern-province clay deposits
    and Burmese clay operations are the dominant Ho sources, not the bastnaesite operations
    at Mountain Pass or Mt. Weld. Country shares sum to ~100.8% due to rounding of
    reported integers against the rounded world total.

reserves:
  economic_reserves:
    value: 135000
    unit: tonnes
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports world total REE reserves >90,000,000 t REO
      (floor value stated as ">90,000,000 t"). Applying Ho's typical basket share (~0.15%)
      gives ~135,000 t Ho₂O₃ equivalent. USGS does not report per-element reserve
      breakdowns; all Ho-specific reserve figures are derived. The true figure depends
      on the actual Ho content in each country's reserve base ore types; bastnaesite-
      dominant reserves (China's Bayan Obo, Australia's Mt. Weld) will yield lower Ho
      tonnages at their actual Ho fractions, while the world's ion adsorption clay
      resources (predominantly in southern China) contain higher Ho fractions than the
      0.15% basket average applied here. The floor nature of the world total understates
      global Ho reserves; actual reserves are likely higher.
