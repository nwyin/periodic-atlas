symbol: Ho
atomic_number: 67
name: holmium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a grouped commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element tonnage
  is not published for individual REEs. Per-element attribution for holmium requires
  multiplying the aggregate by Ho's typical basket share. Holmium is commercially
  traded primarily as Ho₂O₃ (holmium(III) oxide) at ≥99.9% minimum purity for most
  applications. For laser applications, holmium is used as a dopant in Ho:YAG
  (holmium-doped yttrium aluminum garnet) crystals and Ho-doped fiber laser media.
  All production figures in this file are derived by multiplying the USGS-reported
  aggregate REO totals by Ho's typical basket share of ~0.15%, which is not reported
  directly by USGS. The basket share varies strongly by deposit type: bastnaesite-
  dominant mines (Mountain Pass CA ~0.04–0.08%, Bayan Obo CN ~0.1–0.2%) are
  light-REE-dominant and yield very low Ho fractions; ion adsorption clay deposits
  in southern China (Jiangxi, Fujian, Guangdong) and Southeast Asia (Myanmar,
  Thailand) yield ~0.2–0.5% Ho₂O₃ because these deposits are heavy-REE enriched.
  A global weighted average of ~0.15% is used as the central estimate. Holmium has
  the highest magnetic moment of any natural element (10.6 μB) but this property is
  practically exploited only at cryogenic temperatures. Ho is not in the USGS MCS
  2025 salient statistics price table, which covers only Ce, Dy, Eu, La, Mischmetal,
  Nd, and Tb; prices for Ho are therefore omitted. All data are in metric tons REO
  equivalent unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 585
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Ho's typical basket share of ~0.15%
      gives ~585 t Ho₂O₃ equivalent. Ho's basket share is not reported separately by
      USGS; the 0.15% factor is an industry consensus figure reflecting the global
      weighted average, dominated by heavy-REE-enriched ion adsorption clay deposits
      in southern China and Southeast Asia (~0.2–0.5% Ho) and diluted by LREE-dominant
      bastnaesite mines at Mountain Pass (~0.04–0.08% Ho) and Bayan Obo (~0.1–0.2%
      Ho). Actual Ho output is not officially disaggregated from the REE basket in
      public USGS data. The 2023 comparable estimate is ~564 t at the same 0.15% share
      applied to 376,000 t world total. Holmium production is dominated by sources that
      are heavy-REE enriched — primarily Chinese ion adsorption clay operations — meaning
      the country-level shares derived from aggregate REO totals significantly overstate
      contribution from LREE-dominant producers such as Mountain Pass.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
