          Sino-Burmese border region, which are heavy-REE enriched; actual Ho content in
          Burmese production is likely above the 0.15% global basket average (~0.2–0.4%),
          making Burma a disproportionately important Ho contributor at its peak. Production
          estimated from China import records (USGS footnote 12). The 28% decline in 2024
