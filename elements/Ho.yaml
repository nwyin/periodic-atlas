          value: 405
          unit: tonnes_per_year
          form: oxide
          approximate: true
          confidence: low
          source_id: usgs_mcs_2025_rare_earths
        notes: |
          China 2024e REE total: 270,000 t REO (production quota per USGS footnote 14;
          excludes undocumented production). China share: 270,000 / 390,000 = 69.2%.
          Estimated Ho component: ~405 t Ho₂O₃ at 0.15% basket share. China's southern
          ion adsorption clay deposits in Jiangxi, Fujian, and Guangdong have above-average
          Ho content (~0.2–0.5% Ho₂O₃ of total REOs), meaning China's actual share of
          global Ho output likely exceeds 69%. Bayan Obo bastnaesite-monazite contributes
          below-average Ho relative to total REOs. China's 2024 quota rose from 255,000 t
          in 2023 to 270,000 t per USGS footnote 14.
        source_id: usgs_mcs_2025_rare_earths
