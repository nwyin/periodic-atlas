symbol: Ir
atomic_number: 77
name: iridium
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  Iridium is sold commercially mainly as high-purity refined metal sponge, powder,
  grains, and fabricated stock for crucibles and specialty alloys; oxide or chloride
  intermediates are used for mixed-metal-oxide electrode coatings and chemical
  catalysts. USGS MCS 2025 reports platinum-group-metal production in kilograms of
  contained PGM and prices in U.S. dollars per troy ounce.

production:
- reporting_year: 2024
  mine:
    value: 8200
    unit: kg_per_year
    form: contained_element
    approximate: true
    confidence: low
    notes: |
      Iridium is not tabulated separately in USGS MCS 2025. DOE's platinum-group
      metals supply-chain assessment reports 2020 global iridium production of
      8.17 metric tons and lists representative South African UG2 grades of
      Pt 2.0, Pd 1.3, Rh 0.34, Ru 0.45, Ir 0.13, and Os 0.05 g/t, implying an
      iridium basket share of about 3% of a representative 6E reef basket by
      grade. This file therefore carries an 8.2 metric ton per year
      high-single-digit proxy for the 2025 snapshot rather than a false-precision
      standalone 2024 figure.
    source_id: doe_pgm_supply_chain_2022
  grouped_reporting: true
  commodity_group: platinum_group_metals
  mining_by_country:
    shares:
      - country: ZA
        share_pct: 83.0
        notes: |
          DOE Table A2 iridium mine-production share, 2020. South Africa's Bushveld
          Complex overwhelmingly dominates iridium supply, especially UG2 ore where
          iridium is richer than in Merensky Reef.
        source_id: doe_pgm_supply_chain_2022
      - country: ZW
        share_pct: 10.2
        notes: |
          DOE Table A2 iridium mine-production share, 2020. Zimbabwean output comes
          from the Great Dyke PGM belt and is materially smaller than South Africa's
          but still the second-largest national source.
        source_id: doe_pgm_supply_chain_2022
      - country: CA
        share_pct: 3.7
        notes: |
          DOE Table A2 iridium mine-production share, 2020. Canadian iridium is
          recovered mainly from nickel-copper-PGM sulfide systems such as Sudbury.
        source_id: doe_pgm_supply_chain_2022
      - country: RU
        share_pct: 3.1
        notes: |
          DOE Table A2 iridium mine-production share, 2020. Russian output is tied
          to Norilsk-type nickel-copper-PGM sulfide mining and associated refining.
        source_id: doe_pgm_supply_chain_2022
    completeness: complete
  refining_by_country:
    shares: []
    completeness: partial
  notes: |
    USGS MCS 2025 remains the anchor source for the 2025 PGM market snapshot, but it
    does not publish a standalone iridium mine table. The mine quantity and mine-share
    geography above therefore use the latest official iridium-specific appendix data
    located directly in DOE's PGM supply-chain assessment, while grouped_reporting stays
    true to reflect the continuing USGS basket treatment.

reserves:
  economic_reserves:
    value: 2430000
    unit: kg
    form: contained_element
    approximate: true
    confidence: low
    notes: |
      USGS MCS 2025 reports world PGM reserves of more than 81,000,000 kg but does
      not disaggregate iridium. Applying the representative ~3% iridium share used in
      the production proxy implies more than 2,430,000 kg of contained iridium in
      economic reserves.
    source_id: usgs_mcs_2025_pgm
  resources:
    value: 3000000
    unit: kg
    form: contained_element
    approximate: true
    confidence: low
    notes: |
      USGS MCS 2025 reports world PGM resources of more than 100,000,000 kg. Applying
      a representative ~3% iridium share implies more than 3,000,000 kg of contained
      iridium resources globally, concentrated chiefly in the Bushveld Complex.
    source_id: usgs_mcs_2025_pgm
  reserves_by_country:
    shares:
      - country: ZA
        share_pct: 77.8
        notes: |
          Share of total reported PGM reserves from USGS MCS 2025. South Africa's
          Bushveld Complex contains by far the largest iridium-bearing reserve base.
        source_id: usgs_mcs_2025_pgm
      - country: RU
        share_pct: 19.8
        notes: |
          Share of total reported PGM reserves from USGS MCS 2025. Russian reserve
          figures are reported under the Russian A+B+C1+C2 classification system.
        source_id: usgs_mcs_2025_pgm
      - country: ZW
        share_pct: 1.5
        notes: "Share of total reported PGM reserves from USGS MCS 2025."
        source_id: usgs_mcs_2025_pgm
      - country: US
        share_pct: 1.0
        notes: "Share of total reported PGM reserves from USGS MCS 2025."
        source_id: usgs_mcs_2025_pgm
      - country: CA
        share_pct: 0.4
        notes: "Share of total reported PGM reserves from USGS MCS 2025."
        source_id: usgs_mcs_2025_pgm
    completeness: complete
  notes: |
    USGS reports only combined PGM reserve and resource stocks. Country shares above
    are the published PGM-reserve shares; iridium-specific reserve tonnage remains a
    basket-share derivation rather than a separately tabulated reserve series.

end_uses:
  uses:
    - application: electrochemical_applications
      share_pct: 36
      confidence: medium
      notes: |
        DOE Table A1 gives 2021 iridium gross demand of 3.0 metric tons in
        electrochemical applications, the largest identified demand bucket. This
        includes chlor-alkali and other mixed-metal-oxide anode coatings and
        electrolysis-related catalyst demand.
      source_id: doe_pgm_supply_chain_2022
    - application: other_industrial
      share_pct: 32
      confidence: medium
      notes: |
        DOE Table A1 gives 2021 iridium gross demand of 2.7 metric tons in the
        residual "other" category. In commercial practice this bucket includes
        high-temperature hardware such as crucibles, spark-plug components, and other
        specialty industrial uses.
      source_id: doe_pgm_supply_chain_2022
    - application: electronics
      share_pct: 22
      confidence: medium
      notes: |
        DOE Table A1 gives 2021 iridium gross demand of 1.8 metric tons in electronics.
        Iridium is used where oxidation resistance and high-temperature stability matter,
        including advanced electronics manufacturing hardware.
      source_id: doe_pgm_supply_chain_2022
    - application: chemical_catalysts
      share_pct: 10
      confidence: medium
      notes: |
        DOE Table A1 gives 2021 iridium gross demand of 0.8 metric tons in chemical
        applications. USGS also identifies PGMs as catalysts for bulk chemicals and
        petroleum refining.
      source_id: doe_pgm_supply_chain_2022
  completeness: complete

byproduct_of:
  - Pt
  - Ni
  - Cu

feedstock_origins:
  - substrate: ug2_chromitite_reef
    notes: |
      Representative South African UG2 ore carries about 0.13 g/t iridium alongside
      Pt 2.0, Pd 1.3, Rh 0.34, Ru 0.45, and Os 0.05 g/t in DOE Table 3. UG2 is the
      most iridium-rich major PGM reef and the backbone of global primary supply.
    source_id: doe_pgm_supply_chain_2022
  - substrate: merensky_reef_pgm_ore
    notes: |
      DOE Table 3 lists Merensky Reef ore at about 0.05 g/t iridium, lower than UG2
      but still an important platinum-group feedstock in South Africa's Bushveld Complex.
    source_id: doe_pgm_supply_chain_2022
  - substrate: nickel_copper_pgm_sulfide_ore
    notes: |
      Norilsk and Sudbury type nickel-copper-PGM sulfide ores provide the main
      non-Bushveld iridium stream. DOE Table 3 shows very low iridium grades in these
      systems relative to South African reefs, which is why South Africa dominates
      iridium supply far more strongly than it dominates platinum or palladium.
    source_id: doe_pgm_supply_chain_2022

substitutes:
  - application: electrochemical_applications
    availability: partial
    notes: |
      USGS MCS 2025 states that one PGM can substitute for another in some industrial
      end uses, but with losses in efficiency. For iridium's electrochemical uses,
      ruthenium-rich mixed-oxide systems can reduce iridium loading but trade off
      durability and stability.
    source_id: usgs_mcs_2025_pgm
  - application: electrochemical_applications
    availability: partial
    notes: |
      Heraeus and Sibanye-Stillwater announced a ruthenium-based PEM-water-electrolysis
      catalyst that can cut iridium use by about 85% relative to an iridium-oxide
      catalyst. The claim is partial rather than full because the new catalyst is a
      loading-reduction path, not a universal iridium elimination route.
    source_id: heraeus_ruthenium_pem_catalyst_2023

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: us_federal_register_critical_minerals_2022
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_annex_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_annex_2024
  notes: |
    Iridium is explicitly named on the U.S. 2022 final critical-minerals list and is
    covered by the EU Critical Raw Materials Act's Annex I strategic list and Annex II
    critical list under platinum group metals. Extreme mine concentration in South
    Africa and limited substitution in electrochemical uses make the designation
    commercially intuitive rather than merely formal.

