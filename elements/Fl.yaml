  uses: []
  completeness: partial

criticality: {}

narrative: |
  Flerovium has no commercial supply chain and no practical traded form. The
  element exists only in nuclear-physics experiments that synthesize a few atoms
  at a time and identify them through correlated alpha-decay chains. That keeps
  the commercial fields empty even though the element is formally named and
  recognized.

  The primary commercial reality is therefore absence: no mining, no refining,
  no reserves, no price series, and no end-use market. Its significance is
  scientific rather than industrial, because synthesis and decay measurements
  help test shell effects and the "island of stability" hypothesis for
  superheavy nuclei.

