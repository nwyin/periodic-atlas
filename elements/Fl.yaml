symbol: Fl
atomic_number: 114
name: flerovium
category: synthetic_superheavy
industrial_tier: 1
commercial_production: false
snapshot_year: 2025
form_notes: |
  No commercial trade form exists. Flerovium is created one atom at a time in
  heavy-ion fusion experiments using actinide targets; half-lives in the cited
  NNDC/ENSDF datasets are reported in seconds.

