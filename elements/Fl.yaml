research_only:
  longest_lived_isotope: Fl-289
  half_life_seconds: 2.4
  discovered_year: 2004
  iupac_recognized_year: 2011
  discovered_at: |
    Joint Institute for Nuclear Research (Dubna, Russia) in collaboration with
    Lawrence Livermore National Laboratory (California, USA). IUPAC credited
    the Dubna-Livermore collaborations with discovery of elements 114 and 116,
    and the accepted name "flerovium" honors the Flerov Laboratory of Nuclear
    Reactions at JINR and its founder Georgiy N. Flerov.
  production_mode: accelerator_generated
  active_production_labs:
    - JINR Dubna
  notes: |
    IUPAC's discovery summary specifically points to the 2004 Dubna-Livermore
    experiments from 48Ca + 242Pu fusion as the internally redundant evidence
    establishing element 114. NNDC ENSDF datasets list short-lived isotopes
    such as Fl-287, Fl-288, and Fl-289, with Fl-289 carrying the longest
    evaluated half-life among confirmed flerovium isotopes in the cited data.

