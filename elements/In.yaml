symbol: In
atomic_number: 49
name: indium
category: post_transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports all figures in metric tons of indium content unless
  otherwise specified. Indium has no mine-stage production figure; USGS tracks
  only refinery production and capacity. The US has had zero domestic refinery
  production since at least 2020, and all domestic consumption is met through
  imports. Refinery production data for most countries were derived by USGS from
  trade data, production capacity, and changes in related lead and zinc smelter
  output (footnote 6 of MCS 2025 indium chapter); consequently, country-level
  figures carry medium confidence.

