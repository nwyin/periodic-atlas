    Net import reliance 100% per USGS MCS 2025 salient statistics (all years
    2020–2024). Indium is on the US 2025 critical minerals list (25% tariff on
    indium from China announced September 2024 under Section 301 review).
    Indium appears on both Annex I (strategic) and Annex II (critical raw
    materials) of EU Regulation 2024/1252.

