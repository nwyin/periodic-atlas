reserves:
  notes: |
    USGS MCS 2025 does not publish indium reserves separately. The chapter text
    states indium "is most commonly recovered from the zinc-sulfide ore mineral
    sphalerite" and that the indium content of zinc deposits ranges from less
    than 1 ppm to 100 ppm. Quantified reserves are reported only at the zinc
    level; indium reserves can be inferred by applying recovery assumptions to
    zinc reserves but USGS does not publish such a figure in the indium chapter.
    See the USGS MCS 2025 Zinc chapter for zinc reserve data from which indium
    reserves are partially derivable.

byproduct_of: [Zn]
feedstock_origins:
  - substrate: zinc_sulfide_ore_sphalerite
    notes: |
      USGS MCS 2025 p.91: "Indium is most commonly recovered from the zinc-sulfide
      ore mineral sphalerite. The indium content of zinc deposits from which it is
      recovered ranges from less than 1 part per million to 100 parts per million."
      Sphalerite is the primary feedstock for essentially all world refinery
      production.
    source_id: usgs_mcs_2025_indium
  - substrate: chalcopyrite_and_stannite_base_metal_sulfides
    notes: |
      USGS MCS 2025 p.91: "Although the geochemical properties of indium are such
      that it occurs in trace amounts in other base-metal sulfides — particularly
      chalcopyrite and stannite — indium recovery from most deposits of these
      minerals was not economic." Recovery is theoretically possible but not
      currently a material supply source.
    source_id: usgs_mcs_2025_indium

substitutes:
  - application: ito_flat_panel_displays
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph lists several ITO alternatives: antimony
      tin oxide coatings (successfully annealed to LCD glass); carbon nanotube
      coatings (for flexible displays, solar cells, touch screens); poly
      (3,4-ethylene dioxythiophene) (PEDOT) for flexible displays and OLEDs;
      copper or silver nanowires for touch screens; graphene for ITO electrodes in
      solar cells and flexible touch screens; and zinc oxide nanopowder for LCDs.
      All are partial substitutes; none has achieved commercial scale displacement
      of ITO as of the snapshot year.
    source_id: usgs_mcs_2025_indium
  - application: nuclear_reactor_control_rod_alloys
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Hafnium can replace indium in nuclear
      reactor control rod alloys." This is a niche application; hafnium is the
      named substitute.
    source_id: usgs_mcs_2025_indium

end_uses:
  uses:
    - application: ito_flat_panel_displays_and_touchscreens
      share_pct: 80
      confidence: medium
      notes: |
        USGS MCS 2025 chapter text: "Production of indium tin oxide (ITO) continued
        to account for most global indium consumption. ITO thin-film coatings were
        primarily used for electrically conductive purposes in a variety of
        flat-panel displays — most commonly liquid crystal displays (LCDs)." USGS
        does not provide an explicit percentage for ITO in the 2025 MCS chapter.
        The 80% figure is consistent with historical USGS and IEA reporting (ITO
        typically cited at 70–85% of demand); assigned medium confidence pending a
        primary quantitative citation for 2024.
      source_id: usgs_mcs_2025_indium
    - application: alloys_and_solders
      share_pct: 7
      confidence: medium
      notes: |
        USGS MCS 2025 Domestic Production and Use: "Other indium end uses included
        alloys and solders, compounds, electrical components and semiconductors, and
        research." USGS does not quantify individual non-ITO shares. 7% is an
        illustrative partition of the remaining ~20% consistent with industry
        sources; marked medium confidence.
      source_id: usgs_mcs_2025_indium
    - application: semiconductors_and_electrical_components
      share_pct: 8
      confidence: medium
      notes: |
        USGS MCS 2025 chapter text highlights InP (indium phosphide) use in 5G
        fiber-optic telecommunications, AI chip materials, high-speed photodetectors,
        and laser diodes. USGS does not provide a specific percentage. 8% is an
        illustrative partition consistent with industry sources; marked medium
        confidence. Includes CIGS thin-film solar cell use.
      source_id: usgs_mcs_2025_indium
    - application: other_compounds_and_research
      share_pct: 5
      confidence: medium
      notes: |
        Residual from USGS list of non-ITO end uses: compounds, research, and
        data-center uses (ITO-coated fibers, indium-based solder alloys per MCS
        2025 chapter). Marked medium confidence; no explicit share percentage given
        in source.
      source_id: usgs_mcs_2025_indium
  completeness: complete

