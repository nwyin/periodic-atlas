geopolitical_events:
  - date: 2024-09
    event: "US announces 25% Section 301 tariff on critical minerals from China, explicitly including indium"
    impact: |
      USGS MCS 2025 chapter text: "Additional categories of goods from China were
      subject to tariffs including a 25% ad valorem tariff on critical minerals,
      which included indium." Over the prior 4-year average the US imported 8% of
      indium from China; as of September 2024 that share rose to 25%. Tariff
      increases US import cost from the world's dominant supplier (70% of world
      refinery production).
    source_id: usgs_mcs_2025_indium
  - date: 2024-08
    event: "InP wafer fabrication facility in Alhambra, CA, resumes production under US-based photonic devices manufacturer"
    impact: |
      USGS MCS 2025 chapter text: "In August, an indium-phosphide-wafer fabrication
      facility, located in Alhambra, CA, resumed production after it was acquired by
      a U.S.-based photonic devices manufacturer." Supports downstream US semiconductor
      supply-chain security for InP-based devices (5G, AI).
    source_id: usgs_mcs_2025_indium
  - date: 2024-07
    event: "Zinc-copper-silver-indium project in Utah fully permitted for exploration shaft and open pit mine construction"
    impact: |
      USGS MCS 2025 chapter text: "As of July, a zinc-copper-silver-indium project
      in Utah was fully permitted for the construction of an exploration shaft and
      open pit mine." Would be a rare US-domestic indium-bearing mine if developed
      to production; current US net import reliance is 100%.
    source_id: usgs_mcs_2025_indium

narrative: |
  Indium is the classic refinery-only byproduct: there are no indium mines.
  Every tonne of indium reaches market as a trace co-product from zinc smelting,
  primarily from sphalerite ores. USGS MCS 2025 places world 2024 refinery
  production at 1,080 tonnes (estimated), with China at 70% (760 t), Korea
  at ~17% (180 t), and Japan at ~6% (60 t). The US has had zero refinery
  production throughout 2020–2024 and imports all its supply.

  The dominant end use — ITO for flat-panel displays and touchscreens — drives
  most demand. Emerging growth comes from indium phosphide (InP) substrates in
  5G fiber-optic networks and AI-specialized photonic chips; USGS notes a domestic
  InP substrate company reported 67% year-on-year revenue growth in Q2 2024.
  Data-center expansion adds further incremental demand through ITO-coated fibers
  and indium-based solders.

  The September 2024 Section 301 tariff extension to critical minerals (25% ad
  valorem on Chinese indium) is geopolitically salient: China accounts for 70%
  of world refinery production and had become 25% of US imports by the time of
  the announcement, up from an 8% four-year average. US warehouse prices rose
  42% in 2024 (from $244/kg to $340/kg), peaking at $420/kg in June.

  Reserves are not independently published for indium; USGS MCS 2025 explicitly
  refers users to the zinc chapter. The indium content of zinc deposits ranges
  from <1 ppm to 100 ppm, making economically recoverable quantities highly
  mine-specific. Supply cannot respond independently to indium price signals
  because production volumes are governed by zinc output at the smelter level.

  The substitution threat to ITO — carbon nanotubes, PEDOT, silver nanowires,
  graphene, zinc oxide nanopowder, antimony tin oxide — has been discussed for
  over a decade without displacing ITO at commercial scale, partly because
  large-scale recycling of ITO scrap (primarily in Japan and Korea) already
  moderates effective supply tightness.

