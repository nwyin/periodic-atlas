narrative: |
  Americium is the most industrially-deployed transuranic element by
  installation count, if not by mass. Every ionization smoke detector in
  the world — roughly 3 billion installed globally — contains about a
  third of a microgram of Am-241. The entire annual supply is measured
  in kilograms, not tonnes, and the US dependency on a single facility
  at Los Alamos nearly became a crisis during the 2015-2020 production
  gap before the line was restarted in 2021.

