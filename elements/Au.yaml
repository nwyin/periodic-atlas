symbol: Au
atomic_number: 79
name: gold
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports gold production on a gold-content basis in metric tons.
  The salient statistics note: "One metric ton (1,000 kilograms) = 32,150.7 troy ounces."
  The primary commercial forms are gold bullion (refined metal ≥99.5% Au), dore (unrefined
  gold-silver alloy bars smelted at mine sites, typically 60–90% Au), and gold concentrates
  (ores shipped to refineries). Prices are quoted in US dollars per troy ounce (Engelhard
  average gold price quotation). US production figures include lode (hard-rock) and placer
  mine output; refinery figures split primary (from domestic and foreign ores/concentrates)
  and secondary (new and old scrap) streams. World mine production data are on a gold-content
  basis. Data are in metric tons unless otherwise specified.

production:
- reporting_year: 2024
  mine:
    value: 160
    unit: tonnes_per_year
    form: contained_element
    approximate: true
    confidence: high
    notes: |
      US mine production 2024e: 160 metric tons; value estimated at $12 billion, a 9%
      increase in value from 2023 (reflecting higher gold prices). Gold produced at more
      than 40 lode mines in 12 states and at several large and numerous smaller placer
      mines (mostly Alaska and Western States). Nevada led with ~70% of domestic output;
      Alaska contributed ~16%. About 7% was recovered as byproduct from copper ore
      processing. Top 26 operations yielded ~97% of mined gold.
    source_id: usgs_mcs_2025_gold
  refined:
    value: 260
    unit: tonnes_per_year
    form: metal
    approximate: true
    confidence: high
    notes: |
      US total refinery output 2024e: primary 170 t + secondary (new and old scrap) 90 t
      = 260 metric tons. Commercial-grade gold produced at approximately 15 refineries.
      Primary refinery production declined from 179 t (2023) to 170 t (2024e); secondary
      declined from 96 t (2023) to 90 t (2024e). Recycled scrap was equivalent to about
      45% of reported US consumption in 2024.
    source_id: usgs_mcs_2025_gold
