        confidence: medium
        notes: |
          DR Congo 2024e (formal): ~28 metric tons. AngloGold/Barrick's Kibali alone
          produced 21.3 t (686 koz, -10% YoY). Formal exports ~27.9 t. SWISSAID
          estimates formal channels capture <20% of actual DRC gold output, implying
          a real total well above 100 t with the balance smuggled (primarily via
          Uganda and Rwanda to UAE). The figure here is the formal/reported number;
          confidence: medium. Below the 1% floor but admitted under 2-source rule.
          Added via secondary-source decomposition.
