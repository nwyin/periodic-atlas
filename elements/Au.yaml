feedstock_origins:
  - substrate: gold_lode_ore
    notes: |
      The primary source of mined gold. Hard-rock lode deposits include orogenic gold
      (quartz-vein hosted), intrusion-related, and epithermal types. Nevada hosts the Carlin
      Trend and Cortez/Battle Mountain mining districts (US), which together account for ~70%
      of US production. These ores are processed by heap leaching (oxide ores) or mill
      flotation and cyanide leaching (sulfide ores) to produce dore or concentrates.
    source_id: usgs_mcs_2025_gold
  - substrate: gold_placer_deposit
    notes: |
      Alluvial/placer gold mined primarily in Alaska and the Western States. Several large
      placer operations and numerous smaller artisanal mines contribute to US production.
      Placer gold is recovered by gravity separation (sluicing, dredging) and typically
      smelted directly to dore.
    source_id: usgs_mcs_2025_gold
  - substrate: copper_ore_byproduct
    notes: |
      About 7% of US domestic gold is recovered as byproduct from copper ore processing.
      Gold is a common trace constituent in porphyry copper deposits (e.g., Bingham Canyon,
      Utah); it is recovered in the copper smelting/refining circuit as anode slimes, then
      processed through a precious-metals refinery.
    source_id: usgs_mcs_2025_gold
  - substrate: gold_silver_dore
    notes: |
      Dore — unrefined gold-silver alloy bars smelted at mine sites — is the dominant import
      form for US refineries. Major dore import sources (2020–23): Mexico 38%, Colombia 20%,
      Argentina 12%, Nicaragua 8%, other 22%.
    source_id: usgs_mcs_2025_gold
  - substrate: gold_scrap
    notes: |
      New and old scrap provides a significant secondary supply stream: ~90 metric tons in
      2024, equivalent to ~45% of reported US consumption. Sources include industrial process
      scrap (new scrap from fabrication) and post-consumer scrap (old scrap from jewelry,
      electronics, and dental applications).
    source_id: usgs_mcs_2025_gold

substitutes:
  - application: electrical_and_electronic_contacts
    availability: partial
    notes: |
      USGS MCS 2025: "Base metals clad with gold alloys are widely used to economize on
      gold in electrical and electronic products." Products are "continually redesigned to
      maintain high-utility standards with lower gold content." Palladium is the primary
      functional substitute for gold in electrical contacts; silver is used in lower-
      specification applications.
    source_id: usgs_mcs_2025_gold
  - application: jewelry
    availability: partial
    notes: |
      USGS MCS 2025: "Base metals clad with gold alloys are widely used to economize on
      gold in jewelry." Gold-filled and gold-plated jewelry use a base-metal core with a
      thin gold layer. Platinum, palladium, and silver are functional precious-metal
      substitutes in luxury jewelry.
    source_id: usgs_mcs_2025_gold
  - application: general_industrial
    availability: partial
    notes: |
      USGS MCS 2025: "Generally, palladium, platinum, and silver may substitute for gold."
      Platinum-group metals can replace gold in catalytic, chemical-resistance, and high-
      temperature applications where gold's properties are exploited.
    source_id: usgs_mcs_2025_gold

end_uses:
  uses:
    - application: jewelry
      share_pct: 45
      notes: |
        USGS MCS 2025 (World Gold Council data): estimated global gold consumption (excluding
        ETFs and similar investments) in jewelry: 45%. Largest single end-use category
        globally. Global jewelry consumption declined 7% in the first 9 months of 2024
        compared with the same period in 2023.
      source_id: usgs_mcs_2025_gold
    - application: central_bank_and_institutional
      share_pct: 21
      notes: |
        USGS MCS 2025 (World Gold Council data): central banks and other institutions: 21%.
        Central banks have been net buyers in recent years to diversify reserves. In the
        first 9 months of 2024, central bank holdings decreased by 17% compared with
        the same period in 2023.
      source_id: usgs_mcs_2025_gold
    - application: physical_investment_bars
      share_pct: 19
      notes: |
        USGS MCS 2025 (World Gold Council data): physical bars: 19%. Includes retail
        investment bars held by private individuals and institutions. Global consumption
        of physical bars increased 12% in the first 9 months of 2024 vs. the same period
        in 2023.
      source_id: usgs_mcs_2025_gold
    - application: coins_and_medals
      share_pct: 7
      notes: |
        USGS MCS 2025 (World Gold Council data): official coins and medals and imitation
        coins: 7%. Global coin and medal demand decreased 25% in the first 9 months of 2024
        vs. the same period in 2023.
      source_id: usgs_mcs_2025_gold
    - application: electrical_and_electronics
      share_pct: 6
      notes: |
        USGS MCS 2025 (World Gold Council data): electrical and electronics: 6%. Includes
        contacts, connectors, bonding wire in semiconductors, and circuit board plating.
        Global electronics consumption of gold grew 12% in the first 9 months of 2024
        vs. the same period in 2023.
      source_id: usgs_mcs_2025_gold
    - application: other_industrial
      share_pct: 2
      notes: |
        USGS MCS 2025 (World Gold Council data): other: 1%. Includes dentistry (decreasing
        5% in first 9 months of 2024 vs. 2023) and other minor industrial uses (unchanged).
        US domestic: dentistry, decorative uses, and miscellaneous industrial applications.
      source_id: usgs_mcs_2025_gold
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Gold is not on the US 2022 Critical Minerals List, the EU CRM 2023 list, or the EU
    Strategic Raw Materials list (CRMA 2024). Despite being a tier-4 high-volume precious
    metal, gold benefits from highly diversified global mine production (no single country
    exceeds 12% of world output), large global reserves (64,000 t), and a uniquely robust
    secondary supply chain: gold is the most heavily recycled of all metals, with existing
    above-ground stocks (estimated >190,000 t total ever mined) providing a permanent
    buffer. The US is a net exporter of gold in most years (E designation in the USGS
    salient statistics).

