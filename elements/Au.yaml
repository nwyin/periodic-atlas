          Argentina 2024e: ~53 metric tons; 13th-largest global producer per industry
          coverage. Veladero (Barrick/Shandong Gold) 15.7 t (+22% YoY), Cerro Negro
          ~7 t, Cerro Vanguardia ~5 t, plus Don Nicolás, Lindero, Gualcamayo. Not on
