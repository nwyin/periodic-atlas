        confidence: medium
        notes: |
          Turkey 2024e: ~23 metric tons (range 22–25 t). Down from ~36 t in 2023
          because SSR Mining's Çöpler mine was offline all of 2024 following the
          February 2024 heap-leach failure (~6–7 t removed). Kışladağ, Ağı Dağı,
          Efemçukuru, and Öksüt continued. WGC Q3 2024 supply data corroborates.
          Below the 1% floor but admitted under 2-source rule. Added via
          secondary-source decomposition.
        source_id: nordic_monitor_turkey_gold_2024
      - country: ZZ
        share_pct: 6.87
        quantity:
          value: 227
          unit: tonnes_per_year
          form: contained_element
          approximate: true
          confidence: medium
          source_id: usgs_mcs_2025_gold
        confidence: medium
        notes: |
          Remaining unnamed producers after secondary-source decomposition. Originally
          780 t / 23.64% per USGS MCS 2025 'Other countries' row; this atlas has
          extracted ~553 t / 16.77% into 13 named producers (SD, CI, GN, AR, VE, PG,
          CL, BO, ZW, PH, CD, DO, TR). The residual 227 t comprises smaller producers
          including Kyrgyzstan (~22 t), Suriname (~32 t), Ecuador (~18 t), Mongolia
          (~13 t), Egypt (~15 t), Saudi Arabia (~14 t), Tajikistan (~14 t), Nicaragua
          (~14 t), Guyana (~13.5 t), Ethiopia (~15–25 t calendar-2024), Senegal (~10 t),
          and a long tail of smaller national producers. USGS 'rounded' attribution
          is retained as the source of record for this residual row.
        source_id: usgs_mcs_2025_gold
    completeness: complete
  notes: |
    World mine production increased from 3,250 metric tons (2023) to 3,300 metric tons
    (2024e). China, Russia, Australia, Canada, and the United States together accounted
    for 41% of estimated global production in 2024. Burkina Faso has no reported reserves
    (NA). USGS MCS 2025 names 17 producers directly; this atlas extends the list with
    13 additional producers drawn from secondary sources (World Gold Council, SWISSAID,
    USGS country-yearbook chapters, corporate disclosures, national geological surveys),
    shrinking the USGS 'Other countries' residual from 780 t to ~227 t. Coverage
    threshold for secondary-source naming: ≥1% of world production, OR cited in ≥2
    authoritative secondary sources at material tonnage. Sudan (~64 t), Venezuela
    (~50 t), and DR Congo (~28 t) figures are formal/reported; real totals including
    smuggled/ASM flows are materially higher per SWISSAID, ICG, and US State Department
    analyses. Secondary-sourced shares carry `confidence: medium|low` and `approximate:
    true` on their quantities; each row's `source_id` traces provenance.

