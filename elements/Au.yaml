        confidence: low
        notes: |
          Venezuela 2024e: ~50 metric tons (central estimate; range 25–75 t across
          sources). Almost entirely illicit/state-linked ASM concentrated in the
          Orinoco Mining Arc; formal production negligible due to sanctions. OECD
          estimates 25–37.5 t; US State Department Congressional Report (2024) cites
