geopolitical_events:
  - date: "2024-01"
    event: "Gold price reaches record-high annual average of ~$2,400/troy oz in 2024"
    impact: |
      The estimated 2024 annual average gold price of $2,400/troy oz was 23% above the
      2023 record-high annual average of $1,945/troy oz, establishing a new benchmark.
      Price increased in Q1 2024, declined into Q2, and increased strongly again through
      early Q4. The price rally was driven by central bank demand, geopolitical uncertainty,
      investment flows, and US dollar dynamics.
    source_id: usgs_mcs_2025_gold
  - date: "2024-01"
    event: "Global gold ETF outflows accelerate; central bank holdings decline 17%"
    impact: |
      In the first 9 months of 2024, global investments in gold-based exchange-traded funds
      and similar investments decreased by 87% compared with the same period in 2023, and
      central bank holdings decreased by 17%. Despite reduced institutional accumulation,
      strong physical bar investment (+12%) and electronics demand (+12%) supported prices.
    source_id: usgs_mcs_2025_gold
  - date: "2024-01"
    event: "World mine production increases to 3,300 t; China, Russia, Australia lead"
    impact: |
      World gold mine production increased from 3,250 metric tons (2023) to an estimated
      3,300 metric tons (2024). China (380 t), Russia (310 t), Australia (290 t), Canada
      (200 t), and the US (160 t) together accounted for 41% of global production. Supply
      concentration among top producers remains moderate, with no single country controlling
      more than 12% of global output.
    source_id: usgs_mcs_2025_gold
  - date: "2024-01"
    event: "US domestic gold mine production declines to 160 t; value rises 9% to $12 billion"
    impact: |
      US mine production declined from 170 t (2023) to 160 t (2024e), continuing a
      multi-year trend from 193 t in 2020. Despite lower volume, the estimated value
      increased 9% to approximately $12 billion, entirely reflecting the higher gold price.
      Employment in US gold mining and milling was ~12,000 in 2024e.
    source_id: usgs_mcs_2025_gold

narrative: |
  Gold occupies a singular position in the global commodity complex as both a monetary
  asset and an industrial input. In 2024, world mine production reached an estimated 3,300
  metric tons of gold content, with China (380 t, 12%), Russia (310 t, 9%), and Australia
  (290 t, 9%) leading a highly diversified global supply base — no single country controls
  more than 12% of output. The US produced 160 metric tons, concentrated in Nevada (~70%)
  and Alaska (~16%), with approximately 7% recovered as byproduct from copper ore processing.
  The annual average gold price reached a record $2,400 per troy ounce in 2024, a 23%
  increase over the prior record of $1,945 set in 2023, driven by geopolitical uncertainty,
  central bank demand, and investment flows, even as ETF-based gold investments declined
  sharply.

  Global gold consumption (excluding exchange-traded funds) in 2024 was dominated by
  jewelry (45%), central bank and institutional demand (21%), and physical investment bars
  (19%), with electrical and electronics accounting for 6%. In the first nine months of 2024,
  physical bar investment rose 12% and electronics grew 12%, while jewelry consumption
  declined 7% and coin/medal demand fell 25%. US refinery output comprised 170 t of primary
  production (from domestic and imported ores and concentrates) plus 90 t of secondary
  recovery (new and old scrap), totaling 260 t, with recycled scrap equivalent to ~45% of
  reported US consumption. US import sources were dominated by dore from Mexico (38%) and
  Colombia (20%), and bullion from Switzerland (35%) and Canada (27%).

  World reserves stand at 64,000 metric tons of gold content, with Australia and Russia
  each holding 12,000 t (19% each), South Africa 5,000 t, and Indonesia 3,600 t. Identified
  US gold resources total 15,000 t, with an additional 18,000 t undiscovered (nearly
  one-quarter in porphyry copper systems). Gold is not on any current critical minerals list
  due to its geographically diversified supply, large established reserve base, and uniquely
  deep secondary-supply infrastructure: existing above-ground gold stocks (estimated at
  over 190,000 t historically mined) represent a perpetual buffer against primary supply
  disruption, and refined gold is effectively non-consumable in most applications.

