symbol: Li
atomic_number: 3
name: lithium
category: alkali_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports lithium quantities in metric tons of lithium content unless otherwise specified.
  Commercial trade spans upstream brine- and hard-rock-derived lithium units plus downstream compounds such as
  lithium carbonate, lithium hydroxide, and lithium chloride. The chapter's headline price series is battery-grade
  lithium carbonate in U.S. dollars per metric ton; chapter text also quotes China spot carbonate on a c.i.f. basis,
  China spot hydroxide on an f.o.b. basis, and Australian spodumene concentrate prices for 6% Li2O material.

