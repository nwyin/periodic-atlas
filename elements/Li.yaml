      completeness: top_producers_only
    notes: |
      USGS describes the 2024 market as oversupplied in the short term: production rose to about 240,000 tons while
      global consumption rose to an estimated 220,000 tons. The country table excludes withheld U.S. output, and USGS
      separately notes additional smaller operations in Australia, Brazil, China, Namibia, Portugal, and the United States.

reserves:
  economic_reserves:
    value: 30000000
    unit: tonnes
    form: contained_element
    approximate: true
    notes: "USGS MCS 2025 world total lithium reserves (rounded), in metric tons of lithium content."
    source_id: usgs_mcs_2025_lithium
  resources:
    value: 115000000
    unit: tonnes
    form: contained_element
    approximate: true
    notes: |
      USGS MCS 2025: measured and indicated lithium resources total about 115 million tons worldwide, including
      19 million tons in the United States and 96 million tons in other countries.
    source_id: usgs_mcs_2025_lithium
  notes: |
    The USGS chapter reports country reserve values, but the printed Australia reserve entry is internally inconsistent
    with both the world reserve total and footnote 5 on Australian JORC-compliant reserves. This file therefore encodes
    the world reserve and resource totals directly from the chapter and leaves `reserves_by_country` empty pending a
    clarified primary-country table.

byproduct_of: []
feedstock_origins:
  - substrate: continental_brines
    notes: |
      USGS identifies continental brines as a major U.S. and global lithium source and lists brine-based sources in
      development or exploration in Argentina, Bolivia, Canada, Chile, China, and the United States.
    source_id: usgs_mcs_2025_lithium
  - substrate: pegmatite_mineral_ore
    notes: |
      USGS describes mineral operations in Australia, Brazil, Canada, China, and Zimbabwe as accounting for much of
      current production and notes broader mineral-based exploration across multiple countries.
    source_id: usgs_mcs_2025_lithium
  - substrate: lithium_clay
    notes: "USGS notes lithium-clay sources in various stages of development or exploration in Mexico and the United States."
    source_id: usgs_mcs_2025_lithium

substitutes:
  - application: batteries
    availability: partial
    notes: |
      USGS states that substitution for lithium compounds is possible in batteries and gives calcium, magnesium,
      mercury, and zinc as alternative anode materials in primary batteries.
    source_id: usgs_mcs_2025_lithium
  - application: lubricating_greases
    availability: partial
    notes: "USGS lists calcium and aluminum soaps as substitutes for lithium stearates in greases."
    source_id: usgs_mcs_2025_lithium
  - application: ceramics_and_glass
    availability: partial
    notes: "USGS lists sodic and potassic fluxes as substitutes in ceramics and glass manufacture."
    source_id: usgs_mcs_2025_lithium

