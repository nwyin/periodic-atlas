symbol: La
atomic_number: 57
name: lanthanum
category: lanthanide
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single grouped commodity chapter
  ("rare earths") in metric tons rare-earth-oxide (REO) equivalent. Per-element
  production requires multiplying the group total by La's typical basket share.
  Lanthanum oxide (La2O3) is the primary commercial form for catalysts, optical
  glass, and most end uses. La-containing mischmetal (typically 25-35% La by
  weight) is traded for battery alloy and metallurgical applications.
  Price data in the USGS salient statistics table are for La oxide (99.5% minimum
  purity), sourced from the Argus Media Group Argus Non-Ferrous Markets (footnote 6
  of the USGS MCS 2025 Rare Earths chapter). All production and reserve figures are
  in metric tons REO (≈ La2O3 equivalent for lanthanum) unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 113100
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 world total REO mine production 2024e =
      390,000 metric tons. Lanthanum typically accounts for approximately 27-32%
      of the global REE oxide basket; ~29% used as a central estimate
      (390,000 × 0.29 ≈ 113,100 t La2O3). Per-element tonnage is not directly
      reported by USGS; grouped_reporting flag is set accordingly. Basket share
      varies by deposit: bastnaesite at Mountain Pass (CA, USA) ~33-34% La2O3,
      Bayan Obo (China) ~25-27%, Mount Weld (Australia) ~26-30%, ion-adsorption
      clays in southern China ~5-15%. Global weighted average is ~27-30%.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        notes: |
          China 2024e: 270,000 t REO (footnote 14 in USGS: production quota;
          excludes undocumented production), 69.2% of 390,000 t world total.
          Derived La2O3 share ~78,300 t at 29% basket fraction. Production
          increased from 255,000 t in 2023. Primarily from Bayan Obo (Inner
          Mongolia), Sichuan bastnaesite deposits, and southern China
          ion-adsorption clay deposits.
        source_id: usgs_mcs_2025_rare_earths
      - country: US
        share_pct: 11.5
        notes: |
          United States 2024e: 45,000 t REO, 11.5% of world total. Derived
          La2O3 share ~13,050 t. Bastnaesite mined at Mountain Pass, CA
          (MP Materials). La2O3 is ~33-34% of the Mountain Pass REE basket,
          slightly above the global weighted average. Production up from
          41,600 t REO in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: MM
        share_pct: 7.9
        notes: |
          Burma (Myanmar) 2024e: 31,000 t REO (footnote 12: estimated from
          Chinese import data, Zen Innovations / Global Trade Tracker), 7.9%
          of world total. Derived La2O3 share ~8,990 t. Production declined
          from 43,000 t in 2023. Myanmar production is predominantly from
          weathered granite HREE-enriched deposits; La fraction may be below
          global average in some deposits.
        source_id: usgs_mcs_2025_rare_earths
      - country: AU
        share_pct: 3.3
        notes: |
          Australia 2024e: 13,000 t REO (footnote 12: estimated from Chinese
          import data), 3.3% of world total. Derived La2O3 share ~3,770 t.
          Lynas Rare Earths mines Mount Weld carbonatite deposit (WA), a
          LREE-dominant ore; La2O3 is ~26-30% of the Mt Weld basket. JORC-
          compliant reserves are 3.3 Mt REO per footnote 13 of USGS chapter.
        source_id: usgs_mcs_2025_rare_earths
      - country: NG
        share_pct: 3.3
        notes: |
          Nigeria 2024e: 13,000 t REO (footnote 12), 3.3% of world total.
          Derived La2O3 share ~3,770 t. Production nearly doubled from 7,200 t
          in 2023. Primarily monazite and xenotime from placer and alluvial
          mining. USGS MCS 2025 cites Nigeria as one of the key drivers of
          global production growth in 2024.
        source_id: usgs_mcs_2025_rare_earths
      - country: TH
        share_pct: 3.3
        notes: |
          Thailand 2024e: 13,000 t REO (footnote 12), 3.3% of world total.
          Derived La2O3 share ~3,770 t. Production more than tripled from
          3,600 t in 2023. REE recovered from monazite and xenotime in alluvial
          tin-mining residues. USGS MCS 2025 cites Thailand as a key driver of
          2024 production growth.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 2.5
        notes: |
          Rest-of-world 2024e: India 2,900 + Russia 2,500 + Madagascar 2,000 +
          Other 1,100 + Vietnam 300 + Malaysia 130 + Brazil 20 ≈ 8,950 t REO,
          ~2.3% of world total. Canada, Greenland, South Africa, and Tanzania
          reported zero mine production. ZZ rounded to 2.5% for share arithmetic.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 91
        notes: |
          China controls approximately 91% of global REE separation and
          processing capacity. Nearly all rare earths mined outside China are
          either exported to Chinese processors or processed at Chinese-invested
          overseas facilities. Consistent with USGS MCS 2025 import sources
          showing China as 70% of US REE compound/metal imports, with Malaysia
          and Japan (the remaining major sources) processing Chinese-origin
          intermediates per USGS footnote text.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 9
        notes: |
          Non-China refining ~9%: primarily Lynas Advanced Materials Plant
          (LAMP) in Kuantan, Malaysia (separates Mount Weld concentrate),
          Japanese processors (Shin-Etsu, TDK-related facilities), and nascent
          MP Materials domestic separation in California. USGS MCS 2025 import
          sources: Malaysia 13%, Japan 6%, Estonia 5% of US imports (2020-23),
          and USGS states these sources "were derived from mineral concentrates
          and chemical intermediates produced in Australia, China, and elsewhere."
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete

reserves:
  economic_reserves:
    value: 26100000
    unit: tonnes
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports world REE reserves >90,000,000 t
      REO (stated as ">90,000,000 t"; 90 Mt used as the floor value). La2O3
      share derived at ~29% basket fraction: 90,000,000 × 0.29 ≈ 26,100,000 t
      La2O3. Confidence is low because (1) the world REO total is a floor, not
      an exact figure, and (2) the 29% La basket share varies by deposit type.
      Actual La reserves could be meaningfully higher than this floor. USGS
      revised reserves for Russia, South Africa, United States, and Vietnam in
      the 2025 edition. Countries with NA reserves include Burma, Madagascar,
      Malaysia, and Nigeria.
    source_id: usgs_mcs_2025_rare_earths
  reserves_by_country:
    shares:
      - country: CN
        share_pct: 48.9
        notes: |
          China: 44,000,000 t REO per USGS MCS 2025, 48.9% of the >90 Mt floor.
          Derived La2O3: ~12,760,000 t. Dominant reserves at Bayan Obo (Inner
          Mongolia, world's largest REE deposit), Sichuan, and other provinces.
        source_id: usgs_mcs_2025_rare_earths
      - country: BR
        share_pct: 23.3
        notes: |
          Brazil: 21,000,000 t REO per USGS MCS 2025, 23.3% of the >90 Mt floor.
          Derived La2O3: ~6,090,000 t. Large LREE-bearing laterite and carbonatite
          deposits (ARAXÁ and others), most not yet in production at scale.
        source_id: usgs_mcs_2025_rare_earths
      - country: IN
        share_pct: 7.7
        notes: |
          India: 6,900,000 t REO per USGS MCS 2025, 7.7% of the >90 Mt floor.
          Derived La2O3: ~2,001,000 t. Primarily monazite-bearing beach sand
          deposits along the eastern and western coasts (Kerala, Odisha).
        source_id: usgs_mcs_2025_rare_earths
      - country: AU
        share_pct: 6.3
        notes: |
          Australia: 5,700,000 t REO per USGS MCS 2025 (JORC-compliant: 3.3 Mt,
          footnote 13), 6.3% of the >90 Mt floor. Derived La2O3: ~1,653,000 t.
          Mount Weld (Lynas) is the principal reserve base.
        source_id: usgs_mcs_2025_rare_earths
      - country: RU
        share_pct: 4.2
        notes: |
          Russia: 3,800,000 t REO per USGS MCS 2025 (revised), 4.2% of floor.
          Derived La2O3: ~1,102,000 t. Kola Peninsula apatite-nepheline deposits
          and Lovozero massif.
        source_id: usgs_mcs_2025_rare_earths
      - country: VN
        share_pct: 3.9
        notes: |
          Vietnam: 3,500,000 t REO per USGS MCS 2025 (revised), 3.9% of floor.
          Derived La2O3: ~1,015,000 t. Dong Pao and other carbonatite-hosted
          deposits in the northwest.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 5.7
        notes: |
          Rest-of-world quantified reserves: US 1,900,000 + Greenland 1,500,000 +
          Tanzania 890,000 + South Africa 860,000 + Canada 830,000 + Thailand 4,500
          = ~5,985,000 t REO, ~5.7% of the 90 Mt floor used as denominator. Burma,
          Madagascar, Malaysia, and Nigeria are reported as NA. Share percentages
          are relative to the >90 Mt floor; the unstated remainder resides in the
          ">90 Mt" qualifier.
        source_id: usgs_mcs_2025_rare_earths
    completeness: partial
  notes: |
    USGS MCS 2025 reports world REE reserves as >90,000,000 t REO. Reserves were
    revised for Russia, South Africa, United States, and Vietnam based on company
    and government reports. Per-element (La2O3) reserves are derived by applying
    the ~29% La basket share to each country's REO reserve figure; these derivations
    carry low confidence. Countries with NA reserves (Burma, Madagascar, Malaysia,
    Nigeria) are not included in the quantified reserve base.

