feedstock_origins:
  - substrate: bastnaesite_ore
    typical_concentration_pct: 32
    notes: |
      Bastnaesite (or bastnäsite), a rare-earth fluorocarbonate mineral, is the
      dominant La source ore globally. La2O3 constitutes ~32-34% of REO in
      Mountain Pass bastnaesite (USGS MCS 2025: bastnaesite mined as primary
      product at Mountain Pass, CA). Bayan Obo bastnaesite-monazite ore contains
      ~25-27% La2O3. Mountain Weld carbonatite contains ~26-30% La2O3. USGS MCS
      2025 describes bastnäsite as the primary REE ore in domestic (US) production.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 23
    notes: |
      Monazite, a rare-earth phosphate mineral, is a significant secondary La
      source recovered as a co-product from heavy-mineral-sand operations (rutile,
      ilmenite, and zircon mining). La2O3 is typically ~20-25% of monazite TREO.
      USGS MCS 2025 describes monazite stockpiling in the southeastern United
      States and notes monazite as an accessory mineral in heavy-mineral-sand
      concentrates. Thorium contamination (~5-10% ThO2 in monazite) requires
      licensed handling and complicates processing economics.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 10
    notes: |
      Weathered granite clay deposits in southern China (Jiangxi, Guangdong,
      Fujian provinces) yield REE by in-situ or heap-leach ammonium sulfate
      irrigation. La2O3 content is lower (~5-15%) in HREE-dominant zones but
      higher in LREE-enriched zones. These deposits supply a significant share
      of China's separated REE output. Not specifically named by mineral type in
      the USGS MCS 2025 Rare Earths chapter, which focuses on ore minerals at
      named operations.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: fcc_catalysts
    availability: partial
    notes: |
      USGS MCS 2025 states "Substitutes are available for many applications but
      generally are less effective." For FCC catalysts, ultra-stable Y zeolites
      (USY) without La and alternative catalyst stabilizers can partially substitute
      for La2O3, but at reduced thermal stability and conversion efficiency under
      high-severity conditions. La-free FCC catalyst formulations exist and are
      used where economics favor them, but La-stabilized zeolites remain the
      industry standard for maximum distillate yield.
    source_id: usgs_mcs_2025_rare_earths
  - application: battery_alloys_nimh
    availability: full
    notes: |
      Lithium-ion batteries fully substitute for NiMH batteries in consumer
      electronics (smartphones, laptops) and pure battery-electric vehicles.
      NiMH retains competitive advantages in hybrid applications (e.g., Toyota
      Prius-type HEV) due to cost, thermal tolerance, and charge acceptance at
      partial state of charge. Li-ion adoption has materially reduced La demand
      growth in batteries over the past decade. USGS MCS 2025 general substitutes
      statement applies.
    source_id: usgs_mcs_2025_rare_earths
  - application: optical_glass
    availability: partial
    notes: |
      In optical glass, La2O3 can be partially substituted by barium oxide (BaO)
      or other glass modifiers, but achieving high refractive index (n > 1.8) with
      low dispersion (high Abbe number) typically requires La or similarly high-Z
      oxides. No drop-in substitute matches the full optical performance envelope
      of La-crown glass. USGS MCS 2025 general substitutes statement applies.
    source_id: usgs_mcs_2025_rare_earths

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Lanthanum is listed as a critical mineral under the US 2022 Critical Minerals
    List as part of "rare earth elements" (a group designation that includes La).
    US government strategic stockpile targeting: 1,300 t La potential acquisitions
    in FY 2024 and 1,100 t in FY 2025 (USGS MCS 2025 Government Stockpile table;
    gross weight basis), signaling active supply-security concern. US net import
    reliance for REE compounds and metals: 80% in 2024e (USGS MCS 2025). Light
    rare earth elements (including La) and heavy rare earth elements are both
    designated as Critical Raw Materials (Annex I) and Strategic Raw Materials
    (Annex II) under EU Regulation 2024/1252 (Critical Raw Materials Act, CRMA).

