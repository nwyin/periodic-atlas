end_uses:
  uses:
    - application: fcc_catalysts
      share_pct: 45
      confidence: low
      notes: |
        Fluid catalytic cracking (FCC) catalysts for petroleum refining are the
        dominant La end use globally. La2O3 is used as a zeolite stabilizer in
        FCC catalyst formulations, improving thermal stability and cracking
        activity. USGS MCS 2025 confirms "catalysts" as the leading domestic
        end use of rare earths. Share estimate ~45% is approximate; the USGS
        chapter does not provide explicit per-application percentages for La.
      source_id: usgs_mcs_2025_rare_earths
    - application: battery_alloys_nimh
      share_pct: 25
      confidence: low
      notes: |
        La-rich mischmetal (LaNi5-type AB5 intermetallic alloys, typically
        25-35% La) serves as the negative electrode (anode) material in
        nickel-metal hydride (NiMH) batteries. Primary applications: hybrid
        electric vehicles (e.g., Toyota Prius-type HEV), portable power tools,
        and stationary backup. NiMH has lost share in consumer electronics to
        Li-ion but remains dominant in HEV. USGS MCS 2025 includes metallurgical
        applications and alloys as a REE end-use category. Mischmetal (65% Ce,
        35% La) is explicitly priced in the salient statistics table. Share
        estimate ~25% is approximate.
      source_id: usgs_mcs_2025_rare_earths
    - application: ceramics_glass_optical
      share_pct: 12
      confidence: low
      notes: |
        La2O3 is incorporated into high-refractive-index optical glass (camera
        lenses, telescopes, microscopes), La-containing dielectric ceramics
        (capacitors, microwave components), and specialty glass compositions.
        USGS MCS 2025 lists "ceramics and glass" as a REE end-use category.
        Share estimate ~12% is approximate.
      source_id: usgs_mcs_2025_rare_earths
    - application: polishing_powders
      share_pct: 10
      confidence: low
      notes: |
        La2O3-based and La/Ce mixed polishing powders are used for precision
        glass polishing in optics, flat panel displays, and semiconductor
        chemical-mechanical planarization (CMP). USGS MCS 2025 lists "polishing"
        as a REE end-use category. Share estimate ~10% is approximate.
      source_id: usgs_mcs_2025_rare_earths
    - application: metallurgical_alloys
      share_pct: 5
      confidence: low
      notes: |
        La is added as a microalloying element to specialty steels (grain
        refinement), nodular cast iron (graphite morphology control), and
        aluminum/magnesium alloys (improved corrosion resistance and castability).
        La-containing mischmetal (35% La, 65% Ce) is used in lighter flints and
        pyrophoric applications. USGS MCS 2025 lists "metallurgical applications
        and alloys." Share estimate ~5% is approximate.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_uses
      share_pct: 3
      confidence: low
      notes: |
        Other applications include La-based phosphors (lighting, CRT displays),
        hydrogen storage alloys (AB5 variants), La2O3 in specialty electronic
        ceramics, and miscellaneous chemical applications. Permanent magnets
        (NdFeB) are NOT an end use for La; La has no role in NdFeB magnet
        chemistry. Share estimate ~3% is approximate.
      source_id: usgs_mcs_2025_rare_earths
  completeness: partial

geopolitical_events:
  - date: "2024-01"
    event: "Global REE production rises to 390,000 t REO in 2024e, driven by China, Nigeria, and Thailand expansions"
    impact: |
      USGS MCS 2025 Events, Trends, and Issues: global mine production increased
      to 390,000 t REO, up 3.7% from 376,000 t in 2023. Growth driven by China
      (255,000→270,000 t, +6%), Nigeria (7,200→13,000 t, +81%), and Thailand
      (3,600→13,000 t, +261%). For lanthanum at ~29% basket share, implied
      La2O3 production was ~113,100 t in 2024e vs. ~109,000 t in 2023. The
      Myanmar (Burma) supply declined from 43,000 to 31,000 t. Continued
      production growth from multiple low-cost sources reinforces the La price
      depression near $1/kg.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US government targets strategic lanthanum stockpile: 1,300 t FY2024 and 1,100 t FY2025 potential acquisitions"
    impact: |
      USGS MCS 2025 Government Stockpile table shows potential acquisitions of
      1,300 metric tons lanthanum in FY 2024 and 1,100 metric tons in FY 2025
      (gross weight). No disposals planned for either year. These acquisitions
      are substantially larger than for cerium (550 t FY2024 only), indicating
      La receives higher strategic priority. The acquisitions reflect US supply
      chain vulnerability: 80% net import reliance for REE compounds/metals in
      2024e and China's ~91% control of global REE refining capacity.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2022-01"
    event: "Lanthanum oxide price falls to $1/kg and remains depressed through 2024, reflecting REE balance problem"
    impact: |
      USGS MCS 2025 salient statistics show La oxide (99.5%) at $2/kg in 2020-2021,
      declining to $1/kg in 2022 and remaining at $1/kg through 2024e. The
      sustained low price reflects lanthanum's structural oversupply: La is produced
      in fixed proportion with higher-value NdPr and Dy whenever any LREE-dominant
      ore is mined, creating chronic excess supply relative to demand. Low La prices
      constrain economics of dedicated La recovery projects and limit incentives for
      La-specific supply chain investment.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Lanthanum is the most abundant rare earth element by mass, typically constituting
  approximately 27-32% (~29% central estimate) of global REE oxide production —
  roughly 113,000 tonnes La2O3 in 2024 from a 390,000-tonne REO world total (USGS
  MCS 2025). Despite its abundance, La suffers from chronic price depression: La2O3
  traded at approximately $1/kg in 2022-2024 (near historic lows, down from $2/kg
  in 2020-21), a consequence of the REE "balance problem" where La is extracted in
  fixed ratio with higher-value NdPr and Ce whenever any LREE-dominant ore is mined.
  China dominates both production (~69% of world REO) and refining (~91% of global
  REE separation capacity). US net import reliance for REE compounds and metals
  reached 80% in 2024e, prompting US government strategic stockpile targeting of
  1,300 t La in FY 2024 and 1,100 t in FY 2025.

  The leading end use for lanthanum is fluid catalytic cracking (FCC) catalysts in
  petroleum refining (~45% of La demand), where La2O3 stabilizes zeolite catalyst
  structures under high-temperature, high-conversion conditions. La-rich mischmetal
  for nickel-metal hydride (NiMH) battery negative electrodes is the second major
  demand driver (~25%), though lithium-ion adoption has substantially reduced NiMH's
  share in consumer electronics and is beginning to displace it in full-electric
  vehicles. NiMH retains competitiveness in hybrid electric vehicles (notably Toyota
  Prius-type HEV) due to lower cost and favorable partial-state-of-charge
  performance. Optical glass, polishing powders, and metallurgical alloys account
  for most of the remainder. Lanthanum has no role in neodymium-iron-boron (NdFeB)
  permanent magnets, limiting its participation in the strongest REE demand growth
  vectors (EV traction motors, wind turbines).

  Despite its low market price, lanthanum attracts strategic attention because of
  China's near-monopoly on REE processing and La's essential role in FCC catalysts
  that refine the global petroleum supply. Light and heavy rare earths — including La
  — are designated as both Critical and Strategic Raw Materials under EU Regulation
  2024/1252 (CRMA). Global mine production expanded 3.7% to 390,000 t REO in 2024e,
  driven by China, Nigeria, and Thailand, further reinforcing lanthanum's structural
  oversupply. The key long-term demand risk is accelerated adoption of lithium-ion
  batteries reducing NiMH consumption, while the key supply risk is any disruption
  to China's processing infrastructure affecting La2O3 availability for FCC catalyst
  manufacturers globally.

