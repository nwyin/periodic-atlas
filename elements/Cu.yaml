criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Copper is not on the 2025 US Critical Minerals List, the EU CRM 2023 list, or the EU
    Strategic Raw Materials list. It is a tier-4 high-volume workhorse commodity with a
    geographically diversified supply chain. US net import reliance on refined copper
    reached 45% in 2024, but critical-material designation has not been applied.

