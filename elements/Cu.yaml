feedstock_origins:
  - substrate: porphyry_copper_ore
    notes: |
      The dominant primary ore type, accounting for roughly 60% of world copper resources.
      Major deposits: Escondida and Chuquicamata (Chile), Quellaveco and Cerro Verde (Peru),
      Bingham Canyon and Morenci (US), Grasberg (Indonesia), Oyu Tolgoi (Mongolia).
    source_id: usgs_copper_resource_assessment_2015
  - substrate: sediment_hosted_stratiform_copper_ore
    notes: |
      Central African Copperbelt (DRC and Zambia) — high-grade sediment-hosted deposits
      that underpin DRC's 14% mine share and Zambia's 3% mine share.
    source_id: usgs_mcs_2025_copper
  - substrate: secondary_copper_scrap
    notes: |
      US 2024: old (post-consumer) scrap provided ~150,000 tons; new (manufacturing)
      scrap contributed ~720,000 tons. Scrap accounted for ~35% of US copper supply.
      Brass and wire-rod mills accounted for approximately 85% of scrap recovery.
    source_id: usgs_mcs_2025_copper

substitutes:
  - application: electrical_equipment_power_cable
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "Aluminum substitutes for copper in automobile
      radiators, cooling and refrigeration tube, electrical equipment, and power cable."
      Aluminum substitution is partial — smaller wire gauges and high-conductivity
      applications typically retain copper.
    source_id: usgs_mcs_2025_copper
  - application: telecommunications
    availability: full
    notes: |
      USGS MCS 2025: "Optical fiber substitutes for copper in telecommunications
      applications." Fiber-to-the-premises has largely displaced copper in backbone
      and long-haul telecom; legacy copper loops persist in last-mile infrastructure.
    source_id: usgs_mcs_2025_copper
  - application: plumbing_drain_pipe
    availability: full
    notes: |
      USGS MCS 2025: "plastics substitute for copper in drain pipe, plumbing fixtures,
      and water pipe." PVC and PEX piping have taken large share from copper plumbing
      in residential construction.
    source_id: usgs_mcs_2025_copper
  - application: heat_exchangers
    availability: partial
    notes: "USGS MCS 2025: 'Titanium and steel are used in heat exchangers.'"
    source_id: usgs_mcs_2025_copper

