symbol: Cu
atomic_number: 29
name: copper
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports copper production on a copper-content basis (metal equivalent),
  not gross ore or concentrate tonnage. The salient statistics table header reads:
  "Data in thousand metric tons, copper content, unless otherwise specified."
  Refined copper is traded as LME Grade A cathode (99.99% Cu minimum) or COMEX
  high-grade cathode. Prices in the USGS salient statistics table are in U.S. cents
  per pound; Price entries below convert to USD per pound.

