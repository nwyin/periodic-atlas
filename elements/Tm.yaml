symbol: Tm
atomic_number: 69
name: thulium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a grouped commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element tonnage
  is not published for individual REEs. Per-element attribution for thulium requires
  multiplying the aggregate by Tm's typical basket share (~0.07%), which is not
  reported directly by USGS. Thulium is commercially traded primarily as Tm2O3
  (thulium(III) oxide) at ≥99.9% purity for optical and laser applications, and as
  irradiated Tm2O3 targets for Tm-170 radioisotope production. USGS MCS 2025 salient
  statistics table does not list thulium oxide as a tracked price commodity (the table
  covers only Ce, Dy, Eu, La, mischmetal, Nd, and Tb). All production and reserve
  figures in this file are derived by multiplying USGS-reported aggregate REO totals by
  Tm's typical basket share of ~0.07% (global weighted average). This basket share
  varies strongly by deposit type: bastnaesite (Mountain Pass CA, Bayan Obo CN) yields
  ~0.02–0.05% Tm2O3; ion adsorption clay deposits (southern China, Myanmar, Thailand)
  yield ~0.2–0.5% Tm2O3 due to heavy-REE enrichment. Thulium is among the rarest
  commercially recovered lanthanides by basket share — comparable to lutetium (~0.04%)
  and rarer than holmium (~0.15%), europium (~0.10%), and all lighter REEs. All data
  are in metric tons REO equivalent unless otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 270
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent (2023: 376,000 t). Multiplying by Tm's typical basket
      share of ~0.07% gives ~273 t Tm2O3, rounded to ~270 t for this estimate.
      Thulium's basket share is not reported separately by USGS; the 0.07% figure
      is an industry consensus estimate for the global weighted average across all
      deposit types. Ion adsorption clay deposits (contributing ~11% of world REO in
      2024 from Myanmar and Thailand) have substantially higher Tm content (0.2–0.5%)
      than bastnaesite-dominant mines (0.02–0.05%), meaning China's southern provinces
      and Southeast Asian producers contribute a disproportionate share of global Tm
      output relative to their REO tonnage. Thulium output is not officially disaggregated
      from the REE basket in public USGS data. The 2023 comparable estimate is ~263 t
      at the same 0.07% share applied to 376,000 t world total. Confidence is low
      because both the basket share estimate and the world REO total (rounded) carry
      meaningful uncertainty.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
  mining_by_country:
    shares:
      - country: CN
        share_pct: 69.2
        notes: |
          China 2024e REE total: 270,000 t REO (USGS footnote 14: production quota;
          excludes undocumented production). China share: 270,000 / 390,000 = 69.2%.
          Derived Tm2O3 share: ~189 t at 0.07% basket fraction. China's southern ion
          adsorption clay deposits in Jiangxi, Fujian, and Guangdong are substantially
          enriched in heavy REEs including Tm, meaning China's actual share of global
          Tm output likely exceeds 69%. Production increased from 255,000 t REO in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: US
        share_pct: 11.5
        notes: |
          US 2024e REE total: 45,000 t REO from bastnaesite concentrates at Mountain
          Pass, CA (MP Materials), valued at ~$260 million. Share: 45,000 / 390,000 =
          11.5%. Derived Tm2O3 share: ~32 t at 0.07% basket fraction; actual US Tm
          contribution is likely below this because Mountain Pass bastnaesite is
          strongly LREE-dominant with very low Tm content (~0.02–0.05%). Production
          up from 41,600 t REO in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: MM
        share_pct: 7.9
        notes: |
          Burma (Myanmar) 2024e REE total: 31,000 t REO (USGS footnote 12: estimated
          from Chinese import data), 7.9% of world total. Derived Tm2O3 share: ~22 t
          at 0.07% basket fraction; actual Myanmar Tm contribution may be significantly
          above this because Myanmar's deposits are predominantly HREE-enriched ion
          adsorption clays. Production declined from 43,000 t in 2023 (-28% YoY).
        source_id: usgs_mcs_2025_rare_earths
      - country: AU
        share_pct: 3.3
        notes: |
          Australia 2024e REE total: 13,000 t REO (USGS footnote 12), 3.3% of world
          total. Derived Tm2O3 share: ~9 t. Lynas Rare Earths mines Mount Weld
          carbonatite deposit (Western Australia), processed at LAMP (Malaysia). Mt.
          Weld bastnaesite-carbonatite is LREE-dominant with below-average Tm content.
          Production down from 16,000 t in 2023.
        source_id: usgs_mcs_2025_rare_earths
      - country: NG
        share_pct: 3.3
        notes: |
          Nigeria 2024e REE total: 13,000 t REO (USGS footnote 12), 3.3% of world
          total. Derived Tm2O3 share: ~9 t. Production increased from 7,200 t in 2023
          (+81% YoY). Nigeria produces primarily from monazite and xenotime in alluvial
          deposits. USGS cites Nigeria as a key driver of 2024 global REO production
          growth. Reserves reported as NA by USGS.
        source_id: usgs_mcs_2025_rare_earths
      - country: TH
        share_pct: 3.3
        notes: |
          Thailand 2024e REE total: 13,000 t REO (USGS footnote 12), 3.3% of world
          total. Derived Tm2O3 share: ~9 t. Production more than tripled from 3,600 t
          in 2023 (+261% YoY). Thailand produces from ion adsorption clay deposits
          and alluvial tin-mining residues; some Thai deposits are HREE-enriched and
          may yield above-average Tm fractions. Reserves: 4,500 t REO per USGS.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 2.3
        notes: |
          Rest-of-world 2024e: India 2,900 + Russia 2,500 + Madagascar 2,000 +
          Other 1,100 + Vietnam 300 + Malaysia 130 + Brazil 20 ≈ 8,950 t REO,
          ~2.3% of world total. Derived combined Tm2O3 contribution: ~6 t at 0.07%
          basket fraction. Vietnam's ion adsorption-type occurrences may have
          above-average Tm content.
        source_id: usgs_mcs_2025_rare_earths
    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 90
        notes: |
          China controls approximately 90% of global REE separation and refining
          capacity, including Tm2O3 production and Tm metal manufacturing.
          High-purity Tm2O3 (≥99.9%) for optical and laser applications requires
          multi-stage solvent extraction conducted almost entirely in Chinese REE
          separation facilities (Jiangxi, Fujian, Sichuan, Inner Mongolia). Per
          USGS MCS 2025: China supplied 70% of US REE compound and metal imports
          (2020–23 average). Essentially all refined Tm2O3 for commercial laser
          and radioisotope production originates from Chinese refineries.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 7
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Mt. Weld (Australia) concentrate through solvent extraction, producing
          separated REO products including a HREE-fraction oxide that contains Tm.
          USGS cites Malaysia as 13% of US REE compound and metal import sources
          (2020–23). LAMP is the largest non-Chinese REE separation facility globally;
          Tm separation from the HREE fraction is a minor component of LAMP output.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Early-stage non-Chinese REE separation: Neo Performance Materials Sillamäe
          (Estonia, 5% of US REE imports 2020–23) and Japan-based processors (6% of
          US REE imports 2020–23). Both source feed from Australian and Chinese
          intermediates per USGS chapter text. Some Tm separation occurs in Japan
          for high-purity optical glass and laser feedstock supply chains.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO, up from 376,000 t in 2023.
    Applying 0.07% Tm basket share gives ~270 t Tm2O3 equivalent in 2024e
    vs. ~263 t in 2023. Country-level Tm2O3 tonnage is further derived and
    carries low confidence. Countries with no reported mine production (Canada,
    Greenland, South Africa, Tanzania) had zero or NA production per USGS.
    Basket share of 0.07% is a central estimate; the actual global weighted
    average may be 0.05–0.10% depending on the mix of ion adsorption clay
    vs. bastnaesite production.

