byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 0.35
    notes: |
      Ion adsorption clay deposits (weathered granite clays in southern China —
      Jiangxi, Guangdong, Fujian — and similar deposits in Myanmar and Thailand)
      are the primary commercial source of thulium. These HREE-enriched deposits
      yield Tm2O3 content of approximately 0.2–0.5% of total REO, well above the
      global basket average of ~0.07%. Leaching uses ammonium sulfate or ammonium
      bicarbonate solution, either by heap-leach or in-situ methods. USGS MCS 2025
      identifies Myanmar and Thailand REO production as derived from such deposits,
      consistent with their HREE-dominant output profiles.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.03
    notes: |
      Bastnaesite (rare-earth fluorocarbonate mineral) is the dominant global REE
      ore by volume but contains very low Tm2O3 (~0.02–0.05%). Mountain Pass, CA
      (MP Materials bastnaesite mine, confirmed as primary US production source in
      USGS MCS 2025) and Bayan Obo (China) are the largest bastnaesite producers.
      While bastnaesite contributes the largest share of total REO by mass, it is a
      minor source of Tm relative to ion adsorption clays.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 0.07
    notes: |
      Monazite (rare-earth phosphate mineral) contains approximately 0.05–0.10%
      Tm2O3. Recovered as a co-product from heavy-mineral-sand operations (rutile,
      ilmenite, zircon) or stockpiled as a separated concentrate. USGS MCS 2025
      confirms monazite was stockpiled in the southeastern United States in 2024
      and is produced in Nigeria, India, and other countries. Thorium contamination
      (~5–10% ThO2 in monazite) requires licensed handling and constrains
      processing options.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: general
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally
      are less effective." For thulium's niche applications, partial substitution is
      possible but no single alternative replicates the full performance profile.
      The narrow set of applications and small market scale limit the commercial
      urgency of substitution research relative to higher-volume REEs.
    source_id: usgs_mcs_2025_rare_earths
  - application: portable_xray_radioisotope
    availability: partial
    notes: |
      In industrial radiography applications using radioisotope X-ray sources, Tm-170
      (half-life 128.6 days, generates Yb K X-rays at ~52–59 keV) can be partially
      substituted by iridium-192 (Ir-192, higher energy gamma, used for thicker
      materials), selenium-75 (Se-75, lower energy, similar gamma range), or ytterbium-
      169 (Yb-169, comparable energy to Tm-170). The choice depends on material
      thickness, required energy, and access to reactor irradiation facilities. None
      replicates the specific energy spectrum and compact source geometry of Tm-170
      across all applications.
    source_id: usgs_mcs_2025_rare_earths
  - application: lasers_fiber_and_solid_state
    availability: partial
    notes: |
      In surgical and medical laser applications at ~2 µm wavelength, holmium:YAG
      (Ho:YAG, 2.09 µm) and erbium:YAG (Er:YAG, 2.94 µm) can partially substitute
      for thulium:YAG (Tm:YAG, 2.01 µm) in some soft-tissue and urological
      applications, with different tissue interaction profiles. For Tm-doped fiber
      lasers in the 1.9–2.1 µm range, erbium-doped fiber amplifiers (EDFA, 1.5 µm)
      and holmium-doped fiber systems provide partial coverage at different wavelengths.
      No substitute provides equivalent performance in the specific 1.9–2.0 µm window
      where Tm-fiber lasers excel for atmospheric transmission and water absorption.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: specialty_glass_ceramics_optics
      share_pct: 40
      confidence: low
      notes: |
        Tm2O3 is incorporated into specialty optical glass and ceramics as a dopant
        for near-infrared absorption, optical fiber amplifiers (Tm-doped fiber for
        the 1.45–1.53 µm and 1.9–2.1 µm spectral windows), and laser gain medium
        hosts. Tm3+ ions in glass matrices exhibit characteristic absorption bands
        useful for optical filtering. Tm-doped garnet crystals (Tm:YAG, Tm:LiYF4)
        are laser host materials. USGS MCS 2025 lists ceramics and glass as a REE
        end-use category. Share is a Tm-specific industry estimate; USGS does not
        report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: lasers_fiber_and_solid_state
      share_pct: 35
      confidence: low
      notes: |
        Thulium-doped lasers constitute the fastest-growing Tm application. Tm:YAG
        solid-state lasers operating at 2.01 µm are used in soft-tissue surgery
        (urology, otolaryngology), where water's high absorption at ~2 µm limits
        thermal spread in tissue. Tm-doped fiber lasers (1.9–2.1 µm, multi-watt
        to kilowatt class) serve industrial cutting of polymers, remote sensing
        LIDAR, and countermeasure systems where the 2 µm atmospheric transmission
        window is advantageous. Tm-doped fiber amplifiers extend optical
        communication to the S-band (1.46–1.53 µm) and emerging L+-band.
        Growing demand for Tm-fiber lasers in industrial applications is the
        primary driver of commercial Tm2O3 consumption growth. Share is an
        industry estimate; USGS does not report per-element end-use data.
      source_id: usgs_mcs_2025_rare_earths
    - application: portable_xray_radioisotope
      share_pct: 15
      confidence: low
      notes: |
        Thulium-170 (produced by neutron activation of Tm-169 in nuclear reactors:
        ⁶⁹Tm + n → ⁷⁰Tm-170) is a portable gamma and X-ray source used in industrial
        nondestructive testing and field radiography. Tm-170 decays (half-life 128.6 d)
        primarily by beta emission to excited Yb-170, which emits characteristic X-rays
        at 52–59 keV — suitable for imaging welds, castings, and light structural
        components where electrical power is unavailable. This application consumes
        Tm2O3 to manufacture reactor irradiation targets. Although small in absolute
        volume, it represents one of the unique demand drivers for Tm that has no
        counterpart among the lighter lanthanides. Share is an industry estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_uses
      share_pct: 10
      confidence: low
      notes: |
        Other thulium applications include: Tm-doped crystals and powders in
        upconversion phosphors (Tm3+ provides blue emission under 980 nm excitation
        in Er/Tm co-doped upconversion systems); Tm metal in specialized alloys;
        minor additions to permanent magnet alloys; and research-grade Tm compounds
        for spectroscopy and quantum information experiments. Share is an estimate
        aggregating several minor applications.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

prices: []

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: eu_crma_2024
  notes: |
    Thulium is classified as critical under the US 2022 Critical Minerals List as
    part of "rare earth elements" (a group designation covering both light and heavy
    REEs, including Tm). Heavy rare earth elements — including Tm as a heavy
    lanthanide — are designated as Critical Raw Materials (Annex I) and Strategic
    Raw Materials (Annex II) under EU Regulation 2024/1252 (Critical Raw Materials
    Act, CRMA). US net import reliance for REE compounds and metals was 80% in 2024e
    (USGS MCS 2025); Tm separation from the REE basket occurs almost entirely in
    China, making effective Tm import reliance essentially 100%. While Thulium was
    not directly targeted by China's April 2025 HREE export licensing controls (which
    named Sm, Gd, Tb, Dy, Lu, Sc, and Y), the regulatory infrastructure governing
    heavy REE exports from China applies to the entire HREE-enriched product stream
    that contains Tm.

geopolitical_events:
  - date: "2024-01"
    event: "Global REE mine production rose to 390,000 t REO in 2024e, expanding available thulium feedstock"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from
      376,000 t in 2023 (+3.7%). Applying a 0.07% Tm basket share, estimated global
      Tm2O3 production was approximately 270 t in 2024e vs. ~263 t in 2023. Growth
      was driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
      and Thailand (+9,400 t to 13,000 t), partially offset by Burma's decline
      (-12,000 t to 31,000 t). Myanmar's decline is particularly relevant to Tm
      supply because its HREE-enriched deposits contribute a disproportionate share
      of Tm relative to their REO tonnage. Thailand's growth — from HREE-bearing
      ion adsorption clays — partially offsets this loss in Tm terms.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US net import reliance for REE compounds and metals declined to 80% in 2024e, but Tm separation remains fully import-dependent"
    impact: |
      US domestic REE compound and metal production reached 7,600 t total in 2024
      (USGS footnote 3), up from 1,920 t in 2023, reflecting Mountain Pass NdPr
      compound processing and Utah operations. Despite the improvement in aggregate
      REE import reliance, no US domestic Tm separation or high-purity Tm2O3
      production capacity exists. Thulium for laser and optical applications as
      well as Tm-170 radioisotope target production continues to be sourced entirely
      from Chinese-origin or China-processed material. Import sources 2020–23:
      China 70%, Malaysia 13%, Japan 6%, Estonia 5%.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2025-04"
    event: "China imposes export licensing controls on seven heavy rare earth elements; thulium not directly listed but HREE basket dynamics affected"
    impact: |
      China's Ministry of Commerce (MOFCOM) announced export control measures
      requiring licenses for exports of seven heavy rare earth elements: samarium
      (Sm), gadolinium (Gd), terbium (Tb), dysprosium (Dy), lutetium (Lu), scandium
      (Sc), and yttrium (Y). Thulium was not explicitly named in the controlled list.
      However, the controls apply to refined HREE oxide products and concentrates
      that contain the regulated elements; since Tm is co-processed with the named
      HREEs in the same ion adsorption clay separation streams, HREE concentrate
      export licenses may effectively encompass Tm-bearing fractions. Heavy REE
      oxide prices rose sharply following the announcement. The development increases
      the strategic risk profile of all heavy rare earth elements, including Tm,
      and reinforces the urgency of non-Chinese HREE separation capacity investment.
    source_id: china_mofcom_2025_ree_controls

narrative: |
  Thulium (Tm, Z=69) is among the scarcest of the commercially recovered lanthanides
  by basket share — approximately 0.07% of the global rare earth oxide basket — yielding
  an estimated world output of roughly 270 tonnes Tm2O3 in 2024e (derived from the USGS
  MCS 2025 aggregate of 390,000 t REO). Its commercial importance is disproportionate to
  its tonnage, concentrated in three specialized applications that exploit properties
  unique to the element: rare-earth-doped solid-state and fiber lasers in the 1.9–2.1 µm
  atmospheric window, specialty optical glass for fiber amplifiers and near-infrared optics,
  and the Tm-170 radioisotope used as a compact portable X-ray source in field radiography.
  Unlike the magnet REEs (Nd, Pr, Dy, Tb) that dominate rare earth demand growth from EVs
  and wind turbines, Thulium's demand profile is driven by specialized photonics and
  nondestructive testing markets rather than bulk clean-energy applications.

  The Tm:YAG solid-state laser (2.01 µm) and Tm-doped fiber laser systems represent the
  fastest-growing application segment. The 2 µm wavelength aligns with strong water
  absorption, enabling precise soft-tissue incision with minimal thermal spread — making
  Tm lasers competitive with Ho:YAG in urological procedures, otolaryngology, and
  ophthalmology. Industrial Tm-fiber lasers (multi-watt to kilowatt class) serve polymer
  cutting, atmospheric LIDAR, and defense countermeasure applications. The Tm-170
  radioisotope application is niche but unique: reactor-irradiated Tm-169 targets generate
  compact sources of ~52–59 keV X-rays for field inspection of welds and structural
  components where portable, battery-free radiography is required.

  Supply is structurally dependent on China's ion adsorption clay sector, where HREE
  enrichment yields Tm content of 0.2–0.5% of total REO — roughly 3–7 times the global
  weighted basket average of ~0.07%. China controls approximately 90% of global REE
  separation and refining capacity. Thulium was not directly targeted by China's April
  2025 export licensing controls on seven HREEs, but the regulatory infrastructure
  governing HREE concentrate exports from China creates indirect exposure for Tm supply
  chains. Both the US Critical Minerals List and EU Regulation 2024/1252 (Critical Raw
  Materials Act) designate rare earth elements — including heavy REEs such as Tm — as
  critical and strategic materials. The practical supply risk is less acute than for
  controlled HREEs like Tb and Dy, but Tm's extremely small production volume (~270 t/y)
  and concentration in Chinese HREE-enriched deposits means that even minor supply
  disruptions could materially affect the specialty laser and radioisotope markets it serves.

