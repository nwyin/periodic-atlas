  notes: |
    The U.S. Geological Survey's final 2025 list includes beryllium as a U.S.
    critical mineral. The EU Critical Raw Materials Act lists beryllium in
    Annex II (critical raw materials) but not in Annex I (strategic raw
    materials). USGS MCS 2025 also notes direct Department of Defense support
    for domestic availability of beryllium metal.

