symbol: Be
atomic_number: 4
name: beryllium
category: alkaline_earth
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 tracks beryllium in metric tons of beryllium content. The
  commercial chain is vertically integrated: bertrandite ore mined in Utah and
  imported beryl are converted to beryllium hydroxide, then into beryllium
  metal, beryllium oxide, and beryllium-copper master alloy. The published
  price series is the annual average unit value of beryllium-copper master
  alloy, stated in dollars per kilogram of contained beryllium and calculated
  from import gross weight and customs value with beryllium content estimated at
  4%.

