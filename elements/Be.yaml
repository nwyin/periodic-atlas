geopolitical_events:
  - date: 2010
    event: "Defense Production Act Title III partnership reestablished domestic beryllium metal production"
    impact: |
      USGS MCS 2025 states that the U.S. Department of Defense supported a
      public-private partnership in 2010 that reestablished domestic beryllium
      metal production, reinforcing the material's defense-critical domestic
      supply chain.
    source_id: usgs_mcs_2025_beryllium
  - date: 2024
    event: "Beryllium trade flows contracted sharply in key import and export lanes"
    impact: |
      USGS MCS 2025 reports apparent consumption rose 18% in 2024 largely
      because exports fell 56% while imports fell 20%. Export weakness reflected
      lower beryllium metal shipments to Canada, Germany, Japan, and Mexico;
      import weakness reflected lower metal imports from Belgium, Kazakhstan,
      and Latvia.
    source_id: usgs_mcs_2025_beryllium

narrative: |
  Commercial beryllium remains a small, defense-sensitive specialty market built
  around one vertically integrated U.S. producer. The ore side is simple: Utah
  bertrandite is the only domestic mine feed, supplemented by imported beryl.
  Those feeds move into beryllium hydroxide and then into metal, oxide, and
  beryllium-copper master alloy. USGS estimates 2024 U.S. apparent consumption
  at only 170 metric tons of contained beryllium, yet the value of that market
  was about $260 million because beryllium is sold into performance-critical
  niches rather than bulk tonnage markets.

  Supply is concentrated but not purely American. USGS estimates 2024 world mine
  production at about 360 metric tons, with the United States, Brazil, and China
  accounting for nearly all reported output. Reserve visibility is unusually
  thin: USGS reports about 19,000 tons of proven and probable bertrandite
  reserves in Utah but does not publish a world reserve total, only world
  identified resources of more than 100,000 tons. Recycling is economically
  meaningful in this tiny market, with USGS indicating recovered material may
  account for 20% to 25% of total consumption.

  Demand is spread across industrial components, aerospace and defense,
  automotive electronics, telecom infrastructure, and a long tail of other
  uses. That mix explains both the lack of full substitutes and the outsized
  role of U.S. policy support. The DoD-backed reestablishment of domestic metal
  production remains part of the market structure, and 2024 trade data showed
  how small shifts in import and export lanes can materially change apparent
  consumption in such a thinly traded commodity.

