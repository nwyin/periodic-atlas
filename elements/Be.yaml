reserves:
  economic_reserves:
    value: 19000
    unit: tonnes
    form: contained_element
    approximate: true
    confidence: high
    notes: |
      USGS MCS 2025: proven and probable bertrandite reserves in Utah total
      about 19,000 tons of beryllium content. USGS also states that world
      beryllium reserves were not available.
    source_id: usgs_mcs_2025_beryllium
  resources:
    value: 100000
    unit: tonnes
    form: contained_element
    approximate: true
    confidence: high
    notes: |
      USGS MCS 2025: identified world resources of beryllium are estimated to
      be more than 100,000 tons, with about 60% in the United States.
    source_id: usgs_mcs_2025_beryllium
  notes: |
    USGS gives only a Utah proven-and-probable bertrandite reserve figure and
    explicitly states that world beryllium reserves were not available. World
    resources are reported qualitatively as greater than 100,000 tons, with the
    main U.S. districts in Utah, Nevada, South Dakota, Texas, and Alaska.

byproduct_of: []

feedstock_origins:
  - substrate: bertrandite_ore
    notes: |
      One company in Utah mined bertrandite ore and converted it into
      beryllium hydroxide before downstream conversion to metal, oxide, and
      beryllium-copper master alloy.
    source_id: usgs_mcs_2025_beryllium
  - substrate: beryl
    notes: |
      Imported beryl supplements Utah bertrandite feed and is processed into
      beryllium hydroxide by the same domestic producer.
    source_id: usgs_mcs_2025_beryllium

substitutes:
  - application: beryllium_metal_and_composites
    availability: partial
    notes: |
      USGS MCS 2025 states that in some applications metal matrix or organic
      composites, high-strength grades of aluminum, pyrolytic graphite, silicon
      carbide, steel, or titanium may substitute for beryllium metal or
      beryllium composites, but only where the full property set is not crucial.
    source_id: usgs_mcs_2025_beryllium
  - application: beryllium_copper_alloys
    availability: partial
    notes: |
      USGS MCS 2025 states that copper alloys containing nickel and silicon,
      tin, titanium, or other alloying elements, or phosphor bronze alloys,
      may substitute for beryllium-copper alloys, but with substantially
      reduced performance.
    source_id: usgs_mcs_2025_beryllium
  - application: beryllium_oxide_ceramics
    availability: partial
    notes: |
      USGS MCS 2025 states that aluminum nitride or boron nitride may be
      substituted for beryllium oxide.
    source_id: usgs_mcs_2025_beryllium

