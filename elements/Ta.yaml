symbol: Ta
atomic_number: 73
name: tantalum
category: transition_metal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports tantalum quantities in metric tons of contained tantalum unless
  otherwise specified. Imports and exports include contained tantalum estimated from
  synthetic tantalum-niobium concentrates, niobium and tantalum ores and concentrates,
  tantalum waste and scrap, unwrought tantalum alloys and powder, and other tantalum
  articles; footnote assumptions convert Ta2O5-bearing feedstocks to contained Ta.
  Commercial trade forms explicitly listed by USGS include tantalum ores and concentrates,
  tantalum oxide, potassium fluorotantalate, metal and powders, wrought products, and
  waste and scrap. The price series is quoted as dollars per kilogram of Ta2O5 content
  for tantalite rather than dollars per kilogram of contained tantalum metal.

