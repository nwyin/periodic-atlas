    USGS MCS 2025 reports world total economic reserves as NA, but provides country reserve
    quantities for Australia, Brazil, and China. Share percentages above are calculated
    against the subtotal of reported country reserves (390,000 t), not against a world
    reserve total. USGS also states that identified world resources of tantalum are
    considered adequate to supply projected needs and that the United States has about
    55,000 t of tantalum resources in identified deposits, most of them subeconomic at
    2024 prices.

byproduct_of: []

feedstock_origins:
  - substrate: lct_pegmatite_tantalite
    notes: |
      USGS Professional Paper 1802-M states that tantalum is derived mostly from the mineral
      tantalite, found as an accessory mineral in rare-metal granites and lithium-cesium-
      tantalum (LCT) pegmatites enriched in lithium and cesium.
    source_id: usgs_pp_1802m_niobium_tantalum
  - substrate: columbite_tantalite_coltan_concentrate
    notes: |
      USGS Professional Paper 1802-M notes that artisanal mining of columbite-tantalite
      ("coltan") is practiced in Burundi, Congo (Kinshasa), Nigeria, Rwanda, and Uganda.
      This central African concentrate stream remains commercially important to world
      tantalum supply.
    source_id: usgs_pp_1802m_niobium_tantalum
  - substrate: tantalum_containing_scrap
    notes: |
      USGS MCS 2025 says tantalum metal and alloys were recovered from foreign and domestic
      scrap, and recycling came mostly from new scrap generated during manufacture of
      tantalum-containing electronic components and from tantalum-bearing cemented carbide
      and superalloy scrap.
    source_id: usgs_mcs_2025_tantalum

substitutes:
  - application: carbides
    availability: partial
    notes: "USGS MCS 2025 substitutes paragraph: niobium and tungsten can substitute for tantalum in carbides, but with performance loss or higher costs."
    source_id: usgs_mcs_2025_tantalum
  - application: electronic_capacitors
    availability: partial
    notes: "USGS MCS 2025 substitutes paragraph: aluminum, ceramics, and niobium can substitute for tantalum in electronic capacitors, but with performance loss or higher costs."
    source_id: usgs_mcs_2025_tantalum
  - application: corrosion_resistant_applications
    availability: partial
    notes: "USGS MCS 2025 substitutes paragraph: glass, molybdenum, nickel, niobium, platinum, stainless steel, titanium, and zirconium can substitute for tantalum in corrosion-resistant applications."
    source_id: usgs_mcs_2025_tantalum
  - application: high_temperature_applications
    availability: partial
    notes: "USGS MCS 2025 substitutes paragraph: hafnium, iridium, molybdenum, niobium, rhenium, and tungsten can substitute for tantalum in high-temperature applications."
    source_id: usgs_mcs_2025_tantalum

end_uses:
  uses:
    - application: electronic_capacitors
      share_pct: 60
      confidence: medium
      notes: |
        USGS Professional Paper 1802-M states that approximately 60% of global tantalum
        consumption is in the electronics industry and identifies electronic capacitors as
        the leading tantalum use for high-end applications such as cell phones, computer
        hard drives, and implantable medical devices. USGS MCS 2025 is consistent with this
        use pattern, listing domestic production of capacitors and highlighting capacitors
        and sputtering targets in semiconductor fabrication demand growth.
      source_id: usgs_pp_1802m_niobium_tantalum
    - application: other_industrial_uses
      share_pct: 40
      confidence: low
      notes: |
        Residual bucket derived from the same USGS Professional Paper 1802-M statement that
        about 60% of global tantalum consumption is in electronics. USGS MCS 2025 identifies
        domestic tantalum output in alloys, carbides, compounds, and metal, while the
        Professional Paper highlights chemical-processing and superalloy demand. This 40%
        bucket is therefore a broad non-electronics remainder rather than a directly tabulated
        USGS end-use breakdown.
      source_id: usgs_pp_1802m_niobium_tantalum
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_critical_minerals_2025
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: eu_crma_2024
  eu_strategic_list_as_of_2024: false
  notes: |
    Tantalum is on the US 2025 List of Critical Minerals and on the EU 2024 Critical Raw
    Materials list. It is not on the EU 2024 Strategic Raw Materials list. The supply
    risk logic in both jurisdictions aligns with the structure visible in USGS MCS 2025:
    the United States has had no mine production since 1959, net import reliance was 100%
    in 2024, and world mine supply is concentrated in a relatively small set of producers
    dominated by central African coltan streams plus Brazil, Nigeria, and Rwanda.

