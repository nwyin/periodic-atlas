geopolitical_events:
  - date: 2024-10
    event: "CHIPS and Science Act funding commitments expanded projected US semiconductor capacity and tantalum demand"
    impact: |
      USGS MCS 2025 reports that by October 2024 the U.S. Department of Commerce had
      announced preliminary agreements with 20 companies for 32 semiconductor manufacturing
      projects in 20 States, allocating almost $34 billion of direct funding and almost
      $29 billion in loans. USGS explicitly identifies tantalum capacitors and sputtering
      targets as materials that will see higher demand from expanded advanced-chip fabrication.
    source_id: usgs_mcs_2025_tantalum
  - date: 2024-09
    event: "United States finalized additional section 301 tariffs on Chinese critical-mineral goods including tantalum"
    impact: |
      USGS MCS 2025 states that in September 2024 the Office of the United States Trade
      Representative announced final tariff modifications that imposed an additional 25%
      ad valorem tariff on critical minerals from China, including tantalum. The measure
      raised policy risk for US buyers of Chinese tantalum metal, powder, and downstream
      products at the same time that US import reliance remained total.
    source_id: usgs_mcs_2025_tantalum

narrative: |
  Tantalum is a small-volume but strategically important capacitor metal whose commercial
  chain is shaped by the contrast between highly specialized end uses and geographically
  concentrated mine supply. USGS MCS 2025 shows no US mine production, no domestic mining
  since 1959, and 100% net import reliance in 2024, yet US companies still produced alloys,
  capacitors, carbides, compounds, and metal from imported ores, concentrates, and other
  tantalum-bearing feedstocks. World mine production was only about 2,100 t Ta in 2024e,
  with Congo (Kinshasa), Nigeria, Rwanda, and Brazil supplying most of the total.

  The dominant geological reality is pegmatite and coltan supply rather than a large
  merchant refined-metal market. USGS Professional Paper 1802-M describes tantalum as
  derived mostly from tantalite in lithium-cesium-tantalum pegmatites, while also noting
  the importance of artisanal columbite-tantalite mining across central Africa. That mix
  produces a supply chain with persistent traceability and geopolitical sensitivity: small
  tonnages matter, scrap recycling is meaningful, and policy changes such as the September
  2024 US tariff action can materially affect procurement economics even without changing
  headline mine output.

  Demand is anchored in electronics. USGS identifies electronic capacitors as the leading
  use and links 2024 demand recovery to consumer electronics, data centers, and the expected
  build-out of US semiconductor fabrication capacity under the CHIPS and Science Act. The
  result is a market where absolute tonnage is modest, but substitution can impose real
  performance penalties and domestic consumers remain exposed to concentrated foreign mine
  supply and imported intermediate products.

  **Within-country analytical limitation (documented, intentionally not modelled):** the DRC
  row at 880 t and Rwanda row at 350 t — together ~59% of world mine output — mask two
  dynamics that the structured data cannot express. First, the DRC↔Rwanda attribution is
  unstable year-to-year because coltan is smuggled across the border; the UN Group of Experts
  (S/2024/969) documents roughly 120 t/month of coltan moving Masisi→Rwanda from May to
  October 2024, which inflates Rwanda's row and understates DRC's. Second, the Rubaya mining
  complex — estimated at ~15% of world coltan output on its own — has been controlled by the
  M23 armed group since early 2024, making whatever figure sits under the DRC row partially
  a conflict-financing flow rather than a conventional mining output. ITSCI traceability,
  which underwrites most DRC / Rwanda / Burundi tonnage reporting, had its RMI listing
  suspended in 2024 after Global Witness's "ITSCI laundromat" investigation, further
  weakening confidence in formal-vs-informal attribution. Country-level production figures
  here do not decompose within-country flows by mode or by formal/informal status, so none
  of the dynamics above are separable in the DRC and Rwanda tantalum rows; readers should
  treat those rows as aggregates across conflict-affected ASM, formal ITSCI-traced flows,
  and cross-border smuggled material.

