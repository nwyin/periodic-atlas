byproduct_of: []

feedstock_origins:
  - substrate: barite_ore
    notes: |
      Barite (BaSO₄, barium sulfate) is the overwhelmingly dominant commercial source of
      barium in all forms. Barite ore is mined, crushed, and ground for direct use as a
      drilling fluid weighting agent. Chemical-grade barite is further processed to produce
      barium oxide, barium chloride, barium carbonate, and precipitated barium sulfate.
      Most commercial barite occurs in vein deposits, residual deposits, and bedded marine
      sedimentary deposits. Witherite (BaCO₃) is an alternative barium mineral but is not
      commercially significant. USGS MCS 2025 depletion allowance for barite: 14% (domestic
      and foreign).
    source_id: usgs_mcs_2025_barite

substitutes:
  - application: oil_gas_drilling_fluids
    availability: none
    notes: |
      USGS MCS 2025: "Owing to technical and economic factors, there are no large-scale
      alternatives to barite in oil- and gas-drilling fluids." This is the dominant end
      use (>90% of US barite). Barite's combination of high density (~4.2–4.5 g/cm³),
      chemical inertness, low hardness (protects drill bits), and low cost has no
      large-scale equivalent. The API restricts acceptable drilling-fluid weighting
      materials; only API-spec barite and a handful of alternatives are approved.
    source_id: usgs_mcs_2025_barite
  - application: specific_drilling_circumstances
    availability: partial
    notes: |
      USGS MCS 2025: "Calcium carbonate, hematite, ilmenite, and manganese tetroxide are
      the most common alternatives used in specific circumstances." Calcium carbonate
      (SG ~2.7) is used in acid-soluble drilling fluids where formation cleanup is critical;
      hematite (SG ~4.9–5.3) and ilmenite (SG ~4.5–4.7) are higher-density alternatives
      used in ultra-deep wells requiring fluid density above barite's practical range;
      manganese tetroxide is API-approved as a lower-hardness weighting agent. Technical
      literature and patents also mention celestite, iron carbonate, and strontium carbonate,
      but these are not estimated to be widely used.
    source_id: usgs_mcs_2025_barite

end_uses:
  uses:
    - application: oil_gas_drilling_fluid_weighting
      share_pct: 91
      confidence: medium
      notes: |
        USGS MCS 2025: "Typically, more than 90% of the barite sold in the United States
        is used as a weighting agent in fluids used in the drilling of oil and natural gas
        wells." Ground API-spec barite increases the density of water-based and oil-based
        drilling muds to maintain downhole pressure and prevent blowouts. The majority of
        Nevada crude barite is ground in Nevada for Central and Western US drilling markets;
        Gulf of Mexico and coastal offshore operations primarily use imported barite due
        to lower ocean freight costs relative to rail/truck transport from Nevada.
      source_id: usgs_mcs_2025_barite
    - application: industrial_fillers_and_additives
      share_pct: 9
      confidence: low
      notes: |
        USGS MCS 2025: remaining uses as "filler, extender, or weighting agent in products
        such as paints, plastics, and rubber." Specific applications: automobile brake and
        clutch pads (high-density filler reducing noise and wear), automobile paint primer
        (corrosion protection and gloss), weighting agent in rubber products, cement jacket
        around underwater petroleum pipelines, mold-release compounds in metal casting,
        radiation-shielding aggregate in high-density concrete (X-ray units, nuclear power
        plants, research facilities), and ultrapure barium sulfate as a gastrointestinal
        tract contrast medium in X-ray and CT examinations.
      source_id: usgs_mcs_2025_barite
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Barite/barium is not on the US 2022 Critical Minerals List, the EU Critical Raw
    Materials list (Regulation 2024/1252), or the EU Strategic Raw Materials list (CRMA
    2024). Although the United States is heavily import-reliant on barite (net import
    reliance >75%), the commodity is not classified as critical because: (1) global supply
    is geographically diverse (India 32%, China 26%, Morocco 12%, Kazakhstan 8%); (2) world
    resource base is very large (~2 billion tons); (3) no single country exerts dominant
    control. The primary structural risk is the progressive depletion of high-SG (4.2)
    barite suited to deep drilling, partially mitigated by the 2010 API 4.1 SG specification.

