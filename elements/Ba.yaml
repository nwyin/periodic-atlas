symbol: Ba
atomic_number: 56
name: barium
category: alkaline_earth
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 tracks barium through its primary commercial mineral form, barite
  (barium sulfate, BaSO₄), not as elemental barium metal. All production statistics
  are reported in thousand metric tons of barite (gross weight, not barium-content
  basis). The standard commercial grade for the oil and gas industry is crushed and
  ground barite meeting API specification 13A (historically 4.2 specific gravity; in
  2010 the API issued an alternate spec for 4.1 SG material to address dwindling high-SG
  reserves). Ground-barite prices are reported as average unit value ex-works in USD per
  metric ton. US mine production tonnage is withheld to protect company proprietary data;
  only the combined domestic-plus-import grinder sales figure (2.3 million tons in 2024e)
  is disclosed. The USGS world production table explicitly excludes US production (footnote
  10). World total reserves are reported as NA.

