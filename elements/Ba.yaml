geopolitical_events:
  - date: "2024-01"
    event: "US drill rig count ends year 39% below 2019 pre-COVID levels; barite sales increase despite lower rig count due to deeper drilling"
    impact: |
      The number of drill rigs operating in the United States declined from 622 at the
      start of 2024 to 585 by end of October 2024, remaining 39% below the same period
      in 2019 before COVID-19. Despite declining US rig activity, barite sales were estimated
      to have increased slightly, because barite use per rig has been increasing as operators
      drill deeper wells requiring more weighting agent. An estimated 2.3 million tons of
      barite (domestic and imported combined) was sold by US crushers and grinders in 2024.
    source_id: usgs_mcs_2025_barite
  - date: "2024-01"
    event: "World rig count outside the US averages 1,169 in 2024, up from 1,154 in 2023; contributes to slight world barite production increase"
    impact: |
      Through October 2024, the world annual average rig count excluding the United States
      was 1,169 compared with 1,154 in 2023. Increases in worldwide rig counts contributed
      to a slight increase in world barite production from 8,080,000 tonnes (2023) to
      8,200,000 tonnes (2024e, excluding US). International demand growth partially offset
      declining US rig activity.
    source_id: usgs_mcs_2025_barite
  - date: "2024-01"
    event: "China, Iran, and Turkey barite reserves revised based on company and Government reports"
    impact: |
      USGS MCS 2025 notes that reserves for China, Iran, and Turkey were revised. These
      three countries together hold 163,000 thousand metric tons of the known reported
      world barite reserves (out of 392,000 kt total among reporting countries), so reserve
      revisions for these producers materially affect global resource assessments.
    source_id: usgs_mcs_2025_barite
  - date: "2010-01"
    event: "American Petroleum Institute issues alternate 4.1 SG specification for drilling fluid weighting agents"
    impact: |
      In response to concerns about dwindling global reserves of 4.2-specific-gravity barite
      used by the oil- and gas-drilling industry, the API issued an alternate specification
      for 4.1-specific-gravity weighting agents. USGS MCS 2025 notes that estimated reserves
      data for barite were included only if developed since adoption of this standard. This
      policy change effectively expanded the economically recoverable barite resource base by
      including previously sub-specification deposits, partially mitigating long-term supply
      concerns for the drilling industry.
    source_id: usgs_mcs_2025_barite

narrative: |
  Barium's commercial identity is almost entirely synonymous with barite (BaSO₄, barium
  sulfate), a dense industrial mineral mined at approximately 8 million tonnes per year
  (excluding the United States). More than 90% of barite consumed in the United States is
  used as a weighting agent in oil and gas drilling fluids, where its high density, chemical
  inertness, and low cost make it essentially irreplaceable at industrial scale. World barite
  production (ex-US) reached approximately 8.2 million tonnes in 2024, led by India (32%),
  China (26%), Morocco (12%), and Kazakhstan (8%). The United States is a significant consumer
  but heavily import-dependent (net import reliance >75%), with India, China, Morocco, and
  Mexico supplying ~96% of US imports on a 2020–23 average basis.

  The barite market is tightly coupled to global oil and gas drilling activity. In 2024, US
  rig counts declined from 622 at the start of the year to 585 by October 2024, finishing
  39% below pre-pandemic 2019 levels. Despite the slowing US rig count, barite sales
  increased slightly because modern wells are drilled to greater depths requiring more barite
  per rig. Internationally, the non-US world rig count increased from 1,154 in 2023 to 1,169
  in 2024, supporting a modest rise in world barite production. Ground barite prices averaged
  $220/tonne in 2024 (ex-works), near the 2023 peak of $223/tonne but more than 50% above
  the 2022 low of $145/tonne — the 2021–2023 price surge was driven by increased drilling
  activity following the post-COVID energy recovery.

  A structural long-term risk in the barite market is the progressive depletion of
  high-density (4.2 specific gravity) barite deposits suited to deep drilling. The American
  Petroleum Institute responded in 2010 by issuing an alternate specification permitting 4.1
  SG material, expanding the economically recoverable resource base. Identified world barite
  resources are approximately 740 million tonnes within a total of ~2 billion tonnes in all
  categories. Barite/barium is not classified as critical by the US, EU, or major multilateral
  bodies, reflecting its large global resource base and diverse supplier geography. However,
  the almost exclusive dependence on barite for drilling means that significant disruption
  to major exporters — particularly India and China, which together supply a majority of US
  imports — would rapidly constrain US energy exploration capacity.

