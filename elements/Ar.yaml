byproduct_of: []

feedstock_origins:
  - substrate: atmospheric_air
    typical_concentration_pct: 0.934
    notes: |
      NOAA gives argon as 0.934% of dry air by volume. Commercial argon is
      therefore sourced from ambient air and recovered in cryogenic
      air-separation plants; availability follows ASU economics and
      oxygen/nitrogen throughput rather than any dedicated argon mine.
    source_id: noaa_atmosphere

substitutes:
  - application: metal_manufacturing_and_fabrication
    availability: partial
    notes: |
      Grand View notes that argon is often substituted by helium in some
      sectors and is itself used as an alternative to nitrogen in inert
      processing. The practical implication is partial substitutability:
      helium or nitrogen can replace argon in selected shielding or inerting
      duties, but not as a clean one-for-one across welding, metallurgy,
      semiconductors, and high-purity applications.
    source_id: grandview_argon_market_2025

end_uses:
  uses:
    - application: metal_manufacturing_and_fabrication
      share_pct: 33.8
      confidence: medium
      notes: |
        IMARC identifies metal manufacturing and fabrication as the largest
        argon end-use segment in 2024 at about 33.8% of the market. This is
        consistent with argon's established role as the standard inert gas in
        TIG and MIG welding and in other metal-fabrication atmospheres.
      source_id: imarc_argon_market_2025
  completeness: partial

