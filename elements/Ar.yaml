geopolitical_events:
  - date: 2025-06
    event: "Air Liquide signed a long-term agreement to build a new ultra-high-purity air-gases plant in Singapore for VSMC."
    impact: |
      The project adds dedicated semiconductor-grade oxygen, nitrogen, argon,
      and related-gas capacity in Tampines Wafer Fab Park, showing how argon
      supply growth is increasingly being pulled by chip fabs rather than only
      by legacy steel and fabrication markets.
    source_id: air_liquide_vsmc_2025
  - date: 2025-07
    event: "Air Liquide committed more than EUR250 million for three new ASUs in Dresden to supply Europe's semiconductor cluster."
    impact: |
      The project will supply ultra-pure nitrogen, oxygen, argon, hydrogen,
      helium, and CO2 in Silicon Saxony. For argon, this is a concrete signal
      that semiconductor reshoring in Europe is driving new dedicated air-gas
      investment close to fabs.
    source_id: air_liquide_dresden_2025

narrative: |
  Argon is commercially abundant but operationally constrained. It is the
  third-largest constituent of dry air and is recovered wherever very large
  cryogenic air-separation units are justified by oxygen and nitrogen demand.
  That makes argon a workhorse industrial gas with a genuine supply chain, but
  not one that behaves like a mined mineral commodity. Merchant availability is
  tied to steel mills, petrochemical complexes, refinery clusters, and now
  increasingly to semiconductor hubs. When those host industries build ASUs,
  argon appears; when they do not, argon cannot be expanded independently at
  low cost.

  The commercial center of gravity is still metal manufacturing and
  fabrication, where argon is the default inert shielding gas for TIG and MIG
  welding and an established process gas in stainless and specialty metallurgy.
  At the same time, the highest-value growth is moving toward electronics:
  semiconductor fabs, photovoltaics, analytical laboratories, and other uses
  that demand tighter purity control. The result is a split market in which
  bulk liquid argon behaves like a regional industrial commodity, while
  ultra-high-purity argon behaves more like a specialty gas with tighter
  purification, certification, and proximity requirements.

