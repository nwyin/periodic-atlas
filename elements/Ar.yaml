symbol: Ar
atomic_number: 18
name: argon
category: noble_gas
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Commercial argon is recovered from cryogenic air-separation units that are
  primarily built to make oxygen and nitrogen. In trade it is sold both as
  gaseous argon in high-pressure cylinders and bundles and as bulk liquid
  argon. Air Products advertises technical-grade argon at 99.998% purity
  ("4.8") in 200- and 300-bar cylinders for welding service, and BIP argon at
  99.9999% purity ("6.0") for analytical service. Messer likewise markets both
  gaseous and liquid argon from large-scale ASUs. Public market-volume and
  trade-price series for argon are usually reported in cubic meters of gas,
  while packaged-gas product pages quote cylinder water volume and fill
  pressure rather than a normalized delivered gas volume.

