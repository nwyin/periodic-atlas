        share_pct: 90
        notes: |
          China controls approximately 90% of global REE separation and refining capacity,
          including Sm₂O₃ oxide production and SmCo alloy manufacturing. Refineries are
          concentrated in Jiangxi, Fujian, Sichuan, and Inner Mongolia. Import data confirm
          China supplied 70% of US REE compound and metal imports (2020–23 average) while
          also processing concentrates from non-Chinese mines before re-export. SmCo alloy
          production is also concentrated in China, which makes Sm supply chains for defense
          magnets particularly sensitive to Chinese refining controls.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 7
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate producing separated Sm₂O₃ and other REE oxides.
          LAMP is the world's largest non-Chinese rare earth separation facility. USGS cites
          Malaysia as 13% of US REE compound and metal import sources (2020–23).
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Early-stage non-Chinese separation: MP Materials Mountain Pass (California),
          Neo Performance Materials Sillamäe (Estonia, 5% of US imports 2020–23), and
          Japan-based processors (Japan 6% of US imports 2020–23). Estonia and Japan source
          feed from Australian and Chinese intermediates per USGS chapter text.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). Country shares sum to ~100.8% due to rounding of reported integers
    against the rounded world total. All Sm-specific figures derived from REO totals
    using the ~2.8% basket share assumption; actual per-element disaggregation is not
    available from public USGS data.

