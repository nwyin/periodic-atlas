symbol: Sm
atomic_number: 62
name: samarium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a single grouped commodity chapter
  ("rare earths") in metric tons of rare-earth-oxide (REO) equivalent. Per-element
  attribution for samarium requires multiplying the aggregate by Sm's typical basket
  share. Samarium oxide (Sm₂O₃, 99.9% minimum) is the primary commercial form
  for most non-magnet applications. For samarium-cobalt (SmCo) permanent magnets,
  Sm₂Co₁₇ and SmCo₅ alloys are the end-product forms. All production figures in
  this file are derived by multiplying USGS-reported aggregate REO totals by Sm's
  typical basket share (~2.8%), which is not directly reported by USGS. The basket
  share varies by deposit type: bastnaesite and carbonatite deposits (Mountain Pass
  CA ~0.5%, Bayan Obo CN ~2.5%, Mt. Weld AU ~2.3%) are LREE-dominant and yield
  lower Sm fractions; ion adsorption clay deposits in southern China and Southeast
  Asia yield higher Sm proportions (~3–5%) because these deposits are relatively
  enriched in the mid-range REEs. A global weighted average of ~2.8% is used as the
  central estimate. All data are in metric tons REO equivalent unless otherwise noted.
  Prices for Sm₂O₃ (99.9% minimum) are reported separately in USGS MCS 2025 salient
  statistics, sourced from Argus Media Group, Argus Non-Ferrous Markets.

