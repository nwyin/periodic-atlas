byproduct_of: []

feedstock_origins:
  - substrate: bastnaesite_ore
    typical_concentration_pct: 2.5
    notes: |
      Bastnaesite (fluorocarbonate mineral, CeFCO₃) is the primary commercial source
      of light rare earth elements including Sm. Sm₂O₃ typically represents ~2.3–3.3%
      of total REOs in commercial bastnaesite concentrates, varying by deposit: Mountain
      Pass (CA) ~0.5%, Bayan Obo (CN) ~2.5%, Mt. Weld (AU) ~2.3%. USGS MCS 2025
      confirms bastnaesite was mined as a primary product at Mountain Pass in 2024.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 3.0
    notes: |
      Monazite (phosphate mineral, (Ce,La,Pr,Nd)PO₄) is stockpiled as a separated
      concentrate or recovered as an accessory mineral in heavy-mineral-sand concentrates.
      USGS MCS 2025 confirms monazite was stockpiled in the southeastern United States
      in 2024. Sm typically represents ~2.8–3.5% of total REOs in monazite. Thorium
      content in monazite complicates processing under radioactive materials regulations.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 4.0
    notes: |
      Ion adsorption clay deposits in southern China (Jiangxi, Fujian, Guangdong) and
      Southeast Asia (Burma, Thailand) contain higher proportions of mid-range REEs
      including Sm (~3–5% of total REOs) than bastnaesite-dominant mines. These deposits
      account for most world heavy REE supply and for the production in Thailand and
      Burma reported by USGS MCS 2025. The higher Sm fraction from these deposits raises
      the global weighted average Sm basket share above what bastnaesite mines alone
      would imply.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: samarium_cobalt_magnets
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For samarium-cobalt permanent magnets, NdFeB (neodymium-iron-boron)
      magnets can substitute in most applications operating below ~150°C, with superior
      energy product (BH)max at room temperature. However, SmCo magnets offer unique
      advantages in high-temperature environments (stable to ~350°C vs. ~180°C for standard
      NdFeB), resistance to corrosion and demagnetization, and tolerance of ionizing
      radiation — properties critical in aerospace, defense, oil/gas downhole tools, and
      space applications. No complete substitute exists for SmCo in the most demanding
      high-temperature and radiation-hardened environments. For lower-performance
      applications, ferrite (iron oxide) magnets can substitute at significantly lower
      energy density and cost.
    source_id: usgs_mcs_2025_rare_earths
  - application: nuclear_neutron_absorbers
    availability: partial
    notes: |
      In nuclear reactor applications, Sm serves as a significant neutron absorber
      (Sm-149 has a thermal neutron capture cross-section of ~41,000 barns). Boron-10,
      hafnium, gadolinium, europium, cadmium, and indium-silver-cadmium alloys can
      substitute as control rod and shielding materials, but each has different neutron
      energy response characteristics, mechanical properties, and operating temperature
      ranges. Substitution is feasible through reactor design choices rather than
      material drop-in replacement.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: samarium_cobalt_magnets
      share_pct: 50
      confidence: low
      notes: |
        Samarium-cobalt (SmCo) permanent magnets — primarily Sm₂Co₁₇ (second generation,
        higher energy product) and SmCo₅ (first generation) — are the dominant end use
        for separated samarium. Applications include aerospace and defense systems
        (actuators, gyroscopes, radar and electronic warfare components), oil and gas
        downhole drilling motors and sensors (high temperature), satellite and spacecraft
        components (radiation tolerance, wide temperature range), and high-speed precision
        motors. USGS MCS 2025 Government Stockpile table lists samarium-cobalt alloy as
        a potential FY2024–2025 US government acquisition, underscoring its defense
        significance. SmCo magnets command premium prices relative to NdFeB due to cobalt
        content and smaller production volumes. Share is an industry consensus estimate;
        USGS does not report per-element end-use percentages.
      source_id: usgs_mcs_2025_rare_earths
    - application: glass_ceramics_optical
      share_pct: 20
      confidence: low
      notes: |
        Sm₂O₃ is used as a yellow-orange colorant in glass and ceramics, in samarium-
        doped glass for neutron shielding and radiation-absorbing applications, and as
        a dopant in specialty optical glass. USGS MCS 2025 lists "ceramics and glass"
        as an end use for REEs overall. Sm's relatively stable chemical properties and
        yellow-orange optical absorption make it useful in specialty glass applications.
        Share is an estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: nuclear_and_radiation
      share_pct: 15
      confidence: low
      notes: |
        Samarium is used in reactor design and nuclear applications due to its very high
        thermal neutron capture cross-section (Sm-149 ~41,000 barns; Sm naturally has
        seven stable isotopes with a combined macroscopic cross-section making it a
        notable neutron absorber). Applications include neutron-absorbing control rod
        materials, reactor shielding glass, samarium oxide in nuclear research, and
        fission product poisoning management (Sm-149 is a significant xenon-free fission
        product poison). Share is an estimate; some nuclear use is passive (Sm as a
        fission product in irradiated fuel rather than deliberately added).
      source_id: usgs_mcs_2025_rare_earths
    - application: catalysts_and_other
      share_pct: 15
      confidence: low
      notes: |
        Residual end uses including samarium compounds as specialty catalysts (SmI₂ as a
        single-electron reductant in organic synthesis), minor use in phosphors and
        scintillators, carbon-arc lighting (largely obsolete), and miscellaneous chemical
        applications. USGS MCS 2025 lists "catalysts" as the leading domestic REE end use
        overall, though Sm's contribution to this category is small relative to Ce and La.
        Share is an estimate aggregating several minor applications.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

