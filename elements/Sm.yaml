criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Samarium is classified as critical under the US 2022 Critical Minerals List (as
    part of "rare earth elements"), the EU Critical Raw Materials Regulation 2024/1252
    (light and heavy rare earths), and the EU Critical Raw Materials Act 2024 strategic
    materials list. Net import reliance for REE compounds and metals was ~80% in 2024e
    (USGS MCS 2025 salient statistics). Samarium's criticality is amplified by its
    specific role in SmCo permanent magnets for defense and aerospace: the US government
    FY2024–2025 potential stockpile acquisitions explicitly list samarium-cobalt alloy
    (USGS MCS 2025 Government Stockpile table). In April 2025 China directly named Sm
    as one of seven rare earth elements subject to new export controls — the most direct
    supply-chain risk event in Sm's recent history. Import sources 2020–23: China 70%,
    Malaysia 13%, Japan 6%, Estonia 5%.

geopolitical_events:
  - date: "2025-04"
    event: "China imposes export controls on 7 REEs including samarium, gadolinium, terbium, dysprosium, lutetium, scandium, and yttrium"
    impact: |
      China's April 2025 REE export controls directly targeted samarium by name, requiring
      export licenses for Sm metal, Sm₂O₃ oxide, and SmCo alloy intermediates. This is
      the most significant supply-chain disruption event specific to Sm in the USGS MCS
      2025 reporting window. SmCo magnets used in US defense systems (precision-guided
      munitions, aircraft actuators, submarine motors, radar) rely on Sm as a critical
      input, with no short-term substitute offering equivalent performance at high
      temperatures and in radiation environments. The controls placed pressure on non-Chinese
      SmCo magnet producers to seek alternative Sm supply chains.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US government FY2024-2025 potential stockpile acquisitions explicitly include samarium-cobalt alloy"
    impact: |
      USGS MCS 2025 Government Stockpile table lists samarium-cobalt alloy as a potential
      FY2024–2025 acquisition alongside neodymium-praseodymium oxide, NdFeB magnet blocks,
      cerium (550 t FY2024), and lanthanum (1,300 t FY2024, 1,100 t FY2025). The explicit
      naming of samarium-cobalt alloy — a processed downstream product rather than a raw
      oxide — signals US recognition of SmCo as a distinct strategic material class, separate
      from the broader REE basket policy. SmCo alloy demand in US defense procurement reflects
      the element's unique performance envelope in high-temperature and radiation-hardened
      magnet applications that NdFeB cannot serve.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "Global REE mine production increased to 390,000 t REO in 2024e, driven by China, Nigeria, and Thailand; Burma declined 28%"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from 376,000 t
      in 2023. China rose from 255,000 to 270,000 t; Nigeria from 7,200 to 13,000 t;
      Thailand from 3,600 to 13,000 t; Burma fell from 43,000 to 31,000 t. For Sm
      specifically, the production increase is primarily relevant through China's higher quota
      (ion adsorption clay operations produce Sm-enriched REE streams) and the Thai and
      Nigerian growth (also from clay-type or placer sources with variable Sm content). At
      the ~2.8% basket share, world Sm production rose from ~10,528 t in 2023 to ~10,920 t
      in 2024e.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US net import reliance for REE compounds and metals declined to 80% in 2024e, reflecting domestic compound production growth"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds and
      metals at 80% in 2024e, down from >95% in 2020–2023. Domestic compound production grew
      to 1,300 t reported (7,600 t total including California and Utah production per USGS
      footnote 3) in 2024. Despite this improvement, Sm-specific domestic processing capacity
      is absent: Mountain Pass concentrate is shipped to China for separation, meaning US
      SmCo magnet manufacturers remain entirely dependent on imported Sm₂O₃ or SmCo alloy
      for their output.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Samarium occupies a narrow but strategically critical position in the rare earth supply
  chain, defined almost entirely by its role in samarium-cobalt (SmCo) permanent magnets.
  SmCo magnets — available as Sm₂Co₁₇ (second generation) and SmCo₅ (first generation) —
  deliver energy products and operating temperature ranges unmatched by any other commercial
  permanent magnet system: stable to ~350°C (versus ~180°C for standard NdFeB), inherently
  corrosion-resistant, and tolerant of radiation environments. These properties make SmCo
  the only viable magnet option in aerospace and defense applications including precision-
  guided munition actuators, satellite attitude control, high-speed aircraft motor drives,
  submarine propulsion components, and radar/EW systems. The US government's FY2024–2025
  potential stockpile acquisitions specifically name samarium-cobalt alloy, confirming its
  status as a named defense-critical material rather than a passive component of the REE basket.

  Global Sm production is estimated at ~10,920 tonnes Sm₂O₃ equivalent in 2024 (derived
  from the USGS-reported 390,000 t world REE total at a ~2.8% basket share), with China
  supplying ~69% of mine output and controlling ~90% of separation and refining capacity.
  Sm's production is constrained by the REE balance problem: it cannot be scaled
  independently of Ce, La, Nd, and other basket elements that co-occur in fixed ratios in
  any ore deposit. Sm prices have been stable at $2–4/kg (Sm₂O₃, 99.9%) in 2020–2024 —
  far below the $1,500–2,000/kg peaks seen during the 2010–2012 REE boom — but the supply
  chain vulnerability is not about price but about control: SmCo alloy production and the
  separation of Sm₂O₃ from mixed REE concentrates are overwhelmingly Chinese activities.

  China's April 2025 imposition of direct export controls on samarium — explicitly naming
  it alongside Gd, Tb, Dy, Lu, Sc, and Y — marks the sharpest supply-chain risk event in
  Sm's recent history. Unlike Nd and Pr, which are targeted indirectly through NdFeB magnet
  technology controls, Sm was named as a directly controlled substance, subjecting Sm
  metal, Sm₂O₃ oxide, and SmCo alloy exports to license requirements. The path to supply
  chain resilience for SmCo magnets requires building non-Chinese Sm separation and alloy
  manufacturing capacity; short of that, US and allied defense procurement faces chronic
  single-country dependency for a magnet technology with no viable room-temperature
  substitute in its highest-performance applications.

