reserves:
  economic_reserves:
    value: 92000
    unit: tonnes
    form: contained_element
    confidence: high
    notes: |
      USGS MCS 2025 p.159: "World total (rounded) … 92,000" metric tons.
      USGS notes: "The values shown for reserves reflect the estimated selenium
      content of copper reserves except for those of China, which represent
      reported reserves of selenium." Reserves for Canada, Peru, and the United
      States were revised in this edition based on company and Government reports.
    source_id: usgs_mcs_2025_selenium
  resources:
    value: 92000
    unit: tonnes
    form: contained_element
    approximate: true
    notes: |
      USGS MCS 2025 p.159 World Resources note: "Reserves for selenium are based
      on identified copper deposits and average selenium content. Other potential
      sources of selenium include lead, nickel, and zinc ores. Coal generally
      contains significant quantities of selenium, but recovery of selenium from
      coal fly ash, although technically feasible, does not appear likely to be
      economical in the foreseeable future." USGS does not give a separate
      identified-resources figure distinct from reserves for selenium; the global
      reserve figure (92,000 t) is therefore the best available proxy for identified
      economic resources.
    source_id: usgs_mcs_2025_selenium
