  notes: |
    Belgium, Germany, Japan, Serbia, South Africa, Turkey, and Uzbekistan show
    "—" (zero) or "NA" (not available) in the USGS reserves column, indicating
    either no attributed reserves or data not available. Reserves are primarily
    the imputed selenium content of copper ore deposits; the methodology means
    Se reserves closely mirror Cu reserve geography. Named-country sum:
    26,000 + 24,000 + 16,000 + 10,000 + 6,500 + 5,000 + 3,000 + 500 + 500 + 300
    = 91,800; difference from 92,000 rounded world total is a USGS rounding artifact.

byproduct_of: [Cu, Pb, Zn]
feedstock_origins:
  - substrate: electrolytic_copper_anode_slimes
    typical_concentration_pct: 0.05
    notes: |
      USGS MCS 2025 p.158: "Selenium is recovered principally as a byproduct of
      the electrolytic refining of primary copper, where it accumulates in the
      residues of copper anodes." The selenium concentration in anode slimes
      varies by ore deposit; typical values are on the order of 0.02–0.10% Se
      by weight of slime. World Resources note confirms copper deposits are the
      principal reserve base for selenium.
    source_id: usgs_mcs_2025_selenium
  - substrate: lead_zinc_smelter_residues
    notes: |
      USGS MCS 2025 p.159 World Resources: "Other potential sources of selenium
      include lead, nickel, and zinc ores." Selenium accompanies sulfide minerals
      in Pb-Zn deposits and is captured in smelter dusts and residues, though
      at volumes much smaller than from copper refining.
    source_id: usgs_mcs_2025_selenium

substitutes:
  - application: cigs_thin_film_photovoltaics
    availability: partial
    notes: |
      USGS MCS 2025 p.159: "Amorphous silicon and cadmium telluride are the two
      principal competitors with CIGS in thin-film photovoltaic solar cells."
      Both Si-based and CdTe thin-film technologies displace selenium-bearing
      CIGS cells in the solar market; crystalline silicon dominates PV at scale.
    source_id: usgs_mcs_2025_selenium
  - application: pigments_red_cadmium_sulfoselenide
    availability: partial
    notes: |
      USGS MCS 2025 p.159: "Organic pigments have been developed as substitutes
      for cadmium sulfoselenide pigments."
    source_id: usgs_mcs_2025_selenium
  - application: electronics_rectifiers
    availability: full
    notes: |
      USGS MCS 2025 p.159: "Silicon is the major substitute for selenium in
      low- and medium-voltage rectifiers." Silicon has largely displaced selenium
      in this application; the shift is essentially complete.
    source_id: usgs_mcs_2025_selenium
  - application: electrolytic_manganese_metal
    availability: partial
    notes: |
      USGS MCS 2025 p.159: "Sulfur dioxide can be used as a replacement for
      selenium dioxide in the production of electrolytic manganese metal but is
      not as energy efficient."
    source_id: usgs_mcs_2025_selenium
  - application: free_machining_alloys
    availability: partial
    notes: |
      USGS MCS 2025 p.159: "Other substitutes include bismuth, lead, and
      tellurium in free-machining alloys; bismuth and tellurium in lead-free
      brasses; cerium oxide as either a colorant or decolorant in glass; and
      tellurium in pigments and rubber."
    source_id: usgs_mcs_2025_selenium

end_uses:
  uses:
    - application: metallurgy_electrolytic_manganese
      share_pct: 40
      notes: |
        USGS MCS 2025 p.158: "estimated end uses for selenium in global
        consumption were metallurgy (including electrolytic manganese metal
        production), 40%." This is global consumption, not US-specific.
        Selenium acts as an additive in electrolytic Mn production to increase
        yields; it also improves machinability in Cu, Pb, and steel alloys.
      source_id: usgs_mcs_2025_selenium
    - application: agriculture_animal_health
      share_pct: 20
      notes: |
        USGS MCS 2025 p.158: "agriculture and animal health, 20%." Selenium is
        an essential micronutrient; used as fertilizer additive and dietary
        supplement for livestock and humans.
      source_id: usgs_mcs_2025_selenium
    - application: glass_manufacturing
      share_pct: 20
      notes: |
        USGS MCS 2025 p.158: "glass manufacturing, 20%." Selenium decolorizes
        the green tint caused by iron impurities in container glass and other
        soda-lime silica glass. Chinese demand for this application has decreased
        in recent years per chapter text.
      source_id: usgs_mcs_2025_selenium
    - application: electronics_photovoltaics
      share_pct: 10
      notes: |
        USGS MCS 2025 p.158: "electronics and photovoltaics, 10%." Includes
        CIGS thin-film solar cells and photocells exploiting selenium's
        photovoltaic/photoconductive properties. Chinese demand for this
        application has increased in recent years.
      source_id: usgs_mcs_2025_selenium
    - application: chemicals_pigments
      share_pct: 5
      notes: |
        USGS MCS 2025 p.158: "chemicals and pigments, 5%." Includes selenium
        dioxide (catalyst, Mn electrolysis), cadmium sulfoselenide red pigments,
        rubber-compounding vulcanizing agents, plating solutions, and
        antidandruff shampoo active ingredient.
      source_id: usgs_mcs_2025_selenium
    - application: other_applications
      share_pct: 5
      notes: |
        USGS MCS 2025 p.158: "other applications, 5%." Covers blasting caps
        (delay control), gun bluing (cosmetics/corrosion resistance), and
        additional minor uses.
      source_id: usgs_mcs_2025_selenium
  completeness: complete

criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_selenium
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_selenium
  notes: |
    Selenium is on the US 2025 critical minerals list; its inclusion in the USGS
    MCS 2025 publication is the operative designation. Net import reliance was
    reported as >50% for all years 2020–2024 (USGS Salient Statistics). US
    domestic production and consumption data are withheld; downstream companies
    process imported refined selenium. Selenium is on the EU Critical Raw
    Materials list (EU CRM Act 2024); EU Strategic Raw Materials list status
    not confirmed from USGS source — see notes. The absence of a domestic
    US refining stage (crude and anode slimes are produced but not refined
    domestically) amplifies supply-chain vulnerability.

