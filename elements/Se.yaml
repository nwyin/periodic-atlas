symbol: Se
atomic_number: 34
name: selenium
category: reactive_nonmetal
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  Tracked on a contained-selenium basis (selenium content), not gross anode-slime
  tonnage. USGS MCS 2025 reports all figures in metric tons of selenium content
  unless otherwise specified. All production in the USGS world table is refinery
  production; there is no meaningful standalone mine-production figure because
  selenium has no primary mines — it is recovered exclusively as a byproduct of
  electrolytic copper refining (accumulates in copper anode residues/slimes) and
  to a lesser extent from lead and zinc smelting. The `refined` field on the
  ProductionBlock is used accordingly. The world total of 3,700 t (2024e) in the
  USGS table carries footnote 10: "Excludes U.S. production" (US data withheld).

