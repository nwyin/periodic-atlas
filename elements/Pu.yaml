symbol: Pu
atomic_number: 94
name: plutonium
category: actinide
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  Commercial plutonium in the DOE/NIDC catalog is quoted as isotope-specific material sold
  in milligram quantities rather than as a bulk metal market. The commercially relevant
  isotope market is Pu-238, supplied as oxide powder in a glass screw-cap bottle; DOE's
  product information lists "Stock" availability and "Milligrams" as the unit of sale.
  NASA's radioisotope power systems use the material in ceramic plutonium oxide heat-source
  form rather than metallic plutonium.

isotope_markets:
  - isotope: Pu-238
    half_life_seconds: 2767673520
    production_mode: reactor_generated
    reporting_year: 2025
    precursor: |
      DOE produces Pu-238 by transmutation of neptunium-237 through neutron capture. DOE's
      current domestic route presses neptunium oxide-aluminum pellets, irradiates targets in
      the High Flux Isotope Reactor at Oak Ridge National Laboratory and the Advanced Test
      Reactor at Idaho National Laboratory, and chemically processes the irradiated material
      into heat-source plutonium oxide.
    delivery_form: |
      DOE/NIDC sells Pu-238 as oxide powder with stock availability and milligram unit of
      sale. For the space-power supply chain, the oxide is converted into ceramic heat-source
      pellets, then into fueled clads and radioisotope power systems.
    notes: |
      The NIDC plutonium catalog page shows multiple plutonium isotopes available for quote,
      but the distinct commercial market described here is Pu-238 because it is the isotope
      used in radioisotope power systems for NASA missions.

feedstock_origins:
  - substrate: neptunium_oxide_aluminum_targets
    notes: |
      DOE describes the front end of Pu-238 production as fabrication of neptunium
      oxide-aluminum pellets or targets, followed by reactor irradiation and chemical
      processing into plutonium-238.
    source_id: doe_pu238_restart_automation_2019

substitutes:
  - application: radioisotope_power_systems
    availability: none
    notes: |
      NASA states that several radioisotopes could theoretically be used for radioisotope
      power systems, but plutonium-238 is the only one that has consistently met the required
      criteria for space missions.
    source_id: nasa_about_pu238_2025

end_uses:
  uses:
    - application: radioisotope_power_systems
      share_pct: 100
      notes: |
        NASA's plutonium-238 program is entirely tied to radioisotope power systems,
        including radioisotope thermoelectric generators for electrical power and
        radioisotope heater units for spacecraft heat.
      source_id: nasa_rps_overview_2025
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Plutonium is strategically sensitive, but it is not treated as a civilian critical
    mineral in the U.S. critical-minerals list or the EU critical and strategic raw
    materials lists.

geopolitical_events:
  - date: 2012
    event: DOE and NASA agreed to restart domestic Pu-238 production after a roughly 30-year U.S. gap.
    impact: |
      Re-established a domestic supply chain for NASA radioisotope power systems, with ORNL
      leading target fabrication and chemical processing.
    source_id: doe_pu238_restart_automation_2019
  - date: 2023-07-18
    event: DOE shipped 0.5 kg of new heat-source plutonium oxide from ORNL to LANL.
    impact: |
      DOE called this the largest shipment of new heat-source plutonium oxide in more than a
      decade and said it kept the program on track for an average production target of
      1.5 kg/yr by 2026.
    source_id: doe_pu238_shipment_2023

narrative: |
  Plutonium has no conventional bulk commodity market in the atlas sense. The commercial
  reality is a tightly controlled isotope catalog, with DOE/NIDC offering isotope-specific
  plutonium in milligram quantities and the only clearly industrial market centered on
  Pu-238. That isotope is bought and fabricated into ceramic plutonium oxide heat sources
  for radioisotope power systems used on deep-space spacecraft and planetary missions.

  The supply chain is state-run and reactor-based rather than mine-based. DOE's current
  route starts with neptunium-bearing targets, irradiates them in U.S. research reactors,
  processes the irradiated material into heat-source plutonium oxide at Oak Ridge, converts
  it into fueled clads at Los Alamos, and integrates the fuel into radioisotope power
  systems at Idaho National Laboratory. The modern market structure was rebuilt after DOE
  and NASA restarted domestic production in 2012; a 0.5-kilogram shipment in July 2023
  marked the biggest delivery of new heat-source oxide in more than a decade.

