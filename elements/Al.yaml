symbol: Al
atomic_number: 13
name: aluminum
category: post_transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  Aluminum is a three-stream commodity. USGS MCS 2025 reports:
  (1) bauxite in thousand metric dry tons (raw ore); (2) alumina in
  thousand metric dry tons calcined equivalent (Al2O3); and (3)
  primary aluminum smelter output in thousand metric tons of metal.
  The standard conversion rule of thumb is 4 t dried bauxite → 2 t
  alumina → 1 t primary aluminum metal. US market spot prices for
  primary aluminum ingot are reported in cents per pound (source:
  S&P Global Platts Metals Week). Secondary aluminum from scrap is
  reported separately in US salient statistics but is not broken out
  in world production tables.

