byproduct_of: []
feedstock_origins:
  - substrate: bauxite_ore
    typical_concentration_pct: 25
    notes: |
      Bauxite is the sole commercial feedstock for alumina and primary aluminum
      production worldwide. Typical aluminum content in bauxite ore is 15-30%
      Al2O3 equivalent (expressed as Al: ~8-16%). The Bayer process refines
      bauxite to alumina; the Hall-Heroult process electrolyzes alumina to
      primary aluminum metal.
    source_id: usgs_mcs_2025_bauxite_alumina

