criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Aluminum is not on the US Critical Minerals List or the EU Critical Raw
    Materials list. Despite high US import reliance for bauxite (>75%) and
    alumina (~59%), aluminum metal itself is widely available from multiple
    suppliers and from secondary (recycled) sources. The US does maintain a
    small government stockpile of high-purity aluminum alloys.

