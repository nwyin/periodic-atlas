geopolitical_events:
  - date: 2024-01
    event: "New Madrid, MO primary aluminum smelter (263,000 t/yr) shuts down full production with no scheduled restart"
    impact: |
      US primary aluminum production declined 11% from 2023 to an estimated
      670,000 tons in 2024. Combined with the Hawesville, KY smelter idled
      since 2022, US smelting capacity utilization fell well below nameplate.
    source_id: usgs_mcs_2025_aluminum
  - date: 2024-03
    event: "U.S. Department of Energy announces $664 million in grants for aluminum operations"
    impact: |
      Grants include: $500M for a new smelter in the Ohio/Mississippi River
      Basins; $75M for a low-carbon aluminum casting plant in Ravenswood, WV;
      $67.3M for low-waste recycling in Wabash, IN; $22.3M for casting/rolling
      upgrades in Fort Lupton, CO. Signals federal commitment to rebuilding
      domestic smelting capacity.
    source_id: usgs_mcs_2025_aluminum
  - date: 2024-04
    event: "US and UK coordinate to ban Russian aluminum imports and restrict sale on global metal exchanges"
    impact: |
      Russia produces ~5.3% of world primary aluminum (3,800 kt in 2024).
      The ban restricts Russian aluminum from LME and OTC derivative trading
      in both countries, redirecting Russian volumes to non-Western markets.
    source_id: usgs_mcs_2025_aluminum
  - date: 2024-07
    event: "US imposes 10% duties on aluminum products from Mexico containing primary aluminum of Russian, Chinese, Belarussian, or Iranian origin"
    impact: |
      Canada is the largest source of US aluminum imports (56% of 2020-23
      average). The Mexico duty targets transshipment of non-ally primary
      aluminum. US also awarded $23M DOD grant to expand aluminum casting
      capacity by up to 136,000 t/yr at Muscle Shoals, AL.
    source_id: usgs_mcs_2025_aluminum
  - date: 2024-09
    event: "US increases tariffs on aluminum products imported from China from 0-7.5% to 25%"
    impact: |
      Part of broader US tariff escalation on Chinese goods. China represents
      ~60% of world aluminum smelting but exports primarily to Asian markets;
      direct US aluminum imports from China are modest (3% of 2020-23 average).
    source_id: usgs_mcs_2025_aluminum
  - date: 2024-09
    event: "UAE-based aluminum producer acquires 110,000 t/yr US secondary aluminum producer in Rosemont, MN"
    impact: "Signals Gulf-state aluminum producers expanding downstream into recycling."
    source_id: usgs_mcs_2025_aluminum

narrative: |
  Aluminum is the world's most-consumed non-ferrous metal, with a three-stage
  supply chain: bauxite mining (450 Mt/yr globally in 2024), alumina refining
  (142 Mt/yr), and primary aluminum smelting (72 Mt/yr). The 4:2:1 conversion
  ratio means the bauxite-to-metal chain is inherently energy and capital
  intensive. China dominates all three stages — 21% of bauxite, 59% of alumina
  refining, and 60% of aluminum smelting — making it the single largest
  influence on global aluminum pricing and supply.

  The US industry is in a structural transition. Primary smelting capacity
  has declined to 1,360 kt/yr, with only two of four operating smelters
  running at full capacity in 2024; primary output dropped 11% to 670 kt.
  The US relies on imports for >75% of its bauxite and ~59% of its alumina,
  principally from Jamaica (bauxite) and Brazil (alumina). However, secondary
  production from scrap (about 3.6 Mt in 2024) substantially offsets primary
  import dependence, and apparent consumption net import reliance for all
  aluminum forms was 47%. The DOE's $500 million grant for a new smelter
  signals intent to rebuild domestic primary capacity.

  Global bauxite reserves are enormous relative to demand — 29 billion tonnes
  at current 450 Mt/yr extraction equates to roughly 65 years of supply, and
  resources are estimated at 55-75 billion tonnes concentrated in Africa (32%),
  Oceania (23%), and South America (21%). Guinea holds the largest reserves
  (25.5%) and has become the world's largest bauxite producer. Aluminum is not
  classified as a critical mineral by the US or EU, reflecting its abundance
  and the recycling-driven resilience of supply, though the high energy
  intensity of primary smelting (roughly 14 MWh per tonne) means smelter
  location is determined primarily by electricity costs.

