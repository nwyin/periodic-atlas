geopolitical_events:
  - date: 2024-01
    event: "Canadian company announces restart of idled Idaho molybdenum mine for second half of 2027 and progressive ramp-up of Pennsylvania Mo-processing facility"
    impact: |
      The Idaho mine restart would represent a meaningful addition to U.S. primary molybdenum
      capacity, which is currently limited to two primary operations in Colorado. The mine
      was previously idled during a period of low prices; the restart announcement signals
      improved long-term price or strategic supply expectations. The Pennsylvania processing
      facility expansion would strengthen U.S. downstream Mo product capacity, potentially
      reducing U.S. dependence on ferromolybdenum imports (current supply: Chile 77%,
      Korea 19%, UK 3%).
    source_id: usgs_mcs_2025_molybdenum
  - date: 2024-01
    event: "Global molybdenum mine production rises 6% to 260,000 t in 2024; molybdic oxide price falls 13% to $41.72/kg"
    impact: |
      World output increased from 248,000 to 260,000 metric tons Mo content. China posted
      the largest absolute gain (+14,000 t to 110,000 t), and Peru rose +7,500 t to
      41,000 t (+22%), while Chile fell from 44,100 to 38,000 t (−14%). The 13% price
      decline alongside production growth suggests supply expanded faster than demand.
      Strong demand in global power generation and clean energy infrastructure projects
      was cited by USGS as supporting the market.
    source_id: usgs_mcs_2025_molybdenum
  - date: 2024-01
    event: "Declining ore grades at porphyry copper mines and anticipated end-of-life closures in mid-2030s threaten molybdenum byproduct supply"
    impact: |
      A substantial share of global Mo supply (all of Peru, Chile, and Mexico; partial
      contributions from China and the U.S.) comes from byproduct recovery at porphyry
      copper mines. Declining ore grades reduce Mo recovery per tonne of ore processed,
      and several large porphyry copper operations are expected to reach end-of-life in
      the mid-2030s. Unless new primary Mo deposits or expansions at existing primary mines
      offset this byproduct decline, a structural supply tightening is likely in the 2030s.
    source_id: usgs_mcs_2025_molybdenum

narrative: |
  Molybdenum is a refractory transition metal used primarily as an alloying agent in
  steels, cast irons, and superalloys, and secondarily in catalysts, lubricants, and
  specialty chemicals. World mine production reached an estimated 260,000 metric tons
  (Mo content) in 2024, a 6% increase from 248,000 metric tons in 2023. China dominates
  global supply at approximately 42% of world output (110,000 t in 2024e), followed by
  Peru (16%), Chile (15%), and the United States (13%). Of the five major producers —
  China, Peru, Chile, the United States, and Mexico, which together provide 90% of
  global supply — only China and the U.S. operate both primary molybdenum mines and
  byproduct copper operations. The remaining major producers extract molybdenum entirely
  as a byproduct of porphyry copper mining.

  The U.S. molybdic oxide reference price averaged $41.72/kg in 2024 (13% below 2023's
  $47/kg and well off the 2022 peak of $54.32/kg), while production increased — a
  combination suggesting supply growth outpaced demand. U.S. mine production of 33,000
  metric tons exceeds domestic apparent consumption of approximately 12,000 metric tons,
  making the United States a net exporter with E-category import reliance. Recycling
  of molybdenum from ferrous and superalloy scrap contributes as much as 30% of apparent
  Mo supply, a significant secondary flow for which no separate refining process exists —
  the Mo content of recycled alloys is reused in-situ. World reserves total approximately
  15 million metric tons, concentrated in China (39%), the United States (23%), Peru (13%),
  and Chile (9%).

  A significant structural risk is emerging from the byproduct supply side. As porphyry
  copper mines — which collectively provide the majority of global Mo output — experience
  declining ore grades and approach end-of-life, byproduct Mo recovery per unit of copper
  production will decline. USGS notes that several large porphyry copper mines are expected
  to reach end-of-life in the mid-2030s, potentially tightening Mo supply unless primary
  Mo mine expansions or new deposits fill the gap. Molybdenum is not designated as a
  critical mineral by either the United States (2022 list) or the European Union (EU CRMA),
  reflecting U.S. net-exporter status and globally diversified supply, but the medium-term
  byproduct dynamics warrant monitoring. Clean energy infrastructure and global power
  generation projects are expected to sustain demand for molybdenum-bearing high-strength
  steels and corrosion-resistant alloys.

