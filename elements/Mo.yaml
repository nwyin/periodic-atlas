symbol: Mo
atomic_number: 42
name: molybdenum
category: transition_metal
industrial_tier: 4
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports all molybdenum production data in metric tons, molybdenum
  content, unless otherwise specified. Mine production figures refer to molybdenite
  (MoS₂) concentrate expressed as Mo metal content. Reserves data are in thousand
  metric tons of Mo content per the World Mine Production and Reserves table (footnote 5).
  The reference price for molybdenum is the U.S. molybdic oxide (MoO₃, 57% Mo content)
  price in dollars per kilogram, as reported by Argus Media Group, Argus Non-Ferrous
  Markets. Commercial trade forms include molybdenum concentrate (MoS₂), technical-grade
  molybdic oxide (MoO₃), ferromolybdenum (FeMo, ~60–70% Mo), molybdenum metal powder,
  and various Mo chemicals. No standard temperature conventions apply to this chapter.

