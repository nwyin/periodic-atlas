byproduct_of: []

feedstock_origins:
  - substrate: molybdenite_concentrate
    typical_concentration_pct: null
    notes: |
      Molybdenite (MoS₂) is the primary ore mineral of molybdenum, recovered from large
      low-grade porphyry molybdenum deposits (e.g., Henderson and Climax in Colorado) or as
      a byproduct concentrate from porphyry copper processing. Molybdenite concentrate
      typically contains 50–55% Mo and is the standard commercial feedstock for roasting
      plants that produce molybdic oxide (MoO₃, 57% Mo). The U.S. operates three such
      roasting plants.
    source_id: usgs_mcs_2025_molybdenum
  - substrate: porphyry_copper_ore
    typical_concentration_pct: null
    notes: |
      A significant portion of global molybdenum supply is recovered as a byproduct during
      porphyry copper ore processing. USGS MCS 2025 notes that Peru, Chile, and Mexico
      produce molybdenum exclusively from byproduct copper operations; China and the U.S.
      produce from both primary Mo mines and byproduct copper mines. Declining ore grades
      at major porphyry copper deposits are expected to suppress future Mo byproduct output,
      and several large porphyry copper mines are expected to reach end-of-life in the
      mid-2030s, creating a medium-term supply constraint.
    source_id: usgs_mcs_2025_molybdenum

substitutes:
  - application: alloy_steels_and_cast_irons
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: "There is little substitution for molybdenum
      in its major application in steels and cast irons." Potential substitutes include
      boron, chromium, niobium (columbium), and vanadium in alloy steels, but each provides
      only a partial replacement for Mo's combination of hardenability improvement, high-
      temperature strength, and corrosion resistance. The note that "industry has sought to
      develop new materials that benefit from its alloying properties" reflects Mo's position
      as a preferred rather than essential element in many steels.
    source_id: usgs_mcs_2025_molybdenum
  - application: tool_steels
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: tungsten substitutes for molybdenum in tool
      steels. High-speed steel grades historically used tungsten (T-series, e.g., T1) but
      transitioned largely to molybdenum-containing M-series grades (e.g., M2) during the
      20th century for cost and density advantages. Substitution can occur in reverse under
      supply or price pressure, with trade-offs in density, hot-hardness, and cost.
    source_id: usgs_mcs_2025_molybdenum
  - application: refractory_materials
    availability: partial
    notes: |
      USGS MCS 2025 substitutes paragraph: graphite, tantalum, and tungsten substitute for
      molybdenum as refractory materials in high-temperature electric furnaces. Molybdenum's
      high melting point (2,623°C), good thermal conductivity, and competitive cost relative
      to tungsten make it the preferred refractory metal in many furnace components, but
      alternatives are technically viable at higher cost or with performance trade-offs.
    source_id: usgs_mcs_2025_molybdenum
  - application: pigments
    availability: full
    notes: |
      USGS MCS 2025 substitutes paragraph: cadmium-red, chrome-orange, and organic-orange
      pigments substitute for molybdenum orange (lead chromate molybdate). Regulatory
      restrictions on lead-containing pigments in many jurisdictions have accelerated
      substitution toward organic pigments in coatings and plastics. This is a minor end
      use within the Mo consumption mix and is largely already substituted in regulated markets.
    source_id: usgs_mcs_2025_molybdenum

end_uses:
  uses:
    - application: alloy_steels_and_cast_irons
      share_pct: 50
      confidence: low
      notes: |
        USGS MCS 2025 domestic production section: "Molybdenum is a refractory metallic
        element used principally as an alloying agent in cast iron, steel, and superalloys."
        The chapter does not provide explicit end-use percentage breakdowns for 2025. The ~50%
        share for alloy steels and cast irons is consistent with historical USGS molybdenum
        end-use data. Molybdenum improves hardenability, strength at elevated temperatures,
        and corrosion resistance in structural and engineering steels.
      source_id: usgs_mcs_2025_molybdenum
    - application: stainless_and_high_alloy_steels
      share_pct: 20
      confidence: low
      notes: |
        Stainless steels (particularly 316-grade with 2–3% Mo) rely on molybdenum for
        enhanced pitting-corrosion resistance in chloride environments. High-alloy and
        duplex stainless grades use higher Mo concentrations. Share based on historical USGS
        Mo end-use data; not explicitly stated in MCS 2025 chapter.
      source_id: usgs_mcs_2025_molybdenum
    - application: superalloys
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025 mentions superalloys as a major application. Nickel-base and cobalt-base
        superalloys used in jet engines, gas turbines, and aerospace components incorporate Mo
        for solid-solution strengthening and elevated-temperature performance. Share based on
        historical USGS Mo end-use data; not explicitly stated in MCS 2025.
      source_id: usgs_mcs_2025_molybdenum
    - application: catalysts
      share_pct: 10
      confidence: low
      notes: |
        Mo-based catalysts — primarily cobalt-molybdenum (Co-Mo) and nickel-molybdenum (Ni-Mo)
        on alumina supports — are used in petroleum refinery hydrodesulfurization (HDS) and
        hydrodenitrogenation (HDN) processes to produce low-sulfur fuels. These catalysts are
        essential to global fuel standards compliance. Share based on historical USGS Mo end-use
        data; not explicitly stated in MCS 2025.
      source_id: usgs_mcs_2025_molybdenum
    - application: lubricants_pigments_and_other_chemicals
      share_pct: 10
      confidence: low
      notes: |
        USGS MCS 2025: "numerous chemical applications, including catalysts, lubricants, and
        pigments." Molybdenum disulfide (MoS₂) is a major solid lubricant used in aerospace,
        automotive, and industrial machinery. Molybdenum orange pigment (lead chromate
        molybdate) is used in coatings and plastics (declining due to lead regulations). Other
        Mo chemicals include corrosion inhibitors and specialized compounds. Share based on
        historical USGS Mo data; not explicitly stated in MCS 2025.
      source_id: usgs_mcs_2025_molybdenum
  completeness: partial

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false
  notes: |
    Molybdenum does not appear on the U.S. 2022 Final Critical Minerals List (Federal
    Register Vol. 87, No. 37, February 22, 2022) or the EU Critical Raw Materials list
    (Regulation (EU) 2024/1252). The United States has significant domestic mine production
    (33,000 t in 2024) and is a net exporter (net import reliance = E), substantially
    reducing supply security risk compared with many industrial metals. However, the
    structural medium-term risk from declining ore grades at porphyry copper mines and
    anticipated end-of-life closures in the mid-2030s represents a non-trivial supply
    consideration not reflected in current criticality designations.

