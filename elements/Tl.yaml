symbol: Tl
atomic_number: 81
name: thallium
category: post_transition_metal
industrial_tier: 2
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports thallium "in kilograms unless otherwise specified." The
  commercial market is not a bulk ore trade: thallium is recovered in very small
  quantities as refined primary metal or compounds from flue dust generated during
  roasting of copper-, lead-, and zinc-bearing sulfide ores. USGS price data are an
  estimated average for 99.99%-pure thallium granules sold in 100-gram lots by three
  retailers and producers as of October 31 of each year.

production:
  - reporting_year: 2023
    refined:
      value: 10000
      unit: kg_per_year
      form: metal
      approximate: true
      confidence: medium
      notes: |
        USGS MCS 2025 states that in 2023, the latest year for which data were
        available, global thallium production was estimated to be about 10,000
        kilograms. The chapter presents this under "World Refinery Production and
        Reserves" and describes thallium as a byproduct recovered from flue dust in
        roasting of copper, lead, and zinc ores.
      source_id: usgs_mcs_2025_thallium
    refining_by_country:
      shares: []
      completeness: partial
    notes: |
      USGS does not publish a country-by-country production table for thallium because
      most producers withhold output data. The chapter identifies China, Kazakhstan,
      and Russia as the leading producers of primary thallium, but without numerical
      shares, so no country-share estimates are assigned here.

reserves:
  notes: |
    USGS MCS 2025 reports that quantitative estimates of thallium reserves were not
    available because it is difficult to identify deposits where thallium can be
    extracted economically. The chapter notes substantial thallium-rich deposits in
    Brazil, China, North Macedonia, and Russia, and says previous reserve estimates
    were based on the thallium content of zinc ores. It also states that world
    resources are adequate to meet requirements because recoverable thallium occurs
    in trace amounts in sulfide ores of copper, lead, zinc, and other metallic
    elements.

byproduct_of:
  - Cu
  - Pb
  - Zn

feedstock_origins:
  - substrate: copper_lead_zinc_sulfide_ore_roaster_flue_dust
    notes: |
      USGS identifies the major commercial source of thallium as flue dust produced
      during roasting of copper, lead, and zinc ores. Thallium is recovered as a
      byproduct from these metallurgical process streams rather than mined from
      dedicated thallium ore.
    source_id: usgs_mcs_2025_thallium
  - substrate: polymetallic_sulfide_ores
    notes: |
      The USGS world-resources discussion says recoverable thallium occurs in trace
      amounts in sulfide ores of copper, lead, zinc, and other metallic elements.
      This ore association is the reason thallium supply is structurally dependent on
      other base-metal smelting chains.
    source_id: usgs_mcs_2025_thallium

substitutes:
  - application: gamma_radiation_detection_and_infrared_optics
    availability: partial
    notes: |
      USGS MCS 2025 says other materials and formulations can substitute for
      thallium in gamma-radiation detection equipment and optics used for infrared
      detection and transmission, but thallium materials remain superior and more
      cost effective for these specialized uses.
    source_id: usgs_mcs_2025_thallium
  - application: cardiovascular_imaging
    availability: partial
    notes: |
      USGS MCS 2025 states that technetium-99m can be used in cardiovascular-imaging
      applications instead of thallium. The same chapter also says demand for
      thallium in medical nuclear imaging continued to decline because alternatives
      such as technetium-99m offered superior performance and availability.
    source_id: usgs_mcs_2025_thallium
  - application: high_density_liquids_gravity_separation
    availability: partial
    notes: |
      USGS MCS 2025 states that nontoxic substitutes such as tungsten compounds were
      being marketed as replacements for thallium in high-density liquids used for
      gravity separation of minerals.
    source_id: usgs_mcs_2025_thallium

end_uses:
  uses:
    - application: specialty_medical_electronic_optical_and_chemical_compounds
      share_pct: 100
      confidence: medium
      notes: |
        USGS MCS 2025 describes thallium demand as a small specialty market spanning
        radioisotope thallium-201 for cardiovascular imaging, sodium iodide crystals
        doped with thallium for photoelectric cells and gamma-radiation detection,
        thallium-barium-calcium-copper-oxide superconductors, infrared optical
        materials, thallium-arsenic-selenium crystal filters, mercury alloys for
        low-temperature thermometers and switches, glass additives, catalysts, and
        high-density liquids for mineral separation. The source does not publish a
        percentage split among these uses, so the market is represented here as one
        aggregated specialty-demand bucket.
      source_id: usgs_mcs_2025_thallium
  completeness: complete

criticality:
  us_critical_list_as_of_2025: false
  eu_crm_list_as_of_2024: false
  eu_strategic_list_as_of_2024: false

