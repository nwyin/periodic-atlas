    completeness: top_producers_only
  refining_by_country:
    shares:
      - country: CN
        share_pct: 92
        notes: |
          China controls approximately 90–92% of global REE separation and refining
          capacity. Dy₂O₃ separation and DyFe alloy production for NdFeB magnet grain
          boundary diffusion are concentrated in southern China, particularly Jiangxi and
          Fujian provinces where ion adsorption clay mining operations co-locate with
          separation facilities. China's near-monopoly on Dy refining is reinforced by
          its dominance in both the IAC ore source and the downstream sintered NdFeB
          magnet industry that consumes Dy. USGS MCS 2025 import sources (2020–23)
          confirm China supplied 70% of US REE compound and metal imports; China's
          actual global separation share for heavy REEs like Dy is higher (~90–92%)
          given the ore-type dependence on Chinese clay deposits.
        source_id: usgs_mcs_2025_rare_earths
      - country: MY
        share_pct: 5
        notes: |
          Lynas Advanced Materials Plant (LAMP) in Gebeng, Pahang, Malaysia processes
          Australian Mt. Weld concentrate into separated REE products. USGS MCS 2025
          import sources (2020–23): Malaysia 13% of US REE imports. However, Mt. Weld
          is LREE-dominant; LAMP's Dy output is minimal relative to China's. LAMP's
          contribution to the heavy REE separation market is small.
        source_id: usgs_mcs_2025_rare_earths
      - country: ZZ
        share_pct: 3
        notes: |
          Other non-Chinese Dy₂O₃ separation: Neo Performance Materials (Sillamäe,
          Estonia, 5% of US imports 2020–23), Japanese processors (6% of US imports
          2020–23), and nascent US separation capacity. Dy metal and DyFe alloy
          production outside China is essentially absent; magnet-grade Dy processing
          is a near-exclusive Chinese capability. Estonia and Japan source intermediates
          from Australian and Chinese concentrates per USGS text.
        source_id: usgs_mcs_2025_rare_earths
    completeness: complete
  notes: |
    World mine production 2024e = 390,000 t REO (rounded), up from 376,000 t in 2023.
    Increase driven by China (+15,000 t to 270,000 t), Nigeria (+5,800 t to 13,000 t),
    and Thailand (+9,400 t to 13,000 t), partially offset by Burma decline (-12,000 t
    to 31,000 t). All Dy-specific figures derived from REO totals using the ~2% basket
    share assumption; actual per-element disaggregation is not available from public
    USGS data. Dy's heavy-REE character means its actual geographic concentration is
    higher than the REO basket totals imply: Chinese southern-province clay deposits and
    Burmese clay operations are the dominant Dy sources, not the bastnaesite operations
    at Mountain Pass or Mt. Weld. Country shares sum to ~100.8% due to rounding of
    reported integers against the rounded world total.

