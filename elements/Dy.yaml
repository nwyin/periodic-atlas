byproduct_of: []

feedstock_origins:
  - substrate: ion_adsorption_clay
    typical_concentration_pct: 2.0
    notes: |
      Ion adsorption clay (IAC) deposits in southern China (Jiangxi, Fujian, Guangdong,
      Yunnan) and Southeast Asia (Myanmar border regions, Thailand) are the primary
      commercial source of heavy rare earth elements including dysprosium. IAC deposits
      contain ~1.5–3% Dy₂O₃ of total REOs, making them essential for the global Dy
      supply chain. These deeply weathered granite residual deposits are mined by in-situ
      leaching (ammonium sulfate or ammonium bicarbonate injection), yielding a mixed
      heavy-REE leachate that is processed into separated Dy₂O₃. USGS MCS 2025 confirms
      ion adsorption clay production is included in China, Myanmar, and Thailand figures.
      The environmental and geopolitical concentration of IAC deposits in southern China
      and neighboring regions is the core supply-chain vulnerability for Dy.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: bastnaesite_ore
    typical_concentration_pct: 0.3
    notes: |
      Bastnaesite (rare-earth fluorocarbonate mineral, CeFCO₃) is a light-REE-dominant
      mineral that contains very low concentrations of heavy REEs including Dy. Mountain
      Pass (CA) bastnaesite contains ~0.1–0.2% Dy₂O₃ of total REOs; Bayan Obo (CN)
      bastnaesite-monazite complex contains ~0.3–0.5% Dy₂O₃. USGS MCS 2025 confirms
      bastnaesite mined as a primary product at Mountain Pass in 2024. Bastnaesite is
      the primary source for La, Ce, Pr, and Nd but a minor and secondary source for Dy.
      Mountain Pass concentrate is exported (primarily to China) for separation; Dy is
      recovered in the heavy-REE separation stream.
    source_id: usgs_mcs_2025_rare_earths
  - substrate: monazite_sand
    typical_concentration_pct: 1.5
    notes: |
      Monazite (rare-earth phosphate, (Ce,La,Pr,Nd)PO₄ with heavy REE substitution) is
      stockpiled as a separated concentrate or recovered as an accessory mineral in
      heavy-mineral-sand concentrates. USGS MCS 2025 confirms monazite was stockpiled
      in the southeastern United States in 2024. Monazite typically contains ~1.5–2.5%
      Dy₂O₃ of total REOs depending on deposit location. Thorium content in monazite
      complicates processing under radioactive materials regulations. Monazite is an
      important potential source of Dy for Indian and Brazilian reserve development.
    source_id: usgs_mcs_2025_rare_earths

substitutes:
  - application: ndfeb_magnets_high_temperature
    availability: partial
    notes: |
      USGS MCS 2025: "Substitutes are available for many applications but generally are
      less effective." For Dy as a NdFeB magnet additive: terbium (Tb) can partially
      substitute for Dy to improve high-temperature coercivity (Tb is more effective
      per unit mass but far more expensive and scarcer — $810/kg Tb₂O₃ vs. $260/kg
      Dy₂O₃ in 2024e per USGS MCS 2025). Grain boundary diffusion (GBD) techniques
      can reduce total heavy-REE loading per magnet by concentrating Dy/Tb at grain
      surfaces rather than throughout the bulk, lowering consumption without sacrificing
      performance. In applications below ~80°C, Dy-free NdFeB formulations (e.g., for
      consumer electronics) exist, but EV traction motors operating at elevated
      temperatures (~120–180°C) require heavy-REE additives for adequate coercivity.
      No complete substitute exists for Dy in high-temperature NdFeB applications that
      simultaneously achieves required coercivity, thermal stability, and energy product.
    source_id: usgs_mcs_2025_rare_earths
  - application: magnetostrictive_alloys
    availability: none
    notes: |
      Terfenol-D (Tb₀.₃Dy₀.₇Fe₂) is a giant magnetostrictive alloy used in precision
      actuators, sonar transducers (undersea detection, submarine sonar), and vibration
      control systems. Dysprosium is structurally essential to Terfenol-D; the
      Tb:Dy ratio is tuned to achieve room-temperature magnetostriction. No direct
      material substitute provides equivalent magnetostrictive performance at ambient
      temperatures. Alternative transducer technologies (piezoelectric ceramics, PZT)
      substitute at reduced performance levels in non-defense applications.
    source_id: usgs_mcs_2025_rare_earths

end_uses:
  uses:
    - application: magnets_ndfeb_heavy_ree_additive
      share_pct: 80
      confidence: low
      notes: |
        Dysprosium's dominant end use is as a sintering additive to neodymium-iron-boron
        (NdFeB) permanent magnets, where it improves high-temperature coercivity — the
        resistance to demagnetization at elevated operating temperatures. EV traction
        motors operate at temperatures of 120–180°C and require NdFeB magnets with
        sufficient coercivity across that range; without Dy (or Tb) additions, standard
        NdFeB magnets demagnetize at these temperatures. Wind turbine permanent magnet
        generators (direct-drive PMSG) similarly require Dy-containing NdFeB magnets.
        Typical Dy loading is 3–7 wt% of the final magnet alloy for high-performance
        grades; grain boundary diffusion (GBD) techniques are reducing Dy content per
        magnet to ~1–3 wt% for lower-temperature applications. USGS MCS 2025 lists
        permanent magnets as a major REE end use. The 80% share is an industry consensus
        estimate; USGS does not report per-element end-use percentages. Dy demand is
        directly coupled to EV production growth: an average EV traction motor requires
        ~0.1–0.3 kg Dy depending on magnet grade and GBD usage.
      source_id: usgs_mcs_2025_rare_earths
    - application: magnetostrictive_alloys_terfenol
      share_pct: 8
      confidence: low
      notes: |
        Terfenol-D (Tb₀.₃Dy₀.₇Fe₂) is a giant magnetostrictive material used in high-
        precision sonar transducers (submarine and undersea surveillance sonar), active
        vibration control actuators, precision displacement actuators for metrology and
        optics, and linear motors. Dysprosium is a structural component of Terfenol-D
        (not merely an additive) making up ~70 mol% of the rare-earth component. USGS
        MCS 2025 Government Stockpile tables reflect defense procurement interest in
        materials including Dy. Share is an industry estimate.
      source_id: usgs_mcs_2025_rare_earths
    - application: nuclear_neutron_absorbers
      share_pct: 5
      confidence: low
      notes: |
        Dysprosium has a relatively high thermal neutron absorption cross-section
        (~1,000–2,700 barns across its naturally occurring isotopes Dy-164, Dy-162,
        Dy-163). Dy₂O₃ and Dy-bearing compounds are used as burnable neutron absorbers
        in nuclear fuel assemblies, where they burn out as the reactor cycle progresses,
        allowing self-regulation of reactivity. Applications include Dy-doped UO₂ fuel
        pellets and Dy₂O₃ control rod materials. USGS MCS 2025 lists metallurgical
        applications among REE end uses. Share is an estimate; nuclear use competes with
        gadolinium and hafnium as alternative neutron absorbers.
      source_id: usgs_mcs_2025_rare_earths
    - application: other_specialties
      share_pct: 7
      confidence: low
      notes: |
        Other Dy applications include: Dy-doped specialty laser crystals (Dy:YAG, Dy:LiYF₄
        for mid-infrared laser emission near 2.9 μm used in medical laser procedures and
        atmospheric sensing); Dy₂O₃ as a yellow-to-green phosphor component in specialized
        lighting; Dy-halide lamps (DyI₃ in metal halide discharge lamps); and minor use in
        Dy-doped solid oxide fuel cell electrolytes (ceria doped with Dy for improved ionic
        conductivity). These applications are individually small but technically significant
        in their respective niches. Share aggregates several minor uses; USGS does not
        disaggregate per-element end-use shares.
      source_id: usgs_mcs_2025_rare_earths
  completeness: complete

