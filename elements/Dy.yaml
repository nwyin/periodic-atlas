symbol: Dy
atomic_number: 66
name: dysprosium
category: lanthanide
industrial_tier: 3
commercial_production: true
snapshot_year: 2025
form_notes: |
  USGS MCS 2025 reports rare earth elements as a grouped commodity chapter ("rare
  earths") in metric tons of rare-earth-oxide (REO) equivalent; per-element tonnage
  is not published for individual REEs. Per-element attribution for dysprosium requires
  multiplying the aggregate by Dy's typical basket share. Dysprosium is commercially
  traded primarily as Dy₂O₃ (dysprosium(III) oxide) at ≥99.5% minimum purity for most
  applications — the purity tier listed in USGS MCS 2025 salient statistics. USGS MCS
  2025 explicitly prices dysprosium oxide at 99.5% minimum purity (Argus Media Group,
  Argus Non-Ferrous Markets, footnote 6). For magnet applications, dysprosium metal
  or DyFe alloys are used as grain-boundary diffusion additives to NdFeB sintered
  magnets to raise coercivity at elevated temperatures. All production figures in this
  file are derived by multiplying the USGS-reported aggregate REO totals by Dy's
  typical basket share of ~2%, which is not reported directly by USGS. The basket share
  varies strongly by deposit type: bastnaesite-dominant mines (Mountain Pass CA ~0.1–0.2%,
  Bayan Obo CN ~0.3–0.5%) yield very low Dy fractions because bastnaesite is a
  light-REE-dominant mineral; ion adsorption clay deposits in southern China (Jiangxi,
  Fujian, Guangdong) and Southeast Asia (Myanmar, Thailand) yield ~1.5–3% Dy₂O₃ because
  these deposits are heavy-REE enriched. A global weighted average of ~2% is used as
  the central estimate, heavily influenced by Chinese clay production. US figures are
  significantly overstated by this approach since Mountain Pass bastnaesite contributes
  almost no Dy to the basket. All data are in metric tons REO equivalent unless
  otherwise noted.

production:
- reporting_year: 2024
  mine:
    value: 7800
    unit: tonnes_per_year
    form: oxide
    approximate: true
    confidence: low
    notes: |
      Derived estimate: USGS MCS 2025 reports 2024e world total REE mine production of
      390,000 t REO equivalent. Multiplying by Dy's typical basket share of ~2% gives
      ~7,800 t Dy₂O₃ equivalent. Dy basket share is not reported separately by USGS;
      the 2% factor is an industry consensus figure reflecting the global weighted
      average, dominated by heavy-REE-enriched ion adsorption clay deposits in southern
      China and Southeast Asia (~1.5–3% Dy) and diluted by LREE-dominant bastnaesite
      mines at Mountain Pass (~0.1–0.2% Dy) and Bayan Obo (~0.3–0.5% Dy). Actual Dy
      output is not officially disaggregated from the REE basket in public USGS data.
      The 2023 comparable estimate is ~7,520 t at the same 2% share applied to 376,000 t
      world total. The 2% basket share implies Dy production is disproportionately
      concentrated in southern China and SE Asia relative to the overall REO basket.
    source_id: usgs_mcs_2025_rare_earths
  grouped_reporting: true
  commodity_group: rare_earths
