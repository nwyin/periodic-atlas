criticality:
  us_critical_list_as_of_2025: true
  us_critical_source_id: usgs_mcs_2025_rare_earths
  eu_crm_list_as_of_2024: true
  eu_crm_source_id: usgs_mcs_2025_rare_earths
  eu_strategic_list_as_of_2024: true
  eu_strategic_source_id: usgs_mcs_2025_rare_earths
  notes: |
    Dysprosium is classified as critical under the US 2022 Critical Minerals List (as
    part of "rare earth elements" group designation). US net import reliance for REE
    compounds and metals: 80% in 2024e (down from >95% in 2020–2023) per USGS MCS 2025
    salient statistics. Dy's specific criticality is amplified beyond the general REE
    basket because: (1) Dy is sourced predominantly from heavy-REE-enriched ion
    adsorption clay deposits concentrated in southern China and bordering Southeast Asia,
    not the broadly distributed bastnaesite mines; (2) no separation or magnet-grade Dy
    metal production exists outside China at significant scale; (3) Dy is structurally
    essential for high-temperature NdFeB permanent magnets in EV traction motors and
    wind turbines — the two fastest-growing demand categories for which there is no
    near-term material substitute. Dysprosium is included in EU Regulation 2024/1252
    (Critical Raw Materials Act, CRMA) under "heavy rare earth elements" as a Critical
    Raw Material and Strategic Raw Material. China's April 2025 export controls directly
    named dysprosium as one of seven REEs subject to export license requirements,
    representing the most acute supply-chain disruption event for Dy in recent history.
    Import sources 2020–23: China 70%, Malaysia 13%, Japan 6%, Estonia 5% (USGS MCS 2025).

geopolitical_events:
  - date: "2025-04"
    event: "China imposes direct export controls on dysprosium and 6 other REEs (Sm, Gd, Tb, Lu, Sc, Y)"
    impact: |
      China's April 2025 announcement of export controls on seven rare earth elements
      explicitly named dysprosium metal, Dy₂O₃ oxide, and Dy-containing alloys as
      controlled substances requiring export licenses. This is the most significant
      supply-chain disruption event for Dy in the USGS MCS 2025 reporting window, with
      direct implications for NdFeB magnet producers outside China (primarily Japan,
      Germany, and emerging US capacity) that depend on Chinese Dy₂O₃ and DyFe alloy
      imports. EV manufacturers relying on Dy-containing NdFeB traction motors
      (including non-Chinese automakers with global supply chains) face medium-term
      supply uncertainty. The export controls, applied through China's Dual-Use Export
      Control list mechanism, allow China to selectively approve or deny licenses,
      creating pricing and availability uncertainty without necessarily halting all
      exports. Non-Chinese magnet producers with stockpiles gained short-term buffer;
      longer-term responses include accelerated GBD adoption to reduce Dy loading per
      magnet, Tb substitution, and sourcing from non-Chinese ion adsorption clay deposits
      (primarily Myanmar and Thailand, which supply Dy precursors to China anyway).
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "Burma (Myanmar) REE production falls 28% to 31,000 t REO in 2024e, reducing global heavy-REE supply"
    impact: |
      USGS MCS 2025 reports Burma REE production declined from 43,000 t in 2023 to
      31,000 t in 2024e, a 28% drop attributed to reduced mining activity in border
      regions. Myanmar's ion adsorption clay deposits are heavy-REE enriched (~2–4%
      Dy₂O₃) making them disproportionately important for global Dy supply relative
      to their share of total REO production. The 12,000 t REO decline from Burma
      implies a reduction of ~240–480 t Dy₂O₃ equivalent (at 2–4% basket share) from
      this source. Production estimated from China import records (USGS footnote 12).
      Myanmar IAC output has been politically volatile due to military conflict since
      the 2021 coup; further supply disruptions are possible.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "Global REE mine production increases to 390,000 t REO in 2024e, with heavy-REE contribution driven by China quota increase"
    impact: |
      USGS MCS 2025 reports 2024e world REE production of 390,000 t REO, up from
      376,000 t in 2023. China rose from 255,000 to 270,000 t; Nigeria from 7,200 to
      13,000 t; Thailand from 3,600 to 13,000 t; Burma fell from 43,000 to 31,000 t.
      For Dy specifically, the China quota increase (+15,000 t REO) is significant
      because it includes heavy-REE output from southern-province ion adsorption clay
      operations (Jiangxi, Fujian, Guangdong quotas). The Nigerian and Thai increases
      contribute uncertain Dy volumes; Thailand's clay deposits may add meaningful
      heavy-REE supply. At ~2% basket share, world Dy production rose from ~7,520 t
      in 2023 to ~7,800 t in 2024e.
    source_id: usgs_mcs_2025_rare_earths
  - date: "2024-01"
    event: "US net import reliance for REE compounds and metals declines to 80% in 2024e; Dy-specific domestic separation remains absent"
    impact: |
      USGS MCS 2025 salient statistics report US net import reliance for REE compounds
      and metals at 80% in 2024e, down from >95% in 2020–2023. Domestic compound
      production grew to 1,300 t reported (7,600 t total per USGS footnote 3) in 2024.
      Despite this improvement, Dy-specific domestic processing capacity is entirely
      absent: Mountain Pass bastnaesite concentrate (LREE-dominant, low Dy) is shipped
      to China for separation, and no US facility separates Dy₂O₃ or produces DyFe
      alloy. US NdFeB magnet manufacturers and their EV OEM customers remain entirely
      dependent on imported Dy metal or oxide intermediates. The 80% figure for overall
      REE net import reliance understates the dependency for heavy REEs like Dy, which
      lack any domestic production pathway.
    source_id: usgs_mcs_2025_rare_earths

narrative: |
  Dysprosium is the most commercially critical heavy rare earth element, defined almost
  entirely by its role as a coercivity-enhancing additive to neodymium-iron-boron (NdFeB)
  permanent magnets. NdFeB magnets are the dominant magnet technology for EV traction
  motors and wind turbine generators — the two fastest-growing applications in the energy
  transition — but without dysprosium (or terbium) additions of 3–7 wt%, NdFeB magnets
  lose coercivity at the elevated temperatures (120–180°C) that characterize EV motor
  operation. Grain boundary diffusion (GBD) technology is reducing Dy loading per magnet
  to ~1–3 wt% in some applications, but Dy cannot be eliminated from high-performance
  NdFeB grades. Unlike neodymium and praseodymium — which are the bulk of the NdFeB
  alloy — dysprosium is consumed in relatively small amounts per magnet, but its extreme
  supply-chain concentration makes it the strategic chokepoint in the heavy-REE basket.

  Dysprosium's geographic concentration problem is categorically different from light
  REEs. While La, Ce, and Nd can be sourced from multiple deposit types including widely
  distributed bastnaesite mines, Dy is predominantly produced from ion adsorption clay
  (IAC) deposits — a deposit type concentrated in southern China's weathered granites
  (Jiangxi, Fujian, Guangdong) and the border regions of Myanmar and Thailand. At ~2%
  of total REO in IAC deposits versus ~0.1–0.2% in Mountain Pass bastnaesite, China's
  IAC operations and Burmese cross-border clay mining supply the overwhelming majority
  of global Dy₂O₃. USGS MCS 2025 data show world production of 390,000 t REO in 2024e,
  implying ~7,800 t Dy₂O₃ at 2% basket share. China's 92% refining dominance for Dy
  is reinforced by the ore-type dependency: the IAC mining regions in southern China
  co-locate with the refining infrastructure. US import sources (2020–23): China 70%,
  Malaysia 13%, Japan 6%, Estonia 5% per USGS MCS 2025.

  China's April 2025 imposition of export controls on dysprosium — one of seven REEs
  explicitly named — is the sharpest supply-chain risk materialization for Dy in recent
  history. USGS MCS 2025 salient statistics show Dy₂O₃ (99.5%) at $260/kg in 2024e,
  down from a peak of $410/kg in 2021 but still at a heavy scarcity premium: roughly
  4.6× the price of Nd₂O₃ and 260× Ce₂O₃ per the same source. The combination of
  export controls, Myanmar supply volatility (28% production decline in 2024), and
  absence of any significant non-Chinese separation capacity for Dy₂O₃ or DyFe alloy
  creates chronic single-supplier dependency for a material that is structurally
  essential to the energy transition technology base.

